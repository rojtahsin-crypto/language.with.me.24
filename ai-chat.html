<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LinguaAI — Chat Widget Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#faf8f3;--bg2:#f2ede0;--bg3:#ebe4d1;
  --text:#1c1a16;--text2:#5a5040;--text3:#9a8e78;
  --border:#dfd7c2;--shadow:rgba(28,26,22,.07);--shadow-lg:rgba(28,26,22,.18);
  --r:16px;--rs:10px;--t:.28s cubic-bezier(.4,0,.2,1);
  --accent:#059669;--acbg:#ecfdf5;--acbo:#a7f3d0;
}
[data-theme=dark]{
  --bg:#131109;--bg2:#1c1912;--bg3:#24201a;
  --text:#f0ead8;--text2:#b8a88a;--text3:#6a5f45;
  --border:#2e2820;--shadow:rgba(0,0,0,.35);--shadow-lg:rgba(0,0,0,.55);
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}

/* ── CHAT BUBBLE BUTTON ── */
#chatBubble{
  position:fixed;bottom:1.75rem;right:1.75rem;z-index:1000;
  width:58px;height:58px;border-radius:50%;
  background:var(--accent);border:none;cursor:pointer;
  box-shadow:0 8px 28px rgba(5,150,105,.45);
  display:flex;align-items:center;justify-content:center;
  transition:all var(--t);font-size:1.5rem;
}
#chatBubble:hover{transform:scale(1.1);box-shadow:0 12px 36px rgba(5,150,105,.55)}
#chatBubble.open{background:#ef4444;box-shadow:0 8px 28px rgba(239,68,68,.4)}
.bubble-badge{
  position:absolute;top:-4px;right:-4px;
  background:#ef4444;color:#fff;font-size:.62rem;font-weight:900;
  width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  border:2px solid var(--bg);animation:pulse 2s ease infinite;
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

/* ── CHAT PANEL ── */
#chatPanel{
  position:fixed;bottom:5.5rem;right:1.75rem;z-index:999;
  width:min(390px,calc(100vw - 2rem));
  background:var(--bg);border:1.5px solid var(--border);
  border-radius:var(--r);box-shadow:0 24px 64px var(--shadow-lg);
  display:flex;flex-direction:column;overflow:hidden;
  max-height:min(580px,calc(100vh - 8rem));
  transform:translateY(16px) scale(.97);opacity:0;pointer-events:none;
  transition:all .3s cubic-bezier(.4,0,.2,1);
}
#chatPanel.visible{transform:translateY(0) scale(1);opacity:1;pointer-events:all}

/* panel header */
.cp-head{
  background:var(--bg2);border-bottom:1.5px solid var(--border);
  padding:1rem 1.1rem;display:flex;align-items:center;gap:.75rem;flex-shrink:0;
}
.cp-avatar{
  width:38px;height:38px;border-radius:50%;
  background:var(--accent);display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;flex-shrink:0;position:relative;
}
.cp-avatar::after{
  content:'';position:absolute;bottom:1px;right:1px;
  width:9px;height:9px;background:#22c55e;border-radius:50%;border:2px solid var(--bg2);
}
.cp-info{flex:1}
.cp-name{font-family:'Libre Baskerville',serif;font-weight:700;font-size:.97rem;line-height:1.2}
.cp-status{font-size:.75rem;color:var(--text3);font-weight:600}
.cp-lang{
  background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--rs);
  padding:.28rem .7rem;font-size:.78rem;font-weight:700;color:var(--text2);cursor:pointer;
  display:flex;align-items:center;gap:.3rem;transition:all var(--t);
}
.cp-lang:hover{border-color:var(--accent);color:var(--accent)}

/* lang picker */
.lang-picker{
  background:var(--bg2);border-bottom:1.5px solid var(--border);
  padding:.6rem .8rem;display:none;gap:.5rem;flex-wrap:wrap;
}
.lang-picker.show{display:flex}
.lpbtn{
  padding:.3rem .75rem;border-radius:var(--rs);border:1.5px solid var(--border);
  background:var(--bg);color:var(--text);font-size:.8rem;font-weight:700;
  cursor:pointer;transition:all var(--t);font-family:'Nunito',sans-serif;
}
.lpbtn:hover,.lpbtn.active{background:var(--acbg);border-color:var(--acbo);color:var(--accent)}

/* messages */
.cp-msgs{
  flex:1;overflow-y:auto;padding:.9rem;display:flex;flex-direction:column;gap:.6rem;
  scroll-behavior:smooth;
}
.cp-msgs::-webkit-scrollbar{width:4px}
.cp-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.msg{display:flex;gap:.5rem;animation:fadeIn .25s ease both;max-width:88%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-av{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:var(--accent);display:flex;align-items:center;justify-content:center;
  font-size:.75rem;margin-top:2px;
}
.msg.user .msg-av{background:var(--bg3);border:1.5px solid var(--border)}
.msg-bbl{
  padding:.6rem .85rem;border-radius:12px;font-size:.88rem;line-height:1.55;
  background:var(--bg2);border:1.5px solid var(--border);color:var(--text);
}
.msg.user .msg-bbl{
  background:var(--accent);border-color:var(--accent);color:#fff;border-radius:12px 12px 2px 12px;
}
.msg.bot .msg-bbl{border-radius:12px 12px 12px 2px}
.msg-bbl.typing{display:flex;align-items:center;gap:3px;padding:.65rem .85rem}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:bounce .9s ease infinite}
.dot:nth-child(2){animation-delay:.18s}.dot:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* input bar */
.cp-foot{
  border-top:1.5px solid var(--border);padding:.7rem .8rem;
  display:flex;align-items:center;gap:.5rem;flex-shrink:0;background:var(--bg);
}
#chatInp{
  flex:1;padding:.55rem .8rem;border:1.5px solid var(--border);border-radius:var(--rs);
  background:var(--bg2);color:var(--text);font-family:'Nunito',sans-serif;font-size:.88rem;
  transition:all var(--t);resize:none;height:36px;max-height:90px;overflow-y:auto;line-height:1.4;
}
#chatInp:focus{outline:none;border-color:var(--accent);background:var(--bg)}
#chatInp::placeholder{color:var(--text3)}
.foot-btn{
  width:36px;height:36px;border-radius:var(--rs);border:1.5px solid var(--border);
  background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:1rem;transition:all var(--t);flex-shrink:0;color:var(--text);
}
.foot-btn:hover{background:var(--bg3);border-color:var(--text3)}
#sendBtn{background:var(--accent);border-color:var(--accent);color:#fff}
#sendBtn:hover{opacity:.88}
#micBtn.recording{background:#ef4444;border-color:#ef4444;color:#fff;animation:micPulse 1s ease infinite}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 6px rgba(239,68,68,0)}}

/* speak btn inside bubble */
.speak-btn{
  display:inline-flex;align-items:center;gap:.3rem;
  background:var(--bg3);border:1px solid var(--border);border-radius:6px;
  padding:.18rem .5rem;font-size:.75rem;font-weight:700;cursor:pointer;
  margin-top:.35rem;color:var(--text2);transition:all var(--t);
}
.speak-btn:hover{border-color:var(--accent);color:var(--accent)}
.speak-btn.speaking{color:var(--accent);border-color:var(--accent);background:var(--acbg)}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* demo page hint */
.demo-hint{
  text-align:center;color:var(--text3);font-size:.88rem;font-weight:600;
  max-width:300px;line-height:1.6;
}
.demo-hint strong{color:var(--text);font-size:1rem;display:block;margin-bottom:.4rem;font-family:'Libre Baskerville',serif}
</style>
</head>
<body>

<div class="demo-hint">
  <strong>LinguaAI — Chat Widget</strong>
  کلیک بکە لەسەر دوگمەی سەوزەی ئاستەوەی ئەراستە بۆ چاتکردن لەگەڵ AI مامۆستا<br><br>
  <span style="font-size:.8rem;opacity:.7">این کد دابنێ لە وێبسایتەکەت</span>
</div>

<!-- ═══ CHAT BUBBLE ═══ -->
<button id="chatBubble" onclick="toggleChat()" title="Chat with AI Teacher">
  <span id="bubbleIco">💬</span>
  <span class="bubble-badge" id="bubbleBadge">1</span>
</button>

<!-- ═══ CHAT PANEL ═══ -->
<div id="chatPanel">

  <!-- Header -->
  <div class="cp-head">
    <div class="cp-avatar">🎓</div>
    <div class="cp-info">
      <div class="cp-name" id="cpName">AI Language Teacher</div>
      <div class="cp-status" id="cpStatus">Online — ready to help</div>
    </div>
    <div class="cp-lang" onclick="toggleLangPicker()" id="cpLangBtn">
      <span id="cpLangFlag">🇬🇧</span>
      <span id="cpLangCode">EN</span>
      <span style="font-size:.65rem;opacity:.6">▼</span>
    </div>
  </div>

  <!-- Language picker -->
  <div class="lang-picker" id="langPicker">
    <button class="lpbtn active" onclick="setLang('en')">🇬🇧 English</button>
    <button class="lpbtn" onclick="setLang('nl')">🇳🇱 Nederlands</button>
    <button class="lpbtn" onclick="setLang('fr')">🇫🇷 Français</button>
    <button class="lpbtn" onclick="setLang('ar')">🇸🇦 عربي</button>
    <button class="lpbtn" onclick="setLang('de')">🇩🇪 Deutsch</button>
    <button class="lpbtn" onclick="setLang('es')">🇪🇸 Español</button>
    <button class="lpbtn" onclick="setLang('tr')">🇹🇷 Türkçe</button>
  </div>

  <!-- Messages -->
  <div class="cp-msgs" id="cpMsgs"></div>

  <!-- Footer -->
  <div class="cp-foot">
    <button class="foot-btn" id="micBtn" onclick="toggleMic()" title="Voice input">🎤</button>
    <textarea id="chatInp" placeholder="Type your message..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
      oninput="autoResize(this)"></textarea>
    <button class="foot-btn" id="sendBtn" onclick="sendMsg()" title="Send">➤</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
const API_KEY = 'YOUR_ANTHROPIC_API_KEY'; // ← کلیلەکەت ئەمجا دابنێ

let chatLang = 'en';
let panelOpen = false;
let isRecording = false;
let recognition = null;
let currentUtterance = null;
let chatHistory = [];
let greeted = false;

const LANG_CFG = {
  en: {
    flag:'🇬🇧', code:'EN',

    teacherName:'Ms. Grace',
    status:'Online — ready to help',
    placeholder:'Type your message...',
    voiceLang:'en-GB',
    system:`You are Ms. Grace, a warm and encouraging British English teacher on a language learning website called LinguaAI.
Your job: have NATURAL conversations with the learner to help them practise English grammar and vocabulary.
Rules:
- Chat naturally like a real teacher friend, NOT like a robot
- Keep replies SHORT (2-4 sentences max) unless the student asks for a long explanation
- Gently correct grammar mistakes IN the conversation, e.g. "Nice! Just a small note: we say 'I went' not 'I goed' 😊"
- Ask follow-up questions to keep the conversation going
- Be warm, funny sometimes, encouraging always
- If they ask about grammar rules, explain clearly with examples
- Use British English spelling and expressions`
  },
  nl: {
    flag:'🇳🇱', code:'NL',
    teacherName:'Juf Emma',
    status:'Online — klaar om te helpen',
    placeholder:'Typ je bericht...',
    voiceLang:'nl-NL',
    system:`Je bent Juf Emma, een gezellige en bemoedigende Nederlandse taallerares op een taalwebsite genaamd LinguaAI.
Jouw taak: voer NATUURLIJKE gesprekken met de leerling om Nederlands te oefenen.
Regels:
- Praat natuurlijk zoals een echte leraarsvriend, NIET als een robot
- Houd antwoorden KORT (2-4 zinnen max) tenzij om uitleg gevraagd wordt
- Verbeter grammaticafouten vriendelijk IN het gesprek, bijv. "Goed! Kleine noot: we zeggen 'ik ging' niet 'ik gaan' 😊"
- Stel vervolgvragen om het gesprek gaande te houden
- Wees warm, soms grappig, altijd bemoedigend
- Als ze vragen over grammaticaregels stellen, leg dan duidelijk uit met voorbeelden`
  },
  fr: {
    flag:'🇫🇷', code:'FR',
    teacherName:'Prof. Claire',
    status:'En ligne — prêt à aider',
    placeholder:'Écrivez votre message...',
    voiceLang:'fr-FR',
    system:`Tu es Prof. Claire, une professeure de français chaleureuse et encourageante sur un site d'apprentissage des langues appelé LinguaAI.
Ton rôle : avoir des conversations NATURELLES avec l'apprenant pour pratiquer le français.
Règles :
- Parle naturellement comme une vraie amie-professeure, PAS comme un robot
- Garde les réponses COURTES (2-4 phrases max) sauf si une explication est demandée
- Corrige doucement les fautes de grammaire DANS la conversation, ex. "Bien ! Petite note : on dit 'je suis allé' pas 'j'ai allé' 😊"
- Pose des questions de suivi pour continuer la conversation
- Sois chaleureuse, parfois drôle, toujours encourageante`
  },
  ar: {
    flag:'🇸🇦', code:'AR',
    teacherName:'الأستاذة نور',
    status:'متصلة — جاهزة للمساعدة',
    placeholder:'اكتب رسالتك...',
    voiceLang:'ar-SA',
    system:`أنتِ الأستاذة نور، معلمة لغة عربية فصحى دافئة على موقع LinguaAI. مهمتك: محادثات طبيعية لتحسين العربية الفصحى. القواعد: تحدثي بشكل طبيعي كمعلمة حقيقية. اجعلي الردود قصيرة 2-4 جمل. صححي الأخطاء بلطف. اطرحي أسئلة متابعة. كوني مشجعة دائماً. استخدمي الفصحى دائماً.`
  },
  de: {
    flag:'🇩🇪', code:'DE',
    teacherName:'Frau Schmidt',
    status:'Online — bereit zu helfen',
    placeholder:'Schreib deine Nachricht...',
    voiceLang:'de-DE',
    system:`Du bist Frau Schmidt, eine herzliche Deutschlehrerin auf LinguaAI. Fuehre natuerliche Gespraeche. Halte Antworten kurz (2-4 Saetze). Korrigiere Fehler freundlich. Stelle Folgefragen. Sei warm und ermutigend.`
  },
  es: {
    flag:'🇪🇸', code:'ES',
    teacherName:'Profa. Lucía',
    status:'En línea — lista para ayudar',
    placeholder:'Escribe tu mensaje...',
    voiceLang:'es-ES',
    system:`Eres la Profa. Lucia, profesora de espanol en LinguaAI. Ten conversaciones naturales. Respuestas cortas (2-4 frases). Corrige errores con amabilidad. Haz preguntas de seguimiento. Se alentadora siempre.`
  },
  tr: {
    flag:'🇹🇷', code:'TR',
    teacherName:'Öğretmen Ayşe',
    status:'Çevrimiçi — yardıma hazır',
    placeholder:'Mesajını yaz...',
    voiceLang:'tr-TR',
    system:`Sen LinguaAI sitesinde Turkce ogretmenisin: Ogretmen Ayse. Dogal sohbetler yap. Kisa yanitlar ver (2-4 cumle). Hatalari nazikce duzelt. Takip sorulari sor. Her zaman cesaretlendirici ol.`
  }
};

// ══════════════════════════════════════════
// PANEL TOGGLE
// ══════════════════════════════════════════
function toggleChat() {
  panelOpen = !panelOpen;
  document.getElementById('chatPanel').classList.toggle('visible', panelOpen);
  document.getElementById('chatBubble').classList.toggle('open', panelOpen);
  document.getElementById('bubbleIco').textContent = panelOpen ? '✕' : '💬';
  document.getElementById('bubbleBadge').style.display = 'none';
  if(panelOpen && !greeted) { greeted=true; sendGreeting(); }
  if(panelOpen) setTimeout(()=>document.getElementById('chatInp').focus(), 300);
}

// ══════════════════════════════════════════
// LANGUAGE
// ══════════════════════════════════════════
function toggleLangPicker() {
  document.getElementById('langPicker').classList.toggle('show');
}

function setLang(l) {
  chatLang = l;
  const cfg = LANG_CFG[l];
  document.getElementById('cpLangFlag').textContent = cfg.flag;
  document.getElementById('cpLangCode').textContent = cfg.code;
  document.getElementById('cpName').textContent = cfg.teacherName;
  document.getElementById('cpStatus').textContent = cfg.status;
  document.getElementById('chatInp').placeholder = cfg.placeholder;
  document.querySelectorAll('.lpbtn').forEach((b,i)=>{
    b.classList.toggle('active', ['en','nl','fr','ar','de','es','tr'][i]===l);
  });
  document.getElementById('langPicker').classList.remove('show');
  // reset chat
  chatHistory = [];
  document.getElementById('cpMsgs').innerHTML = '';
  greeted = false;
  sendGreeting();
}

// ══════════════════════════════════════════
// GREETING
// ══════════════════════════════════════════
async function sendGreeting() {
  const greets = {
    en: "Hello! 👋 I'm Ms. Grace, your English teacher. What would you like to practise today — grammar, vocabulary, or just have a conversation?",
    nl: "Hallo! 👋 Ik ben Juf Emma, jouw Nederlandse lerares. Wat wil je vandaag oefenen — grammatica, woordenschat, of gewoon een gesprekje?",
    fr: "Bonjour ! 👋 Je suis Prof. Claire, ta professeure de français. Qu'est-ce que tu voudrais pratiquer aujourd'hui — la grammaire, le vocabulaire, ou juste une conversation ?",
    ar: "مرحباً! 👋 أنا الأستاذة نور، معلمتك للغة العربية. ماذا تريد أن تتدرب عليه اليوم — القواعد، أم المفردات، أم مجرد محادثة؟",
    de: "Hallo! 👋 Ich bin Frau Schmidt, deine Deutschlehrerin. Was möchtest du heute üben — Grammatik, Wortschatz oder einfach ein Gespräch?",
    es: "¡Hola! 👋 Soy la Profa. Lucía, tu profesora de español. ¿Qué te gustaría practicar hoy — gramática, vocabulario o simplemente conversar?",
    tr: "Merhaba! 👋 Ben Öğretmen Ayşe, Türkçe öğretmenisin. Bugün ne üzerinde çalışmak istersin — gramer, kelime bilgisi, yoksa sadece konuşmak mı?"
  };
  addMsg('bot', greets[chatLang]);
}

// ══════════════════════════════════════════
// SEND MESSAGE
// ══════════════════════════════════════════
async function sendMsg() {
  const inp = document.getElementById('chatInp');
  const text = inp.value.trim();
  if(!text) return;
  inp.value = '';
  inp.style.height = '36px';

  addMsg('user', text);
  chatHistory.push({role:'user', content:text});

  // typing indicator
  const typId = addTyping();

  try {
    const cfg = LANG_CFG[chatLang];
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': API_KEY,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:400,
        system: cfg.system,
        messages: chatHistory
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || '⚠️ No response.';
    removeTyping(typId);
    addMsg('bot', reply, true);
    chatHistory.push({role:'assistant', content:reply});
    // keep history short
    if(chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
  } catch(e) {
    removeTyping(typId);
    addMsg('bot', '⚠️ Connection error. Please check your API key and try again.');
  }
}

// ══════════════════════════════════════════
// ADD MESSAGE
// ══════════════════════════════════════════
function addMsg(role, text, withSpeak=false) {
  const wrap = document.getElementById('cpMsgs');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const isBot = role==='bot';
  const speakId = 'spk'+Date.now();
  div.innerHTML = `
    <div class="msg-av">${isBot?'🎓':'👤'}</div>
    <div>
      <div class="msg-bbl">${escHtml(text)}</div>
      ${isBot && withSpeak ? `<button class="speak-btn" id="${speakId}" onclick="speakText(this,'${escAttr(text)}')">🔊 Listen</button>` : ''}
    </div>
  `;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return div;
}

function addTyping() {
  const wrap = document.getElementById('cpMsgs');
  const id = 'typ'+Date.now();
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = id;
  div.innerHTML = `<div class="msg-av">🎓</div><div class="msg-bbl typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return id;
}
function removeTyping(id) {
  const el = document.getElementById(id);
  if(el) el.remove();
}

// ══════════════════════════════════════════
// TEXT TO SPEECH
// ══════════════════════════════════════════
function speakText(btn, text) {
  if(currentUtterance) {
    speechSynthesis.cancel();
    currentUtterance = null;
    document.querySelectorAll('.speak-btn.speaking').forEach(b=>{b.classList.remove('speaking');b.textContent='🔊 Listen'});
    if(btn.classList.contains('was-speaking')) {btn.classList.remove('was-speaking');return;}
  }
  const cfg = LANG_CFG[chatLang];
  const u = new SpeechSynthesisUtterance(text);
  u.lang = cfg.voiceLang;
  u.rate = 0.92;
  u.pitch = 1.05;
  currentUtterance = u;
  btn.classList.add('speaking','was-speaking');
  btn.textContent = '⏹ Stop';
  u.onend = ()=>{
    btn.classList.remove('speaking','was-speaking');
    btn.textContent = '🔊 Listen';
    currentUtterance = null;
  };
  speechSynthesis.speak(u);
}

// ══════════════════════════════════════════
// SPEECH TO TEXT (MIC)
// ══════════════════════════════════════════
function toggleMic() {
  if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Your browser does not support voice input. Try Chrome or Edge.');
    return;
  }
  if(isRecording) {
    recognition?.stop();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = LANG_CFG[chatLang].voiceLang;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = ()=>{
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micBtn').textContent = '⏹';
  };
  recognition.onresult = e=>{
    const t = e.results[0][0].transcript;
    document.getElementById('chatInp').value = t;
    autoResize(document.getElementById('chatInp'));
  };
  recognition.onend = ()=>{
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').textContent = '🎤';
    // auto send if got text
    if(document.getElementById('chatInp').value.trim()) sendMsg();
  };
  recognition.onerror = ()=>{
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').textContent = '🎤';
  };
  recognition.start();
}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function autoResize(el) {
  el.style.height = '36px';
  el.style.height = Math.min(el.scrollHeight, 90)+'px';
}
function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}
function escAttr(t){return t.replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/\n/g,' ').substring(0,200)}
