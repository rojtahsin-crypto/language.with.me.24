<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Language Tutor — LinguaAI</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a25;--bg4:#222230;
  --text:#ffffff;--text2:#a0a0b0;--text3:#606070;
  --accent:#ff6b35;--accent2:#f7931e;--accent3:#ee5a6f;
  --success:#00d084;--info:#6366f1;
  --card:rgba(255,255,255,0.03);
  --border:rgba(255,255,255,0.06);
  --glow:rgba(255,107,53,0.15);
  --r:20px;--t:.3s cubic-bezier(.4,0,.2,1);
}
[data-theme=light]{
  --bg:#fafafa;--bg2:#f0f0f5;--bg3:#e8e8f0;--bg4:#e0e0ea;
  --text:#0a0a0f;--text2:#555560;--text3:#9999a5;
  --card:rgba(10,10,15,0.03);
  --border:rgba(10,10,15,0.08);
  --glow:rgba(255,107,53,0.08);
}

body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);color:var(--text);
  line-height:1.6;min-height:100vh;
  transition:background var(--t),color var(--t);
}

/* Animated Background */
.bg-anim{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse at 20% 80%, rgba(255,107,53,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(99,102,241,0.06) 0%, transparent 50%);
}

/* Glass Nav */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(10,10,15,0.8);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:1rem 2rem;
  display:flex;align-items:center;justify-content:space-between;
}
[data-theme=light] .nav{background:rgba(250,250,250,0.8)}
.nav-logo{
  display:flex;align-items:center;gap:.75rem;
  font-family:'Space Grotesk',sans-serif;
  font-weight:700;font-size:1.3rem;
  color:var(--text);text-decoration:none;
}
.logo-box{
  width:38px;height:38px;border-radius:12px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;
  box-shadow:0 4px 20px var(--glow);
}
.nav-links{display:flex;align-items:center;gap:1.5rem}
.nav-link{
  color:var(--text2);text-decoration:none;
  font-weight:500;font-size:.9rem;
  transition:color var(--t);
}
.nav-link:hover{color:var(--accent)}
.nav-btn{
  padding:.6rem 1.2rem;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border:none;border-radius:12px;
  font-family:'Outfit',sans-serif;font-weight:600;
  font-size:.85rem;cursor:pointer;
  text-decoration:none;display:inline-block;
  transition:transform var(--t),box-shadow var(--t);
}
.nav-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 25px var(--glow);
}
.theme-btn{
  width:40px;height:40px;border-radius:12px;
  border:1.5px solid var(--border);
  background:var(--card);color:var(--text2);
  font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--t);
}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Hero */
.hero{
  position:relative;z-index:1;
  padding:8rem 2rem 3rem;
  text-align:center;max-width:800px;margin:0 auto;
}
.hero h1{
  font-family:'Space Grotesk',sans-serif;
  font-size:clamp(2rem,5vw,3.5rem);
  font-weight:800;line-height:1.1;
  margin-bottom:1rem;
}
.gradient{
  background:linear-gradient(135deg,var(--accent),var(--accent3),var(--info));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hero p{color:var(--text2);font-size:1.1rem;max-width:500px;margin:0 auto 2rem}

/* Language Selector */
.lang-section{
  position:relative;z-index:1;
  max-width:1100px;margin:0 auto;
  padding:0 2rem 3rem;
}
.section-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.5rem;font-weight:700;
  text-align:center;margin-bottom:2rem;
}
.lang-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:1rem;
}
.lang-card{
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:var(--r);
  padding:1.5rem 1rem;
  text-align:center;cursor:pointer;
  transition:all var(--t);
  position:relative;overflow:hidden;
}
.lang-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  opacity:0;transition:opacity var(--t);
}
.lang-card:hover::before{opacity:0.08}
.lang-card:hover{
  transform:translateY(-4px) scale(1.02);
  border-color:var(--accent);
  box-shadow:0 12px 40px var(--glow);
}
.lang-card.active{
  border-color:var(--accent);
  background:linear-gradient(135deg,rgba(255,107,53,0.12),rgba(238,90,111,0.08));
}
.lang-flag{font-size:2.5rem;margin-bottom:.5rem;position:relative;z-index:1}
.lang-name{font-weight:700;font-size:1rem;position:relative;z-index:1}
.lang-meta{
  font-size:.75rem;color:var(--text3);
  margin-top:.25rem;position:relative;z-index:1;
  font-weight:500;
}

/* Chat Container */
.chat-wrap{
  position:relative;z-index:1;
  max-width:850px;margin:0 auto;
  padding:0 2rem 4rem;
  display:none;
}
.chat-wrap.active{display:block;animation:fadeIn .5s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.back-link{
  display:inline-flex;align-items:center;gap:.5rem;
  color:var(--text2);text-decoration:none;
  font-weight:500;margin-bottom:1.5rem;
  transition:color var(--t);
}
.back-link:hover{color:var(--accent)}

.chat-header{
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:var(--r);
  padding:1.25rem 1.5rem;
  display:flex;align-items:center;gap:1rem;
  margin-bottom:1.5rem;
  backdrop-filter:blur(10px);
}
.teacher-av{
  width:56px;height:56px;border-radius:16px;
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;
  box-shadow:0 8px 30px var(--glow);
  position:relative;flex-shrink:0;
}
.teacher-av::after{
  content:'';position:absolute;bottom:3px;right:3px;
  width:12px;height:12px;background:var(--success);
  border-radius:50%;border:2.5px solid var(--bg);
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.5;transform:scale(.85)}
}
.teacher-info h3{
  font-family:'Space Grotesk',sans-serif;
  font-size:1.3rem;font-weight:700;
}
.teacher-info p{
  color:var(--text3);font-size:.85rem;
  display:flex;align-items:center;gap:.4rem;
}

/* Suggestions */
.suggestions{
  display:flex;gap:.6rem;flex-wrap:wrap;
  margin-bottom:1.25rem;
}
.sug-chip{
  padding:.5rem 1rem;
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:50px;
  color:var(--text2);
  font-family:'Outfit',sans-serif;
  font-size:.82rem;font-weight:600;
  cursor:pointer;transition:all var(--t);
  border:none;
}
.sug-chip:hover{
  border-color:var(--accent);color:var(--accent);
  background:var(--glow);transform:translateY(-2px);
}

/* Messages */
.messages{
  display:flex;flex-direction:column;gap:1.25rem;
  margin-bottom:1.5rem;
  max-height:55vh;overflow-y:auto;
  padding-right:.5rem;
}
.messages::-webkit-scrollbar{width:5px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.msg{
  display:flex;gap:.875rem;max-width:85%;
  animation:msgPop .4s cubic-bezier(.34,1.36,.64,1) both;
}
@keyframes msgPop{
  from{opacity:0;transform:translateY(16px) scale(.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-av{
  width:38px;height:38px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;flex-shrink:0;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
}
.msg.bot .msg-av{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.msg.user .msg-av{background:linear-gradient(135deg,var(--info),var(--accent3));color:#fff}
.msg-body{max-width:calc(100% - 52px)}
.msg-bubble{
  padding:.875rem 1.25rem;border-radius:18px;
  font-size:.92rem;line-height:1.7;
  word-wrap:break-word;white-space:pre-wrap;
  box-shadow:0 4px 20px rgba(0,0,0,0.12);
}
.msg.bot .msg-bubble{
  background:var(--bg2);
  border:1.5px solid var(--border);
  color:var(--text);
  border-radius:4px 18px 18px 18px;
}
.msg.user .msg-bubble{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border-radius:18px 4px 18px 18px;
}
.msg-actions{margin-top:.5rem;display:flex;gap:.5rem}
.msg-btn{
  padding:.3rem .9rem;
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:50px;
  color:var(--text3);
  font-family:'Outfit',sans-serif;
  font-size:.75rem;font-weight:600;
  cursor:pointer;transition:all var(--t);
}
.msg-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Typing */
.typing-bubble{
  display:flex;align-items:center;gap:6px;
  padding:1rem 1.25rem;
  background:var(--bg2);
  border:1.5px solid var(--border);
  border-radius:4px 18px 18px 18px;
  width:fit-content;
}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);opacity:.4;animation:dotBounce 1.3s infinite}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}
@keyframes dotBounce{
  0%,80%,100%{transform:translateY(0);opacity:.4}
  40%{transform:translateY(-8px);opacity:1}
}

/* Input */
.input-wrap{
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:var(--r);
  padding:.875rem;
  display:flex;align-items:flex-end;gap:.75rem;
  backdrop-filter:blur(10px);
}
#chatInput{
  flex:1;background:transparent;border:none;outline:none;
  font-family:'Outfit',sans-serif;font-size:.93rem;
  color:var(--text);resize:none;
  min-height:24px;max-height:110px;line-height:1.6;
}
#chatInput::placeholder{color:var(--text3)}
.tool-btn{
  width:42px;height:42px;border-radius:12px;
  border:1.5px solid var(--border);
  background:var(--bg2);color:var(--text3);
  font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--t);flex-shrink:0;
}
.tool-btn:hover{background:var(--bg3);color:var(--text)}
.tool-btn.recording{
  background:rgba(238,90,111,0.15);
  border-color:var(--accent3);color:var(--accent3);
  animation:recPulse 1.5s infinite;
}
@keyframes recPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(238,90,111,.3)}
  50%{box-shadow:0 0 0 8px rgba(238,90,111,0)}
}
.send-btn{
  width:48px;height:48px;border-radius:14px;
  border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  box-shadow:0 4px 20px rgba(255,107,53,0.3);
  transition:all var(--t);
}
.send-btn:hover{
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 8px 30px rgba(255,107,53,0.5);
}

/* Responsive */
@media(max-width:768px){
  .nav{padding:.875rem 1.25rem}
  .nav-links{display:none}
  .hero{padding:7rem 1.25rem 2rem}
  .lang-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  .chat-wrap{padding:0 1.25rem 3rem}
  .msg{max-width:92%}
}
@media(max-width:480px){
  .lang-grid{grid-template-columns:repeat(2,1fr)}
  .hero h1{font-size:1.75rem}
}

/* Focus */
button:focus-visible,textarea:focus-visible,a:focus-visible{
  outline:2px solid var(--accent);outline-offset:2px;
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
</style>
</head>

</section>

// STATE
// ════════════════════════════════════════
let currentLang = null;
let chatHistory = [];
let isLoading = false;
let recognition = null;

let darkMode = true;

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  renderLangGrid();
  
  const saved = localStorage.getItem('linguaTheme');
  if(saved === 'light'){
    darkMode = false;
    document.body.setAttribute('data-theme','light');
    document.getElementById('themeBtn').textContent = '🌙';
  }
});

// ════════════════════════════════════════
// RENDER LANGUAGE GRID
// ════════════════════════════════════════
function renderLangGrid(){
  const grid = document.getElementById('langGrid');
  grid.innerHTML = Object.entries(LANGS).map(([code,lang]) => `
    <div class="lang-card" onclick="selectLang('${code}')" data-code="${code}">
      <div class="lang-flag">${lang.flag}</div>
      <div class="lang-name">${lang.name}</div>
      <div class="lang-meta">${lang.level} · ${lang.teacher}</div>
    </div>
  `).join('');
}

function selectLang(code){
  currentLang = code;
  document.querySelectorAll('.lang-card').forEach(c => c.classList.remove('active'));
  document.querySelector(`[data-code="${code}"]`).classList.add('active');
  
  setTimeout(() => {
    document.getElementById('heroSection').style.display = 'none';
    document.getElementById('langSection').style.display = 'none';
    document.getElementById('chatWrap').classList.add('active');
    initChat(code);
  }, 250);
}

function backToLanguages(){
  currentLang = null;
  chatHistory = [];
  document.getElementById('chatWrap').classList.remove('active');
  document.getElementById('heroSection').style.display = 'block';
  document.getElementById('langSection').style.display = 'block';
  document.getElementById('messages').innerHTML = '';
  document.querySelectorAll('.lang-card').forEach(c => c.classList.remove('active'));
  window.scrollTo({top:0,behavior:'smooth'});
}

// ════════════════════════════════════════
// CHAT INIT
// ════════════════════════════════════════

  document.getElementById('teacherName').textContent = cfg.teacher;
  document.getElementById('teacherStatus').textContent = `Online · ${cfg.name} Teacher`;
  document.getElementById('chatInput').placeholder = 
    code==='nl'?'Typ je bericht...':
    code==='fr'?'Écrivez votre message...':
    code==='de'?'Schreib deine Nachricht...':
    code==='es'?'Escribe tu mensaje...':
    code==='it'?'Scrivi il tuo messaggio...':
    code==='pt'?'Escreva sua mensagem...':
    code==='ar'?'اكتب رسالتك...':
    code==='ja'?'メッセージを入力...':
    code==='ko'?'메시지를 입력하세요...':
    code==='zh'?'输入消息...':
    code==='ru'?'Напишите сообщение...':
    code==='tr'?'Mesaj yazın...':
    code==='pl'?'Napisz wiadomość...':
    code==='sv'?'Skriv ditt meddelande...':
    code==='hi'?'संदेश लिखें...':

  renderSugs(cfg.sugs);
  
  setTimeout(() => addBotMsg(cfg.greeting, false), 400);

function renderSugs(sugs){
  document.getElementById('suggestions').innerHTML = sugs.map(s => 
    `<button class="sug-chip" onclick="useSug('${s.replace(/'/g,"\\'")}')">${s}</button>`
  ).join('');
}

function useSug(text){
  document.getElementById('chatInput').value = text;
  autoResize(document.getElementById('chatInput'));
  sendMsg();
}

function addUserMsg(text){
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = `<div class="msg-av">👤</div><div class="msg-body"><div class="msg-bubble">${escHtml(text)}</div></div>`;
  msgs.appendChild(d);
  scrollBottom();
}

function addBotMsg(text, withSpeak=true){
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg bot';
  const sid = 'spk_' + Date.now();
  d.innerHTML = `
    <div class="msg-av">${LANGS[currentLang]?.flag || '🎓'}</div>
    <div class="msg-body">
      <div class="msg-bubble">${escHtml(text)}</div>
      ${withSpeak ? `<div class="msg-actions"><button class="msg-btn" id="${sid}" onclick="speak(this,'${escAttr(text)}')">🔊 Listen</button></div>` : ''}
    </div>`;
  msgs.appendChild(d);
  scrollBottom();
}

function addTyping(){
  const msgs = document.getElementById('messages');
  const id = 'typ_' + Date.now();
  const d = document.createElement('div');
  d.className = 'msg bot';d.id = id;
  d.innerHTML = `<div class="msg-av">${LANGS[currentLang]?.flag || '🎓'}</div><div class="msg-body"><div class="typing-bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>`;
  msgs.appendChild(d);
  scrollBottom();
  return id;
}

function removeTyping(id){
  const el = document.getElementById(id);
  if(el) el.remove();
}

function scrollBottom(){
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

// ════════════════════════════════════════
// TTS
// ════════════════════════════════════════
function speak(btn, text){
  if(ttsU){
    window.speechSynthesis.cancel();ttsU = null;
    document.querySelectorAll('.msg-btn').forEach(b => {b.textContent='🔊 Listen';b.classList.remove('playing');});
    if(btn._active){btn._active=false;return;}
  }
  const cfg = LANGS[currentLang];
  const u = new SpeechSynthesisUtterance(text);
  u.lang = cfg?.voice || 'en-US';u.rate=0.9;u.pitch=1.05;
  ttsU = u;
  btn.classList.add('playing');
  btn.textContent = '⏹ Stop';
  btn._active = true;
  u.onend = () => {btn.classList.remove('playing');btn.textContent='🔊 Listen';btn._active=false;ttsU=null;};
  window.speechSynthesis.speak(u);
}

// ════════════════════════════════════════
// SPEECH RECOGNITION
// ════════════════════════════════════════
function toggleMic(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){alert('Voice input requires Chrome/Edge');return;}
  if(isRecording){recognition?.stop();return;}
  
  recognition = new SR();
  recognition.lang = LANGS[currentLang]?.voice || 'en-US';
  recognition.interimResults = false;
  
  const mic = document.getElementById('micBtn');
  recognition.onstart = () => {isRecording=true;mic.classList.add('recording');mic.textContent='⏹';};
  recognition.onresult = e => {document.getElementById('chatInput').value=e.results[0][0].transcript;autoResize(document.getElementById('chatInput'));};
  recognition.onend = () => {isRecording=false;mic.classList.remove('recording');mic.textContent='🎤';if(document.getElementById('chatInput').value.trim())sendMsg();};
  recognition.onerror = () => {isRecording=false;mic.classList.remove('recording');mic.textContent='🎤';};
  recognition.start();
}

// ════════════════════════════════════════
// UTILS
// ════════════════════════════════════════
function toggleTheme(){
  darkMode = !darkMode;
  document.body.setAttribute('data-theme', darkMode ? '' : 'light');
  document.getElementById('themeBtn').textContent = darkMode ? '☀️' : '🌙';
  localStorage.setItem('linguaTheme', darkMode ? '' : 'light');
}

function handleKey(e){
  if(e.key==='Enter' && !e.shiftKey){e.preventDefault();sendMsg();}
}

function autoResize(el){
  el.style.height = '24px';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

function escHtml(t){
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

function escAttr(t){
  return String(t).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ').substring(0,300);
}
