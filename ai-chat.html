<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LinguaAI — AI Chat Teacher</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#ffffff;--bg2:#f8fafc;--bg3:#f1f5f9;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --border:#e2e8f0;--shadow:0 4px 6px -1px rgba(0,0,0,.08),0 2px 4px -1px rgba(0,0,0,.04);
  --shadow-lg:0 20px 25px -5px rgba(0,0,0,.1),0 10px 10px -5px rgba(0,0,0,.04);
  --r:20px;--rs:12px;--t:.25s cubic-bezier(.4,0,.2,1);
  --accent:#10b981;--accent-hover:#059669;--acbg:#ecfdf5;--acbo:#6ee7b7;
  --user-bg:#3b82f6;--user-text:#ffffff;
  --bot-bg:#f8fafc;--bot-border:#e2e8f0;
  --success:#22c55e;--warning:#f59e0b;--error:#ef4444;
}
[data-theme=dark]{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#334155;
  --text:#f8fafc;--text2:#cbd5e1;--text3:#64748b;
  --border:#334155;--shadow:0 4px 6px -1px rgba(0,0,0,.3);
  --shadow-lg:0 20px 25px -5px rgba(0,0,0,.4);
  --acbg:#064e3b;--acbo:#059669;
  --user-bg:#60a5fa;--bot-bg:#1e293b;--bot-border:#334155;
}
body{
  font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:2rem;line-height:1.6;transition:background var(--t),color var(--t);
}

/* ── CHAT BUBBLE BUTTON ── */
#chatBubble{
  position:fixed;bottom:2rem;right:2rem;z-index:1000;
  width:64px;height:64px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent-hover));
  border:none;cursor:pointer;
  box-shadow:0 8px 32px rgba(16,185,129,.4);
  display:flex;align-items:center;justify-content:center;
  transition:all var(--t);font-size:1.6rem;color:#fff;
}
#chatBubble:hover{
  transform:translateY(-4px) scale(1.05);
  box-shadow:0 12px 40px rgba(16,185,129,.55);
}
#chatBubble:active{transform:scale(.98)}
#chatBubble.open{
  background:linear-gradient(135deg,#ef4444,#dc2626);
  box-shadow:0 8px 32px rgba(239,68,68,.4);
}
.bubble-badge{
  position:absolute;top:2px;right:2px;
  background:var(--error);color:#fff;font-size:.65rem;font-weight:800;
  width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  border:3px solid var(--bg);animation:pulse 2s ease infinite;
  box-shadow:0 2px 8px rgba(239,68,68,.3);
}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.2);opacity:.8}}

/* ── CHAT PANEL ── */
#chatPanel{
  position:fixed;bottom:6rem;right:2rem;z-index:999;
  width:min(420px,calc(100vw - 2.5rem));
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--r);box-shadow:var(--shadow-lg);
  display:flex;flex-direction:column;overflow:hidden;
  max-height:min(600px,calc(100vh - 9rem));
  transform:translateY(20px) scale(.98);opacity:0;pointer-events:none;
  transition:all .35s cubic-bezier(.4,0,.2,1);
}
#chatPanel.visible{transform:translateY(0) scale(1);opacity:1;pointer-events:all}

/* panel header */
.cp-head{
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border-bottom:1px solid var(--border);
  padding:1.1rem 1.25rem;display:flex;align-items:center;gap:.85rem;flex-shrink:0;
}
.cp-avatar{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent-hover));
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;flex-shrink:0;position:relative;
  box-shadow:0 4px 12px rgba(16,185,129,.25);
}
.cp-avatar::after{
  content:'';position:absolute;bottom:2px;right:2px;
  width:10px;height:10px;background:var(--success);border-radius:50%;
  border:2px solid var(--bg);
}
.cp-info{flex:1;min-width:0}
.cp-name{
  font-family:'Libre Baskerville',serif;font-weight:700;font-size:1.05rem;
  line-height:1.2;color:var(--text);margin-bottom:2px;
}
.cp-status{
  font-size:.78rem;color:var(--text3);font-weight:600;
  display:flex;align-items:center;gap:4px;
}
.cp-status::before{
  content:'';width:6px;height:6px;border-radius:50%;
  background:var(--success);display:inline-block;
}
.cp-lang{
  background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rs);
  padding:.35rem .85rem;font-size:.8rem;font-weight:700;color:var(--text2);
  cursor:pointer;display:flex;align-items:center;gap:.4rem;
  transition:all var(--t);white-space:nowrap;
}
.cp-lang:hover{border-color:var(--accent);color:var(--accent);background:var(--acbg)}

/* lang picker */
.lang-picker{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:.7rem 1rem;display:none;gap:.4rem;flex-wrap:wrap;
}
.lang-picker.show{display:flex;animation:slideDown .2s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.lpbtn{
  padding:.35rem .9rem;border-radius:var(--rs);border:1.5px solid var(--border);
  background:var(--bg);color:var(--text);font-size:.82rem;font-weight:700;
  cursor:pointer;transition:all var(--t);font-family:'Nunito',sans-serif;
  display:flex;align-items:center;gap:.35rem;
}
.lpbtn:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}
.lpbtn.active{
  background:var(--acbg);border-color:var(--acbo);color:var(--accent);
  box-shadow:0 2px 8px rgba(16,185,129,.15);
}

/* messages */
.cp-msgs{
  flex:1;overflow-y:auto;padding:1rem 1.1rem;display:flex;flex-direction:column;gap:.75rem;
  scroll-behavior:smooth;background:var(--bg);
}
.cp-msgs::-webkit-scrollbar{width:5px}
.cp-msgs::-webkit-scrollbar-track{background:transparent}
.cp-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.cp-msgs::-webkit-scrollbar-thumb:hover{background:var(--text3)}

.msg{display:flex;gap:.65rem;animation:fadeIn .28s ease both;max-width:85%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-av{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;margin-top:3px;font-weight:600;
}
.msg.bot .msg-av{
  background:linear-gradient(135deg,var(--accent),var(--accent-hover));
  color:#fff;box-shadow:0 3px 10px rgba(16,185,129,.25);
}
.msg.user .msg-av{
  background:linear-gradient(135deg,var(--user-bg),#2563eb);
  color:#fff;box-shadow:0 3px 10px rgba(59,130,246,.25);
}
.msg-bbl{
  padding:.7rem .95rem;border-radius:16px;font-size:.92rem;line-height:1.6;
  background:var(--bot-bg);border:1px solid var(--bot-border);
  color:var(--text);box-shadow:var(--shadow);
  word-wrap:break-word;white-space:pre-wrap;
}
.msg.user .msg-bbl{
  background:linear-gradient(135deg,var(--user-bg),#2563eb);
  border-color:transparent;color:var(--user-text);
  border-radius:16px 4px 16px 16px;
  box-shadow:0 4px 16px rgba(59,130,246,.25);
}
.msg.bot .msg-bbl{border-radius:4px 16px 16px 16px}

.msg-bbl.typing{
  display:flex;align-items:center;gap:4px;padding:.75rem 1rem;
  background:var(--bot-bg);min-width:60px;justify-content:center;
}
.dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--text3);animation:bounce .9s ease infinite;
}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.6}40%{transform:translateY(-6px);opacity:1}}

/* speak btn inside bubble */
.speak-btn{
  display:inline-flex;align-items:center;gap:.4rem;
  background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:.25rem .65rem;font-size:.78rem;font-weight:700;cursor:pointer;
  margin-top:.5rem;color:var(--text2);transition:all var(--t);
  font-family:'Nunito',sans-serif;
}
.speak-btn:hover{
  border-color:var(--accent);color:var(--accent);
  background:var(--acbg);transform:translateY(-1px);
}
.speak-btn.speaking{
  color:var(--accent);border-color:var(--accent);background:var(--acbg);
  box-shadow:0 2px 8px rgba(16,185,129,.2);
}
.speak-btn.speaking::after{
  content:'';width:6px;height:6px;border-radius:50%;
  background:var(--accent);margin-left:2px;
  animation:micPulse 1s ease infinite;
}
@keyframes micPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

/* input bar */
.cp-foot{
  border-top:1px solid var(--border);padding:.8rem 1rem;
  display:flex;align-items:flex-end;gap:.6rem;flex-shrink:0;
  background:var(--bg2);
}
#chatInp{
  flex:1;padding:.7rem 1rem;border:1.5px solid var(--border);
  border-radius:var(--rs);background:var(--bg);color:var(--text);
  font-family:'Nunito',sans-serif;font-size:.92rem;
  transition:all var(--t);resize:none;min-height:44px;max-height:120px;
  overflow-y:auto;line-height:1.5;
}
#chatInp:focus{
  outline:none;border-color:var(--accent);
  box-shadow:0 0 0 3px var(--acbg);background:var(--bg);
}
#chatInp::placeholder{color:var(--text3);font-weight:500}
.foot-btn{
  width:42px;height:42px;border-radius:var(--rs);
  border:1.5px solid var(--border);background:var(--bg);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;transition:all var(--t);flex-shrink:0;
  color:var(--text2);position:relative;
}
.foot-btn:hover{
  background:var(--bg3);border-color:var(--text3);color:var(--text);
  transform:translateY(-2px);
}
.foot-btn:active{transform:scale(.98)}
#sendBtn{
  background:linear-gradient(135deg,var(--accent),var(--accent-hover));
  border-color:transparent;color:#fff;
  box-shadow:0 4px 14px rgba(16,185,129,.35);
}
#sendBtn:hover{
  opacity:.95;box-shadow:0 6px 20px rgba(16,185,129,.45);
  transform:translateY(-2px);
}
#micBtn.recording{
  background:linear-gradient(135deg,var(--error),#dc2626);
  border-color:transparent;color:#fff;
  box-shadow:0 4px 14px rgba(239,68,68,.35);
  animation:micRecord 1s ease infinite;
}
@keyframes micRecord{0%,100%{box-shadow:0 4px 14px rgba(239,68,68,.35)}50%{box-shadow:0 6px 22px rgba(239,68,68,.55)}}

/* demo hint */
.demo-hint{
  text-align:center;color:var(--text2);font-size:.92rem;font-weight:500;
  max-width:340px;line-height:1.7;padding:1.5rem;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);box-shadow:var(--shadow);
}
.demo-hint strong{
  color:var(--text);font-size:1.15rem;display:block;
  margin-bottom:.6rem;font-family:'Libre Baskerville',serif;font-weight:700;
}
.demo-hint span{display:block;margin-top:.5rem;font-size:.85rem;opacity:.8}

/* animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* responsive */
@media(max-width:480px){
  #chatBubble{bottom:1.25rem;right:1.25rem;width:58px;height:58px;font-size:1.4rem}
  #chatPanel{bottom:5rem;right:1rem;width:calc(100vw - 2rem);max-height:calc(100vh - 7rem)}
  .cp-head{padding:1rem}
  .cp-name{font-size:1rem}
  .msg{max-width:92%}
  .msg-bbl{font-size:.9rem;padding:.65rem .85rem}
}

/* focus styles for accessibility */
button:focus-visible,#chatInp:focus-visible{
  outline:2px solid var(--accent);outline-offset:2px;
}

/* reduced motion preference */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}
}
</style>
</head>
<body>

<div class="demo-hint">
  <strong>✨ LinguaAI — AI Chat Teacher</strong>
  Klik op de groene knop om te chatten met je AI-taalleraar<br>
  <span>Perfect voor het oefenen van grammatica, woordenschat en conversatie</span>
</div>

<!-- ═══ CHAT BUBBLE ═══ -->
<button id="chatBubble" onclick="toggleChat()" title="Chat with AI Teacher" aria-label="Open chat">
  <span id="bubbleIco">💬</span>
  <span class="bubble-badge" id="bubbleBadge">1</span>
</button>

<!-- ═══ CHAT PANEL ═══ -->
<div id="chatPanel" role="dialog" aria-label="AI Language Chat">

  <!-- Header -->
  <div class="cp-head">
    <div class="cp-avatar" aria-hidden="true">🎓</div>
    <div class="cp-info">
      <div class="cp-name" id="cpName">AI Language Teacher</div>
      <div class="cp-status" id="cpStatus">Online — ready to help</div>
    </div>
    <button class="cp-lang" onclick="toggleLangPicker()" id="cpLangBtn" aria-haspopup="true" aria-expanded="false">
      <span id="cpLangFlag" aria-hidden="true">🇬🇧</span>
      <span id="cpLangCode">EN</span>
      <span style="font-size:.6rem;opacity:.6" aria-hidden="true">▼</span>
    </button>
  </div>

  <!-- Language picker -->
  <div class="lang-picker" id="langPicker" role="menu">
    <button class="lpbtn active" onclick="setLang('en')" role="menuitem">🇬🇧 English</button>
    <button class="lpbtn" onclick="setLang('nl')" role="menuitem">🇳🇱 Nederlands</button>
    <button class="lpbtn" onclick="setLang('fr')" role="menuitem">🇫🇷 Français</button>
    <button class="lpbtn" onclick="setLang('ar')" role="menuitem">🇸🇦 عربي</button>
    <button class="lpbtn" onclick="setLang('de')" role="menuitem">🇩🇪 Deutsch</button>
    <button class="lpbtn" onclick="setLang('es')" role="menuitem">🇪🇸 Español</button>
    <button class="lpbtn" onclick="setLang('tr')" role="menuitem">🇹🇷 Türkçe</button>
  </div>

  <!-- Messages -->
  <div class="cp-msgs" id="cpMsgs" aria-live="polite"></div>

  <!-- Footer -->
  <div class="cp-foot">
    <button class="foot-btn" id="micBtn" onclick="toggleMic()" title="Voice input" aria-label="Voice input">🎤</button>
    <textarea id="chatInp" placeholder="Type your message..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
      oninput="autoResize(this)" aria-label="Message input"></textarea>
    <button class="foot-btn" id="sendBtn" onclick="sendMsg()" title="Send" aria-label="Send message">➤</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
const API_KEY = 'YOUR_ANTHROPIC_API_KEY'; // ← Replace with your actual API key

let chatLang = 'en';
let panelOpen = false;
let isRecording = false;
let recognition = null;
let currentUtterance = null;
let chatHistory = [];
let greeted = false;

const LANG_CFG = {
  en: {
    flag:'🇬🇧', code:'EN',
    teacherName:'Ms. Grace',
    status:'Online — ready to help',
    placeholder:'Type your message...',
    voiceLang:'en-GB',
    system:`You are Ms. Grace, a warm and encouraging British English teacher on a language learning website called LinguaAI.
Your job: have NATURAL conversations with the learner to help them practise English grammar and vocabulary.
Rules:
- Chat naturally like a real teacher friend, NOT like a robot
- Keep replies SHORT (2-4 sentences max) unless the student asks for a long explanation
- Gently correct grammar mistakes IN the conversation, e.g. "Nice! Just a small note: we say 'I went' not 'I goed' 😊"
- Ask follow-up questions to keep the conversation going
- Be warm, funny sometimes, encouraging always
- If they ask about grammar rules, explain clearly with examples
- Use British English spelling and expressions`
  },
  nl: {
    flag:'🇳🇱', code:'NL',
    teacherName:'Juf Emma',
    status:'Online — klaar om te helpen',
    placeholder:'Typ je bericht...',
    voiceLang:'nl-NL',
    system:`Je bent Juf Emma, een gezellige en bemoedigende Nederlandse taallerares op een taalwebsite genaamd LinguaAI.
Jouw taak: voer NATUURLIJKE gesprekken met de leerling om Nederlands te oefenen.
Regels:
- Praat natuurlijk zoals een echte leraarsvriend, NIET als een robot
- Houd antwoorden KORT (2-4 zinnen max) tenzij om uitleg gevraagd wordt
- Verbeter grammaticafouten vriendelijk IN het gesprek, bijv. "Goed! Kleine noot: we zeggen 'ik ging' niet 'ik gaan' 😊"
- Stel vervolgvragen om het gesprek gaande te houden
- Wees warm, soms grappig, altijd bemoedigend
- Als ze vragen over grammaticaregels stellen, leg dan duidelijk uit met voorbeelden`
  },
  fr: {
    flag:'🇫🇷', code:'FR',
    teacherName:'Prof. Claire',
    status:'En ligne — prêt à aider',
    placeholder:'Écrivez votre message...',
    voiceLang:'fr-FR',
    system:`Tu es Prof. Claire, une professeure de français chaleureuse et encourageante sur un site d'apprentissage des langues appelé LinguaAI.
Ton rôle : avoir des conversations NATURELLES avec l'apprenant pour pratiquer le français.
Règles :
- Parle naturellement comme une vraie amie-professeure, PAS comme un robot
- Garde les réponses COURTES (2-4 phrases max) sauf si une explication est demandée
- Corrige doucement les fautes de grammaire DANS la conversation, ex. "Bien ! Petite note : on dit 'je suis allé' pas 'j'ai allé' 😊"
- Pose des questions de suivi pour continuer la conversation
- Sois chaleureuse, parfois drôle, toujours encourageante`
  },
  ar: {
    flag:'🇸🇦', code:'AR',
    teacherName:'الأستاذة نور',
    status:'متصلة — جاهزة للمساعدة',
    placeholder:'اكتب رسالتك...',
    voiceLang:'ar-SA',
    system:`أنتِ الأستاذة نور، معلمة لغة عربية فصحى دافئة على موقع LinguaAI. مهمتك: محادثات طبيعية لتحسين العربية الفصحى. القواعد: تحدثي بشكل طبيعي كمعلمة حقيقية. اجعلي الردود قصيرة 2-4 جمل. صححي الأخطاء بلطف. اطرحي أسئلة متابعة. كوني مشجعة دائماً. استخدمي الفصحى دائماً.`
  },
  de: {
    flag:'🇩🇪', code:'DE',
    teacherName:'Frau Schmidt',
    status:'Online — bereit zu helfen',
    placeholder:'Schreib deine Nachricht...',
    voiceLang:'de-DE',
    system:`Du bist Frau Schmidt, eine herzliche Deutschlehrerin auf LinguaAI. Fuehre natuerliche Gespraeche. Halte Antworten kurz (2-4 Saetze). Korrigiere Fehler freundlich. Stelle Folgefragen. Sei warm und ermutigend.`
  },
  es: {
    flag:'🇪🇸', code:'ES',
    teacherName:'Profa. Lucía',
    status:'En línea — lista para ayudar',
    placeholder:'Escribe tu mensaje...',
    voiceLang:'es-ES',
    system:`Eres la Profa. Lucia, profesora de espanol en LinguaAI. Ten conversaciones naturales. Respuestas cortas (2-4 frases). Corrige errores con amabilidad. Haz preguntas de seguimiento. Se alentadora siempre.`
  },
  tr: {
    flag:'🇹🇷', code:'TR',
    teacherName:'Öğretmen Ayşe',
    status:'Çevrimiçi — yardıma hazır',
    placeholder:'Mesajını yaz...',
    voiceLang:'tr-TR',
    system:`Sen LinguaAI sitesinde Turkce ogretmenisin: Ogretmen Ayse. Dogal sohbetler yap. Kisa yanitlar ver (2-4 cumle). Hatalari nazikce duzelt. Takip sorulari sor. Her zaman cesaretlendirici ol.`
  }
};

// ══════════════════════════════════════════
// PANEL TOGGLE
// ══════════════════════════════════════════
function toggleChat() {
  panelOpen = !panelOpen;
  document.getElementById('chatPanel').classList.toggle('visible', panelOpen);
  document.getElementById('chatBubble').classList.toggle('open', panelOpen);
  document.getElementById('bubbleIco').textContent = panelOpen ? '✕' : '💬';
  document.getElementById('bubbleBadge').style.display = 'none';
  if(panelOpen && !greeted) { greeted=true; sendGreeting(); }
  if(panelOpen) setTimeout(()=>document.getElementById('chatInp').focus(), 300);
}

// ══════════════════════════════════════════
// LANGUAGE
// ══════════════════════════════════════════
function toggleLangPicker() {
  const picker = document.getElementById('langPicker');
  const btn = document.getElementById('cpLangBtn');
  picker.classList.toggle('show');
  btn.setAttribute('aria-expanded', picker.classList.contains('show'));
}

function setLang(l) {
  chatLang = l;
  const cfg = LANG_CFG[l];
  document.getElementById('cpLangFlag').textContent = cfg.flag;
  document.getElementById('cpLangCode').textContent = cfg.code;
  document.getElementById('cpName').textContent = cfg.teacherName;
  document.getElementById('cpStatus').textContent = cfg.status;
  document.getElementById('chatInp').placeholder = cfg.placeholder;
  document.querySelectorAll('.lpbtn').forEach((b,i)=>{
    b.classList.toggle('active', ['en','nl','fr','ar','de','es','tr'][i]===l);
  });
  document.getElementById('langPicker').classList.remove('show');
  document.getElementById('cpLangBtn').setAttribute('aria-expanded','false');
  chatHistory = [];
  document.getElementById('cpMsgs').innerHTML = '';
  greeted = false;
  sendGreeting();
}

// ══════════════════════════════════════════
// GREETING
// ══════════════════════════════════════════

  const greets = {
    en: "Hello! 👋 I'm Ms. Grace, your English teacher. What would you like to practise today — grammar, vocabulary, or just have a conversation?",
    nl: "Hallo! 👋 Ik ben Juf Emma, jouw Nederlandse lerares. Wat wil je vandaag oefenen — grammatica, woordenschat, of gewoon een gesprekje?",
    fr: "Bonjour ! 👋 Je suis Prof. Claire, ta professeure de français. Qu'est-ce que tu voudrais pratiquer aujourd'hui — la grammaire, le vocabulaire, ou juste une conversation ?",
    ar: "مرحباً! 👋 أنا الأستاذة نور، معلمتك للغة العربية. ماذا تريد أن تتدرب عليه اليوم — القواعد، أم المفردات، أم مجرد محادثة؟",
    de: "Hallo! 👋 Ich bin Frau Schmidt, deine Deutschlehrerin. Was möchtest du heute üben — Grammatik, Wortschatz oder einfach ein Gespräch?",
    es: "¡Hola! 👋 Soy la Profa. Lucía, tu profesora de español. ¿Qué te gustaría practicar hoy — gramática, vocabulario o simplemente conversar?",
    tr: "Merhaba! 👋 Ben Öğretmen Ayşe, Türkçe öğretmenisin. Bugün ne üzerinde çalışmak istersin — gramer, kelime bilgisi, yoksa sadece konuşmak mı?"

// ══════════════════════════════════════════
// SEND MESSAGE
// ══════════════════════════════════════════
async function sendMsg() {
  const inp = document.getElementById('chatInp');
  const text = inp.value.trim();
  if(!text) return;
  inp.value = '';
  inp.style.height = '44px';

  addMsg('user', text);
  chatHistory.push({role:'user', content:text});

  const typId = addTyping();

  try {
    const cfg = LANG_CFG[chatLang];
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': API_KEY,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:400,
        system: cfg.system,
        messages: chatHistory
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || '⚠️ No response.';
    removeTyping(typId);
    addMsg('bot', reply, true);
    chatHistory.push({role:'assistant', content:reply});
    if(chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
  } catch(e) {
    removeTyping(typId);
    addMsg('bot', '⚠️ Connection error. Please check your API key and try again.');
  }
}

// ══════════════════════════════════════════
// ADD MESSAGE
// ══════════════════════════════════════════
function addMsg(role, text, withSpeak=false) {
  const wrap = document.getElementById('cpMsgs');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const isBot = role==='bot';
  const speakId = 'spk'+Date.now();
  div.innerHTML = `
    <div class="msg-av" aria-hidden="true">${isBot?'🎓':'👤'}</div>
    <div>
      <div class="msg-bbl">${escHtml(text)}</div>
      ${isBot && withSpeak ? `<button class="speak-btn" id="${speakId}" onclick="speakText(this,'${escAttr(text)}')" aria-label="Listen to message">🔊 Listen</button>` : ''}
    </div>
  `;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return div;
}

function addTyping() {
  const wrap = document.getElementById('cpMsgs');
  const id = 'typ'+Date.now();
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = id;
  div.innerHTML = `<div class="msg-av" aria-hidden="true">🎓</div><div class="msg-bbl typing" role="status" aria-label="Teacher is typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return id;
}
function removeTyping(id) {
  const el = document.getElementById(id);
  if(el) el.remove();
}

// ══════════════════════════════════════════
// TEXT TO SPEECH
// ══════════════════════════════════════════
function speakText(btn, text) {
  if(currentUtterance) {
    speechSynthesis.cancel();
    currentUtterance = null;
    document.querySelectorAll('.speak-btn.speaking').forEach(b=>{b.classList.remove('speaking');b.textContent='🔊 Listen'});
    if(btn.classList.contains('was-speaking')) {btn.classList.remove('was-speaking');return;}
  }
  const cfg = LANG_CFG[chatLang];
  const u = new SpeechSynthesisUtterance(text);
  u.lang = cfg.voiceLang;
  u.rate = 0.92;
  u.pitch = 1.05;
  currentUtterance = u;
  btn.classList.add('speaking','was-speaking');
  btn.textContent = '⏹';
  btn.setAttribute('aria-label','Stop listening');
  u.onend = ()=>{
    btn.classList.remove('speaking','was-speaking');
    btn.textContent = '🔊 Listen';
    btn.setAttribute('aria-label','Listen to message');
    currentUtterance = null;
  };
  speechSynthesis.speak(u);
}

// ══════════════════════════════════════════
// SPEECH TO TEXT (MIC)
// ══════════════════════════════════════════
function toggleMic() {
  if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Your browser does not support voice input. Try Chrome or Edge.');
    return;
  }
  if(isRecording) {
    recognition?.stop();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = LANG_CFG[chatLang].voiceLang;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = ()=>{
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micBtn').textContent = '⏹';
    document.getElementById('micBtn').setAttribute('aria-label','Stop recording');
  };
  recognition.onresult = e=>{
    const t = e.results[0][0].transcript;
    document.getElementById('chatInp').value = t;
    autoResize(document.getElementById('chatInp'));
  };
  recognition.onend = ()=>{
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').textContent = '🎤';
    document.getElementById('micBtn').setAttribute('aria-label','Voice input');
    if(document.getElementById('chatInp').value.trim()) sendMsg();
  };
  recognition.onerror = ()=>{
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').textContent = '🎤';
    document.getElementById('micBtn').setAttribute('aria-label','Voice input');
  };
  recognition.start();
}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function autoResize(el) {
  el.style.height = '44px';
  el.style.height = Math.min(el.scrollHeight, 120)+'px';
}
function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}
function escAttr(t){return t.replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/\n/g,' ').substring(0,200)}

// Close lang picker when clicking outside
document.addEventListener('click', (e)=>{
  const picker = document.getElementById('langPicker');
  const btn = document.getElementById('cpLangBtn');
  if(picker.classList.contains('show') && !picker.contains(e.target) && !btn.contains(e.target)){
    picker.classList.remove('show');
    btn.setAttribute('aria-expanded','false');
  }
});
</script>
