<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Teacher — LinguaAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lora:ital,wght@0,600;1,500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:       #f0f2f7;
  --panel:    #ffffff;
  --panel2:   #f7f8fc;
  --border:   rgba(0,0,0,.07);
  --text:     #111827;
  --text2:    #6b7280;
  --text3:    #9ca3af;
  --shadow:   0 2px 8px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
  --shadow-m: 0 8px 24px rgba(0,0,0,.09), 0 2px 8px rgba(0,0,0,.05);
  --shadow-l: 0 20px 48px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.06);
  --sans: 'Plus Jakarta Sans', system-ui, sans-serif;
  --serif: 'Lora', Georgia, serif;
  --r: 16px; --rs: 10px;
  --ease: cubic-bezier(.4,0,.2,1);
}

/* dark */
[data-theme=dark] {
  --bg:     #0e1117;
  --panel:  #161b27;
  --panel2: #1c2235;
  --border: rgba(255,255,255,.06);
  --text:   #f1f5f9;
  --text2:  #94a3b8;
  --text3:  #475569;
  --shadow:   0 2px 8px rgba(0,0,0,.4);
  --shadow-m: 0 8px 24px rgba(0,0,0,.5);
  --shadow-l: 0 20px 48px rgba(0,0,0,.6);
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  transition: background .3s, color .3s;
}

/* ── TOPBAR ── */
.topbar {
  height: 60px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  padding: 0 1.25rem;
  gap: .85rem;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow);
  z-index: 100;
}

.back-link {
  display: flex; align-items: center; gap: .35rem;
  padding: .4rem .85rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--rs);
  color: var(--text2);
  font-size: .78rem; font-weight: 600;
  text-decoration: none;
  transition: all .18s var(--ease);
  flex-shrink: 0;
  white-space: nowrap;
}
.back-link:hover { color: var(--text); border-color: var(--text3); background: var(--panel2); }

.teacher-chip {
  flex: 1; min-width: 0;
  display: flex; align-items: center; gap: .65rem;
}
.t-ava {
  width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.05rem;
  position: relative;
}
.t-ava::after {
  content: ''; position: absolute; bottom: 1px; right: 1px;
  width: 9px; height: 9px; background: #22c55e;
  border-radius: 50%; border: 2px solid var(--panel);
}
.t-meta { min-width: 0; }
.t-name {
  font-family: var(--serif);
  font-size: 1rem; line-height: 1.2;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.t-online {
  font-size: .7rem; font-weight: 600; color: var(--text3);
  display: flex; align-items: center; gap: .28rem; margin-top: 1px;
}
.online-dot {
  width: 6px; height: 6px; background: #22c55e;
  border-radius: 50%; animation: onlinePulse 2.5s ease infinite;
}
@keyframes onlinePulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.topbar-end { display: flex; gap: .4rem; flex-shrink: 0; }
.topbtn {
  width: 35px; height: 35px; border-radius: var(--rs);
  border: 1px solid var(--border); background: var(--bg);
  color: var(--text2); font-size: .9rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .18s var(--ease);
}
.topbtn:hover { background: var(--panel2); color: var(--text); border-color: var(--text3); }

/* ══════════════════════════════════════════
   LANGUAGE SELECTOR — completely redesigned
   Each language = its own card with flag,
   name, and unique accent colour
══════════════════════════════════════════ */
.lang-section {
  flex-shrink: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: .85rem 1.25rem;
}

.lang-grid {
  display: flex;
  gap: .55rem;
  flex-wrap: wrap;
  max-width: 820px;
  margin: 0 auto;
}

/* each language card */
.lcard {
  display: flex;
  align-items: center;
  gap: .5rem;
  padding: .45rem .9rem;
  border-radius: 50px;
  border: 1.5px solid transparent;
  background: var(--panel);
  cursor: pointer;
  transition: all .2s var(--ease);
  box-shadow: var(--shadow);
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.lcard::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--lc, transparent);
  opacity: 0;
  transition: opacity .2s;
}
.lcard:hover::before { opacity: 1; }
.lcard:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-m);
  border-color: var(--lborder, var(--border));
}
.lcard.active {
  background: var(--lactive, #f0fdf4);
  border-color: var(--lborder, #86efac);
  box-shadow: 0 4px 16px var(--lglow, rgba(0,200,100,.15)), var(--shadow);
  transform: translateY(-1px);
}
.lcard.active::before { opacity: 1; }

.lcard .flag { font-size: 1.35rem; line-height: 1; flex-shrink: 0; position: relative; z-index: 1; }
.lcard .lname {
  font-size: .8rem; font-weight: 700;
  position: relative; z-index: 1;
  white-space: nowrap;
  color: var(--text2);
  transition: color .2s;
}
.lcard.active .lname { color: var(--ltext, #166534); }
.lcard:hover .lname  { color: var(--ltext, var(--text)); }

/* ── per-language colour tokens ── */
.lcard[data-l=nl] {
  --lc:       rgba(255,138,0,.06);
  --lactive:  #fff7ed;
  --lborder:  #fb923c;
  --lglow:    rgba(251,146,60,.2);
  --ltext:    #9a3412;
}
.lcard[data-l=en] {
  --lc:       rgba(59,130,246,.06);
  --lactive:  #eff6ff;
  --lborder:  #60a5fa;
  --lglow:    rgba(96,165,250,.2);
  --ltext:    #1e40af;
}
.lcard[data-l=fr] {
  --lc:       rgba(99,102,241,.06);
  --lactive:  #eef2ff;
  --lborder:  #818cf8;
  --lglow:    rgba(129,140,248,.2);
  --ltext:    #3730a3;
}
.lcard[data-l=de] {
  --lc:       rgba(234,179,8,.06);
  --lactive:  #fefce8;
  --lborder:  #facc15;
  --lglow:    rgba(250,204,21,.25);
  --ltext:    #713f12;
}
.lcard[data-l=es] {
  --lc:       rgba(239,68,68,.06);
  --lactive:  #fef2f2;
  --lborder:  #f87171;
  --lglow:    rgba(248,113,113,.2);
  --ltext:    #991b1b;
}
.lcard[data-l=it] {
  --lc:       rgba(34,197,94,.06);
  --lactive:  #f0fdf4;
  --lborder:  #4ade80;
  --lglow:    rgba(74,222,128,.2);
  --ltext:    #14532d;
}
.lcard[data-l=pt] {
  --lc:       rgba(20,184,166,.06);
  --lactive:  #f0fdfa;
  --lborder:  #2dd4bf;
  --lglow:    rgba(45,212,191,.2);
  --ltext:    #134e4a;
}
.lcard[data-l=ar] {
  --lc:       rgba(168,85,247,.06);
  --lactive:  #faf5ff;
  --lborder:  #c084fc;
  --lglow:    rgba(192,132,252,.2);
  --ltext:    #581c87;
}
.lcard[data-l=tr] {
  --lc:       rgba(236,72,153,.06);
  --lactive:  #fdf2f8;
  --lborder:  #f472b6;
  --lglow:    rgba(244,114,182,.2);
  --ltext:    #831843;
}

/* dark overrides for active cards */
[data-theme=dark] .lcard { background: var(--panel); }
[data-theme=dark] .lcard[data-l=nl].active { background: rgba(251,146,60,.12); }
[data-theme=dark] .lcard[data-l=en].active { background: rgba(96,165,250,.12); }
[data-theme=dark] .lcard[data-l=fr].active { background: rgba(129,140,248,.12); }
[data-theme=dark] .lcard[data-l=de].active { background: rgba(250,204,21,.12); }
[data-theme=dark] .lcard[data-l=es].active { background: rgba(248,113,113,.12); }
[data-theme=dark] .lcard[data-l=it].active { background: rgba(74,222,128,.12); }
[data-theme=dark] .lcard[data-l=pt].active { background: rgba(45,212,191,.12); }
[data-theme=dark] .lcard[data-l=ar].active { background: rgba(192,132,252,.12); }
[data-theme=dark] .lcard[data-l=tr].active { background: rgba(244,114,182,.12); }
[data-theme=dark] .lcard.active .lname,
[data-theme=dark] .lcard:hover .lname { filter: brightness(1.6); }

/* ── CHAT AREA ── */
.chat-shell {
  flex: 1; overflow: hidden;
  display: flex; flex-direction: column;
}
.chat-inner {
  flex: 1; overflow: hidden;
  display: flex; flex-direction: column;
  max-width: 800px; width: 100%;
  margin: 0 auto; padding: 0 1.25rem;
}

/* messages */
.msgs {
  flex: 1; overflow-y: auto;
  display: flex; flex-direction: column;
  gap: 1rem;
  padding: 1.4rem 0 .8rem;
  scroll-behavior: smooth;
}
.msgs::-webkit-scrollbar { width: 4px; }
.msgs::-webkit-scrollbar-track { background: transparent; }
.msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

.msg {
  display: flex; gap: .7rem;
  max-width: 78%;
  animation: msgPop .3s cubic-bezier(.34,1.5,.64,1) both;
}
@keyframes msgPop {
  from { opacity:0; transform:translateY(14px) scale(.96); }
  to   { opacity:1; transform:none; }
}
.msg.user { align-self: flex-end; flex-direction: row-reverse; }

.av {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .85rem; flex-shrink: 0; margin-top: 3px;
}
.msg.bot .av  { box-shadow: var(--shadow); }
.msg.user .av { background: #1e293b; color: #f1f5f9; box-shadow: var(--shadow); }

.mbody { display: flex; flex-direction: column; gap: .3rem; }

.bubble {
  padding: .82rem 1.05rem;
  border-radius: 16px;
  font-size: .89rem; line-height: 1.7;
  word-wrap: break-word; white-space: pre-wrap;
}
.msg.bot .bubble {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 4px 16px 16px 16px;
  box-shadow: var(--shadow);
}
.msg.user .bubble {
  background: #1e293b;
  color: #f1f5f9;
  border-radius: 16px 4px 16px 16px;
  box-shadow: var(--shadow-m);
}

/* listen btn */
.listen-btn {
  align-self: flex-start;
  display: flex; align-items: center; gap: .3rem;
  padding: .2rem .65rem;
  background: transparent;
  border: 1px solid var(--border); border-radius: 50px;
  color: var(--text3);
  font-family: var(--sans); font-size: .72rem; font-weight: 600;
  cursor: pointer; transition: all .18s var(--ease);
}
.listen-btn:hover  { border-color: var(--laccentc,#22c55e); color: var(--laccentc,#22c55e); background: var(--laccent-bg,#f0fdf4); }
.listen-btn.playing{ border-color: var(--laccentc,#22c55e); color: var(--laccentc,#22c55e); background: var(--laccent-bg,#f0fdf4); }

/* typing */
.typing-row { display: flex; gap: .7rem; animation: msgPop .25s ease both; }
.typ-bbl {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px 16px 16px 16px;
  padding: .9rem 1.1rem;
  display: flex; align-items: center; gap: 5px;
  box-shadow: var(--shadow);
}
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text3); opacity: .4;
  animation: dotAnim 1.1s ease infinite;
}
.dot:nth-child(2){ animation-delay:.15s; }
.dot:nth-child(3){ animation-delay:.3s; }
@keyframes dotAnim { 0%,80%,100%{transform:translateY(0);opacity:.3} 40%{transform:translateY(-6px);opacity:1} }

/* suggestions */
.sugs {
  flex-shrink: 0;
  display: flex; gap: .4rem; flex-wrap: wrap;
  padding: .35rem 0 .65rem;
  transition: opacity .2s;
}
.sug {
  padding: .3rem .85rem;
  background: var(--panel);
  border: 1px solid var(--border); border-radius: 50px;
  color: var(--text2); font-family: var(--sans);
  font-size: .77rem; font-weight: 600;
  cursor: pointer; transition: all .18s var(--ease);
  white-space: nowrap;
}
.sug:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow);
  border-color: var(--lborder-active, #94a3b8);
  color: var(--ltext-active, var(--text));
  background: var(--lbg-active, var(--panel2));
}

/* input */
.input-bar {
  flex-shrink: 0;
  display: flex; align-items: flex-end; gap: .6rem;
  padding: .75rem 0 1rem;
  border-top: 1px solid var(--border);
}
.inp-shell {
  flex: 1; display: flex; align-items: flex-end; gap: .45rem;
  background: var(--panel);
  border: 1.5px solid var(--border); border-radius: 16px;
  padding: .55rem .75rem;
  transition: border-color .2s, box-shadow .2s;
}
.inp-shell:focus-within {
  border-color: var(--focus-color, #94a3b8);
  box-shadow: 0 0 0 3px var(--focus-ring, rgba(148,163,184,.15));
}
.mic-btn {
  width: 30px; height: 30px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--bg);
  color: var(--text3); font-size: .9rem;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all .18s var(--ease);
}
.mic-btn:hover { background: var(--panel2); color: var(--text); }
.mic-btn.rec { background: rgba(239,68,68,.1); border-color: #ef4444; color: #ef4444; animation: recPulse 1.2s ease infinite; }
@keyframes recPulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.3)} 50%{box-shadow:0 0 0 5px rgba(239,68,68,0)} }

#chatInp {
  flex: 1; background: transparent; border: none; outline: none;
  font-family: var(--sans); font-size: .89rem; color: var(--text);
  resize: none; min-height: 26px; max-height: 110px; overflow-y: auto;
  line-height: 1.55;
}
#chatInp::placeholder { color: var(--text3); }

.send-btn {
  width: 44px; height: 44px; border-radius: 13px;
  border: none; flex-shrink: 0;
  color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s var(--ease);
  background: var(--send-bg, linear-gradient(135deg,#22c55e,#16a34a));
  box-shadow: 0 4px 16px var(--send-glow, rgba(34,197,94,.3));
}
.send-btn:hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 8px 24px var(--send-glow, rgba(34,197,94,.4)); }
.send-btn:active { transform: scale(.97); }

/* ── RESPONSIVE ── */
@media (max-width:640px) {
  .topbar { padding:0 .85rem; height:56px; }
  .chat-inner { padding:0 .85rem; }
  .msg { max-width:88%; }
  .bubble { font-size:.86rem; }
  .lcard .lname { display:none; }
  .lcard { padding:.45rem .65rem; }
  .lcard .flag { font-size:1.5rem; }
  .lang-section { padding:.65rem .85rem; }
  .lang-grid { gap:.4rem; }
}
@media (max-width:360px) {
  .back-link span { display:none; }
  .back-link { padding:.4rem .6rem; }
}

button:focus-visible, a:focus-visible, #chatInp:focus-visible {
  outline: 2px solid #22c55e; outline-offset: 2px;
}
@media(prefers-reduced-motion:reduce){ *, *::before, *::after { animation-duration:.01ms !important; transition-duration:.01ms !important; } }
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <a href="index.html" class="back-link" title="Back to home">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    <span>Back</span>
  </a>
  <div class="teacher-chip">
    <div class="t-ava" id="tAva">🎓</div>
    <div class="t-meta">
      <div class="t-name" id="tName">Juf Emma</div>
      <div class="t-online"><span class="online-dot"></span><span id="tStat">Online · Nederlandse Lerares</span></div>
    </div>
  </div>
  <div class="topbar-end">
    <button class="topbtn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
  </div>
</header>

<!-- LANGUAGE SELECTOR -->
<div class="lang-section">
  <div class="lang-grid" role="group" aria-label="Choose language">
    <button class="lcard active" data-l="nl" onclick="setLang('nl')">
      <span class="flag">🇳🇱</span><span class="lname">Nederlands</span>
    </button>
    <button class="lcard" data-l="en" onclick="setLang('en')">
      <span class="flag">🇬🇧</span><span class="lname">English</span>
    </button>
    <button class="lcard" data-l="fr" onclick="setLang('fr')">
      <span class="flag">🇫🇷</span><span class="lname">Français</span>
    </button>
    <button class="lcard" data-l="de" onclick="setLang('de')">
      <span class="flag">🇩🇪</span><span class="lname">Deutsch</span>
    </button>
    <button class="lcard" data-l="es" onclick="setLang('es')">
      <span class="flag">🇪🇸</span><span class="lname">Español</span>
    </button>
    <button class="lcard" data-l="it" onclick="setLang('it')">
      <span class="flag">🇮🇹</span><span class="lname">Italiano</span>
    </button>
    <button class="lcard" data-l="pt" onclick="setLang('pt')">
      <span class="flag">🇵🇹</span><span class="lname">Português</span>
    </button>
    <button class="lcard" data-l="ar" onclick="setLang('ar')">
      <span class="flag">🇸🇦</span><span class="lname">عربي</span>
    </button>
    <button class="lcard" data-l="tr" onclick="setLang('tr')">
      <span class="flag">🇹🇷</span><span class="lname">Türkçe</span>
    </button>
  </div>
</div>

<!-- CHAT -->
<div class="chat-shell">
  <div class="chat-inner">
    <div class="msgs" id="msgs" aria-live="polite"></div>
    <div class="sugs" id="sugs"></div>
    <div class="input-bar">
      <div class="inp-shell">
        <button class="mic-btn" id="micBtn" onclick="toggleMic()" aria-label="Voice input">🎤</button>
        <textarea id="chatInp" rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
          aria-label="Message"
          placeholder="Typ je bericht…"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()" aria-label="Send">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ⚠️  PUT YOUR ANTHROPIC API KEY BELOW
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const API_KEY = 'YOUR_ANTHROPIC_API_KEY';

/* ── per-language accent colours for dynamic UI elements ── */
const ACCENTS = {
  nl: { color:'#ea580c', bg:'#fff7ed', ring:'rgba(234,88,12,.15)', send:'linear-gradient(135deg,#f97316,#ea580c)', glow:'rgba(234,88,12,.3)', focus:'#f97316' },
  en: { color:'#2563eb', bg:'#eff6ff', ring:'rgba(37,99,235,.15)', send:'linear-gradient(135deg,#3b82f6,#2563eb)', glow:'rgba(37,99,235,.3)', focus:'#3b82f6' },
  fr: { color:'#4f46e5', bg:'#eef2ff', ring:'rgba(79,70,229,.15)', send:'linear-gradient(135deg,#6366f1,#4f46e5)', glow:'rgba(79,70,229,.3)', focus:'#6366f1' },
  de: { color:'#b45309', bg:'#fefce8', ring:'rgba(180,83,9,.15)',  send:'linear-gradient(135deg,#f59e0b,#d97706)', glow:'rgba(245,158,11,.35)', focus:'#d97706' },
  es: { color:'#dc2626', bg:'#fef2f2', ring:'rgba(220,38,38,.15)', send:'linear-gradient(135deg,#ef4444,#dc2626)', glow:'rgba(220,38,38,.3)', focus:'#ef4444' },

/* ── STATE ── */
let lang='nl', hist=[], loading=false,
    recog=null, recording=false,
    ttsU=null, greeted=false, dark=false;

/* ── INIT ── */
window.addEventListener('DOMContentLoaded', () => {
  const p = new URLSearchParams(location.search);
  const saved = p.get('lang') || localStorage.getItem('llang') || 'nl';
  lang = LANGS[saved] ? saved : 'nl';

  const th = localStorage.getItem('ltheme');
  if (th==='dark' || (!th && matchMedia('(prefers-color-scheme:dark)').matches)) {
    dark = true;
    document.body.setAttribute('data-theme','dark');
    document.getElementById('themeBtn').textContent = '☀️';
  }

  applyLang(lang);
  setTimeout(sendGreeting, 380);
});

/* ── LANGUAGE ── */
function setLang(l) {
  if (lang===l) return;
  lang=l; hist=[]; greeted=false;
  document.getElementById('msgs').innerHTML='';
  hideSugs(false);
  applyLang(l);
  localStorage.setItem('llang', l);
  setTimeout(sendGreeting, 160);
}

function applyLang(l) {
  const c = LANGS[l];
  const a = ACCENTS[l];

  // update header
  document.getElementById('tName').textContent = c.name;
  document.getElementById('tStat').textContent  = c.stat;
  document.getElementById('chatInp').placeholder = c.ph;
  document.title = `${c.name} — LinguaAI`;

  // update active chip
  document.querySelectorAll('.lcard').forEach(b => b.classList.toggle('active', b.dataset.l===l));

  // apply accent colours via CSS vars on root
  const root = document.documentElement;
  root.style.setProperty('--focus-color', a.focus);
  root.style.setProperty('--focus-ring',  a.ring);
  root.style.setProperty('--send-bg',     a.send);
  root.style.setProperty('--send-glow',   a.glow);
  root.style.setProperty('--laccentc',    a.color);
  root.style.setProperty('--laccent-bg',  a.bg);
  root.style.setProperty('--lborder-active', a.color);
  root.style.setProperty('--ltext-active',   a.color);
  root.style.setProperty('--lbg-active',     a.bg);

  // colour the teacher avatar ring
  const av = document.getElementById('tAva');
  av.style.background = `linear-gradient(135deg,${a.color},${a.color}bb)`;
  av.style.boxShadow  = `0 0 0 3px ${a.bg}`;

  // RTL for Arabic
  document.getElementById('chatInp').style.direction = l==='ar' ? 'rtl' : 'ltr';

  renderSugs(c.sugs);
}

/* ── THEME ── */
function toggleTheme() {
  dark = !dark;
  document.body.setAttribute('data-theme', dark ? 'dark' : '');
  document.getElementById('themeBtn').textContent = dark ? '☀️' : '🌙';
  localStorage.setItem('ltheme', dark ? 'dark' : '');
}

/* ── SUGGESTIONS ── */
function renderSugs(arr) {
  const w = document.getElementById('sugs');
  w.style.opacity='1'; w.style.pointerEvents='';
  w.innerHTML = arr.map(s=>`<button class="sug" onclick="useSug(this)">${s}</button>`).join('');
}
function useSug(btn) {
  const inp = document.getElementById('chatInp');
  inp.value = btn.textContent; autoResize(inp); sendMsg();
}
function hideSugs(fade=true) {
  const s = document.getElementById('sugs');
  if (fade) { s.style.opacity='0'; s.style.pointerEvents='none'; }
  else { s.innerHTML=''; }
}

/* ── GREETING ── */
function sendGreeting() {
  if (greeted) return; greeted=true;
  addBotMsg(LANGS[lang].greet, false);
}

/* ── SEND ── */
async function sendMsg() {
  const inp = document.getElementById('chatInp');
  const text = inp.value.trim();
  if (!text || loading) return;
  inp.value=''; inp.style.height='26px';
  hideSugs();

  addUserMsg(text);
  hist.push({ role:'user', content:text });
  loading=true;
  const tid = addTyping();

  try {
    const c = LANGS[lang];
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': API_KEY,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:450,
        system: c.sys,
        messages: hist
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || 'API error');
    const reply = data.content?.[0]?.text || '(no response)';
    removeTyping(tid);
    addBotMsg(reply, true);
    hist.push({ role:'assistant', content:reply });
    if (hist.length > 28) hist = hist.slice(-28);
  } catch(err) {
    removeTyping(tid);
    const isAuth = /auth|key/i.test(err.message||'');
    addBotMsg(isAuth
      ? '⚠️ Invalid API key. Open ai-chat.html and replace YOUR_ANTHROPIC_API_KEY with your key from console.anthropic.com'
      : '⚠️ Connection error. Check your API key and internet connection.', false);
    console.error(err);
  }
  loading=false;
}

/* ── DOM ── */
function addUserMsg(text) {
  const w = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className='msg user';
  d.innerHTML=`<div class="av" style="background:#1e293b;color:#f1f5f9">👤</div><div class="mbody"><div class="bubble">${esc(text)}</div></div>`;
  w.appendChild(d); scrollDn();
}

function addBotMsg(text, speak=true) {
  const w = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className='msg bot';
  const a = ACCENTS[lang];
  const sid = 'sp'+Date.now();
  const lbl = LANGS[lang].listen;
  d.innerHTML=`
    <div class="av" style="background:linear-gradient(135deg,${a.color},${a.color}bb);box-shadow:0 2px 10px ${a.ring}">🎓</div>
    <div class="mbody">
      <div class="bubble">${esc(text)}</div>
      ${speak?`<button class="listen-btn" id="${sid}" onclick="speakMsg(this,'${escA(text)}')" aria-label="${lbl}">🔊 ${lbl}</button>`:''}
    </div>`;
  w.appendChild(d); scrollDn();
}

function addTyping() {
  const w = document.getElementById('msgs');
  const id = 'ty'+Date.now();
  const d = document.createElement('div');
  d.className='typing-row'; d.id=id;
  d.innerHTML=`<div class="av" style="background:linear-gradient(135deg,${ACCENTS[lang].color},${ACCENTS[lang].color}bb)">🎓</div><div class="typ-bbl"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
  w.appendChild(d); scrollDn(); return id;
}
function removeTyping(id) { const e=document.getElementById(id); if(e) e.remove(); }
function scrollDn() { const m=document.getElementById('msgs'); m.scrollTop=m.scrollHeight; }

/* ── TTS ── */
function speakMsg(btn, text) {
  if (ttsU) {
    speechSynthesis.cancel(); ttsU=null;
    document.querySelectorAll('.listen-btn.playing').forEach(b=>{b.classList.remove('playing');resetLBtn(b);});
    if (btn._on) { btn._on=false; return; }
  }
  const u = new SpeechSynthesisUtterance(text);
  u.lang=LANGS[lang].voice; u.rate=0.9; u.pitch=1.05;
  ttsU=u; btn.classList.add('playing');
  btn.textContent=`⏹ ${LANGS[lang].stop}`; btn._on=true;
  u.onend = () => { btn.classList.remove('playing'); resetLBtn(btn); btn._on=false; ttsU=null; };
  speechSynthesis.speak(u);
}
function resetLBtn(btn) { btn.textContent=`🔊 ${LANGS[lang].listen}`; }

/* ── MIC ── */
function toggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Voice input needs Chrome or Edge.'); return; }
  if (recording) { recog?.stop(); return; }
  recog = new SR();
  recog.lang=LANGS[lang].voice; recog.interimResults=false; recog.maxAlternatives=1;
  const mic = document.getElementById('micBtn');
  recog.onstart  = ()=>{recording=true;mic.classList.add('rec');mic.textContent='⏹';mic.setAttribute('aria-label','Stop');};
  recog.onresult = e=>{document.getElementById('chatInp').value=e.results[0][0].transcript;autoResize(document.getElementById('chatInp'));};
  recog.onend    = ()=>{recording=false;mic.classList.remove('rec');mic.textContent='🎤';mic.setAttribute('aria-label','Voice input');if(document.getElementById('chatInp').value.trim())sendMsg();};
  recog.onerror  = ()=>{recording=false;mic.classList.remove('rec');mic.textContent='🎤';};
  recog.start();
}

/* ── UTILS ── */
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} }
function autoResize(el){ el.style.height='26px'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }
function esc(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>'); }
function escA(t){ return String(t).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ').substring(0,300); }
</script>
