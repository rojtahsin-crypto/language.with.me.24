<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LinguaAI — Your Friendly Language Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#faf8f3; --bg2:#f2ede0; --bg3:#ebe4d1;
--text:#1c1a16; --text2:#5a5040; --text3:#9a8e78;
--border:#dfd7c2; --shadow:rgba(28,26,22,.07); --shadow-lg:rgba(28,26,22,.14);
--r:16px; --rs:10px; --t:.28s cubic-bezier(.4,0,.2,1);
--accent:#059669; --acbg:#ecfdf5; --acbo:#a7f3d0;
--nl:#e8590c; --nlbg:#fff3ed; --nlbo:#fcd0b5;
--fr:#4f46e5; --frbg:#eef2ff; --frbo:#c7d2fe;
--en:#059669; --enbg:#ecfdf5; --enbo:#a7f3d0;
}
[data-theme=dark]{
--bg:#131109; --bg2:#1c1912; --bg3:#24201a;
--text:#f0ead8; --text2:#b8a88a; --text3:#6a5f45;
--border:#2e2820; --shadow:rgba(0,0,0,.35); --shadow-lg:rgba(0,0,0,.55);
--acbg:rgba(5,150,105,0.15); --acbo:rgba(5,150,105,0.4);
--nlbg:rgba(232,89,12,0.15); --nlbo:rgba(232,89,12,0.4);
--frbg:rgba(79,70,229,0.15); --frbo:rgba(79,70,229,0.4);
--enbg:rgba(5,150,105,0.15); --enbo:rgba(5,150,105,0.4);
}
body{
font-family:'Nunito',sans-serif;
background:var(--bg);
color:var(--text);
line-height:1.65;
transition:background var(--t),color var(--t);
min-height:100vh;
display:flex;
flex-direction:column;
}

/* ════════════════════════════════════════
   TOPBAR
   ════════════════════════════════════════ */
.topbar{
position:sticky;top:0;z-index:100;
background:var(--bg);
border-bottom:1.5px solid var(--border);
padding:.85rem 1.75rem;
display:flex;align-items:center;gap:1rem;
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);
}
.top-back{
display:flex;align-items:center;gap:.4rem;
background:var(--bg2);
border:1.5px solid var(--border);
border-radius:var(--rs);
padding:.5rem .85rem;
cursor:pointer;
transition:all var(--t);
font-family:'Nunito',sans-serif;
font-weight:700;
color:var(--text);
font-size:.88rem;
text-decoration:none;
}
.top-back:hover{
background:var(--bg3);
border-color:var(--text3);
transform:translateX(-2px);
}
.top-teacher{
flex:1;
display:flex;align-items:center;gap:.75rem;
min-width:0;
}
.top-av{
width:40px;height:40px;
border-radius:50%;
background:linear-gradient(135deg,var(--accent),var(--acbo));
display:flex;align-items:center;justify-content:center;
font-size:1.2rem;
flex-shrink:0;
box-shadow:0 4px 14px var(--shadow);
position:relative;
}
.top-av::after{
content:'';
position:absolute;bottom:2px;right:2px;
width:9px;height:9px;
background:#22c55e;
border-radius:50%;
border:2px solid var(--bg);
}
.top-info{min-width:0}
.top-name{
font-family:'Libre Baskerville',serif;
font-size:1.1rem;font-weight:700;
color:var(--text);
white-space:nowrap;
overflow:hidden;text-overflow:ellipsis;
}
.top-status{
font-size:.75rem;font-weight:500;
color:var(--text3);
display:flex;align-items:center;gap:.3rem;
}
.top-status::before{
content:'';width:5px;height:5px;
background:#22c55e;border-radius:50%;
flex-shrink:0;
}
.top-actions{
display:flex;align-items:center;gap:.45rem;
}
.theme-btn{
background:var(--bg2);
border:1.5px solid var(--border);
border-radius:var(--rs);
padding:.5rem .85rem;
cursor:pointer;
transition:all var(--t);
font-size:.88rem;
font-family:'Nunito',sans-serif;
font-weight:700;
color:var(--text);
display:flex;align-items:center;gap:.3rem;
}
.theme-btn:hover{
background:var(--bg3);
border-color:var(--text3);
}

/* ════════════════════════════════════════
   LANGUAGE CHIPS
   ════════════════════════════════════════ */
.lang-bar{
display:flex;align-items:center;gap:.35rem;
flex-wrap:nowrap;overflow-x:auto;
padding:.4rem 0;
scrollbar-width:none;
}
.lang-bar::-webkit-scrollbar{display:none}
.lchip{
padding:.35rem .9rem;
border-radius:50px;
border:1.5px solid var(--border);
background:var(--bg2);
color:var(--text2);
font-family:'Nunito',sans-serif;
font-size:.78rem;font-weight:600;
cursor:pointer;
transition:all var(--t);
white-space:nowrap;
display:flex;align-items:center;gap:.35rem;
flex-shrink:0;
}
.lchip:hover{
border-color:var(--accent);
color:var(--accent);
background:var(--acbg);
transform:translateY(-1px);
}
.lchip.active{
background:var(--accent);
border-color:var(--accent);
color:#fff;
box-shadow:0 3px 12px var(--shadow);
}

/* ════════════════════════════════════════
   CHAT BODY
   ════════════════════════════════════════ */
.chat-body{
flex:1;
display:flex;
flex-direction:column;
max-width:840px;
width:100%;
margin:0 auto;
padding:0 1.5rem 1.5rem;
min-height:0;
}

/* ════════════════════════════════════════
   MESSAGES
   ════════════════════════════════════════ */
.msgs{
flex:1;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:1.1rem;
padding:1.25rem 0;
scroll-behavior:smooth;
min-height:0;
}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-track{background:transparent}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.msgs::-webkit-scrollbar-thumb:hover{background:var(--text3)}

.msg{
display:flex;gap:.85rem;
max-width:82%;
animation:msgIn .35s cubic-bezier(.34,1.36,.64,1) both;
}
@keyframes msgIn{
from{opacity:0;transform:translateY(18px) scale(.97)}
to{opacity:1;transform:translateY(0) scale(1)}
}
.msg.user{
align-self:flex-end;
flex-direction:row-reverse;
}
.msg-av{
width:38px;height:38px;
border-radius:50%;
display:flex;align-items:center;justify-content:center;
font-size:1rem;
flex-shrink:0;
margin-top:2px;
box-shadow:0 3px 10px var(--shadow);
}
.msg.bot .msg-av{
background:linear-gradient(135deg,var(--accent),var(--acbo));
color:#fff;
}
.msg.user .msg-av{
background:linear-gradient(135deg,var(--nl),var(--nlbo));
color:#fff;
}
.msg-body{display:flex;flex-direction:column;gap:.45rem}
.msg-bbl{
padding:.9rem 1.2rem;
border-radius:18px;
font-size:.93rem;
line-height:1.7;
word-wrap:break-word;
white-space:pre-wrap;
box-shadow:0 3px 14px var(--shadow);
}
.msg.bot .msg-bbl{
background:var(--bg2);
border:1.5px solid var(--border);
color:var(--text);
border-radius:4px 18px 18px 18px;
}
.msg.user .msg-bbl{
background:var(--accent);
color:#fff;
border-radius:18px 4px 18px 18px;
border:1.5px solid var(--acbo);
}

/* Speak button */
.speak-btn{
align-self:flex-start;
display:flex;align-items:center;gap:.4rem;
padding:.25rem .8rem;
background:transparent;
border:1.5px solid var(--border);
border-radius:50px;
color:var(--text3);
font-family:'Nunito',sans-serif;
font-size:.75rem;font-weight:600;
cursor:pointer;
transition:all var(--t);
}
.speak-btn:hover{
border-color:var(--accent);
color:var(--accent);
background:var(--acbg);
}
.speak-btn.playing{
border-color:var(--accent);
color:var(--accent);
background:var(--acbg);
}

/* Typing indicator */
.typing-wrap{
display:flex;align-items:center;gap:6px;
padding:.95rem 1.2rem;
background:var(--bg2);
border:1.5px solid var(--border);
border-radius:4px 18px 18px 18px;
width:fit-content;
box-shadow:0 3px 14px var(--shadow);
}
.tdot{
width:7px;height:7px;
border-radius:50%;
background:var(--accent);
opacity:.45;
animation:tdot 1.1s ease-in-out infinite;
}
.tdot:nth-child(2){animation-delay:.15s}
.tdot:nth-child(3){animation-delay:.3s}
@keyframes tdot{
0%,80%,100%{transform:translateY(0);opacity:.35}
40%{transform:translateY(-8px);opacity:1}
}

/* ════════════════════════════════════════
   SUGGESTIONS
   ════════════════════════════════════════ */
.sugs{
display:flex;gap:.5rem;flex-wrap:wrap;
padding:.4rem 0 .8rem;
flex-shrink:0;
}
.sug{
padding:.4rem 1rem;
background:var(--bg2);
border:1.5px solid var(--border);
border-radius:50px;
color:var(--text2);
font-family:'Nunito',sans-serif;
font-size:.82rem;font-weight:600;
cursor:pointer;
transition:all var(--t);
white-space:nowrap;
}
.sug:hover{
border-color:var(--accent);
color:var(--accent);
background:var(--acbg);
transform:translateY(-1px);
box-shadow:0 3px 10px var(--shadow);
}

/* ════════════════════════════════════════
   INPUT BAR
   ════════════════════════════════════════ */
.input-bar{
flex-shrink:0;
padding:.9rem 0 1rem;
border-top:1.5px solid var(--border);
display:flex;align-items:flex-end;gap:.75rem;
}
.inp-field{
flex:1;
display:flex;align-items:flex-end;gap:.5rem;
background:var(--bg2);
border:1.5px solid var(--border);
border-radius:16px;
padding:.65rem .9rem;
transition:all var(--t);
}
.inp-field:focus-within{
border-color:var(--accent);
box-shadow:0 0 0 3px var(--acbg);
background:var(--bg);
}
#chatInp{
flex:1;
background:transparent;
border:none;
outline:none;
font-family:'Nunito',sans-serif;
font-size:.93rem;
color:var(--text);
resize:none;
min-height:28px;
max-height:120px;
overflow-y:auto;
line-height:1.6;
}
#chatInp::placeholder{color:var(--text3)}
#chatInp::-webkit-scrollbar{width:3px}
#chatInp::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

.inp-side{
display:flex;align-items:center;gap:.4rem;
flex-shrink:0;
}
.ibtn{
width:36px;height:36px;
border-radius:10px;
border:1.5px solid var(--border);
background:var(--bg2);
color:var(--text3);
font-size:1.05rem;
cursor:pointer;
display:flex;align-items:center;justify-content:center;
transition:all var(--t);
}
.ibtn:hover{
background:var(--bg3);
border-color:var(--text3);
color:var(--text);
}
#micBtn.recording{
background:rgba(239,68,68,.12);
border-color:#ef4444;
color:#ef4444;
animation:rPulse 1.2s ease-in-out infinite;
}
@keyframes rPulse{
0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.25)}
50%{box-shadow:0 0 0 7px rgba(239,68,68,0)}
}
#sendBtn{
width:48px;height:48px;
border-radius:14px;
border:none;
background:linear-gradient(135deg,var(--accent),var(--acbo));
color:#fff;
font-size:1.1rem;
cursor:pointer;
display:flex;align-items:center;justify-content:center;
flex-shrink:0;
box-shadow:0 4px 18px var(--shadow);
transition:all var(--t);
}
#sendBtn:hover{
transform:translateY(-2px) scale(1.04);
box-shadow:0 8px 26px rgba(5,150,105,.35);
}
#sendBtn:active{transform:scale(.97)}

/* ════════════════════════════════════════
   EMPTY STATE
   ════════════════════════════════════════ */
.empty{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:2.5rem 1.5rem;
gap:1.1rem;
}
.empty-av{
width:84px;height:84px;
background:linear-gradient(135deg,var(--accent),var(--acbo));
border-radius:28px;
display:flex;align-items:center;justify-content:center;
font-size:2.4rem;
box-shadow:0 8px 32px var(--shadow-lg);
margin-bottom:.4rem;
}
.empty-title{
font-family:'Libre Baskerville',serif;
font-size:1.6rem;
font-weight:700;
color:var(--text);
line-height:1.3;
}
.empty-sub{
font-size:.92rem;
color:var(--text2);
max-width:320px;
line-height:1.7;
}

/* ════════════════════════════════════════
   RESPONSIVE
   ════════════════════════════════════════ */
@media(max-width:768px){
.topbar{padding:.7rem 1.2rem;gap:.7rem}
.top-name{font-size:1rem}
.top-status{font-size:.7rem}
.chat-body{padding:0 1.2rem 1.2rem}
.msg{max-width:90%}
.msg-bbl{font-size:.9rem;padding:.85rem 1.1rem}
#sendBtn{width:44px;height:44px}
.sugs{flex-wrap:nowrap;overflow-x:auto;padding-bottom:.4rem}
.sugs::-webkit-scrollbar{display:none}
}

@media(max-width:480px){
.topbar{padding:.6rem 1rem}
.top-av{width:36px;height:36px;font-size:1.1rem}
.top-name{font-size:.95rem}
.msg-bbl{font-size:.88rem}
.inp-field{padding:.6rem .8rem}
#sendBtn{width:42px;height:42px}
}

/* Focus states */
button:focus-visible,
#chatInp:focus-visible,
.top-back:focus-visible{
outline:2px solid var(--accent);
outline-offset:2px;
}

/* Reduced motion */
@media(prefers-reduced-motion:reduce){
*,*::before,*::after{
animation-duration:.01ms !important;
transition-duration:.01ms !important;
}
}
</style>
</head>
<body>

<!-- ════════════════════════════════════════
     TOPBAR
     ════════════════════════════════════════ -->
<header class="topbar">
  <a href="index.html" class="top-back" title="Terug naar home">
    ← <span id="backLabel">Terug</span>
  </a>

  <div class="top-teacher">
    <div class="top-av" id="topAv">🎓</div>
    <div class="top-info">
      <div class="top-name" id="topName">Juf Emma</div>
      <div class="top-status" id="topStatus">Online · Nederlandse Lerares</div>
    </div>
  </div>

  <div class="top-actions">
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Thema wisselen">
      <span id="themeIcon">🌙</span>
    </button>
  </div>
</header>

<!-- ════════════════════════════════════════
     LANGUAGE SELECTOR
     ════════════════════════════════════════ -->
<div class="lang-bar" role="group" aria-label="Selecteer taal">
  <button class="lchip active" data-l="nl" onclick="setLang('nl')">🇳🇱 NL</button>
  <button class="lchip" data-l="en" onclick="setLang('en')">🇬🇧 EN</button>
  <button class="lchip" data-l="fr" onclick="setLang('fr')">🇫🇷 FR</button>
  <button class="lchip" data-l="de" onclick="setLang('de')">🇩🇪 DE</button>
  <button class="lchip" data-l="es" onclick="setLang('es')">🇪🇸 ES</button>
  <button class="lchip" data-l="it" onclick="setLang('it')">🇮🇹 IT</button>
  <button class="lchip" data-l="pt" onclick="setLang('pt')">🇵🇹 PT</button>
  <button class="lchip" data-l="ar" onclick="setLang('ar')">🇸🇦 AR</button>
</div>

<!-- ════════════════════════════════════════
     CHAT AREA
     ════════════════════════════════════════ -->
<div class="chat-body">
  <div class="msgs" id="msgs" aria-live="polite"></div>

  <div class="sugs" id="sugs"></div>

  <div class="input-bar">
    <div class="inp-field">
      <button class="ibtn" id="micBtn" onclick="toggleMic()" aria-label="Spraakinput" title="Spraakinput">🎤</button>
      <textarea id="chatInp" rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
        aria-label="Bericht invoeren"
        placeholder="Typ je bericht…"></textarea>
      <div class="inp-side"></div>
    </div>
    <button id="sendBtn" onclick="sendMsg()" aria-label="Verstuur bericht" title="Verstuur">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
// ════════════════════════════════════════
// ⚠️  Vervang met jouw ANTHROPIC API-sleutel
// ════════════════════════════════════════
const API_KEY = 'YOUR_ANTHROPIC_API_KEY';

// ════════════════════════════════════════
// TAALCONFIGURATIE
// ════════════════════════════════════════
const LANGS = {
  nl:{
    name:'Juf Emma', emoji:'🎓',
    status:'Online · Nederlandse Lerares',
    placeholder:'Typ je bericht…',
    voice:'nl-NL',
    sugs:['Verbeter mijn zin','Leer me een uitdrukking','Gewoon een gesprekje','Leg de/het uit','Hoe zeg ik...?'],
    greeting:"Hallo lieverd! 👋 Ik ben Juf Emma, jouw vriendelijke Nederlandse lerares op LinguaAI. Wat wil je vandaag oefenen — grammatica, woordenschat, of gewoon een gezellig gesprekje? Ik help je graag verder! 😊",
    system:`Je bent Juf Emma, een warme, geestige en geduldige Nederlandse lerares op LinguaAI.

PERSOONLIJKHEID: Je bent als een slimme, bemoedigende vriendin die toevallig taalexpert is. Je bent enthousiast, geduldig en maakt leerlingen comfortabel om fouten te maken. Je gebruikt vriendelijke taal zoals "lieverd", "schat", "geweldig!" en lachende emoji's 😊

JE ROL: Voer NATUURLIJKE, VRIENDENDELIJKE gesprekken die leerlingen helpen hun Nederlands te verbeteren.

STRIKTE REGELS — volg ze allemaal bij elk antwoord:
1. Houd antwoorden KORT en VRIENDENDELIJK: 2–4 zinnen max. Praat alsof je tegen een vriend praat.
2. Als de leerling een fout maakt, verbeter die dan ZACHTJES en NATUURLIJK binnen je antwoord. Bijvoorbeeld: "Wat een leuke zin, lieverd! Even een kleinigheidje: we zeggen 'ik ben gegaan' niet 'ik heb gegaan' — 'gaan' gaat altijd met 'zijn' 😊 Maar terug naar jouw vraag..."
3. Eindig ALTIJD met ÉÉN warme, natuurlijke vervolgvraag om het gesprek gaande te houden.
4. Wees SPECIFIEK en WARM in je lof: "Wat een mooie zin heb je gemaakt!" is beter dan "Goed gedaan!"
5. Voeg soms een nuttige uitdrukking of spreekwoord toe OP EEN NATUURLIJKE MANIER in de context.
6. Praat NOOIT als een robot of een boek. Praat als een echte, lieve vriendin.
7. Pas de complexiteit AUTOMATISCH aan op het niveau van de leerling.
8. Gebruik af en toe lieve woordjes zoals "lieverd", "schat", "geweldig", "fantastisch" om het gesprek warm te houden.
9. Reageer op emoties: als iemand gefrustreerd is, moedig dan aan; als iemand blij is, vier dat mee!`
  },
  en:{
    name:'Ms. Grace', emoji:'🎓',
    status:'Online · English Teacher',
    placeholder:'Ask anything or just say hi…',
    voice:'en-GB',
    sugs:['Correct my last sentence','Teach me a phrasal verb','Let\'s have a conversation','Explain present perfect','How do I say...?'],
    greeting:"Hello darling! 👋 I'm Ms. Grace, your friendly English teacher here at LinguaAI. What would you like to work on today — grammar, vocabulary, pronunciation, or just a lovely relaxed conversation? I'm here to help you shine! ✨",
    system:`You are Ms. Grace, a brilliant, warm and encouraging British English teacher on LinguaAI.

PERSONALITY: You're like a clever, kind friend who happens to be a language expert. You're witty, patient, and genuinely excited about language. You make learners feel safe to make mistakes. Use warm words like "darling", "love", "brilliant!", and friendly emojis 😊

YOUR ROLE: Have NATURAL, FRIENDLY conversations that help learners improve their English.

STRICT RULES — follow all of them every reply:
1. Keep replies SHORT and FRIENDLY: 2–4 sentences max. Only write more if the student explicitly asks for a full explanation. Talk like you're chatting with a friend.
2. If the student makes a grammar or vocabulary mistake, correct it GENTLY and NATURALLY within your reply. Example: "What a lovely sentence, darling! Just a tiny note: we say 'I have been waiting' not 'I am waiting since' — the present perfect is perfect here 😊 Anyway, back to your question..."
3. End with ONE warm, natural follow-up question to keep the conversation flowing.
4. Use British English spelling (colour, realise, etc.) and idioms naturally.
5. Be WARM and SPECIFIC with praise: "That was a really natural sentence, love!" beats "Good job!"
6. Occasionally slip in a useful phrase or idiom naturally in context.
7. NEVER be robotic, list-heavy, or formal. Speak like a real, caring friend.
8. Adapt complexity to the student's level automatically — beginner gets simpler language, advanced gets richer vocabulary.
9. Respond to emotions: if someone's frustrated, encourage them; if they're happy, celebrate with them!`
  },
  fr:{
    name:'Prof. Claire', emoji:'🎓',
    status:'En ligne · Professeure de Français',
    placeholder:'Écrivez votre message…',
    voice:'fr-FR',
    sugs:['Corrige ma phrase','Apprends-moi une expression','Une conversation simple','Explique le subjonctif','Comment dire...?'],

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
let chatLang = 'nl';
let chatHistory = [];
let isLoading = false;
let recognition = null;
let isRecording = false;
let ttsU = null;
let greeted = false;
let darkMode = false;

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  // Pick lang from URL or localStorage
  const params = new URLSearchParams(window.location.search);
  const saved = params.get('lang') || localStorage.getItem('linguaLang') || 'nl';
  const valid = Object.keys(LANGS).includes(saved) ? saved : 'nl';
  chatLang = valid;
  
  // Check for dark mode preference
  const savedTheme = localStorage.getItem('linguaTheme');
  if(savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    darkMode = true;
    document.body.setAttribute('data-theme', 'dark');
    document.getElementById('themeIcon').textContent = '☀️';
  }
  
  applyLang(valid);
  setTimeout(sendGreeting, 400);
});

// ════════════════════════════════════════
// LANGUAGE & THEME
// ════════════════════════════════════════
function setLang(l) {
  if(chatLang === l) return;
  chatLang = l;
  chatHistory = [];
  greeted = false;
  document.getElementById('msgs').innerHTML = '';
  applyLang(l);
  localStorage.setItem('linguaLang', l);
  setTimeout(sendGreeting, 200);
}

function applyLang(l) {
  const cfg = LANGS[l];
  document.getElementById('topName').textContent = cfg.name;
  document.getElementById('topStatus').textContent = cfg.status;
  document.getElementById('chatInp').placeholder = cfg.placeholder;
  document.getElementById('backLabel').textContent = l === 'nl' ? 'Terug' : l === 'fr' ? 'Retour' : 'Back';
  document.title = `${cfg.name} — LinguaAI`;
  
  // Update active language chip
  document.querySelectorAll('.lchip').forEach(b => {
    b.classList.toggle('active', b.dataset.l === l);
  });
  
  renderSugs(cfg.sugs);
}

function toggleTheme() {
  darkMode = !darkMode;
  document.body.setAttribute('data-theme', darkMode ? 'dark' : '');
  document.getElementById('themeIcon').textContent = darkMode ? '☀️' : '🌙';
  localStorage.setItem('linguaTheme', darkMode ? 'dark' : '');
}

// ════════════════════════════════════════
// SUGGESTIONS
// ════════════════════════════════════════
function renderSugs(arr) {
  const w = document.getElementById('sugs');
  w.innerHTML = arr.map(s => `<button class="sug" onclick="useSug(this)">${s}</button>`).join('');
}

function useSug(btn) {
  const inp = document.getElementById('chatInp');
  inp.value = btn.textContent;
  autoResize(inp);
  inp.focus();
  sendMsg();
}

// ════════════════════════════════════════
// GREETING
// ════════════════════════════════════════
function sendGreeting() {
  if(greeted) return;
  greeted = true;
  addBotMsg(LANGS[chatLang].greeting, false);
}

// ════════════════════════════════════════
// SEND MESSAGE
// ════════════════════════════════════════
async function sendMsg() {
  const inp = document.getElementById('chatInp');
  const text = inp.value.trim();
  if(!text || isLoading) return;

  inp.value = '';
  inp.style.height = '28px';
  hideSugs();

  addUserMsg(text);
  chatHistory.push({ role: 'user', content: text });
  isLoading = true;

  const typId = addTyping();

  try {
    const cfg = LANGS[chatLang];
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 450,
        system: cfg.system,
        messages: chatHistory
      })
    });

    const data = await res.json();

    if(data.error) {
      const msg = data.error.type === 'authentication_error'
        ? (chatLang === 'nl' ? '⚠️ API-sleutel ongeldig. Open ai-chat.html en vervang YOUR_ANTHROPIC_API_KEY met je echte sleutel van console.anthropic.com' :
           chatLang === 'fr' ? '⚠️ Clé API invalide. Veuillez ouvrir ai-chat.html et remplacer YOUR_ANTHROPIC_API_KEY par votre vraie clé depuis console.anthropic.com' :
           '⚠️ Invalid API key. Please open ai-chat.html and replace YOUR_ANTHROPIC_API_KEY with your real key from console.anthropic.com')
        : (chatLang === 'nl' ? `⚠️ Fout: ${data.error.message}` :
           chatLang === 'fr' ? `⚠️ Erreur : ${data.error.message}` :
           `⚠️ Error: ${data.error.message}`);
      removeTyping(typId);
      addBotMsg(msg, false);
      isLoading = false;
      return;
    }

    const reply = data.content?.[0]?.text || (chatLang === 'nl' ? '(Geen antwoord)' : chatLang === 'fr' ? '(Pas de réponse)' : '(No response)');
    removeTyping(typId);
    addBotMsg(reply, true);
    chatHistory.push({ role: 'assistant', content: reply });
    if(chatHistory.length > 26) chatHistory = chatHistory.slice(-26);

  } catch(err) {
    removeTyping(typId);
    const errMsg = chatLang === 'nl' ? '⚠️ Netwerkfout. Controleer je internetverbinding en API-sleutel, en probeer het opnieuw.' :
                   chatLang === 'fr' ? '⚠️ Erreur réseau. Vérifiez votre connexion internet et votre clé API, puis réessayez.' :
                   '⚠️ Network error. Check your internet connection and API key, then try again.';
    addBotMsg(errMsg, false);
    console.error('API error:', err);
  }

  isLoading = false;
}

// ════════════════════════════════════════
// DOM HELPERS
// ════════════════════════════════════════
function addUserMsg(text) {
  const msgs = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = `
    <div class="msg-av">👤</div>
    <div class="msg-body">
      <div class="msg-bbl">${escHtml(text)}</div>
    </div>`;
  msgs.appendChild(d);
  scrollBottom();
}

function addBotMsg(text, withSpeak = true) {
  const msgs = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg bot';
  const sid = 'sp_' + Date.now();
  d.innerHTML = `
    <div class="msg-av">🎓</div>
    <div class="msg-body">
      <div class="msg-bbl">${escHtml(text)}</div>
      ${withSpeak ? `<button class="speak-btn" id="${sid}" onclick="speakMsg(this,'${escAttr(text)}')" aria-label="Luister">🔊 ${chatLang === 'nl' ? 'Luister' : chatLang === 'fr' ? 'Écouter' : 'Listen'}</button>` : ''}
    </div>`;
  msgs.appendChild(d);
  scrollBottom();
}

function addTyping() {
  const msgs = document.getElementById('msgs');
  const id = 'ty_' + Date.now();
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.id = id;
  d.innerHTML = `
    <div class="msg-av">🎓</div>
    <div class="msg-body">
      <div class="typing-wrap" role="status" aria-label="${chatLang === 'nl' ? 'Lerares is aan het typen' : chatLang === 'fr' ? 'Professeure est en train d\'écrire' : 'Teacher is typing'}">
        <span class="tdot"></span>
        <span class="tdot"></span>
        <span class="tdot"></span>
      </div>
    </div>`;
  msgs.appendChild(d);
  scrollBottom();
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if(el) el.remove();
}

function scrollBottom() {
  const msgs = document.getElementById('msgs');
  msgs.scrollTop = msgs.scrollHeight;
}

function hideSugs() {
  const s = document.getElementById('sugs');
  if(s) { s.style.opacity='0'; s.style.pointerEvents='none'; }
}

// ════════════════════════════════════════
// TEXT-TO-SPEECH
// ════════════════════════════════════════
function speakMsg(btn, text) {
  if(ttsU) {
    window.speechSynthesis.cancel();
    ttsU = null;
    document.querySelectorAll('.speak-btn.playing').forEach(b => {
      b.classList.remove('playing');
      b.textContent = `🔊 ${chatLang === 'nl' ? 'Luister' : chatLang === 'fr' ? 'Écouter' : 'Listen'}`;
      b.setAttribute('aria-label', chatLang === 'nl' ? 'Luister' : chatLang === 'fr' ? 'Écouter' : 'Listen');
    });
    if(btn._active) { btn._active = false; return; }
  }
  const cfg = LANGS[chatLang];
  const u = new SpeechSynthesisUtterance(text);
  u.lang = cfg.voice;
  u.rate = 0.92;
  u.pitch = 1.08;
  ttsU = u;
  btn.classList.add('playing');
  btn.textContent = `⏹ ${chatLang === 'nl' ? 'Stop' : chatLang === 'fr' ? 'Arrêter' : 'Stop'}`;
  btn.setAttribute('aria-label', chatLang === 'nl' ? 'Stop' : chatLang === 'fr' ? 'Arrêter' : 'Stop');
  btn._active = true;
  u.onend = () => {
    btn.classList.remove('playing');
    btn.textContent = `🔊 ${chatLang === 'nl' ? 'Luister' : chatLang === 'fr' ? 'Écouter' : 'Listen'}`;
    btn.setAttribute('aria-label', chatLang === 'nl' ? 'Luister' : chatLang === 'fr' ? 'Écouter' : 'Listen');
    btn._active = false;
    ttsU = null;
  };
  window.speechSynthesis.speak(u);
}

// ════════════════════════════════════════
// SPEECH RECOGNITION
// ════════════════════════════════════════
function toggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) { 
    const msg = chatLang === 'nl' ? 'Spraakinput werkt alleen in Chrome of Edge.' :
                chatLang === 'fr' ? 'La saisie vocale nécessite Chrome ou Edge.' :
                'Voice input needs Chrome or Edge browser.';
    alert(msg); 
    return; 
  }

  if(isRecording) { recognition?.stop(); return; }

  recognition = new SR();
  recognition.lang = LANGS[chatLang].voice;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  const mic = document.getElementById('micBtn');

  recognition.onstart = () => {
    isRecording = true;
    mic.classList.add('recording');
    mic.textContent = '⏹';
    mic.setAttribute('aria-label', chatLang === 'nl' ? 'Stop opnemen' : chatLang === 'fr' ? 'Arrêter l\'enregistrement' : 'Stop recording');
  };
  recognition.onresult = e => {
    const t = e.results[0][0].transcript;
    document.getElementById('chatInp').value = t;
    autoResize(document.getElementById('chatInp'));
  };
  recognition.onend = () => {
    isRecording = false;
    mic.classList.remove('recording');
    mic.textContent = '🎤';
    mic.setAttribute('aria-label', chatLang === 'nl' ? 'Spraakinput' : chatLang === 'fr' ? 'Saisie vocale' : 'Voice input');
    if(document.getElementById('chatInp').value.trim()) sendMsg();
  };
  recognition.onerror = () => {
    isRecording = false;
    mic.classList.remove('recording');
    mic.textContent = '🎤';
  };
  recognition.start();
}

// ════════════════════════════════════════
// UTILS
// ════════════════════════════════════════
function handleKey(e) {
  if(e.key === 'Enter' && !e.shiftKey) { 
    e.preventDefault(); 
    sendMsg(); 
  }
}

function autoResize(el) {
  el.style.height = '28px';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function escHtml(t) {
  return String(t)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/\n/g,'<br>');
}

function escAttr(t) {
  return String(t)
    .replace(/\\/g,'\\\\')
    .replace(/'/g,"\\'")
    .replace(/\n/g,' ')
    .substring(0, 300);
}
