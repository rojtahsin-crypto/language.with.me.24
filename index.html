<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>LinguaAI</title><script src="https://accounts.google.com/gsi/client" async defer></script><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,#f0f9ff,#e0f2fe);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;transition:background.3s}body.dark{background:linear-gradient(135deg,#1f2937,#111827)}.card{background:#fff;border-radius:24px;padding:32px;width:100%;max-width:400px;box-shadow:0 10px 40px rgba(0,0,0,.1);transition:all.3s}body.dark .card{background:#1f2937;border:1px solid #374151;box-shadow:0 10px 40px rgba(0,0,0,.3)}.logo{width:56px;height:56px;background:linear-gradient(135deg,#10b981,#059669);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:#fff;font-weight:700;font-size:24px}h1{text-align:center;color:#1f2937;margin-bottom:8px}body.dark h1{color:#fff}.subtitle{text-align:center;color:#6b7280;margin-bottom:24px}body.dark .subtitle{color:#9ca3af}.tabs{display:flex;gap:8px;background:#f3f4f6;padding:4px;border-radius:12px;margin-bottom:24px}body.dark .tabs{background:#374151}.tab{flex:1;padding:10px;border:none;background:transparent;border-radius:8px;font-weight:600;color:#6b7280;cursor:pointer;transition:all.2s}body.dark .tab{color:#9ca3af}.tab.active{background:#fff;color:#10b981;box-shadow:0 2px 4px rgba(0,0,0,.1)}body.dark .tab.active{background:#111827;color:#10b981}.input-group{margin-bottom:16px}label{display:block;font-size:12px;font-weight:600;color:#6b7280;margin-bottom:6px;text-transform:uppercase}body.dark label{color:#9ca3af}input{width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:12px;font-size:14px;transition:border-color.2s;background:#fff}body.dark input{background:#374151;border-color:#4b5563;color:#fff}input:focus{outline:none;border-color:#10b981}.btn{width:100%;padding:14px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;border-radius:12px;font-weight:600;font-size:16px;cursor:pointer;margin-top:8px;transition:transform.1s}.btn:hover{transform:translateY(-2px)}.btn:disabled{opacity:.7;cursor:not-allowed}.divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:#9ca3af;font-size:12px;font-weight:600}body.dark .divider{color:#6b7280}.divider::before,.divider::after{content:"";flex:1;height:1px;background:#e5e7eb}body.dark .divider::before,body.dark .divider::after{background:#374151}.google-btn{width:100%;padding:12px;border:2px solid #e5e7eb;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;gap:10px;font-weight:500;color:#374151;cursor:pointer;transition:border-color.2s}body.dark .google-btn{background:#374151;border-color:#4b5563;color:#fff}.google-btn:hover{border-color:#10b981}.hidden{display:none}.error{color:#ef4444;font-size:12px;margin-top:4px}.theme-toggle{position:fixed;top:20px;right:20px;padding:12px;border-radius:50%;background:#fff;border:none;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.1);font-size:20px;transition:transform.2s;z-index:100}body.dark .theme-toggle{background:#374151}.theme-toggle:hover{transform:scale(1.1)}.welcome-card{text-align:center}.welcome-card .btn{background:linear-gradient(135deg,#ef4444,#dc2626)}.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-radius:50%;border-top-color:#fff;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px}@keyframes spin{to{transform:rotate(360deg)}}.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;opacity:.6}.eye-btn:hover{opacity:1}.input-wrap{position:relative}</style></head><body><button class="theme-toggle" onclick="toggleTheme()" title="Wissel thema">🌙</button><div class="card" id="authCard"><div class="logo">🌍</div><h1>LinguaAI</h1><p class="subtitle">Log in om verder te gaan</p><div class="tabs"><button class="tab active" onclick="switchTab('login')">Inloggen</button><button class="tab" onclick="switchTab('signup')">Registreren</button></div><form id="loginForm" onsubmit="handleLogin(event)"><div class="input-group"><label>E-mail</label><input type="email" id="loginEmail" placeholder="jij@voorbeeld.nl" required></div><div class="input-group"><label>Wachtwoord</label><div class="input-wrap"><input type="password" id="loginPassword" placeholder="••••••••" required><button type="button" class="eye-btn" onclick="togglePass('loginPassword')">👁️</button></div></div><button type="submit" class="btn" id="loginBtn">Inloggen</button></form><form id="signupForm" class="hidden" onsubmit="handleSignup(event)"><div class="input-group"><label>Naam</label><input type="text" id="signupName" placeholder="Je naam" required></div><div class="input-group"><label>E-mail</label><input type="email" id="signupEmail" placeholder="jij@voorbeeld.nl" required></div><div class="input-group"><label>Wachtwoord</label><div class="input-wrap"><input type="password" id="signupPassword" placeholder="Minimaal 6 tekens" minlength="6" required><button type="button" class="eye-btn" onclick="togglePass('signupPassword')">👁️</button></div></div><button type="submit" class="btn" id="signupBtn">Account aanmaken</button></form><div class="divider">OF</div><button class="google-btn" onclick="handleGoogle()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>Verder met Google</button></div><div class="card welcome-card hidden" id="welcomeCard"><div class="logo">🌍</div><h2>Welkom! 👋</h2><p id="welcomeEmail" style="color:#6b7280;margin:8px 0"></p><p style="color:#9ca3af;font-size:14px;margin-bottom:24px">Succesvol ingelogd bij LinguaAI</p><button class="btn" onclick="logout()">Uitloggen</button></div><script>
function toggleTheme(){document.body.classList.toggle('dark');const d=document.body.classList.contains('dark');localStorage.setItem('lingua-theme',d?'dark':'light');document.querySelector('.theme-toggle').textContent=d?'☀️':'🌙'}
if(localStorage.getItem('lingua-theme")==='dark'){document.body.classList.add('dark');document.querySelector('.theme-toggle').textContent='☀️'}
function switchTab(t){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');document.getElementById('loginForm').classList.toggle('hidden',t!=='login');document.getElementById('signupForm').classList.toggle('hidden',t!=='signup')}
function togglePass(id){const el=document.getElementById(id);el.type=el.type==='password'?'text':'password'}
function handleLogin(e){e.preventDefault();const email=document.getElementById('loginEmail').value,btn=document.getElementById('loginBtn'),orig=btn.innerHTML;btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Inloggen...';setTimeout(()=>{showWelcome(email);btn.disabled=false;btn.innerHTML=orig},1500)}
function handleSignup(e){e.preventDefault();const name=document.getElementById('signupName').value,email=document.getElementById('signupEmail').value,btn=document.getElementById('signupBtn'),orig=btn.innerHTML;btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Aanmaken...';setTimeout(()=>{showWelcome(email,name);btn.disabled=false;btn.innerHTML=orig},1500)}
function handleGoogle(){alert('🔐 Google Login:\n\nVoor productie: ga naar https://console.cloud.google.com\nen maak een OAuth client aan.')}
function showWelcome(email,name=null){document.getElementById('authCard').classList.add('hidden');document.getElementById('welcomeCard').classList.remove('hidden');document.getElementById('welcomeEmail').textContent=name?name+' • '+email:email;setTimeout(()=>{window.location.href='home.html'},2000)}
function logout(){document.getElementById('welcomeCard').classList.add('hidden');document.getElementById('authCard').classList.remove('hidden');document.getElementById('loginForm').reset();document.getElementById('signupForm').reset()}
</script></body></html>
