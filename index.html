<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lang.Master</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --bg:#f5f3ef;--surface:#fff;--surface2:#faf9f7;--border:#e8e4de;
  --text:#1c1917;--text2:#78716c;--accent:#d97706;--accent-dark:#b45309;
  --accent-soft:#fef3c7;--green:#16a34a;--red:#dc2626;--blue:#2563eb;
  --purple:#7c3aed;--teal:#0d9488;--pink:#db2777;
  --sh:0 4px 16px rgba(0,0,0,0.08);--r:16px;--r-sm:10px;
  --font:'Plus Jakarta Sans',sans-serif;--mono:'Fira Code',monospace;
}
body.dark{
  --bg:#0c0a08;--surface:#1a1614;--surface2:#221e1a;--border:#2e2a26;
  --text:#f5f0e8;--text2:#9c9087;--accent:#f59e0b;--accent-dark:#d97706;
  --accent-soft:#1c1500;--sh:0 4px 16px rgba(0,0,0,0.35);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}

/* LANG SCREEN */
#langScreen{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(160deg,#0f0a00,#1c0d00 40%,#0a1200);
  display:flex;align-items:center;justify-content:center;transition:opacity .5s;
}
#langScreen.gone{opacity:0;pointer-events:none;}
.li{text-align:center;animation:su .7s cubic-bezier(.22,1,.36,1);}
@keyframes su{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:none}}
.brand{font-size:clamp(2.5rem,6vw,4rem);font-weight:800;color:#fff;letter-spacing:-2px;margin-bottom:.4rem;}
.brand span{color:#f59e0b;}
.bsub{color:#78716c;font-size:1rem;margin-bottom:3.5rem;}
.lcards{display:flex;gap:1.2rem;justify-content:center;flex-wrap:wrap;}
.lcard{
  background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);
  border-radius:20px;padding:2rem 2.5rem;cursor:pointer;color:#f5f0e8;
  text-align:center;transition:all .25s;min-width:160px;
}
.lcard:hover{background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.5);transform:translateY(-6px);box-shadow:0 20px 50px rgba(0,0,0,.4);}
.lcard img{width:72px;border-radius:10px;display:block;margin:0 auto 1rem;}
.lcard .ln{font-size:1.05rem;font-weight:700;}

/* APP */
#app{display:none;min-height:100vh;flex-direction:column;}
#app.on{display:flex;}

/* HEADER */
.hdr{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;
  gap:1rem;flex-wrap:wrap;position:sticky;top:0;z-index:200;
  box-shadow:0 1px 3px rgba(0,0,0,.08);
}
.logo{font-size:1.35rem;font-weight:800;letter-spacing:-1px;color:var(--text);}
.logo span{color:var(--accent);}
.tnav{display:flex;gap:.25rem;background:var(--bg);border:1px solid var(--border);border-radius:50px;padding:.35rem;}
.tb{
  background:transparent;border:none;cursor:pointer;padding:.5rem 1.3rem;
  border-radius:40px;font-family:var(--font);font-size:.88rem;font-weight:600;
  color:var(--text2);display:flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap;
}
.tb.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.tb i{font-size:.9rem;}
.hbtns{display:flex;gap:.4rem;}
.hbtn{
  width:40px;height:40px;border-radius:50%;border:1px solid var(--border);
  background:var(--bg);cursor:pointer;font-size:1rem;color:var(--text2);
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.hbtn:hover{color:var(--accent);border-color:var(--accent);}

/* SEARCH */
.sbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.85rem 2rem;}
.sw{
  max-width:680px;margin:0 auto;position:relative;
  background:var(--bg);border:1.5px solid var(--border);
  border-radius:50px;display:flex;align-items:center;padding:0 .5rem 0 1.2rem;
  transition:border-color .2s,box-shadow .2s;
}
.sw:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(217,119,6,.12);}
.sw > i{color:var(--text2);font-size:.95rem;flex-shrink:0;}
#si{flex:1;border:none;background:transparent;outline:none;padding:.75rem .8rem;font-family:var(--font);font-size:.9rem;color:var(--text);}
#si::placeholder{color:var(--text2);}
#sc{background:none;border:none;color:var(--text2);cursor:pointer;padding:.4rem .6rem;font-size:.95rem;border-radius:50%;display:none;}
#sc:hover{color:var(--red);}
#sr{
  position:absolute;top:calc(100% + 8px);left:0;right:0;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);box-shadow:var(--sh);z-index:500;
  display:none;max-height:380px;overflow-y:auto;
}
.srlbl{padding:.4rem 1rem;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);}
.sri{
  display:flex;align-items:center;gap:10px;padding:.75rem 1rem;
  cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;
}
.sri:last-child{border-bottom:none;}
.sri:hover{background:var(--bg);}
.sric{width:30px;height:30px;border-radius:8px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;}
.srt{font-size:.88rem;font-weight:600;margin-bottom:1px;}
.srs{font-size:.75rem;color:var(--text2);}
mark{background:#fde68a;padding:0 2px;border-radius:3px;}
body.dark mark{background:#78350f;color:#fde68a;}

/* MAIN */
.main{flex:1;padding:1.8rem 2rem;max-width:1080px;margin:0 auto;width:100%;}
.sec{display:none;animation:fi .2s;}
.sec.on{display:block;}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* GRAMMAR */
.gl{display:flex;flex-direction:column;gap:.9rem;}
.gc{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:1.3rem 1.5rem;
  position:relative;overflow:hidden;transition:box-shadow .2s,transform .2s;
}
.gc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:var(--r) 0 0 var(--r);}
.gc.hl{box-shadow:0 0 0 3px var(--accent);transform:scale(1.003);}
.gctop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.6rem;gap:1rem;}
.gcnum{font-family:var(--mono);font-size:.68rem;color:var(--text2);font-weight:500;}
.gc h3{font-size:1rem;font-weight:700;line-height:1.4;flex:1;}
.exb{
  background:var(--bg);border:1px solid var(--border);width:28px;height:28px;
  border-radius:50%;cursor:pointer;color:var(--text2);font-size:.8rem;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;
}
.exb:hover{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);}
.gbody{display:none;margin-top:.8rem;}
.gbody.op{display:block;animation:fi .2s;}
.gexp{font-size:.87rem;color:var(--text2);line-height:1.75;margin-bottom:.9rem;}
.gexp strong{color:var(--text);font-weight:600;}
.gexb{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:.9rem 1rem;margin-bottom:.8rem;}
.gexl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:.5rem;}
.gexr{padding:.35rem 0;border-bottom:1px dashed var(--border);font-size:.84rem;color:var(--text);}
.gexr:last-child{border-bottom:none;}
.gwrds{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.7rem;}
.wt{
  background:var(--accent-soft);color:var(--accent-dark);border:1px solid rgba(217,119,6,.2);
  border-radius:2rem;padding:.28rem .75rem;font-size:.8rem;font-weight:600;cursor:pointer;
  display:inline-flex;align-items:center;gap:4px;transition:all .15s;
}
.wt:hover{background:var(--accent);color:white;}
.wt i{font-size:.7rem;}
.gc-blue::before{background:var(--blue);}
.gc-green::before{background:var(--green);}
.gc-orange::before{background:#ea580c;}
.gc-purple::before{background:var(--purple);}
.gc-red::before{background:var(--red);}
.gc-teal::before{background:var(--teal);}
.gc-pink::before{background:var(--pink);}
.gc-yellow::before{background:#ca8a04;}

/* PRACTICE */
.lvlrow{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.lbtn{
  background:var(--bg);border:1.5px solid var(--border);padding:.5rem 1.4rem;
  border-radius:50px;font-family:var(--font);font-weight:700;font-size:.88rem;
  cursor:pointer;color:var(--text2);transition:all .2s;
}
.lbtn.on{background:var(--accent);border-color:var(--accent);color:white;}
.qbox{
  background:var(--surface);border:1px solid var(--border);
  border-left:5px solid var(--accent);border-radius:var(--r);
  padding:1.4rem 1.6rem;font-size:1.05rem;font-weight:600;margin-bottom:1.2rem;
}
.opts{display:flex;flex-direction:column;gap:.6rem;}
.obtn{
  background:var(--bg);border:1.5px solid var(--border);padding:.8rem 1.4rem;
  border-radius:50px;text-align:left;font-family:var(--font);font-size:.9rem;
  font-weight:500;color:var(--text);cursor:pointer;transition:all .15s;
}
.obtn:hover:not(.ok):not(.bad){border-color:var(--accent);background:var(--accent-soft);}
.obtn.ok{background:#dcfce7;border-color:var(--green);color:#14532d;}
.obtn.bad{background:#fee2e2;border-color:var(--red);color:#7f1d1d;}
body.dark .obtn.ok{background:#052e16;color:#86efac;}
body.dark .obtn.bad{background:#450a0a;color:#fca5a5;}
.fbmsg{margin-top:.9rem;padding:.75rem 1.2rem;border-radius:var(--r-sm);font-weight:600;font-size:.88rem;}
.fbok{background:#dcfce7;color:#14532d;border:1px solid var(--green);}
.fbbad{background:#fee2e2;color:#7f1d1d;border:1px solid var(--red);}
body.dark .fbok{background:#052e16;color:#86efac;border-color:var(--green);}
body.dark .fbbad{background:#450a0a;color:#fca5a5;border-color:var(--red);}
.nxtbtn{
  background:var(--accent);color:white;border:none;padding:.8rem 2rem;
  border-radius:50px;font-family:var(--font);font-weight:700;font-size:.92rem;
  cursor:pointer;margin-top:1.2rem;transition:opacity .15s;display:inline-flex;align-items:center;gap:6px;
}
.nxtbtn:hover{opacity:.88;}
.prwrap{margin-top:1.6rem;}
.prbg{background:var(--border);border-radius:10px;height:7px;overflow:hidden;}
.prfill{background:var(--green);height:100%;width:0%;border-radius:10px;transition:width .4s;}
.prlbl{font-family:var(--mono);font-size:.75rem;color:var(--text2);margin-top:.4rem;text-align:right;}

/* TESTS */
.titem{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem 1.4rem;margin-bottom:.9rem;}
.tq{font-size:.92rem;font-weight:600;margin-bottom:.8rem;}
.tmc{display:flex;flex-wrap:wrap;gap:.5rem;}
.tmcbtn{
  padding:.4rem 1rem;border:1.5px solid var(--border);border-radius:50px;
  font-family:var(--font);font-size:.84rem;font-weight:500;cursor:pointer;
  color:var(--text);background:var(--bg);transition:all .15s;
}
.tmcbtn.sel{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
.tfill{
  width:100%;padding:.7rem 1.1rem;border:1.5px solid var(--border);border-radius:50px;
  background:var(--bg);font-family:var(--font);font-size:.88rem;color:var(--text);
  outline:none;transition:border-color .2s;
}
.tfill:focus{border-color:var(--accent);}
.subbtn{
  background:var(--accent);color:white;border:none;padding:.85rem 2.2rem;
  border-radius:50px;font-family:var(--font);font-weight:700;font-size:.92rem;
  cursor:pointer;margin-top:1.5rem;transition:opacity .15s;
}
.subbtn:hover{opacity:.88;}
.rbox{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2rem;margin-top:1.5rem;text-align:center;}
.rpct{font-size:3.5rem;font-weight:800;color:var(--accent);line-height:1;margin-bottom:.5rem;}
.rmsg{font-size:1rem;color:var(--text2);}

/* POPUP */
.pop{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--text);color:var(--bg);padding:11px 22px;border-radius:50px;
  font-weight:600;font-size:.88rem;box-shadow:var(--sh);z-index:9998;
  animation:pu .2s ease;display:flex;align-items:center;gap:9px;
}
@keyframes pu{from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.pop button{background:none;border:none;color:inherit;cursor:pointer;font-size:1.1rem;opacity:.7;}

footer{text-align:center;padding:1.5rem;color:var(--text2);font-size:.78rem;border-top:1px solid var(--border);}

@media(max-width:640px){
  .hdr{padding:.75rem 1rem;}
  .main{padding:1.2rem 1rem;}
  .sbar{padding:.75rem 1rem;}
  .tb span{display:none;}
  .logo{font-size:1.15rem;}
}
</style>
</head>
<body>

<div id="langScreen">
  <div class="li">
    <div class="brand">Lang<span>.</span>Master</div>
    <div class="bsub">The smartest way to learn a language</div>
    <div class="lcards">
      <div class="lcard" id="lc-dutch">
        <img src="https://flagcdn.com/w160/nl.png" alt="NL">
        <div class="ln">🇳🇱 Nederlands</div>
      </div>
      <div class="lcard" id="lc-french">
        <img src="https://flagcdn.com/w160/fr.png" alt="FR">
        <div class="ln">🇫🇷 Français</div>
      </div>
      <div class="lcard" id="lc-english">
        <img src="https://flagcdn.com/w160/gb.png" alt="EN">
        <div class="ln">🇬🇧 English</div>
      </div>
    </div>
  </div>
</div>

<div id="app">
  <header class="hdr">
    <div class="logo">Lang<span>.</span>Master</div>
    <nav class="tnav">
      <button class="tb on" data-tab="grammar"><i class="fas fa-book-open"></i><span id="l-g">Grammar</span></button>
      <button class="tb" data-tab="practice"><i class="fas fa-pen"></i><span id="l-p">Practice</span></button>
      <button class="tb" data-tab="tests"><i class="fas fa-clipboard-check"></i><span id="l-t">Tests</span></button>
    </nav>
    <div class="hbtns">
      <button class="hbtn" id="btnLang"><i class="fas fa-globe"></i></button>
      <button class="hbtn" id="btnDark"><i class="fas fa-moon"></i></button>
    </div>
  </header>

  <div class="sbar">
    <div class="sw">
      <i class="fas fa-search"></i>
      <input id="si" type="text" placeholder="Search grammar, exercises..." autocomplete="off">
      <button id="sc"><i class="fas fa-times"></i></button>
      <div id="sr"></div>
    </div>
  </div>

  <div class="main">
    <div id="s-grammar" class="sec on"><div id="gl" class="gl"></div></div>
    <div id="s-practice" class="sec">
      <div id="pl" class="lvlrow"></div>
      <div id="pq" class="qbox"></div>
      <div id="po" class="opts"></div>
      <div id="pf"></div>
      <button id="pn" class="nxtbtn" style="display:none">Next <i class="fas fa-arrow-right"></i></button>
      <div class="prwrap"><div class="prbg"><div id="prf" class="prfill"></div></div><div id="prl" class="prlbl"></div></div>
    </div>
    <div id="s-tests" class="sec">
      <div id="tl" class="lvlrow"></div>
      <div id="tb2"></div>
      <button id="ts" class="subbtn">Show Results 📊</button>
      <div id="tr"></div>
    </div>
  </div>
  <footer>✨ Lang.Master · Learn with me · Roj Tahsin ✨</footer>
</div>

<script>
// ── DATA ──────────────────────────────────────
const DG=[
{
  n: '01',
  c: 'gc-blue',
  t: 'Het Nederlandse alfabet en uitspraak 🔤',
  e: 'Het Nederlands telt <strong>26 letters</strong>. Uniek zijn de <strong>harde G</strong> (schrapend, achter in de keel), de <strong>IJ/EI</strong> (als in "blijft"), <strong>UI</strong> (lastige tweeklank), <strong>OE</strong> (als "oo" in boot) en <strong>EU</strong> (als Franse "eu"). Let op: <strong>CH</strong> klinkt precies als G.',
  x: [
    { n: '"G" — harde, schrapende g, achter in de keel: "gracht", "goed"' },
    { n: '"IJ" — klinkt als "ij" in "blijft", ook geschreven als EI (zelfde klank)' },
    { n: '"OE" — klinkt als de "oo" in het Engelse "boot" of "food"' },
    { n: '"UI" — lastig: begin met "u" en glijd naar "i", zoals in "huis", "tuin"' },
    { n: '"EU" — als de Franse "eu" in "deux" of "feu": "neus", "leuk"' },
    { n: '"CH" — identiek aan de harde G: "lacht", "licht", "school"' },
    { n: '"SCH" — combinatie van S + CH (dus s‑chra­pend): "school", "schip"' }
  ],
  w: [
    'goedemorgen',
    'huis',
    'boek',
    'neus',
    'ijs',
    'school',
    'gracht',
    'schip',
    'euvel'
  ],
  k: [
    'alfabet',
    'uitspraak',
    'klinker',
    'medeklinker',
    'tweeklank',
    'ij',
    'ei',
    'eu',
    'oe',
    'ui',
    'ch',
    'g'
  ]
},
{n:'02',c:'gc-green',t:'Lidwoorden en zelfstandige naamwoorden 📝',
  e:'Er zijn drie lidwoorden: <strong>de</strong> (mannelijk/vrouwelijk, ~75% van woorden), <strong>het</strong> (onzijdig), en <strong>een</strong> (onbepaald, altijd hetzelfde). Tip: verkleinwoorden zijn <em>altijd</em> het-woorden.',
  x:[{n:'De man / de vrouw / de tafel (de-woord)'},{n:'Het kind / het boek / het huis (het-woord)'},{n:'Een man / een boek (onbepaald lidwoord, geen verschil)'},{n:'Het huisje — elk verkleinwoord is altijd een het-woord!'},{n:'Woorden op -ing, -heid, -tie zijn altijd de-woorden'}],
  w:['de man','het kind','het boek','een auto','de vrouw'],k:['lidwoord','de','het','een','naamwoord','genus']},
 {n:'03',c:'gc-orange',t:'Meervoud van zelfstandige naamwoorden 👨‍👩‍👧‍👦',
  e:'Twee hoofdregels: <strong>-en</strong> (meest voorkomend) en <strong>-s</strong>. Let op spellingveranderingen! Kleine groep krijgt <strong>-eren</strong>.',
  x:[{n:'boek → boeken | man → mannen (verdubbel medeklinker!)'},{n:'maan → manen (haal dubbele klinker weg)'},{n:'brief → brieven | huis → huizen (f→v, s→z)'},{n:"tafel → tafels | café → café's (-s na stomme e/klinker)"},{n:'kind → kinderen | ei → eieren | blad → bladeren (-eren, uitzondering!)'}],
  w:['mannen','boeken','kinderen',"cafés",'huizen','brieven'],k:['meervoud','plural','-en','-s','-eren','spelling']},
 {n:'04',c:'gc-purple',t:'Verkleinwoorden (Diminutieven) 🐣',
  e:'Elk zelfstandig naamwoord kan worden verkleind. Het verkleinwoord is <strong>altijd een het-woord</strong>. De uitgang is een variant van <strong>-je</strong>.',
  x:[{n:'huis → huisje | boek → boekje (-je na de meeste medeklinkers)'},{n:'bloem → bloempje (-pje na korte klinker + m)'},{n:'ring → ringetje (-etje na ng, l, n, r na korte klinker)'},{n:'boom → boompje | been → beentje (-tje na lange klinker)'},{n:'koning → koninkje (-kje na woorden op -ing)'}],
  w:['huisje','bloempje','ringetje','boompje','koninkje','boekje'],k:['verkleinwoord','diminutief','-je','-tje','-pje','-etje','-kje']},
 {n:'05',c:'gc-teal',t:'Bijvoeglijke naamwoorden – verbuiging en trappen 🎨',
  e:'Standaard: voeg <strong>-e</strong> toe. Uitzondering: het-woord + <strong>een</strong> (of geen lidwoord) = géén -e. Trappen: stellend → <strong>-er</strong> → <strong>-st</strong>.',
  x:[{n:'De grote man / Een grote man (de-woord: altijd -e)'},{n:'Het grote huis (het-woord + het: -e)'},{n:'Een groot huis (het-woord + een: géén -e!)'},{n:'mooi → mooier → mooist'},{n:'Onregelmatig: goed → beter → best | veel → meer → meest'}],
  w:['grote','mooi','mooier','mooist','beter','best','meer'],k:['bijvoeglijk','verbuiging','vergelijking','-er','-st','comparatief','superlatief']},

// ── STATE ─────────────────────────────────────
let lang='dutch', tab='grammar', pLv='A1', tLv='A1';
let pQs=[], pIdx=0, pAns=false;
let tQs=[], tAns=[];

// ── UTILS ─────────────────────────────────────
const $=id=>document.getElementById(id);
const L=()=>CFG[lang];

function speak(w){
  if(!window.speechSynthesis)return;
  const u=new SpeechSynthesisUtterance(w);
  u.lang={dutch:'nl-NL',french:'fr-FR',english:'en-US'}[lang]||'en-US';
  speechSynthesis.cancel();speechSynthesis.speak(u);
}
function showPop(w){
  document.querySelectorAll('.pop').forEach(p=>p.remove());
  const p=document.createElement('div');p.className='pop';
  p.innerHTML=`<button onclick="speak('${w.replace(/'/g,"\\'")}')" ><i class="fas fa-volume-up"></i></button> <strong>${w}</strong>`;
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),2500);
}
function setCSS(){
  const c=L().theme;
  let s=$('dcs');
  if(!s){s=document.createElement('style');s.id='dcs';document.head.appendChild(s);}
  s.textContent=`:root{--accent:${c};--accent-dark:${c};--accent-soft:${c}18;}`;
}
function setLabels(){
  const lb=L().lbl;
  $('l-g').textContent=lb.g;$('l-p').textContent=lb.p;$('l-t').textContent=lb.t;
  $('pn').innerHTML=lb.next;$('ts').textContent=lb.sub;
  $('si').placeholder=lb.search;
}

// ── TABS ──────────────────────────────────────
function goTab(t){
  tab=t;
  document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));
  document.querySelectorAll('.sec').forEach(s=>s.classList.toggle('on',s.id==='s-'+t));
  localStorage.setItem('lmt',t);
}

// ── GRAMMAR ───────────────────────────────────
function renderG(){
  const list=$('gl');list.innerHTML='';
  L().gram.forEach((g,i)=>{
    const d=document.createElement('div');
    d.className=`gc ${g.c}`;d.dataset.idx=i;
    d.innerHTML=`
      <div class="gctop">
        <div><div class="gcnum">${g.n} · ${L().name}</div><h3>${g.t}</h3></div>
        <button class="exb" data-i="${i}"><i class="fas fa-chevron-down"></i></button>
      </div>
      <div class="gbody" id="gb${i}">
        <div class="gexp">${g.e}</div>
        ${g.x&&g.x.length?`<div class="gexb"><div class="gexl">Examples</div>${g.x.map(ex=>`<div class="gexr">${ex.n}</div>`).join('')}</div>`:''}
        <div class="gwrds">${(g.w||[]).map(w=>`<span class="wt" data-w="${w}"><i class="fas fa-volume-up"></i>${w}</span>`).join('')}</div>
      </div>`;
    list.appendChild(d);
  });
  list.querySelectorAll('.exb').forEach(btn=>btn.addEventListener('click',e=>{
    e.stopPropagation();
    const body=$('gb'+btn.dataset.i);
    const ic=btn.querySelector('i');
    const op=body.classList.toggle('op');
    ic.className=op?'fas fa-chevron-up':'fas fa-chevron-down';
  }));
  list.querySelectorAll('.wt').forEach(tag=>tag.addEventListener('click',e=>{
    e.stopPropagation();showPop(tag.dataset.w);speak(tag.dataset.w);
  }));
}

// ── LEVEL BUTTONS ─────────────────────────────
function lvlBtns(cid,lvs,cur,cb){
  const c=$(cid);c.innerHTML='';
  lvs.forEach(l=>{
    const b=document.createElement('button');b.className='lbtn'+(l===cur?' on':'');b.textContent=l;
    b.addEventListener('click',()=>cb(l));c.appendChild(b);
  });
}

// ── PRACTICE ──────────────────────────────────
function loadP(){
  const ex=L().ex[pLv]||[];
  pQs=ex.length?ex:[{q:L().lbl.noex,o:[L().lbl.ok],a:L().lbl.ok}];
  pIdx=0;pAns=false;renderP();
}
function renderP(){
  const lb=L().lbl,q=pQs[pIdx];
  $('pq').textContent=q.q;
  $('po').innerHTML=q.o.map(o=>`<button class="obtn" data-o="${o}">${o}</button>`).join('');
  $('pf').innerHTML='';$('pn').style.display='none';pAns=false;updProg();
  $('po').querySelectorAll('.obtn').forEach(btn=>btn.addEventListener('click',function(){
    if(pAns)return;pAns=true;
    const ok=this.dataset.o===q.a;
    this.classList.add(ok?'ok':'bad');
    if(!ok)$('po').querySelectorAll('.obtn').forEach(b=>{if(b.dataset.o===q.a)b.classList.add('ok');});
    $('pf').innerHTML=`<div class="fbmsg ${ok?'fbok':'fbbad'}">${ok?lb.cor:lb.wrg+q.a}</div>`;
    $('pn').style.display='inline-flex';updProg();
  }));
}
function updProg(){
  const a=pIdx+(pAns?1:0),pct=pQs.length?Math.round(a/pQs.length*100):0;
  $('prf').style.width=pct+'%';$('prl').textContent=L().lbl.qof(a,pQs.length);
}
function nextP(){
  if(pIdx+1<pQs.length){pIdx++;pAns=false;renderP();}
  else{$('pf').innerHTML=`<div class="fbmsg fbok">${L().lbl.done}</div>`;$('pn').style.display='none';}
}

// ── TESTS ─────────────────────────────────────
function loadT(lv){
  tLv=lv;tQs=L().ts[lv]||[];tAns=Array(tQs.length).fill('');renderT();
}
function renderT(){
  const lb=L().lbl;
  if(!tQs.length){$('tb2').innerHTML=`<p style="color:var(--text2);padding:1rem 0">${lb.lvl}</p>`;return;}
  $('tb2').innerHTML=tQs.map((q,i)=>`
    <div class="titem">
      <div class="tq">${i+1}. ${q.q}</div>
      ${q.tp==='mc'?`<div class="tmc">${q.o.map(o=>`<button class="tmcbtn" data-qi="${i}" data-o="${o}">${o}</button>`).join('')}</div>`
      :`<input class="tfill" data-qi="${i}" placeholder="Write your answer..." autocomplete="off">`}
    </div>`).join('');
  $('tb2').querySelectorAll('.tmcbtn').forEach(btn=>btn.addEventListener('click',function(){
    const qi=+this.dataset.qi;
    $('tb2').querySelectorAll(`.tmcbtn[data-qi="${qi}"]`).forEach(b=>b.classList.remove('sel'));
    this.classList.add('sel');tAns[qi]=this.dataset.o;
  }));
  $('tb2').querySelectorAll('.tfill').forEach(inp=>inp.addEventListener('input',function(){tAns[+this.dataset.qi]=this.value.trim();}));
  $('tr').innerHTML='';
}
function submitT(){
  const lb=L().lbl;if(!tQs.length)return;
  let ok=0;
  tQs.forEach((q,i)=>{if((tAns[i]||'').trim().toLowerCase()===q.a.toLowerCase())ok++;});
  const pct=Math.round(ok/tQs.length*100);
  $('tr').innerHTML=`<div class="rbox"><div class="rpct">${pct}%</div><div class="rmsg">${pct>=70?lb.congrats(ok,tQs.length,pct):lb.keep(ok,tQs.length,pct)}</div><div class="prbg" style="margin-top:1rem"><div class="prfill" style="width:${pct}%"></div></div></div>`;
  $('tr').scrollIntoView({behavior:'smooth'});
}

// ── SEARCH ────────────────────────────────────
function buildIdx(){
  const idx=[],lb=L().lbl;
  L().gram.forEach((g,i)=>{
    idx.push({tp:'g',ttl:g.t,sub:lb.g,i,txt:(g.t+' '+(g.k||[]).join(' ')+' '+g.e+' '+(g.w||[]).join(' ')).toLowerCase(),ic:'book-open'});
  });
  ['A1','A2','B1','B2'].forEach(lv=>{
    (L().ex[lv]||[]).forEach((e,i)=>idx.push({tp:'e',lv,ttl:e.q,sub:`${lb.p} ${lv}`,i,txt:(e.q+' '+e.o.join(' ')+' '+lv).toLowerCase(),ic:'pen'}));
    (L().ts[lv]||[]).forEach((t,i)=>idx.push({tp:'t',lv,ttl:t.q,sub:`${lb.t} ${lv}`,i,txt:(t.q+' '+(t.o||[]).join(' ')+' '+lv).toLowerCase(),ic:'clipboard-check'}));
  });
  return idx;
}
function doSearch(q){
  const panel=$('sr');
  if(!q.trim()){panel.style.display='none';return;}
  const lq=q.toLowerCase().trim();
  let idx=buildIdx();
  const lvm=lq.match(/^(a1|a2|b1|b2)$/i);
  idx=lvm?idx.filter(r=>(r.tp==='e'||r.tp==='t')&&r.lv===lvm[0].toUpperCase()):idx.filter(r=>r.txt.includes(lq));
  if(!idx.length){panel.innerHTML=`<div style="padding:1.2rem;text-align:center;color:var(--text2);font-size:.88rem">No results found</div>`;panel.style.display='block';return;}
  const grp={g:[],e:[],t:[]};idx.forEach(r=>grp[r.tp].push(r));
  const names={g:L().lbl.g,e:L().lbl.p,t:L().lbl.t};
  const ics={g:'book-open',e:'pen',t:'clipboard-check'};
  let html='';
  for(const tp in grp){
    if(!grp[tp].length)continue;
    html+=`<div class="srlbl"><i class="fas fa-${ics[tp]}"></i> ${names[tp]}</div>`;
    grp[tp].slice(0,5).forEach(item=>{
      const esc=lq.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      const hl=item.ttl.replace(new RegExp(esc,'gi'),m=>`<mark>${m}</mark>`);
      html+=`<div class="sri" data-tp="${item.tp}" data-lv="${item.lv||''}" data-i="${item.i}">
        <div class="sric"><i class="fas fa-${ics[item.tp]}"></i></div>
        <div><div class="srt">${hl}</div><div class="srs">${item.sub}</div></div>
      </div>`;
    });
  }
  panel.innerHTML=html;panel.style.display='block';
  panel.querySelectorAll('.sri').forEach(el=>el.addEventListener('click',()=>{
    const tp=el.dataset.tp,lv=el.dataset.lv,i=+el.dataset.i;
    panel.style.display='none';$('si').value='';$('sc').style.display='none';
    if(tp==='g'){
      goTab('grammar');
      setTimeout(()=>{
        const cards=document.querySelectorAll('.gc');
        cards.forEach(c=>c.classList.remove('hl'));
        if(cards[i]){
          cards[i].classList.add('hl');
          cards[i].scrollIntoView({behavior:'smooth',block:'center'});
          const body=cards[i].querySelector('.gbody');
          const btn=cards[i].querySelector('.exb i');
          if(body&&!body.classList.contains('op')){body.classList.add('op');if(btn)btn.className='fas fa-chevron-up';}
          setTimeout(()=>cards[i].classList.remove('hl'),2500);
        }
      },50);
    }else if(tp==='e'){
      goTab('practice');pLv=lv;
      lvlBtns('pl',['A1','A2','B1','B2'],pLv,l=>{pLv=l;lvlBtns('pl',['A1','A2','B1','B2'],pLv,arguments.callee);loadP();});
      loadP();
      setTimeout(()=>{pIdx=i;renderP();$('pq').scrollIntoView({behavior:'smooth'});},100);
    }else{
      goTab('tests');
      lvlBtns('tl',['A1','A2','B1','B2'],lv,l=>{lvlBtns('tl',['A1','A2','B1','B2'],l,arguments.callee);loadT(l);});
      loadT(lv);
    }
  }));
}

// ── LANGUAGE SWITCH ───────────────────────────
function switchLang(nl,anim=true){
  lang=nl;localStorage.setItem('lml',nl);
  setCSS();setLabels();renderG();
  lvlBtns('pl',['A1','A2','B1','B2'],pLv,l=>{pLv=l;lvlBtns('pl',['A1','A2','B1','B2'],pLv,()=>{});loadP();});
  lvlBtns('tl',['A1','A2','B1','B2'],tLv,l=>{lvlBtns('tl',['A1','A2','B1','B2'],l,()=>{});loadT(l);});
  loadP();loadT(tLv);$('tr').innerHTML='';
  if(anim){
    const ls=$('langScreen');ls.classList.add('gone');
    setTimeout(()=>{ls.style.display='none';$('app').classList.add('on');},500);
  }
}

// ── DARK MODE ─────────────────────────────────
function initDark(){if(localStorage.getItem('lmd')==='1'){document.body.classList.add('dark');$('btnDark').querySelector('i').className='fas fa-sun';}}
function togDark(){const on=document.body.classList.toggle('dark');$('btnDark').querySelector('i').className=on?'fas fa-sun':'fas fa-moon';localStorage.setItem('lmd',on?'1':'0');}

// ── INIT ──────────────────────────────────────
function init(){
  initDark();

  // Language cards — direct onclick assignment for reliability
  ['dutch','french','english'].forEach(l=>{
    const el=$('lc-'+l);
    if(el){el.onclick=()=>switchLang(l,true);}
  });

  // Tabs
  document.querySelectorAll('.tb').forEach(b=>b.addEventListener('click',()=>goTab(b.dataset.tab)));

  // Header buttons
  $('btnLang').onclick=()=>{
    localStorage.removeItem('lml');
    const ls=$('langScreen');ls.style.display='flex';ls.style.opacity='1';ls.classList.remove('gone');
    $('app').classList.remove('on');
  };
  $('btnDark').onclick=togDark;

  // Practice
  $('pn').onclick=nextP;

  // Tests
  $('ts').onclick=submitT;

  // Search
  $('si').addEventListener('input',e=>{doSearch(e.target.value);$('sc').style.display=e.target.value?'block':'none';});
  $('sc').onclick=()=>{$('si').value='';$('sr').style.display='none';$('sc').style.display='none';$('si').focus();};
  document.addEventListener('click',e=>{if(!$('si').contains(e.target)&&!$('sr').contains(e.target))$('sr').style.display='none';});

  // Restore
  const sl=localStorage.getItem('lml'),st=localStorage.getItem('lmt')||'grammar';
  if(sl&&CFG[sl]){
    $('langScreen').style.display='none';$('app').classList.add('on');
    switchLang(sl,false);goTab(st);
  }else{
    $('langScreen').style.display='flex';$('app').style.display='none';
  }
}

document.addEventListener('DOMContentLoaded',init);
</script>
