<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LinguaAI — Grammar Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
–bg:#faf8f3; –bg2:#f2ede0; –bg3:#ebe4d1;
–text:#1c1a16; –text2:#5a5040; –text3:#9a8e78;
–border:#dfd7c2; –shadow:rgba(28,26,22,.07); –shadow-lg:rgba(28,26,22,.14);
–r:16px; –rs:10px; –t:.28s cubic-bezier(.4,0,.2,1);
–accent:#059669; –acbg:#ecfdf5; –acbo:#a7f3d0;
–nl:#e8590c; –nlbg:#fff3ed; –nlbo:#fcd0b5;
–fr:#4f46e5; –frbg:#eef2ff; –frbo:#c7d2fe;
–en:#059669; –enbg:#ecfdf5; –enbo:#a7f3d0;
}
[data-theme=dark]{
–bg:#131109; –bg2:#1c1912; –bg3:#24201a;
–text:#f0ead8; –text2:#b8a88a; –text3:#6a5f45;
–border:#2e2820; –shadow:rgba(0,0,0,.35); –shadow-lg:rgba(0,0,0,.55);
–acbg:#1a2e1e; –acbo:#15803d;
–nlbg:#2d1410; –nlbo:#c2410c;
–frbg:#1e1b3c; –frbo:#4338ca;
–enbg:#1a2e1e; –enbo:#15803d;
}

body{font-family:‘Nunito’,sans-serif;background:var(–bg);color:var(–text);line-height:1.65;transition:background var(–t),color var(–t);min-height:100vh}

/* === LANGUAGE SELECT === */
#langSelect{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;position:relative;overflow:hidden}
#langSelect::before{content:’’;position:absolute;inset:0;background:radial-gradient(ellipse at 25% 30%,rgba(232,89,12,.07) 0%,transparent 50%),radial-gradient(ellipse at 75% 70%,rgba(79,70,229,.07) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(5,150,105,.05) 0%,transparent 55%);pointer-events:none}
[data-theme=dark] #langSelect::before{background:radial-gradient(ellipse at 25% 30%,rgba(232,89,12,.12) 0%,transparent 50%),radial-gradient(ellipse at 75% 70%,rgba(79,70,229,.12) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(5,150,105,.08) 0%,transparent 55%)}
.ls-hero{text-align:center;margin-bottom:3rem;animation:fadeUp .6s ease both}
.ls-hero h1{font-family:‘Libre Baskerville’,serif;font-size:clamp(2.2rem,5vw,3.8rem);font-weight:700;letter-spacing:-.025em;line-height:1.1}
.ls-hero h1 em{font-style:normal;color:var(–accent)}
.ls-hero p{color:var(–text2);font-size:1.05rem;margin-top:.5rem;font-weight:500}
.ls-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1.25rem;max-width:860px;width:100%}
.lc{background:var(–bg2);border:1.5px solid var(–border);border-radius:var(–r);padding:2.5rem 2rem;text-align:center;cursor:pointer;transition:all var(–t);position:relative;overflow:hidden;animation:fadeUp .6s ease both}
.lc:nth-child(1){animation-delay:.12s}.lc:nth-child(2){animation-delay:.22s}.lc:nth-child(3){animation-delay:.32s}
.lc::after{content:’’;position:absolute;bottom:0;left:0;right:0;height:3px;transform:scaleX(0);transition:transform var(–t);transform-origin:left}
.lc.nl::after{background:var(–nl)}.lc.fr::after{background:var(–fr)}.lc.en::after{background:var(–en)}
.lc:hover{transform:translateY(-7px);box-shadow:0 20px 44px var(–shadow-lg)}
.lc:hover::after{transform:scaleX(1)}
.lc.nl:hover{border-color:var(–nl)}.lc.fr:hover{border-color:var(–fr)}.lc.en:hover{border-color:var(–en)}
.lc-flag{font-size:3.8rem;display:block;margin-bottom:1rem;animation:float 4s ease-in-out infinite}
.lc:nth-child(2) .lc-flag{animation-delay:1.4s}.lc:nth-child(3) .lc-flag{animation-delay:2.8s}
.lc-name{font-family:‘Libre Baskerville’,serif;font-size:1.9rem;font-weight:700;margin-bottom:.25rem}
.lc-sub{color:var(–text3);font-size:.9rem;font-weight:500;letter-spacing:.02em}

/* === APP SHELL === */
#app{display:none}
.app-header{background:var(–bg);border-bottom:1.5px solid var(–border);position:sticky;top:0;z-index:100;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.hdr{max-width:1320px;margin:0 auto;padding:.85rem 1.75rem;display:flex;align-items:center;gap:1rem}
.logo{font-family:‘Libre Baskerville’,serif;font-size:1.45rem;font-weight:700;flex:1;cursor:pointer;display:flex;align-items:center;gap:.35rem;color:var(–text);text-decoration:none}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(–accent);flex-shrink:0}
.hdr-acts{display:flex;gap:.45rem}
.btico{background:var(–bg2);border:1.5px solid var(–border);border-radius:var(–rs);padding:.5rem .85rem;cursor:pointer;transition:all var(–t);font-size:.88rem;font-family:‘Nunito’,sans-serif;font-weight:700;color:var(–text);display:flex;align-items:center;gap:.3rem}
.btico:hover{background:var(–bg3);border-color:var(–text3)}
.nav-bar{background:var(–bg);border-bottom:1.5px solid var(–border)}
.nav-inner{max-width:1320px;margin:0 auto;padding:0 1.75rem;display:flex}
.ntab{padding:.8rem 1.4rem;background:none;border:none;border-bottom:2.5px solid transparent;color:var(–text3);font-size:.93rem;font-weight:700;cursor:pointer;transition:all var(–t);font-family:‘Nunito’,sans-serif;letter-spacing:.01em;white-space:nowrap}
.ntab:hover{color:var(–text)}
.ntab.active{color:var(–text);border-bottom-color:var(–accent)}

/* === MAIN CONTENT === */
.cwrap{max-width:1320px;margin:0 auto;padding:1.75rem}
.sh{margin-bottom:1.25rem;position:relative}
.si{width:100%;padding:.85rem 2.8rem .85rem 1.1rem;font-size:.97rem;border:1.5px solid var(–border);border-radius:var(–rs);background:var(–bg2);color:var(–text);font-family:‘Nunito’,sans-serif;transition:all var(–t)}
.si::placeholder{color:var(–text3)}
.si:focus{outline:none;border-color:var(–accent);box-shadow:0 0 0 3px var(–acbg);background:var(–bg)}
.si-ico{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);color:var(–text3);pointer-events:none}

/* === TOPIC GRID === */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:.9rem}
.tc{background:var(–bg2);border:1.5px solid var(–border);border-radius:var(–r);padding:1.4rem;cursor:pointer;transition:all var(–t);position:relative;animation:fadeIn .4s ease both}
.tc:hover{transform:translateY(-3px);box-shadow:0 8px 22px var(–shadow);border-color:var(–acbo);background:var(–acbg)}
.tc-num{display:inline-flex;align-items:center;justify-content:center;width:1.9rem;height:1.9rem;background:var(–acbg);color:var(–accent);border-radius:7px;font-size:.72rem;font-weight:900;margin-bottom:.7rem;border:1px solid var(–acbo)}
.tc-title{font-family:‘Libre Baskerville’,serif;font-size:1rem;font-weight:700;margin-bottom:.3rem;line-height:1.3}
.tc-desc{color:var(–text2);font-size:.82rem;line-height:1.5}

/* === TOPIC DETAIL === */
.back-btn{display:inline-flex;align-items:center;gap:.4rem;background:var(–bg2);border:1.5px solid var(–border);border-radius:var(–rs);padding:.5rem .95rem;cursor:pointer;transition:all var(–t);font-weight:700;color:var(–text);font-family:‘Nunito’,sans-serif;font-size:.88rem;margin-bottom:1.25rem}
.back-btn:hover{transform:translateX(-3px);border-color:var(–text3)}
.det-hdr{background:var(–bg2);border:1.5px solid var(–border);border-radius:var(–r);padding:1.8rem 2.2rem;margin-bottom:1.25rem}
.det-hdr h1{font-family:‘Libre Baskerville’,serif;font-size:clamp(1.4rem,3vw,2rem);font-weight:700;margin-bottom:.4rem}
.det-hdr p{color:var(–text2);margin-bottom:1.25rem;font-size:.95rem}
.tact{display:flex;gap:.6rem;flex-wrap:wrap}
.btn{padding:.65rem 1.35rem;border-radius:var(–rs);font-family:‘Nunito’,sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;transition:all var(–t);border:1.5px solid transparent;letter-spacing:.01em}
.btn-p{background:var(–accent);color:#fff;border-color:var(–accent)}.btn-p:hover{opacity:.88;transform:translateY(-1px)}
.btn-s{background:var(–bg);color:var(–text);border-color:var(–border)}.btn-s:hover{background:var(–bg3);border-color:var(–text3)}
.btn-o{background:var(–bg2);color:var(–text);border-color:var(–border)}.btn-o:hover{background:var(–bg3)}

/* === CONTENT BOX === */
.cbox{background:var(–bg2);border:1.5px solid var(–border);border-radius:var(–r);padding:2rem 2.4rem;line-height:1.85;animation:fadeIn .4s ease both}
.cbox h2{font-family:‘Libre Baskerville’,serif;font-size:1.3rem;margin-bottom:.9rem;color:var(–text)}
.cbox p{margin-bottom:.9rem;color:var(–text)}
.cbox ul,.cbox ol{margin:.4rem 0 1rem 1.1rem}
.cbox li{margin-bottom:.35rem;color:var(–text)}
.cbox strong{font-weight:800}
.cbox em{color:var(–accent);font-style:italic}
.example-box{background:var(–bg3);border-left:3px solid var(–accent);padding:.9rem 1.1rem;border-radius:0 var(–rs) var(–rs) 0;margin:.9rem 0}
.example-box .original{display:block;font-family:‘Libre Baskerville’,serif;font-style:italic;color:var(–text);margin-bottom:.18rem;font-size:1rem}
.example-box .translation{display:block;color:var(–text3);font-size:.86rem}

/* === LOADING === */
.ldwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;gap:.9rem;color:var(–text3);font-weight:600;font-size:.92rem}
.spin{width:38px;height:38px;border:3px solid var(–border);border-top-color:var(–accent);border-radius:50%;animation:spin 1s linear infinite}

/* === QUIZ === */
.qhdr{margin-bottom:1.2rem}
.pbar-wrap{background:var(–bg3);border-radius:100px;height:5px;margin-bottom:.45rem;overflow:hidden}
.pbar-fill{height:100%;background:var(–accent);border-radius:100px;transition:width .5s ease}
.qmeta{display:flex;justify-content:space-between;color:var(–text3);font-size:.82rem;font-weight:700}
.qcard{background:var(–bg2);border:1.5px solid var(–border);border-radius:var(–r);padding:1.8rem 2.2rem;margin-bottom:1rem;animation:fadeIn .3s ease both}
.qtext{font-size:1.08rem;font-weight:700;margin-bottom:1.4rem;line-height:1.5;color:var(–text)}
.opts{display:flex;flex-direction:column;gap:.6rem}
.obtn{padding:.9rem 1.1rem;border:1.5px solid var(–border);border-radius:var(–rs);background:var(–bg);color:var(–text);text-align:left;cursor:pointer;transition:all var(–t);font-size:.93rem;font-family:‘Nunito’,sans-serif;font-weight:600;display:flex;align-items:center;gap:.7rem;line-height:1.4}
.obtn:hover:not(:disabled){border-color:var(–accent);background:var(–acbg);transform:translateX(4px)}
.obtn:disabled{cursor:default}
.oltr{width:1.5rem;height:1.5rem;border-radius:6px;background:var(–bg2);border:1.5px solid var(–border);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:900;flex-shrink:0;transition:all var(–t)}
.obtn.correct{background:#ecfdf5;border-color:#059669;color:#065f46}
[data-theme=dark] .obtn.correct{background:#1a2e1e;border-color:#15803d;color:#86efac}
.obtn.correct .oltr{background:#059669;border-color:#059669;color:#fff}
.obtn.incorrect{background:#fef2f2;border-color:#ef4444;color:#991b1b}
[data-theme=dark] .obtn.incorrect{background:#2d1410;border-color:#dc2626;color:#fca5a5}
.obtn.incorrect .oltr{background:#ef4444;border-color:#ef4444;color:#fff}
.obtn.sel-test{background:var(–acbg);border-color:var(–accent)}
.obtn.sel-test .oltr{background:var(–accent);border-color:var(–accent);color:#fff}
.expbox{background:var(–acbg);border:1.5px solid var(–acbo);border-radius:var(–rs);padding:.85rem 1.1rem;margin-top:.9rem;font-size:.88rem;color:var(–text);animation:fadeIn .3s ease both;font-weight:600;line-height:1.55}
.qnav{display:flex;justify-content:space-between;align-items:center;margin-top:1rem;gap:.6rem}

/* === RESULTS === */
.res-card{background:var(–bg2);border:1.5px solid var(–border);border-radius:var(–r);padding:2.5rem;text-align:center;animation:fadeIn .5s ease both}
.res-score{font-family:‘Libre Baskerville’,serif;font-size:clamp(3rem,8vw,5.5rem);font-weight:700;color:var(–accent);line-height:1;margin:.75rem 0}
.res-lbl{color:var(–text3);font-size:.9rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.res-msg{font-size:1.15rem;font-weight:800;margin-bottom:1.5rem;color:var(–text)}
.res-acts{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.75rem}
.rev-item{background:var(–bg2);border:1.5px solid var(–border);border-radius:var(–rs);padding:.85rem 1.1rem;margin-bottom:.6rem;border-left-width:3px;font-size:.88rem}
.rev-q{font-weight:700;margin-bottom:.35rem}
.rev-a{font-weight:800;margin-bottom:.25rem}
.rev-e{color:var(–text3);font-size:.82rem}

/* === ANIMATIONS === */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* === RESPONSIVE === */
@media(max-width:768px){
.cwrap{padding:1rem}
.hdr{padding:.7rem 1rem}
.nav-inner{padding:0 1rem;overflow-x:auto;scrollbar-width:none}
.nav-inner::-webkit-scrollbar{display:none}
.ntab{padding:.7rem 1rem;font-size:.85rem}
.det-hdr{padding:1.4rem 1.5rem}
.cbox,.qcard{padding:1.4rem 1.5rem}
.tgrid{grid-template-columns:1fr}
.ls-grid{max-width:320px}
.res-card{padding:1.75rem 1.5rem}
}
</style>

</head>

// =============================================
// PERSISTENCE (LocalStorage)
// =============================================
function saveState() {
  try {
    localStorage.setItem('linguaState', JSON.stringify({
      lang: STATE.lang,
      dark: STATE.dark
    }));
  } catch(e) { console.error('Save failed', e); }
}

function loadState() {
  try {
    const saved = localStorage.getItem('linguaState');
    if (saved) {
      const data = JSON.parse(saved);
      if (data.lang) STATE.lang = data.lang;
      if (data.dark !== undefined) {
        STATE.dark = data.dark;
        document.body.setAttribute('data-theme', STATE.dark ? 'dark' : '');
        const ti = document.getElementById('themeIco');
        if (ti) ti.textContent = STATE.dark ? '☀️' : '🌙';
      }
    }
  } catch(e) { console.error('Load failed', e); }
}

// =============================================
// LANGUAGE & THEME
// =============================================
function selectLang(l) {
  STATE.lang = l;
  saveState();
  
  const flags={nl:'🇳🇱',fr:'🇫🇷',en:'🇬🇧'};
  const cols={
    nl:{a:'--nl',ab:'--nlbg',abo:'--nlbo'},
    fr:{a:'--fr',ab:'--frbg',abo:'--frbo'},
    en:{a:'--en',ab:'--enbg',abo:'--enbo'}
  };
  const r = document.documentElement;
  const s = getComputedStyle(r);
  r.style.setProperty('--accent', s.getPropertyValue(cols[l].a).trim());
  r.style.setProperty('--acbg',   s.getPropertyValue(cols[l].ab).trim());
  r.style.setProperty('--acbo',   s.getPropertyValue(cols[l].abo).trim());
  
  document.getElementById('langFlag').textContent = flags[l];
  const lb = LABELS[l];
  document.getElementById('lbl-grammar').textContent = lb.grammar;
  document.getElementById('lbl-practice').textContent = lb.practice;
  document.getElementById('lbl-test').textContent = lb.test;
  document.getElementById('searchInp').placeholder = lb.ph;
  
  document.getElementById('langSelect').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  STATE.tab = 'grammar';
  showTab('grammar');
}

function showLangSelect() {
  document.getElementById('langSelect').style.display = '';
  document.getElementById('app').style.display = 'none';
}

function toggleTheme() {
  STATE.dark = !STATE.dark;
  saveState();
  document.body.setAttribute('data-theme', STATE.dark ? 'dark' : '');
  document.getElementById('themeIco').textContent = STATE.dark ? '☀️' : '🌙';
}

// =============================================
// TAB NAVIGATION
// =============================================
function switchTab(t) {
  STATE.tab = t;
  showTab(t);
}

function showTab(t) {
  ['grammar','practice','test'].forEach(x => {
    const sec = document.getElementById('sec-'+x);
    if(sec) sec.style.display = x===t ? '' : 'none';
    const btn = document.getElementById('tab-'+x);
    if(btn) btn.classList.toggle('active', x===t);
  });
  document.getElementById('sec-detail').style.display = 'none';
  if(t==='grammar')  renderGrid('grammarGrid',  'topicClickGrammar');
  if(t==='practice') renderGrid('practiceGrid', 'topicClickPractice');
  if(t==='test')     renderGrid('testGrid',     'topicClickTest');
}

// =============================================
// RENDER TOPIC GRIDS
// =============================================
function renderGrid(gridId, fnName) {
  const el = document.getElementById(gridId);
  if(!el) return;
  el.innerHTML = TOPICS[STATE.lang].map((tp,i) => `
    <div class="tc" onclick="${fnName}(${tp.id})" style="animation-delay:${i*0.025}s">
      <div class="tc-num">${tp.id}</div>
      <div class="tc-title">${tp.t}</div>
      <div class="tc-desc">${tp.d}</div>
    </div>
  `).join('');
}

function filterTopics() {
  const q = document.getElementById('searchInp').value.toLowerCase();
  document.querySelectorAll('#grammarGrid .tc').forEach(c => {
    c.style.display = c.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

// =============================================
// DETAIL VIEW
// =============================================
function showDetail() {
  document.getElementById('sec-grammar').style.display = 'none';
  document.getElementById('sec-practice').style.display = 'none';
  document.getElementById('sec-test').style.display = 'none';
  document.getElementById('sec-detail').style.display = '';
  document.getElementById('backLbl').textContent = LABELS[STATE.lang].back;
}

function backFromDetail() {
  document.getElementById('sec-detail').style.display = 'none';
  document.getElementById('sec-'+STATE.mode).style.display = '';
  const tabBtn = document.getElementById('tab-'+STATE.mode);
  if(tabBtn) tabBtn.classList.add('active');
}

// =============================================
// GRAMMAR EXPLANATION
// =============================================
async function openGrammar(id) {
  STATE.topicId = id;
  const tp = TOPICS[STATE.lang].find(t=>t.id===id);
  const lb = LABELS[STATE.lang];
  showDetail();
  document.getElementById('detailContent').innerHTML = `
    <div class="det-hdr">
      <h1>${tp.t}</h1>
      <p>${tp.d}</p>
      <div class="tact">
        <button class="btn btn-s" onclick="topicClickPractice(${id})">${lb.startP}</button>
        <button class="btn btn-s" onclick="topicClickTest(${id})">${lb.startT}</button>
      </div>
    </div>
    <div class="cbox" id="gramBox">
      <div class="ldwrap"><div class="spin"></div><span>${lb.loading}</span></div>
    </div>
  `;
  
  try {
    const html = await fetchGrammarContent(STATE.lang, id, tp.t);
    document.getElementById('gramBox').innerHTML = html;
  } catch(e) {
    console.error('Grammar load error:', e);
    document.getElementById('gramBox').innerHTML = `
      <p style="color:var(--text2)">⚠️ Could not load content. Please check your connection and try again.</p>
    `;
  }
}

async function fetchGrammarContent(lang, id, title) {
  const cacheKey = `gram_${lang}_${id}`;
  if (STATE.cache[cacheKey]) return STATE.cache[cacheKey];
  
  const langMap = {nl:'Dutch',fr:'French',en:'British English'};
  const instructions = {
    nl:'Schrijf alle uitleg in het Nederlands.',
    fr:'Écris toute l\'explication en français.',
    en:'Write all explanations in English.'
  };
  
  const prompt = `You are an expert ${langMap[lang]} grammar teacher. ${instructions[lang]}

Create a comprehensive, beautifully formatted HTML explanation of: "${title}"

Requirements:
- Use modern, clean HTML with inline CSS
- Include clear examples with translations
- Use tables, cards, or structured layouts
- Make it visually appealing with proper spacing
- Include practical exercises or tips
- Return ONLY the HTML content (no backticks, no markdown)`;

  const html = await callAPI(prompt);
  STATE.cache[cacheKey] = html;
  return html;
}

// =============================================
// PRACTICE MODE
// =============================================
async function openPractice(id) {
  STATE.topicId = id;
  const tp = TOPICS[STATE.lang].find(t=>t.id===id);
  const lb = LABELS[STATE.lang];
  showDetail();
  document.getElementById('detailContent').innerHTML = `
    <div class="det-hdr">
      <h1>${tp.t}</h1>
      <p>${lb.practice} — 5 ${lb.q}s</p>
    </div>
    <div id="pquiz">
      <div class="ldwrap"><div class="spin"></div><span>${lb.loading}</span></div>
    </div>
  `;
  
  try {
    STATE.questions = await fetchQuestions(STATE.lang, id, tp.t, 5, 'practice');
    STATE.qi = 0;
    STATE.answers = [];
    renderPracticeQuestion();
  } catch(e) {
    console.error('Practice load error:', e);
    document.getElementById('pquiz').innerHTML = `
      <p style="color:var(--text2)">⚠️ Could not load questions. Please try again.</p>
    `;
  }
}

function renderPracticeQuestion() {
  const lb = LABELS[STATE.lang];
  const q = STATE.questions[STATE.qi];
  const pct = Math.round(STATE.qi / STATE.questions.length * 100);
  
  document.getElementById('pquiz').innerHTML = `
    <div class="qhdr">
      <div class="pbar-wrap"><div class="pbar-fill" style="width:${pct}%"></div></div>
      <div class="qmeta"><span>${lb.q} ${STATE.qi+1} ${lb.of} ${STATE.questions.length}</span><span>${pct}%</span></div>
    </div>
    <div class="qcard">
      <div class="qtext">${q.question}</div>
      <div class="opts" id="opts">
        ${q.options.map((o,i)=>`
          <button class="obtn" id="ob${i}" onclick="selectPracticeAnswer(${i})">
            <span class="oltr">${LTRS[i]}</span>${o}
          </button>
        `).join('')}
      </div>
      <div id="expbl"></div>
    </div>
    <div class="qnav">
      <div></div>
      <button class="btn btn-p" id="nxtbtn" style="display:none" onclick="nextPracticeQuestion()">
        ${STATE.qi < STATE.questions.length-1 ? lb.next : '✓ '+lb.backTop}
      </button>
    </div>
  `;
}

function selectPracticeAnswer(sel) {
  const lb = LABELS[STATE.lang];
  const q = STATE.questions[STATE.qi];
  
  document.querySelectorAll('.obtn').forEach((btn,i) => {
    btn.disabled = true;
    if(i === q.correct) btn.classList.add('correct');
    else if(i === sel && sel !== q.correct) btn.classList.add('incorrect');
  });
  
  document.getElementById('expbl').innerHTML = `
    <div class="expbox"><strong>${lb.expl}</strong> ${q.explanation}</div>
  `;
  document.getElementById('nxtbtn').style.display = 'inline-flex';
  STATE.answers[STATE.qi] = sel;
}

function nextPracticeQuestion() {
  if(STATE.qi < STATE.questions.length - 1) {
    STATE.qi++;
    renderPracticeQuestion();
  } else {
    backFromDetail();
  }
}

// =============================================
// TEST MODE
// =============================================
async function openTest(id) {
  STATE.topicId = id;
  const tp = TOPICS[STATE.lang].find(t=>t.id===id);
  const lb = LABELS[STATE.lang];
  showDetail();
  document.getElementById('detailContent').innerHTML = `
    <div class="det-hdr">
      <h1>${tp.t}</h1>
      <p>${lb.test} — 10 ${lb.q}s</p>
    </div>
    <div id="tquiz">
      <div class="ldwrap"><div class="spin"></div><span>${lb.loading}</span></div>
    </div>
  `;
  
  try {
    STATE.questions = await fetchQuestions(STATE.lang, id, tp.t, 10, 'test');
    STATE.qi = 0;
    STATE.answers = new Array(10).fill(null);
    renderTestQuestion(0);
  } catch(e) {
    console.error('Test load error:', e);
    document.getElementById('tquiz').innerHTML = `
      <p style="color:var(--text2)">⚠️ Could not load questions. Please try again.</p>
    `;
  }
}

function renderTestQuestion(idx) {
  const lb = LABELS[STATE.lang];
  const q = STATE.questions[idx];
  const pct = Math.round(idx / STATE.questions.length * 100);
  const isLast = idx === STATE.questions.length - 1;
  const selected = STATE.answers[idx];
  
  document.getElementById('tquiz').innerHTML = `
    <div class="qhdr">
      <div class="pbar-wrap"><div class="pbar-fill" style="width:${pct}%"></div></div>
      <div class="qmeta"><span>${lb.q} ${idx+1} ${lb.of} ${STATE.questions.length}</span><span>${pct}%</span></div>
    </div>
    <div class="qcard">
      <div class="qtext">${q.question}</div>
      <div class="opts">
        ${q.options.map((o,i)=>`
          <button class="obtn ${selected===i?'sel-test':''}" onclick="selectTestAnswer(${idx},${i})">
            <span class="oltr">${LTRS[i]}</span>${o}
          </button>
        `).join('')}
      </div>
    </div>
    <div class="qnav">
      ${idx>0 ? `<button class="btn btn-o" onclick="renderTestQuestion(${idx-1})">← </button>` : '<div></div>'}
      ${!isLast
        ? `<button class="btn btn-p" onclick="renderTestQuestion(${idx+1})">${lb.next}</button>`
        : `<button class="btn btn-p" onclick="submitTest()">${lb.submit}</button>`
      }
    </div>
  `;
}

function selectTestAnswer(idx, opt) {
  STATE.answers[idx] = opt;
  renderTestQuestion(idx);
}

function submitTest() {
  const lb = LABELS[STATE.lang];
  let correct = 0;
  STATE.questions.forEach((q,i) => {
    if(STATE.answers[i] === q.correct) correct++;
  });
  
  const total = STATE.questions.length;
  const pct = Math.round(correct/total*100);
  const msg = pct===100 ? lb.perfect : pct>=70 ? lb.great : pct>=40 ? lb.ok : lb.keep;
  
  document.getElementById('tquiz').innerHTML = `
    <div class="res-card">
      <div class="res-lbl">${lb.results}</div>
      <div class="res-score">${correct}/${total}</div>
      <div class="res-msg">${msg}</div>
      <div style="margin-bottom:1.5rem">
        <div class="pbar-wrap" style="height:9px">
          <div class="pbar-fill" id="resPbar" style="width:0%"></div>
        </div>
        <div style="text-align:center;margin-top:.4rem;color:var(--text3);font-weight:700;font-size:.9rem">${pct}%</div>
      </div>
      <div class="res-acts">
        <button class="btn btn-p" onclick="openTest(${STATE.topicId})">${lb.tryAgain}</button>
        <button class="btn btn-s" onclick="backFromDetail()">${lb.backTop}</button>
      </div>
    </div>
    <div style="margin-top:1.5rem">
      <h3 style="font-family:'Libre Baskerville',serif;margin-bottom:1rem;font-size:1.05rem;color:var(--text2)">Review</h3>
      ${STATE.questions.map((q,i)=>{
        const isCorrect = STATE.answers[i]===q.correct;
        return `<div class="rev-item" style="border-left-color:${isCorrect?'var(--en)':'#ef4444'}">
          <div class="rev-q">${i+1}. ${q.question}</div>
          <div class="rev-a" style="color:${isCorrect?'var(--en)':'#ef4444'}">${isCorrect?'✓':'✗'} ${LTRS[q.correct]}. ${q.options[q.correct]}</div>
          <div class="rev-e">${q.explanation}</div>
        </div>`;
      }).join('')}
    </div>
  `;
  
  setTimeout(() => {
    const pb = document.getElementById('resPbar');
    if(pb) pb.style.width = pct+'%';
  }, 100);
}

// =============================================
// API CALLS
// =============================================
async function callAPI(prompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:4000,
      messages:[{role:"user",content:prompt}]
    })
  });
  
  if (!res.ok) {
    throw new Error(`API error: ${res.status}`);
  }
  
  const data = await res.json();
  if(!data.content?.[0]?.text) {
    throw new Error("No response from API");
  }
  
  return data.content[0].text;
}

async function fetchQuestions(lang, id, title, count, qtype) {
  const cacheKey = `q_${qtype}_${lang}_${id}`;
  if(STATE.cache[cacheKey]) return STATE.cache[cacheKey];
  
  const langMap = {nl:'Dutch',fr:'French',en:'British English'};
  const instructions = {
    nl:'Schrijf alle vragen en antwoorden in het Nederlands.',
    fr:'Écris toutes les questions et réponses en français.',
    en:'Write all questions and answers in English.'
  };
  
  const prompt = `You are an expert ${langMap[lang]} grammar teacher. ${instructions[lang]}

Generate exactly ${count} multiple choice questions testing: "${title}"

Each question must have exactly 4 options. Only one is correct. Include a brief 1-sentence explanation.

Return ONLY valid JSON, no markdown, no backticks, no preamble:
{"questions":[{"question":"...","options":["A text","B text","C text","D text"],"correct":0,"explanation":"..."}]}

The "correct" value is the 0-based index of the correct option (0, 1, 2, or 3).`;

  const raw = await callAPI(prompt);
  let clean = raw.trim()
    .replace(/^```json\s*/,'')
    .replace(/^```\s*/,'')
    .replace(/\s*```$/,'');
  
  const start = clean.indexOf('{');
  if(start > 0) clean = clean.slice(start);
  
  const data = JSON.parse(clean);
  STATE.cache[cacheKey] = data.questions;
  return data.questions;
}

// =============================================
(function init() {
  loadState();
  
  // Auto-select language if already chosen
  if (STATE.lang && STATE.lang !== 'en') {
    // Small delay to ensure DOM is ready
    setTimeout(() => {
      const langBtn = document.querySelector(`.lc.${STATE.lang}`);
      if (langBtn) {
        selectLang(STATE.lang);
      }
    }, 50);
  }
})();
