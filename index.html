// =============================================
// LANGUAGE & THEME SETUP
// =============================================
function selectLang(l) {
  lang = l;
  const flags={nl:'🇳🇱',fr:'🇫🇷',en:'🇬🇧'};
  const cols={
    nl:{a:'--nl',ab:'--nlbg',abo:'--nlbo'},
    fr:{a:'--fr',ab:'--frbg',abo:'--frbo'},
    en:{a:'--en',ab:'--enbg',abo:'--enbo'}
  };
  const r = document.documentElement;
  const s = getComputedStyle(r);
  r.style.setProperty('--accent', s.getPropertyValue(cols[l].a).trim());
  r.style.setProperty('--acbg',   s.getPropertyValue(cols[l].ab).trim());
  r.style.setProperty('--acbo',   s.getPropertyValue(cols[l].abo).trim());
  document.getElementById('langFlag').textContent = flags[l];
  const lb = LABELS[l];
  document.getElementById('lbl-grammar').textContent = lb.grammar;
  document.getElementById('lbl-practice').textContent = lb.practice;
  document.getElementById('lbl-test').textContent = lb.test;
  document.getElementById('searchInp').placeholder = lb.ph;
  document.getElementById('langSelect').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  tab = 'grammar'; showTab('grammar');
}

function showLangSelect() {
  document.getElementById('langSelect').style.display = '';
  document.getElementById('app').style.display = 'none';
}

function toggleTheme() {
  dark = !dark;
  document.body.setAttribute('data-theme', dark ? 'dark' : '');
  document.getElementById('themeIco').textContent = dark ? '☀️' : '🌙';
  localStorage.setItem('ltheme', dark ? 'dark' : '');
}

// =============================================
// TAB NAVIGATION
// =============================================
function switchTab(t) { tab = t; showTab(t); }

function showTab(t) {
  ['grammar','practice','test'].forEach(x => {
    const s = document.getElementById('sec-'+x);
    if(s) s.style.display = x===t ? '' : 'none';
    const b = document.getElementById('tab-'+x);
    if(b) b.classList.toggle('active', x===t);
  });
  document.getElementById('sec-detail').style.display = 'none';
  if(t==='grammar')  renderGrid('grammarGrid',  topicClickGrammar);
  if(t==='practice') renderGrid('practiceGrid', topicClickPractice);
  if(t==='test')     renderGrid('testGrid',      topicClickTest);
}

// =============================================
// RENDER GRIDS
// =============================================
function renderGrid(gid, fn) {
  const el = document.getElementById(gid);
  if(!el) return;
  const fnName = fn.name;
  el.innerHTML = TOPICS[lang].map((tp,i) => `
    <div class="tc" onclick="${fnName}(${tp.id})" style="animation-delay:${i*0.025}s">
      <div class="tc-num">${tp.id}</div>
      <div class="tc-title">${tp.t}</div>
      <div class="tc-desc">${tp.d}</div>
    </div>
  `).join('');
}

function filterTopics() {
  const q = document.getElementById('searchInp').value.toLowerCase();
  document.querySelectorAll('#grammarGrid .tc').forEach(c => {
    c.style.display = c.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

// =============================================
// SHOW DETAIL SECTION
// =============================================
function showDetail() {
  document.getElementById('sec-grammar').style.display = 'none';
  document.getElementById('sec-practice').style.display = 'none';
  document.getElementById('sec-test').style.display = 'none';
  document.getElementById('sec-detail').style.display = '';
  document.getElementById('backLbl').textContent = LABELS[lang].back;
}

function backFromDetail() {
  document.getElementById('sec-detail').style.display = 'none';
  document.getElementById('sec-'+mode).style.display = '';
  document.getElementById('tab-'+mode).classList.add('active');
}

// =============================================
// TOPIC CLICK HANDLERS (global, used in innerHTML)
// =============================================
function topicClickGrammar(id) { mode='grammar'; openGrammar(id); }
function topicClickPractice(id){ mode='practice'; openPractice(id); }
function topicClickTest(id)    { mode='test';     openTest(id); }

// Also expose for buttons inside detail view
window.topicClickGrammar = topicClickGrammar;
window.topicClickPractice = topicClickPractice;
window.topicClickTest = topicClickTest;

// =============================================
// GRAMMAR EXPLANATION
// =============================================
async function openGrammar(id) {
  topicId = id;
  const tp = TOPICS[lang].find(t=>t.id===id);
  const lb = LABELS[lang];
  showDetail();
  document.getElementById('detailContent').innerHTML = `
    <div class="det-hdr">
      <h1>${tp.t}</h1>
      <p>${tp.d}</p>
      <div class="tact">
        <button class="btn btn-s" onclick="topicClickPractice(${id})">${lb.startP}</button>
        <button class="btn btn-s" onclick="topicClickTest(${id})">${lb.startT}</button>
      </div>
    </div>
    <div class="cbox" id="gramBox">
      <div class="ldwrap"><div class="spin"></div><span>${lb.loading}</span></div>
    </div>
  `;
  try {
    const html = await fetchGrammar(lang, id, tp.t);
    document.getElementById('gramBox').innerHTML = html;
  } catch(e) {
    document.getElementById('gramBox').innerHTML = `<p style="color:var(--text2)">⚠️ Could not load content. Check your connection and try again.</p>`;
  }
}

async function fetchGrammar(l, id, title) {
  // ١. هەوڵ بدە ناوەڕۆکەکە لە TOPICSـەوە بھێنیت
  const topicList = TOPICS[l];
  const topic = topicList?.find(t => t.id === id);
  
  // ئەگەر content هەبوو، ڕاستەوخۆ بیگەڕێنەوە
  if (topic?.content) {
    return topic.content;
  }
  
  // ٢. ئەگەر content نەبوو، پەیامێکی ئامادەکاری نیشان بدە
  return `
    <div class="modern-grammar">
      <h2>⚠️ شرحی ئەم بابەتە هێشتا ئامادە نەبووە</h2>
      <p><strong>بابەت:</strong> ${title}</p>
      <p>تکایە دواتر سەردان بکە یان پەیوەندی بە مامۆستاوە بکە.</p>
    </div>
  `;
}// =============================================
// PRACTICE MODE (5 questions, immediate feedback)
// =============================================
async function openPractice(id) {
  topicId = id;
  const tp = TOPICS[lang].find(t=>t.id===id);
  const lb = LABELS[lang];
  showDetail();
  document.getElementById('detailContent').innerHTML = `
    <div class="det-hdr">
      <h1>${tp.t}</h1>
      <p>${lb.practice} — 5 ${lb.q}s</p>
    </div>
    <div id="pquiz">
      <div class="ldwrap"><div class="spin"></div><span>${lb.loading}</span></div>
    </div>
  `;
  try {
    Qs = await fetchQuestions(lang, id, tp.t, 5, 'practice');
    qi = 0; ans = [];
    renderPracticeQ();
  } catch(e) {
    document.getElementById('pquiz').innerHTML = `<p style="color:var(--text2)">⚠️ Could not load questions. Please try again.</p>`;
  }
}

function renderPracticeQ() {
  const lb = LABELS[lang];
  const q = Qs[qi];
  const pct = Math.round(qi / Qs.length * 100);
  document.getElementById('pquiz').innerHTML = `
    <div class="qhdr">
      <div class="pbar-wrap"><div class="pbar-fill" style="width:${pct}%"></div></div>
      <div class="qmeta"><span>${lb.q} ${qi+1} ${lb.of} ${Qs.length}</span><span>${pct}%</span></div>
    </div>
    <div class="qcard">
      <div class="qtext">${q.question}</div>
      <div class="opts" id="opts">
        ${q.options.map((o,i)=>`
          <button class="obtn" id="ob${i}" onclick="pickPractice(${i})">
            <span class="oltr">${LTRS[i]}</span>${o}
          </button>
        `).join('')}
      </div>
      <div id="expbl"></div>
    </div>
    <div class="qnav">
      <div></div>
      <button class="btn btn-p" id="nxtbtn" style="display:none" onclick="nextPractice()">
        ${qi < Qs.length-1 ? lb.next : '✓ '+lb.backTop}
      </button>
    </div>
  `;
}

function pickPractice(sel) {
  const lb = LABELS[lang];
  const q = Qs[qi];
  document.querySelectorAll('.obtn').forEach((b,i) => {
    b.disabled = true;
    if(i === q.correct) b.classList.add('correct');
    else if(i === sel && sel !== q.correct) b.classList.add('incorrect');
  });
  document.getElementById('expbl').innerHTML = `<div class="expbox"><strong>${lb.expl}</strong> ${q.explanation}</div>`;
  document.getElementById('nxtbtn').style.display = 'inline-flex';
  ans[qi] = sel;
}

function nextPractice() {
  if(qi < Qs.length-1){ qi++; renderPracticeQ(); }
  else { backFromDetail(); }
}

// =============================================
// TEST MODE (10 questions, submit at end)
// =============================================
async function openTest(id) {
  topicId = id;
  const tp = TOPICS[lang].find(t=>t.id===id);
  const lb = LABELS[lang];
  showDetail();
  document.getElementById('detailContent').innerHTML = `
    <div class="det-hdr">
      <h1>${tp.t}</h1>
      <p>${lb.test} — 10 ${lb.q}s</p>
    </div>
    <div id="tquiz">
      <div class="ldwrap"><div class="spin"></div><span>${lb.loading}</span></div>
    </div>
  `;
  try {
    Qs = await fetchQuestions(lang, id, tp.t, 10, 'test');
    qi = 0; ans = new Array(10).fill(null);
    renderTestQ(0);
  } catch(e) {
    document.getElementById('tquiz').innerHTML = `<p style="color:var(--text2)">⚠️ Could not load questions. Please try again.</p>`;
  }
}

function renderTestQ(idx) {
  const lb = LABELS[lang];
  const q = Qs[idx];
  const pct = Math.round(idx / Qs.length * 100);
  const isLast = idx === Qs.length - 1;
  const selAns = ans[idx];
  document.getElementById('tquiz').innerHTML = `
    <div class="qhdr">
      <div class="pbar-wrap"><div class="pbar-fill" style="width:${pct}%"></div></div>
      <div class="qmeta"><span>${lb.q} ${idx+1} ${lb.of} ${Qs.length}</span><span>${pct}%</span></div>
    </div>
    <div class="qcard">
      <div class="qtext">${q.question}</div>
      <div class="opts">
        ${q.options.map((o,i)=>`
          <button class="obtn ${selAns===i?'sel-test':''}" onclick="pickTest(${idx},${i})">
            <span class="oltr">${LTRS[i]}</span>${o}
          </button>
        `).join('')}
      </div>
    </div>
    <div class="qnav">
      ${idx>0 ? `<button class="btn btn-o" onclick="renderTestQ(${idx-1})">← </button>` : '<div></div>'}
      ${!isLast
        ? `<button class="btn btn-p" onclick="renderTestQ(${idx+1})">${lb.next}</button>`
        : `<button class="btn btn-p" onclick="submitTest()">${lb.submit}</button>`
      }
    </div>
  `;
}

function pickTest(qi_, opt) {
  ans[qi_] = opt;
  renderTestQ(qi_);
}

function submitTest() {
  const lb = LABELS[lang];
  let correct = 0;
  Qs.forEach((q,i) => { if(ans[i]===q.correct) correct++; });
  const total = Qs.length;
  const pct = Math.round(correct/total*100);
  const msg = pct===100?lb.perfect:pct>=70?lb.great:pct>=40?lb.ok:lb.keep;
  const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  document.getElementById('tquiz').innerHTML = `
    <div class="res-card">
      <div class="res-lbl">${lb.results}</div>
      <div class="res-score">${correct}/${total}</div>
      <div class="res-msg">${msg}</div>
      <div style="margin-bottom:1.5rem">
        <div class="pbar-wrap" style="height:9px">
          <div class="pbar-fill" id="resPbar" style="width:0%"></div>
        </div>
        <div style="text-align:center;margin-top:.4rem;color:var(--text3);font-weight:700;font-size:.9rem">${pct}%</div>
      </div>
      <div class="res-acts">
        <button class="btn btn-p" onclick="openTest(${topicId})">${lb.tryAgain}</button>
        <button class="btn btn-s" onclick="backFromDetail()">${lb.backTop}</button>
      </div>
    </div>
    <div style="margin-top:1.5rem">
      <h3 style="font-family:'Libre Baskerville',serif;margin-bottom:1rem;font-size:1.05rem;color:var(--text2)">${lb.score} — ${lb.q}s</h3>
      ${Qs.map((q,i)=>{
        const ok = ans[i]===q.correct;
        return `<div class="rev-item" style="border-left-color:${ok?'var(--en)':'#ef4444'}">
          <div class="rev-q">${i+1}. ${q.question}</div>
          <div class="rev-a" style="color:${ok?'var(--en)':'#ef4444'}">${ok?'✓':'✗'} ${LTRS[q.correct]}. ${q.options[q.correct]}</div>
          <div class="rev-e">${q.explanation}</div>
        </div>`;
      }).join('')}
    </div>
  `;
  // Animate progress bar
  setTimeout(() => {
    const pb = document.getElementById('resPbar');
    if(pb) pb.style.width = pct+'%';
  }, 100);
}

// =============================================
// API CALLS
// =============================================
async function callAPI(prompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      messages:[{role:"user",content:prompt}]
    })
  });
  const data = await res.json();
  if(!data.content?.[0]?.text) throw new Error("No response");
  return data.content[0].text;
}

async function fetchQuestions(l, id, title, count, qtype) {
  const k = `q_${qtype}_${l}_${id}`;
  if(cache[k]) return cache[k];
  const langFull = {nl:'Dutch',fr:'French',en:'British English'}[l];
  const instr = {
    nl:`Schrijf alle vragen en antwoorden in het Nederlands.`,
    fr:`Écris toutes les questions et réponses en français.`,
    en:`Write all questions and answers in English.`
  }[l];
  const prompt = `You are an expert ${langFull} grammar teacher. ${instr}
Generate exactly ${count} multiple choice questions testing the grammar topic: "${title}"
Each question must have exactly 4 options. Only one is correct. Include a brief 1-sentence explanation.
Return ONLY valid JSON, no markdown, no backticks, no preamble:
{"questions":[{"question":"...","options":["A text","B text","C text","D text"],"correct":0,"explanation":"..."}]}
The "correct" value is the 0-based index of the correct option.`;
  const raw = await callAPI(prompt);
  let clean = raw.trim().replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'');
  const start = clean.indexOf('{');
  if(start > 0) clean = clean.slice(start);
  const data = JSON.parse(clean);
  cache[k] = data.questions;
  return data.questions;
}
