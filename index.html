              <tr><td><strong>Doel</strong></td><td><strong>om ... te + infinitief / opdat</strong></td><td>Geeft een doel aan.</td><td><em>"Ik spaar geld <strong>om</strong> een auto <strong>te</strong> kunnen <strong>kopen</strong>."<br>"Hij zweeg <strong>opdat</strong> niemand hem zou horen."</em></td></tr>
              <tr><td><strong>Toegevend</strong></td><td><strong>hoewel / al / ofschoon</strong></td><td>Geeft een tegenstelling toe.</td><td><em>"<strong>Hoewel</strong> hij moe was, ging hij toch sporten."</em></td></tr>
              <tr><td><strong>Betrekkelijk</strong></td><td><strong>die / dat / wie / wat / waar + voorzetsel</strong></td><td>Verwijst naar een eerder genoemd woord.</td><td><em>"De man <strong>die</strong> daar loopt, is mijn oom."<br>"Het boek <strong>dat</strong> ik lees, is saai."</em></td></tr>
              <tr><td><strong>Vergelijking</strong></td><td><strong>alsof / als / dan</strong></td><td>Maakt een vergelijking.</td><td><em>"Hij doet <strong>alsof</strong> hij alles weet."</em></td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"Ik hoop <strong>dat</strong> het morgen mooi weer <strong>wordt</strong>."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Weet jij <strong>of</strong> de supermarkt nog open <strong>is</strong>?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Omdat</strong> de trein vertraging <strong>had</strong>, kwam ik te laat."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Als</strong> je je best <strong>doet</strong>, <strong>zul</strong> je slagen."</em> <small>(Let op: eerst de bijzin, dan de hoofdzin met inversie!)</small></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Toen</strong> de zon onder<strong>ging</strong>, werd het koud."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Ik luister muziek <strong>terwijl</strong> ik <strong>werk</strong>."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"De fiets <strong>die</strong> ik gisteren <strong>heb gekocht</strong>, is al kapot."</em></span>
        </div>
      </div>

      <div class="gw-section">
        <h2>🔚 Deel 4: De Plaats van de Werkwoorden in de Bijzin (De Clustervolgorde)</h2>
        <p>Wanneer er <strong>meerdere werkwoorden</strong> aan het einde van de bijzin staan, is de volgorde van die werkwoorden een bekend struikelblok. Er zijn twee hoofdpatronen: de <strong>groene</strong> en de <strong>rode</strong> volgorde.</p>
        
        <h3>✅ A. De Groene Volgorde (Standaardnederlands)</h3>
        <p>In de <strong>groene volgorde</strong> staat het <strong>hulpwerkwoord van tijd</strong> (hebben, zijn, worden) of het <strong>modale hulpwerkwoord</strong> (kunnen, moeten, willen, etc.) <strong>vóór</strong> het hoofdwerkwoord.</p>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Aantal WW</th><th>Groene Volgorde</th><th>Voorbeeldzin</th></tr></thead>
            <tbody>
              <tr><td><strong>2</strong></td><td><strong>heeft</strong> + <strong>gezien</strong></td><td><em>"...dat hij mij <strong>heeft gezien</strong>."</em></td></tr>
              <tr><td><strong>2</strong></td><td><strong>wil</strong> + <strong>komen</strong></td><td><em>"...dat hij <strong>wil komen</strong>."</em></td></tr>
              <tr><td><strong>3</strong></td><td><strong>had</strong> + <strong>willen</strong> + <strong>doen</strong></td><td><em>"...dat hij het <strong>had willen doen</strong>."</em></td></tr>
              <tr><td><strong>4</strong></td><td><strong>zou</strong> + <strong>hebben</strong> + <strong>kunnen</strong> + <strong>zien</strong></td><td><em>"...dat hij het <strong>zou hebben kunnen zien</strong>."</em></td></tr>
            </tbody>
          </table>
        </div>
        <div class="gw-note">💡 Dit is de <strong>veilige, altijd correcte</strong> volgorde in de Nederlandse standaardtaal. Gebruik deze volgorde en je zit nooit fout.</div>

        <h3 style="margin-top:24px;">🔴 B. De Rode Volgorde (Regionaal / Formeel)</h3>
        <p>In de <strong>rode volgorde</strong> staat het <strong>hoofdwerkwoord vóór</strong> de hulpwerkwoorden. Dit patroon komt vooral voor in het noordoosten van Nederland, in Vlaanderen, en in zeer formele of archaïsche schrijftaal.</p>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Aantal WW</th><th>Rode Volgorde</th><th>Voorbeeldzin</th></tr></thead>
            <tbody>
              <tr><td><strong>2</strong></td><td><strong>gezien</strong> + <strong>heeft</strong></td><td><em>"...dat hij mij <strong>gezien heeft</strong>."</em></td></tr>
              <tr><td><strong>3</strong></td><td><strong>doen</strong> + <strong>had willen</strong></td><td><em>"...dat hij het <strong>doen had willen</strong>."</em></td></tr>
              <tr><td><strong>4</strong></td><td><strong>zien</strong> + <strong>zou hebben kunnen</strong></td><td><em>"...dat hij het <strong>zien zou hebben kunnen</strong>."</em></td></tr>
            </tbody>
          </table>
        </div>
        <div class="gw-card gw-card--tip" style="margin-top:16px;">
          <div class="gw-card-title">💡 Advies:</div>
          <p style="margin:0; color:var(--gw-text)">Leer de <strong>groene volgorde</strong> als standaard. Wees je bewust van de rode volgorde omdat je hem kunt tegenkomen in boeken of formele toespraken.</p>
        </div>

        <h3 style="margin-top:24px;">🔀 C. Scheidbare Werkwoorden in de Bijzin</h3>
        <p>In de bijzin <strong>plakt</strong> het scheidbare werkwoord weer aan elkaar en staat het als één geheel in de werkwoordscluster aan het einde.</p>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Hoofdzin (Gesplitst)</th><th>Bijzin (Ongesplitst)</th></tr></thead>
            <tbody>
              <tr><td><em>"Ik <strong>bel</strong> mijn moeder <strong>op</strong>."</em></td><td><em>"...dat ik mijn moeder <strong>opbel</strong>."</em></td></tr>
              <tr><td><em>"De trein <strong>komt</strong> om 3 uur <strong>aan</strong>."</em></td><td><em>"...dat de trein om 3 uur <strong>aankomt</strong>."</em></td></tr>
              <tr><td><em>"Hij <strong>geeft</strong> het boek <strong>terug</strong>."</em></td><td><em>"...dat hij het boek <strong>teruggeeft</strong>."</em></td></tr>
              <tr><td><em>"Ik <strong>heb</strong> mijn moeder <strong>opgebeld</strong>."</em></td><td><em>"...dat ik mijn moeder <strong>heb opgebeld</strong>."</em></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="gw-section">
        <h2>🎯 Deel 5: De Positie van 'Niet' en Andere Bijwoorden in de Bijzin</h2>
        <p>In de bijzin staat <strong>'niet'</strong> (en de meeste andere bijwoorden) <strong>vóór</strong> de werkwoorden aan het einde, en meestal ook <strong>vóór</strong> andere bepalingen zoals een plaats- of tijdsbepaling, tenzij het een specifiek zinsdeel ontkent.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Situatie</th><th>Positie 'Niet' in Bijzin</th><th>Voorbeeldzin</th></tr></thead>
            <tbody>
              <tr><td><strong>Algemene ontkenning</strong></td><td>Vóór de werkwoorden</td><td><em>"...dat ik <strong>niet</strong> kom."<br>"...omdat hij <strong>niet</strong> heeft gebeld."</em></td></tr>
              <tr><td><strong>Ontkenning van specifiek ZN</strong></td><td>Vóór dat ZN</td><td><em>"...dat ik <strong>niet de</strong> directeur bedoel, maar de assistent."</em></td></tr>
              <tr><td><strong>Ontkenning van een bepaling</strong></td><td>Vóór die bepaling</td><td><em>"...dat hij <strong>niet in</strong> Amsterdam woont."<br>"...dat we <strong>niet op</strong> maandag kunnen."</em></td></tr>
              <tr><td><strong>In combinatie met 'meer'</strong></td><td><em>niet meer</em> vóór de werkwoorden</td><td><em>"...dat ik het <strong>niet meer</strong> weet."<br>"...omdat zij <strong>niet meer</strong> wilde wachten."</em></td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"Ik begrijp <strong>dat</strong> je het er <strong>niet mee eens bent</strong>."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Zij zei <strong>dat</strong> ze <strong>niet</strong> naar het feest <strong>gaat</strong>."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Het is jammer <strong>dat</strong> hij <strong>niet</strong> heeft kunnen <strong>komen</strong>."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Ik vraag me af <strong>waarom</strong> je het <strong>niet</strong> gewoon <strong>vraagt</strong>."</em></span>
        </div>
      </div>

      <div class="gw-section">
        <h2>🧩 Deel 6: Bijzinnen met 'Om ... Te + Infinitief' (Doelconstructie)</h2>
        <p>Dit is een speciaal soort verkorte bijzin. De structuur is: <strong>om + (rest van de zin) + te + infinitief</strong>.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Volledige Bijzin (met 'opdat' of 'zodat')</th><th>Verkorte Bijzin met 'om ... te'</th></tr></thead>
            <tbody>
              <tr><td><em>"Ik spaar geld <strong>opdat</strong> ik een auto <strong>kan kopen</strong>."</em></td><td><em>"Ik spaar geld <strong>om</strong> een auto <strong>te kunnen kopen</strong>."</em></td></tr>
              <tr><td><em>"Hij bleef thuis <strong>zodat</strong> hij voor zijn moeder <strong>kon zorgen</strong>."</em></td><td><em>"Hij bleef thuis <strong>om</strong> voor zijn moeder <strong>te zorgen</strong>."</em></td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-card gw-card--rule" style="margin-top:16px;">
          <div class="gw-card-title">📐 Regels voor 'Om ... te':</div>
          <ol style="margin:10px 0 0 20px;">
            <li>Het onderwerp van de <em>om ... te</em>-zin is <strong>hetzelfde</strong> als dat van de hoofdzin (of het is een algemeen 'men').</li>
            <li>'Te' staat direct vóór de infinitief. Als er meerdere werkwoorden zijn, staat 'te' vóór het hele werkwoordscluster.</li>
            <li>'Niet' staat tussen <em>om</em> en <em>te</em>: <em>om niet te ...</em></li>
          </ol>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"Ik ben hier <strong>om</strong> je <strong>te helpen</strong>."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Hij las het boek <strong>om</strong> zijn kennis <strong>te vergroten</strong>."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Zij droeg een zonnebril <strong>om niet herkend te worden</strong>."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"We moeten opschieten <strong>om</strong> de trein <strong>te halen</strong>."</em></span>
        </div>
      </div>

      <div class="gw-section">
        <h2>🔄 Deel 7: De Bijzin als Eerste Zinsdeel van de Hoofdzin (Inversie!)</h2>
        <p>Wanneer een bijzin <strong>vóór</strong> de hoofdzin staat, fungeert de hele bijzin als het <strong>eerste zinsdeel</strong> van de samengestelde zin. De hoofdzin begint dan met de <strong>persoonsvorm</strong>, gevolgd door het onderwerp (inversie).</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Structuur</th><th>Voorbeeldzin</th></tr></thead>
            <tbody>
              <tr><td><strong>[Bijzin] , PV + Onderwerp + Rest</strong></td><td><em>"<strong>Omdat het regent</strong>, <strong>blijf ik</strong> thuis."</em></td></tr>
              <tr><td></td><td><em>"<strong>Als je honger hebt</strong>, <strong>kun je</strong> een boterham <strong>pakken</strong>."</em></td></tr>
              <tr><td></td><td><em>"<strong>Toen de wekker ging</strong>, <strong>sprong hij</strong> uit bed."</em></td></tr>
              <tr><td></td><td><em>"<strong>Wat hij ook zegt</strong>, <strong>geloof ik</strong> hem niet."</em></td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"<strong>Hoewel hij rijk is</strong>, <strong>leeft hij</strong> heel sober."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Als ik jou was</strong>, <strong>zou ik</strong> het niet <strong>doen</strong>."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Dat hij de waarheid spreekt</strong>, <strong>betwijfel ik</strong> ten zeerste."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Wie het weet</strong>, <strong>mag</strong> het <strong>zeggen</strong>."</em></span>
        </div>

        <div class="gw-note" style="margin-top:12px;">📍 <strong>Let op:</strong> Na de bijzin staat een <strong>komma</strong> voordat de hoofdzin begint.</div>
      </div>

      <div class="gw-section">
        <h2>🏗️ Deel 8: Bijzinnen Binnen Bijzinnen (Ingebedde Bijzinnen)</h2>
        <p>Het Nederlands staat toe om bijzinnen in elkaar te schuiven. De regels voor de werkwoordsvolgorde blijven dan gelden op elk niveau.</p>
        
        <div class="gw-table-wrap">

            <thead><tr><th>Niveau</th><th>Voorbeeldzin</th><th>Analyse</th></tr></thead>

      <div class="gw-section">
        <h2>💡 Deel 10: Pro-Tips & Ezelsbruggetjes</h2>
        <ol>
          <li><strong>De 'Dat'-Test:</strong> Twijfel je of je een hoofdzin of bijzin moet gebruiken? Zet <em>"Ik denk dat..."</em> voor de zin. Verandert de woordvolgorde? Dan is het een bijzin. <br><em>"Hij gaat morgen." → "Ik denk dat hij morgen <strong>gaat</strong>."</em></li>
          <li><strong>De Werkwoords-Magneet:</strong> In de bijzin worden alle werkwoorden naar het einde <strong>getrokken</strong> als door een magneet. Alles wat niet op de tweede plek hoeft te staan, eindigt achteraan.</li>
          <li><strong>Groen is Altijd Goed:</strong> Bij twijfel over de volgorde van de werkwoorden aan het eind: gebruik de <strong>groene volgorde</strong> (hulpwerkwoord vóór hoofdwerkwoord). <em>"...dat hij het <strong>heeft gedaan</strong>."</em></li>
          <li><strong>Inversie-Alarm na Bijzin:</strong> Staat de bijzin vooraan? Zet dan <strong>meteen een komma</strong> en begin de hoofdzin met de <strong>persoonsvorm</strong>. <em>"Omdat het regent <strong>,</strong> blijf ik thuis."</em></li>
          <li><strong>'Te' is de Verkorter:</strong> Als het onderwerp hetzelfde blijft en je een doel wilt uitdrukken, gebruik dan <strong>om ... te + infinitief</strong>. Dat scheelt een hele bijzin.</li>
          <li><strong>Oefen met het Aanvullen van Zinnen:</strong><br><em>"Ik weet niet of..." | "Hij zegt dat..." | "Wij blijven thuis omdat..."</em></li>
        </ol>
      </div>

      <div class="gw-section">
        <h2>📋 Deel 11: Overzichtsschema's</h2>

        <h3 style="margin-top:24px;">🔹 Schema 2: Plaats van Zinsdelen in de Bijzin</h3>

            <thead><tr><th>Positie</th><th>Zinsdeel</th><th>Voorbeeld</th></tr></thead>

              <tr><td><strong>1</strong></td><td><strong>Voegwoord</strong></td><td><em>dat, omdat, als, die</em></td></tr>

    <div class="gw-wrap">
      <div class="gw-hero">
        <h1>🧩 Voegwoorden – Onderschikkend</h1>
        <p>Dat, omdat, als, terwijl, hoewel, die, wat — bijzinvolgorde</p>
      </div>

      <div class="gw-section">
        <p>Met veel plezier duiken we in de wereld van de <strong>onderschikkende voegwoorden</strong>. Waar de nevenschikkende voegwoorden (<em>en, maar, want, dus</em>) twee gelijkwaardige elementen verbinden, openen de onderschikkende voegwoorden de deur naar de <strong>bijzin</strong>. Ze creëren een hiërarchie in de zin: de ene zin is de hoofdzin, de andere is de afhankelijke bijzin.</p>
        <p>Deze gids is jouw complete, foutloze en prachtig geïllustreerde naslagwerk over onderschikkende voegwoorden. We behandelen het cruciale verschil met nevenschikkende voegwoorden, de absolute hoofdregel van de woordvolgorde in de bijzin, een uitgebreide categorisering van alle soorten onderschikkende voegwoorden, en een <strong>overvloed aan schitterende voorbeelden</strong>.</p>
      </div>

      <div class="gw-section">
        <h2>🧩 Deel 1: Het Fundamentele Verschil – Onderschikkend vs. Nevenschikkend</h2>
        <p>Het allerbelangrijkste om te onthouden is het effect op de <strong>woordvolgorde</strong>.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Kenmerk</th><th>Nevenschikkend</th><th>Onderschikkend</th></tr></thead>
            <tbody>
              <tr><td><strong>Verbinding</strong></td><td>Twee <strong>gelijkwaardige</strong> delen (hoofdzin + hoofdzin).</td><td>Een hoofdzin en een <strong>afhankelijke</strong> bijzin.</td></tr>
              <tr><td><strong>Woordvolgorde</strong></td><td>Beide delen behouden de <strong>V2-regel</strong> (PV op plek 2).</td><td>De bijzin krijgt <strong>SOV-volgorde</strong>: alle werkwoorden naar het <strong>einde</strong>.</td></tr>
              <tr><td><strong>Voorbeelden</strong></td><td><em>en, maar, want, of, dus</em></td><td><em>dat, omdat, als, terwijl, hoewel, die, wat</em></td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-card gw-card--rule" style="margin-top:16px;">
          <div class="gw-card-title">🔍 Vergelijk direct:</div>
          <div class="gw-table-wrap" style="margin-top:12px;">
            <table class="gw-table">
              <thead><tr><th>Nevenschikkend (met <em>want</em>)</th><th>Onderschikkend (met <em>omdat</em>)</th></tr></thead>
              <tbody>
                <tr><td><em>"Ik blijf thuis, <strong>want</strong> ik <strong>ben</strong> ziek."</em></td><td><em>"Ik blijf thuis <strong>omdat</strong> ik ziek <strong>ben</strong>."</em></td></tr>
                <tr><td><small>(Hoofdzinvolgorde: <em>ik ben</em>)</small></td><td><small>(Bijzinvolgorde: <em>ik ziek <strong>ben</strong></em>)</small></td></tr>
              </tbody>
            </table>
          </div>
          <p style="margin-top:12px; margin-bottom:0; color:var(--gw-text)">Dit ene verschil in woordvolgorde is de sleutel tot het correct gebruiken van onderschikkende voegwoorden.</p>
        </div>
      </div>

      <div class="gw-section">
        <h2>📜 Deel 2: De Gouden Regel van de Bijzin</h2>
        <p>Zodra een onderschikkend voegwoord de bijzin inleidt, geldt de <strong>absolute regel</strong>:</p>
        
        <div class="gw-card gw-card--rule">
          <div class="gw-card-title">✨ Werkwoorden naar het Einde:</div>
          <p style="margin:0; color:var(--gw-text)">In de bijzin staan <strong>alle werkwoorden</strong> (inclusief de persoonsvorm) <strong>aan het einde van de zin</strong>.</p>
        </div>

        <div class="gw-table-wrap" style="margin-top:16px;">
          <table class="gw-table">
            <thead><tr><th>Structuur Bijzin</th><th>Voorbeeld</th></tr></thead>
            <tbody>
              <tr><td><strong>Voegwoord + Onderwerp + Rest + WERKWOORDEN</strong></td><td><em>"...dat <strong>ik</strong> morgen naar Amsterdam <strong>ga</strong>."</em></td></tr>
              <tr><td></td><td><em>"...omdat <strong>hij</strong> het boek <strong>heeft gelezen</strong>."</em></td></tr>
              <tr><td></td><td><em>"...als <strong>jij</strong> me zou kunnen <strong>helpen</strong>."</em></td></tr>
              <tr><td></td><td><em>"...terwijl <strong>de baby</strong> lag te <strong>slapen</strong>."</em></td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"Ik hoop <strong>dat</strong> de zon morgen <strong>schijnt</strong>."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Zij vertelde <strong>dat</strong> ze een nieuwe baan <strong>heeft gevonden</strong>."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"We blijven thuis <strong>omdat</strong> het hard <strong>regent</strong>."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Het boek <strong>dat</strong> ik gisteren <strong>heb gekocht</strong>, is spannend."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Hoewel</strong> hij hard <strong>heeft gewerkt</strong>, is hij niet geslaagd."</em></span>
        </div>
      </div>

      <div class="gw-section">
        <h2>🗂️ Deel 3: De Hoofdcategorieën Onderschikkende Voegwoorden</h2>
        <p>We kunnen de onderschikkende voegwoorden indelen naar de <strong>relatie</strong> die ze leggen tussen de hoofdzin en de bijzin.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Categorie</th><th>Voegwoorden</th><th>Betekenis / Relatie</th></tr></thead>
            <tbody>
              <tr><td><strong>Aanwijzend / Feitelijk</strong></td><td><em>dat, of</em></td><td>Geeft een feit, mededeling of indirecte vraag weer.</td></tr>
              <tr><td><strong>Redengevend</strong></td><td><em>omdat, aangezien, doordat</em></td><td>Geeft een reden of oorzaak.</td></tr>
              <tr><td><strong>Tijd</strong></td><td><em>toen, terwijl, voordat, nadat, zodra, totdat, sinds, wanneer</em></td><td>Geeft een tijdstip, tijdsduur of volgorde aan.</td></tr>
              <tr><td><strong>Voorwaardelijk</strong></td><td><em>als, wanneer, indien, mits, tenzij</em></td><td>Geeft een voorwaarde aan.</td></tr>
              <tr><td><strong>Toegevend</strong></td><td><em>hoewel, al, ofschoon</em></td><td>Geeft een tegenstelling of concessie aan.</td></tr>
              <tr><td><strong>Doel</strong></td><td><em>opdat</em></td><td>Geeft een doel aan.</td></tr>
              <tr><td><strong>Vergelijking</strong></td><td><em>alsof, als, dan, naarmate</em></td><td>Maakt een vergelijking.</td></tr>
              <tr><td><strong>Gevolg / Mate</strong></td><td><em>zodat, zo ... dat, te ... om</em></td><td>Geeft een gevolg of mate aan.</td></tr>
              <tr><td><strong>Betrekkelijk</strong></td><td><em>die, dat, wie, wat, welke, hetgeen</em></td><td>Verwijst naar een antecedent.</td></tr>
              <tr><td><strong>Vraagwoord</strong></td><td><em>wie, wat, welke, waar, wanneer, hoe, waarom</em></td><td>Leidt een indirecte vraag in.</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="gw-section">
        <h2>📖 Deel 4: Uitgebreide Bespreking per Categorie</h2>
        
        <h3>✅ 4.1 Aanwijzend / Feitelijk: Dat en Of</h3>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Voegwoord</th><th>Gebruik</th><th>Prachtige Voorbeelden</th></tr></thead>
            <tbody>
              <tr><td><strong>dat</strong></td><td>Introduceert een feit, mededeling of waarneming.</td><td><em>"Ik weet <strong>dat</strong> hij eerlijk <strong>is</strong>."<br>"Zij zei <strong>dat</strong> ze zou <strong>komen</strong>."<br>"Het is duidelijk <strong>dat</strong> we moeten <strong>ingrijpen</strong>."</em></td></tr>
              <tr><td><strong>of</strong></td><td>Introduceert een indirecte ja/nee-vraag.</td><td><em>"Ik vraag me af <strong>of</strong> het morgen <strong>gaat regenen</strong>."<br>"Weet jij <strong>of</strong> de winkel open <strong>is</strong>?"<br>"Hij twijfelt <strong>of</strong> hij de juiste keuze <strong>heeft gemaakt</strong>."</em></td></tr>
            </tbody>
          </table>
        </div>

        <h3 style="margin-top:24px;">✅ 4.2 Redengevend: Omdat, Aangezien, Doordat</h3>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Voegwoord</th><th>Nuance</th><th>Prachtige Voorbeelden</th></tr></thead>
            <tbody>
              <tr><td><strong>omdat</strong></td><td>Algemene reden (neutraal).</td><td><em>"Ik blijf thuis <strong>omdat</strong> ik verkouden <strong>ben</strong>."<br>"Hij is blij <strong>omdat</strong> hij <strong>heeft gewonnen</strong>."</em></td></tr>
              <tr><td><strong>aangezien</strong></td><td>Formeler, bekende reden.</td><td><em>"<strong>Aangezien</strong> niemand bezwaar <strong>maakt</strong>, gaan we akkoord."<br>"<strong>Aangezien</strong> de trein vertraging <strong>heeft</strong>, kom ik later."</em></td></tr>
              <tr><td><strong>doordat</strong></td><td>Onbedoelde, mechanische oorzaak.</td><td><em>"De straat is nat <strong>doordat</strong> het <strong>heeft geregend</strong>."<br>"<strong>Doordat</strong> de brug open <strong>stond</strong>, miste ik mijn afspraak."</em></td></tr>
            </tbody>
          </table>
        </div>

        <h3 style="margin-top:24px;">✅ 4.3 Tijd: Toen, Terwijl, Voordat, Nadat, etc.</h3>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Voegwoord</th><th>Betekenis</th><th>Prachtige Voorbeelden</th></tr></thead>
            <tbody>
              <tr><td><strong>toen</strong></td><td>Eenmalig moment in het verleden.</td><td><em>"<strong>Toen</strong> de bel <strong>ging</strong>, stond ik op."</em></td></tr>
              <tr><td><strong>terwijl</strong></td><td>Gelijktijdigheid (twee acties tegelijk).</td><td><em>"<strong>Terwijl</strong> hij <strong>kookte</strong>, luisterde hij naar muziek."</em></td></tr>
              <tr><td><strong>voordat</strong></td><td>De hoofdzin gebeurt eerder dan de bijzin.</td><td><em>"<strong>Voordat</strong> je <strong>vertrekt</strong>, moet je de deur op slot doen."</em></td></tr>
              <tr><td><strong>nadat</strong></td><td>De hoofdzin gebeurt later dan de bijzin.</td><td><em>"<strong>Nadat</strong> hij <strong>had gegeten</strong>, dronk hij koffie."</em></td></tr>
              <tr><td><strong>zodra</strong></td><td>Direct aansluitend.</td><td><em>"<strong>Zodra</strong> de zon <strong>opkomt</strong>, vertrekken we."</em></td></tr>
              <tr><td><strong>totdat</strong></td><td>Voortdurende actie tot een moment.</td><td><em>"Wacht hier <strong>totdat</strong> ik <strong>terugkom</strong>."</em></td></tr>
              <tr><td><strong>sinds</strong></td><td>Beginpunt in verleden, nog steeds actueel.</td><td><em>"<strong>Sinds</strong> hij gestopt <strong>is</strong> met roken, voelt hij zich beter."</em></td></tr>
              <tr><td><strong>wanneer</strong></td><td>Herhaaldelijk of toekomstig moment.</td><td><em>"<strong>Wanneer</strong> het <strong>regent</strong>, blijf ik binnen."</em></td></tr>
            </tbody>
          </table>
        </div>

        <h3 style="margin-top:24px;">✅ 4.4 Voorwaardelijk: Als, Wanneer, Indien, Mits, Tenzij</h3>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Voegwoord</th><th>Betekenis</th><th>Prachtige Voorbeelden</th></tr></thead>
            <tbody>
              <tr><td><strong>als</strong></td><td>Algemene voorwaarde.</td><td><em>"<strong>Als</strong> het <strong>regent</strong>, ga ik niet."</em></td></tr>
              <tr><td><strong>wanneer</strong></td><td>Formeler dan <em>als</em>.</td><td><em>"<strong>Wanneer</strong> u nog vragen <strong>heeft</strong>, kunt u bellen."</em></td></tr>
              <tr><td><strong>indien</strong></td><td>Zeer formeel, schrijftaal.</td><td><em>"<strong>Indien</strong> de betaling niet op tijd <strong>wordt voldaan</strong>, volgt een boete."</em></td></tr>
              <tr><td><strong>mits</strong></td><td>Positieve voorwaarde (alleen als).</td><td><em>"Je mag een ijsje, <strong>mits</strong> je je bord leeg <strong>eet</strong>."</em></td></tr>
              <tr><td><strong>tenzij</strong></td><td>Negatieve voorwaarde (behalve als).</td><td><em>"Ik kom, <strong>tenzij</strong> het <strong>gaat stormen</strong>."</em></td></tr>
            </tbody>
          </table>
        </div>

        <h3 style="margin-top:24px;">✅ 4.5 Toegevend: Hoewel, Al, Ofschoon</h3>
        <div class="gw-conj-card">
          <div class="gw-conj-ex"><em>"<strong>Hoewel</strong> hij moe <strong>was</strong>, ging hij toch sporten."</em></div>
          <div class="gw-conj-ex"><em>"<strong>Al</strong> ben ik arm, ik ben gelukkig."</em></div>
          <div class="gw-conj-ex"><em>"<strong>Ofschoon</strong> hij zijn best <strong>deed</strong>, faalde hij."</em></div>
        </div>

        <h3 style="margin-top:24px;">✅ 4.6 Doel: Opdat</h3>
        <p><strong>Opdat</strong> geeft het <strong>doel</strong> aan. Het is formeel en wordt vaak gevolgd door <em>zou/moge</em>. Informeel gebruiken we liever <em>om ... te</em>.</p>
        <div class="gw-conj-card">
          <div class="gw-conj-ex"><em>"Hij spaarde geld <strong>opdat</strong> hij een wereldreis <strong>kon maken</strong>."</em></div>
          <div class="gw-conj-ex"><em>"Zij zweeg <strong>opdat</strong> niemand haar <strong>zou horen</strong>."</em></div>
        </div>

        <h3 style="margin-top:24px;">✅ 4.7 Vergelijking: Alsof, Als, Dan, Naarmate</h3>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Voegwoord</th><th>Betekenis</th><th>Prachtige Voorbeelden</th></tr></thead>
            <tbody>
              <tr><td><strong>alsof</strong></td><td>Irreële vergelijking.</td><td><em>"Hij doet <strong>alsof</strong> hij alles <strong>weet</strong>."</em></td></tr>
              <tr><td><strong>als</strong></td><td>Gelijkheid (na <em>even/net zo</em>).</td><td><em>"Hij is even groot <strong>als</strong> ik <strong>ben</strong>."</em></td></tr>
              <tr><td><strong>dan</strong></td><td>Ongelijkheid (na vergrotende trap).</td><td><em>"Hij is groter <strong>dan</strong> ik <strong>ben</strong>."</em></td></tr>
              <tr><td><strong>naarmate</strong></td><td>Evenredigheid (hoe...hoe).</td><td><em>"<strong>Naarmate</strong> de dag <strong>vordert</strong>, word ik moeier."</em></td></tr>
            </tbody>
          </table>
        </div>

        <h3 style="margin-top:24px;">✅ 4.8 Gevolg / Mate: Zodat, Zo...dat, Te...om</h3>
        <div class="gw-conj-card">
          <div class="gw-conj-ex"><strong>zodat:</strong> <em>"Hij zette de wekker <strong>zodat</strong> hij niet te laat <strong>zou komen</strong>."</em></div>
          <div class="gw-conj-ex"><strong>zo ... dat:</strong> <em>"Het was <strong>zo</strong> koud <strong>dat</strong> de meren <strong>bevroren</strong>."</em></div>
          <div class="gw-conj-ex"><strong>te ... om:</strong> <em>"Hij is <strong>te</strong> jong <strong>om</strong> alcohol <strong>te mogen drinken</strong>."</em></div>
        </div>

        <h3 style="margin-top:24px;">✅ 4.9 Betrekkelijke Voornaamwoorden: Die, Dat, Wie, Wat, Welke</h3>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Voornaamwoord</th><th>Verwijst naar...</th><th>Prachtige Voorbeelden</th></tr></thead>
            <tbody>
              <tr><td><strong>die</strong></td><td>De-woorden & meervoud</td><td><em>"De man <strong>die</strong> daar <strong>loopt</strong>, is mijn oom."</em></td></tr>
              <tr><td><strong>dat</strong></td><td>Het-woorden (enkelvoud)</td><td><em>"Het boek <strong>dat</strong> ik <strong>lees</strong>, is spannend."</em></td></tr>
              <tr><td><strong>wie</strong></td><td>Personen (na voorzetsel)</td><td><em>"De vrouw met <strong>wie</strong> ik <strong>sprak</strong>, was aardig."</em></td></tr>
              <tr><td><strong>wat</strong></td><td>Hele zin, iets/alles/niets, overtr. trap</td><td><em>"Hij zei dat hij zou komen, <strong>wat</strong> ik niet <strong>geloofde</strong>."</em></td></tr>
              <tr><td><strong>welke</strong></td><td>Formele variant van <em>die/dat</em></td><td><em>"De brief <strong>welke</strong> u <strong>heeft ontvangen</strong>, is vertrouwelijk."</em></td></tr>
            </tbody>

              <tr><td><strong>wie</strong></td><td>Personen na een <strong>voorzetsel</strong> (of als zelfstandig antecedent).</td><td><em>"De vriend <strong>met wie</strong> ik sprak." / "<strong>Wie</strong> dit leest, is gewaarschuwd."</em></td></tr>
              <tr><td><strong>wat</strong></td><td>Een <strong>hele zin</strong>, een <strong>onbepaald woord</strong> (iets, niets, alles), een <strong>overtreffende trap</strong>, of na een voorzetsel voor zaken.</td><td><em>"Hij kwam te laat, <strong>wat</strong> ik vervelend vond." / "Alles <strong>wat</strong> hij zegt."</em></td></tr>
              <tr><td><strong>welke</strong></td><td>Formele variant van <em>die</em> en <em>dat</em> (schrijftaal).</td><td><em>"De brief <strong>welke</strong> u ontving."</em></td></tr>
              <tr><td><strong>hetgeen</strong></td><td>Zeer formele variant van <em>wat</em> (verwijzend naar een hele zin).</td><td><em>"Hij zweeg, <strong>hetgeen</strong> mij verbaasde."</em></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="gw-section">
        <h2>📖 Deel 3: Uitgebreide Bespreking per Betrekkelijk Voornaamwoord</h2>
        
        <h3>✅ 3.1 Die – Voor De-woorden en Meervouden</h3>
        <p><strong>Die</strong> is het werkpaard onder de betrekkelijke voornaamwoorden. Je gebruikt het voor <strong>alle de-woorden in het enkelvoud</strong> en voor <strong>alle meervoudsvormen</strong> (ongeacht of het de- of het-woorden zijn).</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Antecedent</th><th>Voorbeeldzin</th><th>Uitleg</th></tr></thead>
            <tbody>
              <tr><td><strong>De-woord (persoon)</strong></td><td><em>"De man <strong>die</strong> daar <strong>loopt</strong>, is mijn vader."</em></td><td><em>Man</em> is een de-woord.</td></tr>
              <tr><td><strong>De-woord (zaak)</strong></td><td><em>"De stoel <strong>die</strong> ik <strong>heb gekocht</strong>, zit lekker."</em></td><td><em>Stoel</em> is een de-woord.</td></tr>
              <tr><td><strong>Meervoud (personen)</strong></td><td><em>"De kinderen <strong>die</strong> buiten <strong>spelen</strong>, zijn luidruchtig."</em></td><td><em>Kinderen</em> is meervoud → <em>die</em>.</td></tr>
              <tr><td><strong>Meervoud (zaken)</strong></td><td><em>"De boeken <strong>die</strong> ik <strong>heb gelezen</strong>, waren saai."</em></td><td><em>Boeken</em> is meervoud → <em>die</em>.</td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"De leraar <strong>die</strong> mij Engels <strong>gaf</strong>, was erg streng."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"De film <strong>die</strong> we gisteren <strong>hebben gezien</strong>, was ontroerend."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"De bloemen <strong>die</strong> je me <strong>hebt gestuurd</strong>, zijn prachtig."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"De herinneringen <strong>die</strong> we samen <strong>hebben gemaakt</strong>, koester ik."</em></span>
        </div>

        <h3 style="margin-top:24px;">✅ 3.2 Dat – Voor Het-woorden in het Enkelvoud</h3>
        <p><strong>Dat</strong> gebruik je uitsluitend voor <strong>het-woorden in het enkelvoud</strong>. Let op: verkleinwoorden zijn altijd het-woorden, dus die krijgen <strong>dat</strong>.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Antecedent</th><th>Voorbeeldzin</th><th>Uitleg</th></tr></thead>
            <tbody>
              <tr><td><strong>Het-woord (zaak)</strong></td><td><em>"Het boek <strong>dat</strong> op tafel <strong>ligt</strong>, is van mij."</em></td><td><em>Boek</em> is een het-woord.</td></tr>
              <tr><td><strong>Het-woord (dier)</strong></td><td><em>"Het paard <strong>dat</strong> in de wei <strong>staat</strong>, is van de buren."</em></td><td><em>Paard</em> is een het-woord.</td></tr>
              <tr><td><strong>Verkleinwoord</strong></td><td><em>"Het meisje <strong>dat</strong> daar <strong>loopt</strong>, is mijn nichtje."</em></td><td><em>Meisje</em> is een verkleinwoord (het).</td></tr>
              <tr><td><strong>Verkleinwoord</strong></td><td><em>"Het autootje <strong>dat</strong> ik <strong>heb gekregen</strong>, is rood."</em></td><td><em>Autootje</em> is een verkleinwoord.</td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-card gw-card--warn" style="margin-top:16px;">
          <div class="gw-card-title">⚠️ Valkuil: 'Meisje' en 'Jongetje'</div>
          <p style="margin:0; color:var(--gw-text)">Hoewel het over personen gaat, zijn <em>meisje</em> en <em>jongetje</em> verkleinwoorden en dus <strong>het-woorden</strong>. Je gebruikt <strong>dat</strong>, niet <em>die</em>.<br><em>"Het meisje <strong>dat</strong> ik <strong>zag</strong>, huilde."</em> (Niet: <em>Het meisje die ik zag</em>)</p>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"Het raadsel <strong>dat</strong> niemand <strong>kon oplossen</strong>, bleek simpel."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Het schilderij <strong>dat</strong> aan de muur <strong>hangt</strong>, is een erfstuk."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Het idee <strong>dat</strong> je <strong>hebt geopperd</strong>, is briljant."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Het kindje <strong>dat</strong> in de box <strong>speelt</strong>, lacht zo lief."</em></span>
        </div>

        <h3 style="margin-top:24px;">✅ 3.3 Wie – Voor Personen na een Voorzetsel</h3>
        <p>Wanneer een voorzetsel (<em>aan, met, door, voor, op, van, etc.</em>) voor het betrekkelijk voornaamwoord staat, gebruik je <strong>wie</strong> voor personen. Dit is een absolute regel in de schrijftaal.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Voorzetsel + Wie</th><th>Voorbeeldzin</th><th>Informeel Alternatief</th></tr></thead>
            <tbody>
              <tr><td><strong>aan wie</strong></td><td><em>"De vrouw <strong>aan wie</strong> ik de brief <strong>gaf</strong>."</em></td><td><em>"De vrouw <strong>waar</strong> ik de brief <strong>aan gaf</strong>."</em></td></tr>
              <tr><td><strong>met wie</strong></td><td><em>"De vriend <strong>met wie</strong> ik <strong>samenwerk</strong>."</em></td><td><em>"De vriend <strong>waar</strong> ik <strong>mee samenwerk</strong>."</em></td></tr>
              <tr><td><strong>door wie</strong></td><td><em>"De dokter <strong>door wie</strong> ik <strong>ben geopereerd</strong>."</em></td><td><em>"De dokter <strong>waar</strong> ik <strong>door ben geopereerd</strong>."</em></td></tr>
              <tr><td><strong>van wie</strong></td><td><em>"De auteur <strong>van wie</strong> ik alle boeken <strong>heb</strong>."</em></td><td><em>"De auteur <strong>waar</strong> ik alle boeken <strong>van heb</strong>."</em></td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"De collega <strong>op wie</strong> ik <strong>kan rekenen</strong>, is vandaag vrij."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"De klant <strong>voor wie</strong> ik dit <strong>doe</strong>, is zeer tevreden."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"De man <strong>naar wie</strong> we <strong>zochten</strong>, was nergens te vinden."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"De vriendin <strong>zonder wie</strong> ik niet <strong>kan leven</strong>."</em></span>
        </div>

        <h4 style="margin-top:20px;">🔹 Zelfstandig Gebruik van 'Wie' (Ingesloten Antecedent):</h4>
        <p><em>Wie</em> kan ook gebruikt worden zonder expliciet antecedent. Het betekent dan <em>"degene die"</em> of <em>"iedereen die"</em>.</p>
        <div class="gw-example">
          <span class="orig">✨ <em>"<strong>Wie</strong> dit <strong>leest</strong>, is gewaarschuwd."</em> (= Degene die dit leest...)</span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Wie</strong> niet weg <strong>is</strong>, is gezien."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Wie</strong> het eerst <strong>komt</strong>, het eerst <strong>maalt</strong>."</em></span>
        </div>

        <h3 style="margin-top:24px;">✅ 3.4 Wat – Voor Hele Zinnen, Onbepaalde Woorden en Overtreffende Trappen</h3>
        <p><strong>Wat</strong> is een veelzijdig betrekkelijk voornaamwoord dat in vier specifieke situaties wordt gebruikt:</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Situatie</th><th>Verwijst naar...</th><th>Voorbeeldzin</th></tr></thead>
            <tbody>
              <tr><td><strong>1. Een hele zin</strong></td><td>De hele voorgaande mededeling.</td><td><em>"Hij kwam te laat, <strong>wat</strong> ik erg vervelend <strong>vond</strong>."</em></td></tr>
              <tr><td><strong>2. Onbepaald woord</strong></td><td><em>iets, niets, alles, veel, weinig, datgene</em>.</td><td><em>"Er is niets <strong>wat</strong> ik liever <strong>zou doen</strong>."<br>"Alles <strong>wat</strong> hij <strong>zegt</strong>, is waar."</em></td></tr>
              <tr><td><strong>3. Overtreffende trap</strong></td><td>Na <em>het mooiste, het beste, het ergste</em>, etc.</td><td><em>"Het mooiste <strong>wat</strong> ik ooit <strong>heb gezien</strong>."</em></td></tr>
              <tr><td><strong>4. Voorzetsel + Zaak</strong> (gesplitst)</td><td>Zaken na een voorzetsel (in combinatie met <em>waar</em>).</td><td><em>"Het mes <strong>waar</strong> ik <strong>mee</strong> <strong>sneed</strong>."</em></td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-card gw-card--tip" style="margin-top:16px;">
          <div class="gw-card-title">🔍 Let op het Onderscheid met 'Dat':</div>
          <p style="margin:0; color:var(--gw-text)">• <em>"Het boek <strong>dat</strong> ik lees..."</em> (Specifiek antecedent: <em>het boek</em>)<br>• <em>"Alles <strong>wat</strong> ik lees..."</em> (Onbepaald antecedent: <em>alles</em>)</p>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"Ze is geslaagd, <strong>wat</strong> me enorm <strong>verheugt</strong>."</em> (Verwijst naar de hele mededeling)</span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Ik heb iets <strong>wat</strong> ik je moet <strong>vertellen</strong>."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Dat is het stomste <strong>wat</strong> je kunt <strong>doen</strong>."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Alles <strong>wat</strong> los en vast <strong>zit</strong>."</em></span>
        </div>

        <h3 style="margin-top:24px;">✅ 3.5 Welke en Hetgeen – Formele Schrijftaal</h3>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Voornaamwoord</th><th>Gebruik</th><th>Voorbeeldzin</th></tr></thead>
            <tbody>
              <tr><td><strong>welke</strong></td><td>Formele variant van <em>die</em> en <em>dat</em>.</td><td><em>"De brief <strong>welke</strong> u <strong>heeft ontvangen</strong>, is vertrouwelijk."<br>"Het document <strong>welk</strong> ter tafel <strong>ligt</strong>."</em> <small>(Let op: <em>welk</em> voor het-woord)</small></td></tr>
              <tr><td><strong>hetgeen</strong></td><td>Formele variant van <em>wat</em> (verwijzend naar een hele zin).</td><td><em>"Hij heeft gelogen, <strong>hetgeen</strong> de situatie <strong>verergert</strong>."</em></td></tr>
            </tbody>
          </table>
        </div>
        <div class="gw-note">💡 In de dagelijkse spreektaal worden deze vormen zelden gebruikt. Ze behoren tot de ambtelijke of literaire stijl.</div>
      </div>

      <div class="gw-section">
        <h2>🧩 Deel 4: De Woordvolgorde in de Betrekkelijke Bijzin</h2>
        <p>Een betrekkelijke bijzin is een <strong>bijzin</strong>. Dat betekent dat de <strong>gouden regel</strong> van de bijzin geldt:</p>
        
        <div class="gw-card gw-card--rule">
          <div class="gw-card-title">✨ Alle werkwoorden (inclusief de persoonsvorm) staan aan het einde van de bijzin.</div>
        </div>

        <div class="gw-table-wrap" style="margin-top:16px;">
          <table class="gw-table">
            <thead><tr><th>Hoofdzin</th><th>Betrekkelijke Bijzin</th></tr></thead>
            <tbody>
              <tr><td><em>"De man <strong>loopt</strong> daar."</em> (V2)</td><td><em>"...die daar <strong>loopt</strong>."</em> (SOV)</td></tr>
              <tr><td><em>"Ik <strong>heb</strong> het boek <strong>gelezen</strong>."</em> (V2)</td><td><em>"...dat ik <strong>heb gelezen</strong>."</em> (SOV)</td></tr>
              <tr><td><em>"Zij <strong>wil</strong> de film <strong>zien</strong>."</em> (V2)</td><td><em>"...die zij <strong>wil zien</strong>."</em> (SOV)</td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"De film <strong>die</strong> we gisteren <strong>hebben gezien</strong>."</em> (Niet: <em>...die we hebben gisteren gezien</em>)</span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Het huis <strong>dat</strong> te koop <strong>staat</strong>."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"De vriend <strong>met wie</strong> ik <strong>ga samenwerken</strong>."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"De taart <strong>die</strong> zij <strong>had gebakken</strong>."</em></span>
        </div>

        <h3 style="margin-top:24px;">🔹 Volgorde bij Meerdere Werkwoorden:</h3>
        <div class="gw-example">
          <span class="orig">📌 <em>"Het boek <strong>dat</strong> ik <strong>had willen lezen</strong>."</em> (Groene volgorde: hulpwerkwoord – modaal – hoofdwerkwoord)</span>
          <span class="orig" style="margin-top:4px;">📌 <em>"De man <strong>die</strong> daar <strong>zou hebben kunnen staan</strong>."</em></span>
        </div>
      </div>

      <div class="gw-section">
        <h2>🌍 Deel 5: Betrekkelijke Bijzinnen met Voorzetsels en 'Waar'</h2>
        <p>Wanneer een voorzetsel betrokken is bij een <strong>zaak</strong> (niet een persoon), gebruiken we in het Nederlands de constructie <strong>waar + voorzetsel</strong>. Dit is een van de meest kenmerkende structuren van de taal.</p>
        
        <h3>🔹 A. De Ongesplitste Vorm (Formeel / Schrijftaal)</h3>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Voorzetsel</th><th>Waar-woord</th><th>Voorbeeldzin</th></tr></thead>
            <tbody>
              <tr><td><strong>op</strong></td><td><strong>waarop</strong></td><td><em>"De stoel <strong>waarop</strong> ik <strong>zat</strong>, was kapot."</em></td></tr>
              <tr><td><strong>in</strong></td><td><strong>waarin</strong></td><td><em>"De doos <strong>waarin</strong> de schat <strong>zat</strong>."</em></td></tr>
              <tr><td><strong>mee</strong> (met)</td><td><strong>waarmee</strong></td><td><em>"Het mes <strong>waarmee</strong> ik <strong>sneed</strong>."</em></td></tr>
              <tr><td><strong>over</strong></td><td><strong>waarover</strong></td><td><em>"Het onderwerp <strong>waarover</strong> we <strong>spraken</strong>."</em></td></tr>
              <tr><td><strong>aan</strong></td><td><strong>waaraan</strong></td><td><em>"De muur <strong>waaraan</strong> het schilderij <strong>hing</strong>."</em></td></tr>
            </tbody>
          </table>
        </div>

        <h3 style="margin-top:24px;">🔹 B. De Gesplitste Vorm (Spreektaal / Gebruikelijk)</h3>
        <p>In de gesproken taal en informele schrijftaal wordt de constructie vrijwel altijd <strong>gesplitst</strong>. Het voorzetsel staat dan <strong>achteraan</strong> in de bijzin, en het eerste deel wordt <strong>waar</strong>.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Ongesplitst (Formeel)</th><th>Gesplitst (Informeel)</th></tr></thead>
            <tbody>
              <tr><td><em>"De stoel <strong>waarop</strong> ik zat."</em></td><td><em>"De stoel <strong>waar</strong> ik <strong>op</strong> zat."</em></td></tr>
              <tr><td><em>"Het mes <strong>waarmee</strong> ik sneed."</em></td><td><em>"Het mes <strong>waar</strong> ik <strong>mee</strong> sneed."</em></td></tr>
              <tr><td><em>"De doos <strong>waarin</strong> het zat."</em></td><td><em>"De doos <strong>waar</strong> het <strong>in</strong> zat."</em></td></tr>
              <tr><td><em>"Het onderwerp <strong>waarover</strong> we spraken."</em></td><td><em>"Het onderwerp <strong>waar</strong> we <strong>over</strong> spraken."</em></td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"Het huis <strong>waar</strong> ik <strong>in</strong> <strong>woon</strong>, is honderd jaar oud."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"De pen <strong>waar</strong> ik <strong>mee</strong> <strong>schrijf</strong>, is leeg."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"De vriend <strong>waar</strong> ik <strong>op</strong> <strong>wachtte</strong>, kwam niet opdagen."</em> <small>(Persoon! Hier is <em>wie</em> formeler)</small></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Het geld <strong>waar</strong> ik <strong>op</strong> <strong>rekende</strong>, is er niet."</em></span>
        </div>

        <div class="gw-card gw-card--tip" style="margin-top:16px;">
          <div class="gw-card-title">🔍 Let op bij Personen:</div>
          <p style="margin:0; color:var(--gw-text)">Voor personen is de formele vorm met <strong>wie + voorzetsel</strong> de standaard. De gesplitste vorm met <strong>waar</strong> is in de spreektaal echter wijdverbreid.<br><em>• Formeel: "De man <strong>op wie</strong> ik <strong>wacht</strong>."<br>• Informeel: "De man <strong>waar</strong> ik <strong>op</strong> <strong>wacht</strong>."</em></p>
        </div>
      </div>

      <div class="gw-section">
        <h2>🧠 Deel 6: Ingesloten Antecedent</h2>
        <p>Soms wordt het antecedent <strong>niet apart genoemd</strong>, maar is het <strong>ingesloten</strong> in het betrekkelijk voornaamwoord. Dit komt vooral voor bij <em>wie</em> en <em>wat</em>.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Met Expliciet Antecedent</th><th>Met Ingesloten Antecedent</th><th>Betekenis</th></tr></thead>
            <tbody>
              <tr><td><em>"<strong>Degene die</strong> dit leest..."</em></td><td><em>"<strong>Wie</strong> dit leest..."</em></td><td>Iedereen die dit leest.</td></tr>
              <tr><td><em>"<strong>Datgene wat</strong> hij zegt..."</em></td><td><em>"<strong>Wat</strong> hij zegt..."</em></td><td>Alles wat hij zegt.</td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"<strong>Wie</strong> niet horen <strong>wil</strong>, moet maar <strong>voelen</strong>."</em> (= Degene die niet wil horen...)</span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Wat</strong> je <strong>zaait</strong>, zul je <strong>oogsten</strong>."</em> (= Datgene wat je zaait...)</span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Wie</strong> het laatst <strong>lacht</strong>, <strong>lacht</strong> het best."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Wat</strong> in het vat <strong>zit</strong>, <strong>verzuurt</strong> niet."</em></span>
        </div>

        <div class="gw-note" style="margin-top:12px;">📍 <strong>Grammaticale Constructie:</strong><br>Zinnen met een ingesloten antecedent bestaan vaak uit twee delen:<br>1. De betrekkelijke bijzin (met ingesloten antecedent) – werkwoorden aan het eind.<br>2. De hoofdzin – begint met de persoonsvorm (inversie).<br><em>"<strong>Wie</strong> het <strong>weet</strong>, <strong>mag</strong> het <strong>zeggen</strong>."<br>"<strong>Wat</strong> hij ook <strong>probeert</strong>, het <strong>lukt</strong> hem niet."</em></div>
      </div>

      <div class="gw-section">
        <h2>⚠️ Deel 7: Veelgemaakte Fouten en Hun Correcties</h2>

      <div class="gw-section">
        <h2>💡 Deel 10: Pro-Tips & Ezelsbruggetjes</h2>
        <ol>
          <li><strong>De 'Worden'-Test voor Passief:</strong><br>Kun je <em>worden</em> + voltooid deelwoord toevoegen? Dan is het een passieve constructie (of een koppelwerkwoord bij <em>zijn</em>).<br><em>"De deur <strong>wordt</strong> gesloten." (Passief)<br>"De deur <strong>is</strong> gesloten." (Kan passief zijn, maar ook een toestand: De deur is dicht.)</em></li>
          <li><strong>'Worden' = Proces, 'Zijn' = Resultaat:</strong><br>• <strong>Worden</strong> + VD beschrijft de <strong>handeling</strong> of het <strong>proces</strong>. <em>"Het huis <strong>wordt gebouwd</strong>."</em> (Ze zijn nu aan het bouwen)<br>• <strong>Zijn</strong> + VD beschrijft de <strong>toestand</strong> of het <strong>resultaat</strong>. <em>"Het huis <strong>is gebouwd</strong>."</em> (Het staat er)</li>
          <li><strong>Actief is Vaak Krachtiger:</strong><br>In veel teksten (vooral informele) is de actieve vorm directer en levendiger. Gebruik de passieve vorm met mate en met een doel.<br><em>Zwak: "Er werd door de commissie besloten dat..."<br>Sterker: "De commissie besloot dat..."</em></li>
          <li><strong>'Er' als Redder bij Zonder LV:</strong><br>Heeft de actieve zin geen lijdend voorwerp? Gebruik <strong>er</strong> om de passieve zin te starten.<br><em>"De kinderen lachen." → "<strong>Er wordt</strong> gelachen."</em></li>
          <li><strong>De 'Door'-Dader Onthouden:</strong><br>Wil je de dader noemen in een passieve zin? Gebruik <strong>door</strong>.<br><em>"Het doelpunt werd gescoord <strong>door</strong> de spits."</em></li>
          <li><strong>Receptief Passief = Krijgen + Ontvangen:</strong><br>Krijgt het onderwerp iets? Dan is <em>krijgen</em> je hulpwerkwoord.<br><em>"Ik <strong>kreeg</strong> een medaille <strong>opgespeld</strong>."</em></li>
          <li><strong>Oefen met de Krant:</strong><br>Lees de koppen van nieuwsartikelen. Passieve zinnen worden daar veel gebruikt: <em>"Verdachte <strong>aangehouden</strong>", "Weg <strong>afgesloten</strong> na ongeluk".</em></li>
        </ol>
      </div>

              <tr><td><strong>Beleefd Verzoek</strong></td><td><em>Als</em> + O.V.T. (van <em>kunnen/zijn</em>)</td><td><em>Zou(den)</em> + Infinitief</td><td><em>"<strong>Als</strong> u even tijd <strong>had</strong>, <strong>zou</strong> u mij kunnen <strong>helpen</strong>?"</em></td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">

          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Als</strong> hij Nederlands <strong>sprak</strong>, <strong>zou</strong> de communicatie makkelijker <strong>zijn</strong>."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Als</strong> ik jou <strong>was</strong>, <strong>zou</strong> ik dat niet <strong>pikken</strong>."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Als</strong> we nu <strong>vertrokken</strong>, <strong>zouden</strong> we op tijd <strong>komen</strong>."</em></span>

        <div class="gw-card gw-card--tip" style="margin-top:16px;">
          <div class="gw-card-title">📍 Let op de Vorm van 'Zijn':</div>
          <p style="margin:0; color:var(--gw-text)">In de bijzin gebruik je <strong>was</strong> (enkelvoud) of <strong>waren</strong> (meervoud).<br><em>"<strong>Als</strong> ik <strong>was</strong> ..."</em> (Niet: <em>Als ik zou zijn</em>)</p>

      <div class="gw-section">
        <h2>💔 Deel 5: Type 3 – De Irreële Voorwaarde (Verleden / Gemiste Kans)</h2>
        <p>Dit type gebruik je om terug te kijken op het verleden en te speculeren over hoe het <strong>anders had kunnen lopen</strong>. De voorwaarde is <strong>niet vervuld</strong> en kan ook niet meer vervuld worden.</p>
        
        <div class="gw-card gw-card--rule">
          <div class="gw-card-title">📐 Formule: Als + Voltooid Verleden Tijd → Zou(den) + VD + Hebben/Zijn</div>
        </div>

        <div class="gw-table-wrap" style="margin-top:16px;">
          <table class="gw-table">
            <thead><tr><th>Structuur Bijzin</th><th>Structuur Hoofdzin</th><th>Prachtige Voorbeelden</th></tr></thead>
            <tbody>
              <tr><td><em>Als</em> + <strong>V.V.T.</strong> (<em>had</em> + VD)</td><td><em>Zou(den)</em> + VD + <strong>hebben/zijn</strong></td><td><em>"<strong>Als</strong> ik het <strong>had geweten</strong>, <strong>zou</strong> ik niet <strong>zijn gegaan</strong>."<br>"<strong>Als</strong> hij harder <strong>had gewerkt</strong>, <strong>zou</strong> hij <strong>zijn geslaagd</strong>."</em></td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"<strong>Als</strong> je het me <strong>had gevraagd</strong>, <strong>had</strong> ik je graag <strong>geholpen</strong>."</em> <small>(In spreektaal valt <em>zou</em> vaak weg)</small></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Als</strong> de wekker <strong>was afgegaan</strong>, <strong>zou</strong> ik niet te laat <strong>zijn gekomen</strong>."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Als</strong> hij naar de dokter <strong>was gegaan</strong>, <strong>zou</strong> hij nog <strong>hebben geleefd</strong>."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Als</strong> jullie <strong>hadden opgelet</strong>, <strong>zouden</strong> jullie het <strong>hebben begrepen</strong>."</em></span>
        </div>

        <div class="gw-note" style="margin-top:12px;">📍 <strong>De 'Hadden'-Vorm in Spreektaal:</strong><br>In informele gesproken taal gebruiken Nederlanders vaak een vereenvoudigde vorm, waarbij <em>zouden</em> vervangen wordt door <em>hadden</em>.<br><em>Formeel: "Als ik dat had geweten, <strong>zou</strong> ik <strong>zijn gekomen</strong>."<br>Informeel: "Als ik dat had geweten, <strong>was</strong> ik <strong>gekomen</strong>."</em><br>Beide vormen zijn correct. De formele vorm met <em>zouden</em> is veiliger in schrijftaal.</div>
      </div>

      <div class="gw-section">
        <h2>🔧 Deel 6: Andere Voorwaardelijke Voegwoorden en Hun Nuances</h2>
        <p>Naast het universele <strong>als</strong> zijn er andere voegwoorden die een specifiekere betekenis aan de voorwaarde geven.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">

              <tr><td><strong>Indien</strong></td><td>Zeer formeel, ambtelijk.</td><td>Juridische teksten, voorwaarden.</td><td><em>"<strong>Indien</strong> de betaling niet op tijd <strong>wordt voldaan</strong>, volgt een boete."</em></td></tr>

      <div class="gw-section">
        <h2>📏 Deel 7: Woordvolgorde in Conditionele Zinnen</h2>
        
        <h3>✅ A. De Bijzin Staat Vooraan</h3>
        <p>Wanneer de voorwaardelijke bijzin <strong>vóór</strong> de hoofdzin staat, fungeert de hele bijzin als het <strong>eerste zinsdeel</strong> van de hoofdzin. De hoofdzin begint dan met de <strong>persoonsvorm</strong>, gevolgd door het onderwerp (<strong>inversie</strong>).</p>

              <tr><td></td><td><em>"<strong>Als</strong> ik jou <strong>was</strong>, <strong>zou</strong> ik gaan."</em></td></tr>
              <tr><td></td><td><em>"<strong>Indien</strong> gewenst, <strong>sturen</strong> wij een brochure."</em></td></tr>
            </tbody>
          </table>
        </div>

        <h3 style="margin-top:24px;">✅ B. De Hoofdzin Staat Vooraan</h3>
        <p>Wanneer de hoofdzin <strong>vóór</strong> de bijzin staat, is de woordvolgorde in de hoofdzin <strong>normaal</strong> (V2). Er is geen inversie.</p>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Structuur</th><th>Voorbeeldzin</th></tr></thead>

              <tr><td></td><td><em>"Hij <strong>zou</strong> slagen <strong>als</strong> hij harder <strong>werkte</strong>."</em></td></tr>

        <div class="gw-note" style="margin-top:12px;">📍 <strong>Let op de Komma:</strong> Tussen de bijzin en de hoofdzin staat altijd een <strong>komma</strong> als de bijzin voorop staat.</div>
      </div>

      <div class="gw-section">
        <h2>🎭 Deel 8: De Veelzijdige Rol van 'Zou(den)'</h2>
        <p>Het werkwoord <strong>zouden</strong> (de verleden tijd van <em>zullen</em>) is de spil van de irreële voorwaardelijke zinnen. Maar het kan ook <strong>zelfstandig</strong> gebruikt worden om een voorwaarde te <strong>impliceren</strong>, zonder een <em>als</em>-zin.</p>

              <tr><td><strong>Hypothese</strong></td><td><em>"Dat <strong>zou</strong> leuk <strong>zijn</strong>."</em></td><td><em>"...als dat zou gebeuren."</em></td></tr>
              <tr><td><strong>Onzekerheid</strong></td><td><em>"Het <strong>zou</strong> kunnen <strong>gaan regenen</strong>."</em></td><td><em>"...als de voorspelling klopt."</em></td></tr>

      <div class="gw-section">
        <h2>🧩 Deel 9: Gemengde Vormen en Alternatieve Constructies</h2>

          <li><strong>Type 2 Herkennen:</strong> Zie je <strong>was/waren</strong> in de bijzin en <strong>zou(den)</strong> in de hoofdzin? Dan is het een droom, fantasie of advies over nu of de toekomst.<br><em>"<strong>Als</strong> ik jou <strong>was</strong>..."</em></li>
          <li><strong>Type 3 Herkennen:</strong> Zie je <strong>had</strong> + voltooid deelwoord in de bijzin en <strong>zou</strong> + voltooid deelwoord + <strong>hebben/zijn</strong> in de hoofdzin? Dan is het een gemiste kans in het verleden.<br><em>"<strong>Als</strong> ik <strong>had geweten</strong>..."</em></li>
          <li><strong>'Mits' en 'Tenzij' Uit Elkaar Houden:</strong> • <strong>Mits</strong> = <strong>M</strong>oet (Positieve voorwaarde). <em>"Je mag een ijsje, <strong>mits</strong> je je bord leeg eet."</em> • <strong>Tenzij</strong> = <strong>T</strong>egenwerking (Negatief). <em>"Ik kom, <strong>tenzij</strong> het regent."</em></li>

          <span class="orig">✨ <em>Direct: Ze zei: "Ik <strong>ga</strong> naar de markt." → Indirect: Ze zei dat ze naar de markt <strong>ging</strong>.</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>Direct: Hij dacht: "Ik <strong>heb</strong> de deur op slot <strong>gedaan</strong>." → Indirect: Hij dacht dat hij de deur op slot <strong>had gedaan</strong>.</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>Direct: De politicus beloofde: "Ik <strong>zal</strong> de belastingen verlagen." → Indirect: De politicus beloofde dat hij de belastingen <strong>zou</strong> verlagen.</em></span>
        </div>

        <h3 style="margin-top:24px;">🔹 5.2 Geen Backshift (Hoofdzin in Tegenwoordige Tijd)</h3>
        <p>Als de hoofdzin in de <strong>tegenwoordige tijd</strong> staat (<em>zegt, denkt, vraagt</em>), <strong>verandert de tijd in de bijzin meestal niet</strong>.</p>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Directe Rede</th><th>Indirecte Rede (na <em>Hij zegt dat...</em>)</th></tr></thead>
            <tbody>
              <tr><td><em>"Ik <strong>ben</strong> moe."</em></td><td><em>...hij moe <strong>is</strong>.</em></td></tr>
              <tr><td><em>"Ik <strong>heb</strong> honger."</em></td><td><em>...hij honger <strong>heeft</strong>.</em></td></tr>
              <tr><td><em>"Ik <strong>zal</strong> komen."</em></td><td><em>...hij <strong>zal</strong> komen.</em> (of: <em>...hij komt</em>)</td></tr>
            </tbody>
          </table>
        </div>

        <h3 style="margin-top:24px;">🔹 5.3 Uitzonderingen op Backshift</h3>
        <p><strong>Algemene waarheden</strong> of <strong>nog steeds geldende feiten</strong> blijven vaak in de tegenwoordige tijd, ook al staat de hoofdzin in de verleden tijd.</p>
        <div class="gw-note">
          📍 <em>Direct: "De aarde <strong>is</strong> rond." → Indirect: ...de aarde rond <strong>is</strong>. (Feit blijft waar)<br>
          Direct: "Ik <strong>hou</strong> van chocolade." → Indirect: ...hij van chocolade <strong>houdt</strong>. (Nog steeds waar)<br>
          Direct: "Amsterdam <strong>ligt</strong> in Nederland." → Indirect: ...Amsterdam in Nederland <strong>ligt</strong>.</em>
        </div>
      </div>

      <div class="gw-section">
        <h2>❓ Deel 6: Vragen in de Indirecte Rede</h2>
        <p>Bij het omzetten van een vraag naar de indirecte rede gelden twee speciale regels:</p>
        <ol>
          <li>Het voegwoord is <strong>of</strong> (voor ja/nee-vragen) of het <strong>vraagwoord</strong> (voor open vragen).</li>
          <li>De <strong>vraagzinvolgorde</strong> (inversie) verdwijnt en wordt <strong>bijzinvolgorde</strong> (werkwoorden aan het einde).</li>
        </ol>
        
        <h3>✅ 6.1 Ja/Nee-vragen (Voegwoord 'Of')</h3>

              <tr><td><em>"<strong>Zal</strong> het regenen?"</em></td><td><em>Ik vroeg <strong>of</strong> het <strong>zou</strong> regenen.</em></td></tr>
            </tbody>
          </table>
        </div>

        <h3 style="margin-top:24px;">✅ 6.2 Open Vragen (Vraagwoord blijft)</h3>

              <tr><td><em>"<strong>Hoe laat begint</strong> de film?"</em></td><td><em>Zij vroeg <strong>hoe laat</strong> de film <strong>begon</strong>.</em></td></tr>
              <tr><td><em>"<strong>Wat bedoel</strong> je?"</em></td><td><em>Ik vroeg <strong>wat</strong> hij <strong>bedoelde</strong>.</em></td></tr>

      <div class="gw-section">
        <h2>📢 Deel 7: Bevelen en Verzoeken in de Indirecte Rede (Imperatief)</h2>
        <p>Een bevel of verzoek (gebiedende wijs) wordt in de indirecte rede omgezet met een <strong>modaal werkwoord</strong> (<em>moeten, zullen, kunnen, willen</em>) of met de constructie <strong>vragen om + te + infinitief</strong>.</p>

      <div class="gw-section">
        <h2>🎭 Deel 8: Indirecte Rede met Modale Werkwoorden en 'Zouden'</h2>
        <p>Bij het weergeven van een <strong>toekomstige gebeurtenis</strong> of een <strong>belofte</strong> in het verleden, speelt <strong>zouden</strong> een hoofdrol. Ook <strong>moeten</strong> en <strong>kunnen</strong> worden vaak gebruikt om nuances van verplichting en mogelijkheid over te brengen.</p>

        <h2>🕰️ Deel 9: Aanpassing van Tijds- en Plaatsbepalingen</h2>

      <div class="gw-section">
        <h2>🧩 Deel 10: Indirecte Rede Zonder 'Dat' (Vrije Indirecte Rede)</h2>
        <p>In literaire teksten komt de <strong>vrije indirecte rede</strong> voor. Hierbij wordt de indirecte rede <strong>niet ingeleid</strong> door een werkwoord als <em>hij zei</em> of <em>zij dacht</em>, en ook <strong>zonder voegwoord</strong>. De gedachten van een personage worden rechtstreeks in de verhaalstroom opgenomen, maar met de <strong>tijd en voornaamwoorden van de indirecte rede</strong>. Dit creëert een intiem effect.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Normale Indirecte Rede</th><th>Vrije Indirecte Rede</th></tr></thead>

              <tr><td><em>Hij dacht: "Wat <strong>ben</strong> ik toch dom."</em></td><td><em>Wat <strong>was</strong> hij toch dom!</em></td></tr>
              <tr><td><em>Zij vroeg zich af: "<strong>Zal</strong> ik gaan?"</em></td><td><em>Zou ze gaan?</em></td></tr>

        <div class="gw-example" style="margin-top:16px;">

          <span class="orig" style="margin-top:4px;">✨ <em>Vrije indirecte rede: Hij stond op het perron. <strong>Zou</strong> hij de trein missen? Nee, hij moest opschieten.</em></span>
        </div>
      </div>

              <tr><td><em>Ik vroeg <strong>wat bedoelde</strong> hij.</em></td><td><em>Ik vroeg <strong>wat</strong> hij <strong>bedoelde</strong>.</em></td><td>Indirecte vraag → bijzinvolgorde.</td></tr>

      <div class="gw-section">
        <h2>💡 Deel 12: Pro-Tips & Ezelsbruggetjes</h2>
        <ol>
          <li><strong>De 'Dat'-Test:</strong><br>Zet de woorden van de spreker achter <em>"Hij zei dat..."</em> en <strong>verplaats alle werkwoorden naar het einde</strong>. Klaar!<br><em>"Ik ga morgen naar school." → Hij zei dat ik morgen naar school <strong>ga</strong>. (of <em>ging</em>)</em></li>
          <li><strong>Backshift-Alarm:</strong><br>Staat de hoofdzin in de <strong>verleden tijd</strong> (<em>zei, dacht, vroeg</em>)? <strong>Alarm!</strong> Zet de werkwoordstijd in de bijzin één stap terug in het verleden.<br><em>is → was, heeft → had, zal → zou.</em></li>
          <li><strong>Vraag? 'Of' of Vraagwoord + Bijzinvolgorde:</strong><br>Ja/nee-vraag → <strong>of</strong>. Open vraag → <strong>vraagwoord</strong>. In beide gevallen <strong>geen inversie</strong>, maar werkwoorden naar achteren.<br><em>"Kom je?" → ...of je <strong>komt</strong>.<br>"Waar woon je?" → ...waar je <strong>woont</strong>.</em></li>
          <li><strong>Bevel? Gebruik een Modaal Werkwoord:</strong><br><em>Moeten, zullen, kunnen, mogen, willen.</em><br><em>"Doe de deur dicht!" → Hij zei dat ik de deur <strong>moest</strong> dichtdoen.</em></li>
          <li><strong>Perspectief Verandert Alles:</strong><br>Lees de indirecte rede hardop en vraag je af: <em>Wie zegt wat over wie?</em> Pas <strong>ik/jij/hij</strong> en <strong>mijn/jouw/zijn</strong> aan.<br><em>Zij tegen mij: "Jij bent lief." → Zij zei dat <strong>ik</strong> lief <strong>was</strong>.</em></li>
        </ol>
      </div>

      <div class="gw-summary">
        <h3>🧭 Snelle Samenvatting</h3>
        <ul>
          <li><strong>Basis:</strong> Hoofdzin + <em>dat/of</em> + bijzin (werkwoorden naar einde!)</li>
          <li><strong>Backshift:</strong> Hoofdzin verleden → bijzin één stap terug (<em>is→was, heeft→had, zal→zou</em>)</li>
