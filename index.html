<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lingua — Grammar Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#faf8f3; --bg2:#f2ede0; --bg3:#ebe4d1;
  --text:#1c1a16; --text2:#5a5040; --text3:#9a8e78;
  --border:#dfd7c2; --shadow:rgba(28,26,22,.07); --shadow-lg:rgba(28,26,22,.14);
  --r:16px; --rs:10px; --t:.28s cubic-bezier(.4,0,.2,1);
  --accent:#059669; --acbg:#ecfdf5; --acbo:#a7f3d0;
  --nl:#e8590c; --nlbg:#fff3ed; --nlbo:#fcd0b5;
  --fr:#4f46e5; --frbg:#eef2ff; --frbo:#c7d2fe;
  --en:#059669; --enbg:#ecfdf5; --enbo:#a7f3d0;
}
[data-theme=dark]{
  --bg:#131109; --bg2:#1c1912; --bg3:#24201a;
  --text:#f0ead8; --text2:#b8a88a; --text3:#6a5f45;
  --border:#2e2820; --shadow:rgba(0,0,0,.35); --shadow-lg:rgba(0,0,0,.55);
}

body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;transition:background var(--t),color var(--t);min-height:100vh}

/* === LANGUAGE SELECT === */
#langSelect{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;position:relative;overflow:hidden}
#langSelect::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 25% 30%,rgba(232,89,12,.07) 0%,transparent 50%),radial-gradient(ellipse at 75% 70%,rgba(79,70,229,.07) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(5,150,105,.05) 0%,transparent 55%);pointer-events:none}
.ls-hero{text-align:center;margin-bottom:3rem;animation:fadeUp .6s ease both}
.ls-hero h1{font-family:'Libre Baskerville',serif;font-size:clamp(2.2rem,5vw,3.8rem);font-weight:700;letter-spacing:-.025em;line-height:1.1}
.ls-hero h1 em{font-style:normal;color:var(--accent)}
.ls-hero p{color:var(--text2);font-size:1.05rem;margin-top:.5rem;font-weight:500}
.ls-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1.25rem;max-width:860px;width:100%}
.lc{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:2.5rem 2rem;text-align:center;cursor:pointer;transition:all var(--t);position:relative;overflow:hidden;animation:fadeUp .6s ease both}
.lc:nth-child(1){animation-delay:.12s}.lc:nth-child(2){animation-delay:.22s}.lc:nth-child(3){animation-delay:.32s}
.lc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;transform:scaleX(0);transition:transform var(--t);transform-origin:left}
.lc.nl::after{background:var(--nl)}.lc.fr::after{background:var(--fr)}.lc.en::after{background:var(--en)}
.lc:hover{transform:translateY(-7px);box-shadow:0 20px 44px var(--shadow-lg)}
.lc:hover::after{transform:scaleX(1)}
.lc.nl:hover{border-color:var(--nl)}.lc.fr:hover{border-color:var(--fr)}.lc.en:hover{border-color:var(--en)}
.lc-flag{font-size:3.8rem;display:block;margin-bottom:1rem;animation:float 4s ease-in-out infinite}
.lc:nth-child(2) .lc-flag{animation-delay:1.4s}.lc:nth-child(3) .lc-flag{animation-delay:2.8s}
.lc-name{font-family:'Libre Baskerville',serif;font-size:1.9rem;font-weight:700;margin-bottom:.25rem}
.lc-sub{color:var(--text3);font-size:.9rem;font-weight:500;letter-spacing:.02em}

/* === APP SHELL === */
#app{display:none}
.app-header{background:var(--bg);border-bottom:1.5px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.hdr{max-width:1320px;margin:0 auto;padding:.85rem 1.75rem;display:flex;align-items:center;gap:1rem}
.logo{font-family:'Libre Baskerville',serif;font-size:1.45rem;font-weight:700;flex:1;cursor:pointer;display:flex;align-items:center;gap:.35rem;color:var(--text);text-decoration:none}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0}
.hdr-acts{display:flex;gap:.45rem}
.btico{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--rs);padding:.5rem .85rem;cursor:pointer;transition:all var(--t);font-size:.88rem;font-family:'Nunito',sans-serif;font-weight:700;color:var(--text);display:flex;align-items:center;gap:.3rem}
.btico:hover{background:var(--bg3);border-color:var(--text3)}
.nav-bar{background:var(--bg);border-bottom:1.5px solid var(--border)}
.nav-inner{max-width:1320px;margin:0 auto;padding:0 1.75rem;display:flex}
.ntab{padding:.8rem 1.4rem;background:none;border:none;border-bottom:2.5px solid transparent;color:var(--text3);font-size:.93rem;font-weight:700;cursor:pointer;transition:all var(--t);font-family:'Nunito',sans-serif;letter-spacing:.01em;white-space:nowrap}
.ntab:hover{color:var(--text)}
.ntab.active{color:var(--text);border-bottom-color:var(--accent)}

/* === MAIN CONTENT === */
.cwrap{max-width:1320px;margin:0 auto;padding:1.75rem}
.sh{margin-bottom:1.25rem;position:relative}
.si{width:100%;padding:.85rem 2.8rem .85rem 1.1rem;font-size:.97rem;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--bg2);color:var(--text);font-family:'Nunito',sans-serif;transition:all var(--t)}
.si::placeholder{color:var(--text3)}
.si:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--acbg);background:var(--bg)}
.si-ico{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}

/* === TOPIC GRID === */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:.9rem}
.tc{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:1.4rem;cursor:pointer;transition:all var(--t);position:relative;animation:fadeIn .4s ease both}
.tc:hover{transform:translateY(-3px);box-shadow:0 8px 22px var(--shadow);border-color:var(--acbo);background:var(--acbg)}
.tc-num{display:inline-flex;align-items:center;justify-content:center;width:1.9rem;height:1.9rem;background:var(--acbg);color:var(--accent);border-radius:7px;font-size:.72rem;font-weight:900;margin-bottom:.7rem;border:1px solid var(--acbo)}
.tc-title{font-family:'Libre Baskerville',serif;font-size:1rem;font-weight:700;margin-bottom:.3rem;line-height:1.3}
.tc-desc{color:var(--text2);font-size:.82rem;line-height:1.5}

/* === TOPIC DETAIL === */
.back-btn{display:inline-flex;align-items:center;gap:.4rem;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--rs);padding:.5rem .95rem;cursor:pointer;transition:all var(--t);font-weight:700;color:var(--text);font-family:'Nunito',sans-serif;font-size:.88rem;margin-bottom:1.25rem}
.back-btn:hover{transform:translateX(-3px);border-color:var(--text3)}
.det-hdr{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:1.8rem 2.2rem;margin-bottom:1.25rem}
.det-hdr h1{font-family:'Libre Baskerville',serif;font-size:clamp(1.4rem,3vw,2rem);font-weight:700;margin-bottom:.4rem}
.det-hdr p{color:var(--text2);margin-bottom:1.25rem;font-size:.95rem}
.tact{display:flex;gap:.6rem;flex-wrap:wrap}
.btn{padding:.65rem 1.35rem;border-radius:var(--rs);font-family:'Nunito',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;transition:all var(--t);border:1.5px solid transparent;letter-spacing:.01em}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-p:hover{opacity:.88;transform:translateY(-1px)}
.btn-s{background:var(--bg);color:var(--text);border-color:var(--border)}.btn-s:hover{background:var(--bg3);border-color:var(--text3)}
.btn-o{background:var(--bg2);color:var(--text);border-color:var(--border)}.btn-o:hover{background:var(--bg3)}

/* === CONTENT BOX === */
.cbox{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:2rem 2.4rem;line-height:1.85;animation:fadeIn .4s ease both}
.cbox h2{font-family:'Libre Baskerville',serif;font-size:1.3rem;margin-bottom:.9rem;color:var(--text)}
.cbox p{margin-bottom:.9rem;color:var(--text)}
.cbox ul,.cbox ol{margin:.4rem 0 1rem 1.1rem}
.cbox li{margin-bottom:.35rem;color:var(--text)}
.cbox strong{font-weight:800}
.cbox em{color:var(--accent);font-style:italic}
.example-box{background:var(--bg3);border-left:3px solid var(--accent);padding:.9rem 1.1rem;border-radius:0 var(--rs) var(--rs) 0;margin:.9rem 0}
.example-box .original{display:block;font-family:'Libre Baskerville',serif;font-style:italic;color:var(--text);margin-bottom:.18rem;font-size:1rem}
.example-box .translation{display:block;color:var(--text3);font-size:.86rem}

/* === LOADING === */
.ldwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;gap:.9rem;color:var(--text3);font-weight:600;font-size:.92rem}
.spin{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}

/* === QUIZ === */
.qhdr{margin-bottom:1.2rem}
.pbar-wrap{background:var(--bg3);border-radius:100px;height:5px;margin-bottom:.45rem;overflow:hidden}
.pbar-fill{height:100%;background:var(--accent);border-radius:100px;transition:width .5s ease}
.qmeta{display:flex;justify-content:space-between;color:var(--text3);font-size:.82rem;font-weight:700}
.qcard{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:1.8rem 2.2rem;margin-bottom:1rem;animation:fadeIn .3s ease both}
.qtext{font-size:1.08rem;font-weight:700;margin-bottom:1.4rem;line-height:1.5;color:var(--text)}
.opts{display:flex;flex-direction:column;gap:.6rem}
.obtn{padding:.9rem 1.1rem;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--text);text-align:left;cursor:pointer;transition:all var(--t);font-size:.93rem;font-family:'Nunito',sans-serif;font-weight:600;display:flex;align-items:center;gap:.7rem;line-height:1.4}
.obtn:hover:not(:disabled){border-color:var(--accent);background:var(--acbg);transform:translateX(4px)}
.obtn:disabled{cursor:default}
.oltr{width:1.5rem;height:1.5rem;border-radius:6px;background:var(--bg2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:900;flex-shrink:0;transition:all var(--t)}
.obtn.correct{background:#ecfdf5;border-color:#059669;color:#065f46}
.obtn.correct .oltr{background:#059669;border-color:#059669;color:#fff}
.obtn.incorrect{background:#fef2f2;border-color:#ef4444;color:#991b1b}
.obtn.incorrect .oltr{background:#ef4444;border-color:#ef4444;color:#fff}
.obtn.sel-test{background:var(--acbg);border-color:var(--accent)}
.obtn.sel-test .oltr{background:var(--accent);border-color:var(--accent);color:#fff}
.expbox{background:var(--acbg);border:1.5px solid var(--acbo);border-radius:var(--rs);padding:.85rem 1.1rem;margin-top:.9rem;font-size:.88rem;color:var(--text);animation:fadeIn .3s ease both;font-weight:600;line-height:1.55}
.qnav{display:flex;justify-content:space-between;align-items:center;margin-top:1rem;gap:.6rem}

/* === RESULTS === */
.res-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:2.5rem;text-align:center;animation:fadeIn .5s ease both}
.res-score{font-family:'Libre Baskerville',serif;font-size:clamp(3rem,8vw,5.5rem);font-weight:700;color:var(--accent);line-height:1;margin:.75rem 0}
.res-lbl{color:var(--text3);font-size:.9rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.res-msg{font-size:1.15rem;font-weight:800;margin-bottom:1.5rem;color:var(--text)}
.res-acts{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.75rem}
.rev-item{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--rs);padding:.85rem 1.1rem;margin-bottom:.6rem;border-left-width:3px;font-size:.88rem}
.rev-q{font-weight:700;margin-bottom:.35rem}
.rev-a{font-weight:800;margin-bottom:.25rem}
.rev-e{color:var(--text3);font-size:.82rem}

/* === ANIMATIONS === */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* === RESPONSIVE === */
@media(max-width:768px){
  .cwrap{padding:1rem}
  .hdr{padding:.7rem 1rem}
  .nav-inner{padding:0 1rem;overflow-x:auto;scrollbar-width:none}
  .nav-inner::-webkit-scrollbar{display:none}
  .ntab{padding:.7rem 1rem;font-size:.85rem}
  .det-hdr{padding:1.4rem 1.5rem}
  .cbox,.qcard{padding:1.4rem 1.5rem}
  .tgrid{grid-template-columns:1fr}
  .ls-grid{max-width:320px}
  .res-card{padding:1.75rem 1.5rem}
}
</style>
</head>
<body>

<!-- LANGUAGE SELECTION -->
<div id="langSelect">
  <div class="ls-hero">
    <h1>Lingua<em>AI</em></h1>
    <p>Grammar Mastery — AI-Powered Learning</p>
  </div>
  <div class="ls-grid">
    <div class="lc nl" onclick="selectLang('nl')">
      <span class="lc-flag">🇳🇱</span>
      <div class="lc-name">Nederlands</div>
      <div class="lc-sub">Dutch Language</div>
    </div>
    <div class="lc fr" onclick="selectLang('fr')">
      <span class="lc-flag">🇫🇷</span>
      <div class="lc-name">Français</div>
      <div class="lc-sub">French Language</div>
    </div>
    <div class="lc en" onclick="selectLang('en')">
      <span class="lc-flag">🇬🇧</span>
      <div class="lc-name">English</div>
      <div class="lc-sub">British English</div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header class="app-header">
    <div class="hdr">
      <div class="logo" onclick="showLangSelect()">
        LinguaAI<span class="logo-dot"></span>
      </div>
      <div class="hdr-acts">
        <button class="btico" id="langBtn" onclick="showLangSelect()">
          <span id="langFlag">🇬🇧</span>
        </button>
        <button class="btico" onclick="toggleTheme()">
          <span id="themeIco">🌙</span>
        </button>
      </div>
    </div>
  </header>
  <nav class="nav-bar">
    <div class="nav-inner">
      <button class="ntab active" id="tab-grammar" onclick="switchTab('grammar')">
        <span id="lbl-grammar">Grammar</span>
      </button>
      <button class="ntab" id="tab-practice" onclick="switchTab('practice')">
        <span id="lbl-practice">Practice</span>
      </button>
      <button class="ntab" id="tab-test" onclick="switchTab('test')">
        <span id="lbl-test">Test</span>
      </button>
    </div>
  </nav>
  <div class="cwrap">
    <!-- Grammar section -->
    <div id="sec-grammar">
      <div class="sh">
        <input type="text" class="si" id="searchInp" placeholder="Search grammar topics..." oninput="filterTopics()"/>
        <span class="si-ico">🔍</span>
      </div>
      <div class="tgrid" id="grammarGrid"></div>
    </div>

    <!-- Practice section -->
    <div id="sec-practice" style="display:none">
      <div class="tgrid" id="practiceGrid"></div>
    </div>

    <!-- Test section -->
    <div id="sec-test" style="display:none">
      <div class="tgrid" id="testGrid"></div>
    </div>

    <!-- Detail/quiz section (shared) -->
    <div id="sec-detail" style="display:none">
      <button class="back-btn" onclick="backFromDetail()">
        ← <span id="backLbl">Back</span>
      </button>
      <div id="detailContent"></div>
    </div>
  </div>
</div>

<script>
// =============================================
// CONFIGURATION & STATE
// =============================================
let lang = 'en';
let tab = 'grammar';
let dark = false;
let topicId = null;
let mode = 'grammar'; // grammar | practice | test
const cache = {};
let Qs = [], qi = 0, ans = [];
const LTRS = ['A','B','C','D'];

// =============================================
// TOPICS DATA
// =============================================
const TOPICS = {
  nl:[
{

  id: 1,
  t: "De lidwoorden (de/het/een)",
  d: "Leer wanneer je 'de' of 'het' moet gebruiken",
  content: `
    <style>
      .gw-wrap {
        --gw-bg: var(--bg); --gw-bg2: var(--bg2); --gw-bg3: var(--bg3);
        --gw-text: var(--text); --gw-text2: var(--text2); --gw-text3: var(--text3);
        --gw-border: var(--border); --gw-accent: var(--accent); --gw-accent-bg: var(--acbg);
        --gw-nl: var(--nl); --gw-nl-bg: var(--nlbg); --gw-nl-bo: var(--nlbo);
        --gw-fr: var(--fr); --gw-fr-bg: var(--frbg); --gw-fr-bo: var(--frbo);
        --gw-warn: #d97706; --gw-warn-bg: #fffbeb; --gw-warn-text: #92400e;
        font-family: 'Nunito', sans-serif; color: var(--gw-text);
        line-height: 1.65; max-width: 920px; margin: 0 auto; padding: 6px;
      }
      [data-theme="dark"] .gw-wrap {
        --gw-warn-bg: #2c1e0a; --gw-warn-text: #fbbf24; --gw-warn: #b45309;
        --gw-nl-bg: rgba(232, 89, 12, 0.15); --gw-nl-bo: rgba(232, 89, 12, 0.4); --gw-nl: #fb923c;
        --gw-fr-bg: rgba(79, 70, 229, 0.15); --gw-fr-bo: rgba(79, 70, 229, 0.4); --gw-fr: #a5b4fc;
        --gw-accent-bg: rgba(5, 150, 105, 0.15); --gw-accent-bo: rgba(5, 150, 105, 0.4); --gw-accent: #6ee7b7;
        --gw-card-hover: rgba(255,255,255,0.04); --gw-table-hover: rgba(255,255,255,0.06);
      }
      .gw-wrap * { box-sizing: border-box; }

      .gw-hero {
        background: linear-gradient(135deg, var(--gw-accent-bg) 0%, var(--gw-bg2) 100%);
        border: 1.5px solid var(--gw-border); border-radius: 22px;
        padding: 28px 24px; margin-bottom: 24px; text-align: center;
        position: relative; overflow: hidden;
      }
      .gw-hero::before {
        content: ''; position: absolute; top: -40%; right: -40%; width: 220px; height: 220px;
        background: radial-gradient(circle, var(--gw-accent) 0%, transparent 70%);
        opacity: 0.1; border-radius: 50%; pointer-events: none;
      }
      .gw-hero h1 {
        font-family: 'Libre Baskerville', serif; font-size: 2.1rem; margin: 0 0 10px;
        color: var(--gw-text); font-weight: 800; letter-spacing: -0.02em; position: relative;
      }
      .gw-hero p { color: var(--gw-text2); margin: 0; font-weight: 500; font-size: 1.08rem; position: relative; }

      .gw-section {
        background: var(--gw-bg2); border: 1.5px solid var(--gw-border);
        border-radius: 20px; padding: 26px 28px; margin-bottom: 20px;
        transition: transform 0.25s ease, box-shadow 0.25s ease;
      }
      .gw-section:hover { box-shadow: 0 8px 30px var(--shadow); transform: translateY(-3px); }
      .gw-section h2 {
        font-family: 'Libre Baskerville', serif; font-size: 1.55rem; margin: 0 0 22px;
        padding-bottom: 14px; border-bottom: 2px solid var(--gw-border); color: var(--gw-text);
      }
      .gw-section h3 { color: var(--gw-accent); font-size: 1.3rem; margin: 28px 0 14px; font-weight: 700; }
      .gw-section h4 { margin: 20px 0 10px; font-weight: 700; color: var(--gw-text); font-size: 1.05rem; }
      .gw-section p { margin: 0 0 14px; color: var(--gw-text); }
      .gw-section ul, .gw-section ol { margin: 10px 0 18px 28px; padding: 0; }
      .gw-section li { margin-bottom: 8px; color: var(--gw-text); line-height: 1.6; }
      .gw-section em { color: var(--gw-accent); font-style: italic; }
      .gw-section strong { font-weight: 800; color: var(--gw-text); }

      .gw-card {
        background: var(--gw-bg); border: 1.5px solid var(--gw-border);
        border-radius: 16px; padding: 22px; margin: 20px 0; color: var(--gw-text);
      }
      .gw-card--rule { border-left: 5px solid var(--gw-accent); background: var(--gw-accent-bg); }
      .gw-card--warn { background: var(--gw-warn-bg); border: 1.5px solid var(--gw-warn); }
      .gw-card--check { background: linear-gradient(145deg, var(--gw-bg), var(--gw-bg2)); }
      .gw-card--tip { border-left: 5px solid var(--gw-fr); background: var(--gw-fr-bg); }
      .gw-card-title { font-weight: 800; font-size: 1.1rem; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
      .gw-card ul { margin: 10px 0 0 22px !important; padding: 0 !important; }

    <div class="gw-wrap">
      <div class="gw-hero">
        <h1>📘 Tegenwoordige Tijd (O.T.T.)</h1>
        <p>De basis van elke Nederlandse zin — Alles wat nu, altijd of straks gebeurt</p>
      </div>

      <div class="gw-section">
        <p>Natuurlijk! Na de lidwoorden is de <strong>tegenwoordige tijd</strong> (o.t.t. - onvoltooid tegenwoordige tijd) de basis van elke Nederlandse zin. Het lijkt simpel (<em>ik loop, jij loopt</em>), maar er zitten verrassend veel nuances, uitzonderingen en speciale toepassingen in.</p>
        <p>Hier is de ultieme, complete gids voor de Nederlandse tegenwoordige tijd, met alle regels, alle valkuilen en <strong>héél véél voorbeelden</strong>.</p>
      </div>

      <div class="gw-section">
        <h2>📖 Deel 1: De Basisregel – De Stam vinden</h2>
        <p>Om de tegenwoordige tijd te kunnen vervormen, moet je eerst de <strong>stam</strong> van het werkwoord vinden. Dit is de ruwe vorm zonder <code class="gw-code">-en</code>.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Heel Werkwoord</th><th>Min <code>-en</code></th><th>= Stam</th><th>Let op! Spellingregel</th></tr></thead>
            <tbody>
              <tr><td><strong>werken</strong></td><td>werk</td><td><strong>werk</strong></td><td>Makkelijk.</td></tr>
              <tr><td><strong>fietsen</strong></td><td>fiets</td><td><strong>fiets</strong></td><td>Makkelijk.</td></tr>
              <tr><td><strong>lopen</strong></td><td>lop</td><td><strong>loop</strong></td><td><em>Lange klinker moet lang blijven, dus dubbele 'o'.</em></td></tr>
              <tr><td><strong>weten</strong></td><td>wet</td><td><strong>weet</strong></td><td><em>Lange klinker moet lang blijven, dus dubbele 'e'.</em></td></tr>
              <tr><td><strong>bakken</strong></td><td>bakk</td><td><strong>bak</strong></td><td><em>Korte klinker kan geen dubbele medeklinker hebben aan het eind.</em></td></tr>
              <tr><td><strong>reizen</strong></td><td>reiz</td><td><strong>reis</strong></td><td><em>'z' kan niet aan het eind van een woord staan, wordt 's'.</em></td></tr>
              <tr><td><strong>leven</strong></td><td>lev</td><td><strong>leef</strong></td><td><em>'v' kan niet aan het eind van een woord staan, wordt 'f'.</em></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="gw-section">
        <h2>📝 Deel 2: De Vervoegingstabel (Standaard)</h2>
        <p>Dit is de tabel die je uit je hoofd moet kennen. Hij werkt voor 99% van de Nederlandse werkwoorden.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Persoon</th><th>Regel</th><th>Voorbeeld (Werken)</th><th>Voorbeeld (Fietsen)</th></tr></thead>
            <tbody>
              <tr><td><strong>Ik</strong></td><td><strong>STAM</strong></td><td>Ik <strong>werk</strong>.</td><td>Ik <strong>fiets</strong>.</td></tr>
              <tr><td><strong>Jij / U</strong></td><td><strong>STAM + T</strong></td><td>Jij <strong>werkt</strong>. / U <strong>werkt</strong>.</td><td>Jij <strong>fiets</strong>t.</td></tr>
              <tr><td><strong>Hij / Zij / Het</strong></td><td><strong>STAM + T</strong></td><td>Hij <strong>werkt</strong>.</td><td>Het <strong>fiets</strong>t.</td></tr>
              <tr><td><strong>Wij</strong></td><td><strong>HELE WERKWOORD</strong></td><td>Wij <strong>werken</strong>.</td><td>Wij <strong>fietsen</strong>.</td></tr>
              <tr><td><strong>Jullie</strong></td><td><strong>HELE WERKWOORD</strong></td><td>Jullie <strong>werken</strong>.</td><td>Jullie <strong>fietsen</strong>.</td></tr>
              <tr><td><strong>Zij</strong> (meervoud)</td><td><strong>HELE WERKWOORD</strong></td><td>Zij <strong>werken</strong>.</td><td>Zij <strong>fietsen</strong>.</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="gw-section">
        <h2>⚠️ Deel 3: De Beruchte Uitzondering – Inversie met 'Je'/'Jij'</h2>
        <p>Dit is de <strong>#1 fout</strong> die zelfs vergevorderde leerders maken. De regel is simpel maar onnatuurlijk:</p>
        
        <div class="gw-card gw-card--rule">
          <div class="gw-card-title">✨ De Inversie-Regel:</div>
          <p style="margin:0; color:var(--gw-text)">Als het onderwerp <strong>'je'</strong> of <strong>'jij'</strong> <strong>ACHTER</strong> de persoonsvorm staat, <strong>valt de -T weg</strong>.</p>
        </div>

        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Normale volgorde (Onderwerp eerst)</th><th>Inversie / Vraagzin (Onderwerp na de PV)</th></tr></thead>
            <tbody>
              <tr><td>Jij <strong>loop</strong><strong>t</strong> snel.</td><td><strong>Loop</strong> jij snel? <em>(NIET: Loop<strong>t</strong> jij)</em></td></tr>
              <tr><td>Je <strong>werk</strong><strong>t</strong> hard.</td><td>Morgen <strong>werk</strong> je hard. <em>(NIET: Werk<strong>t</strong> je morgen)</em></td></tr>
              <tr><td>Je <strong>word</strong><strong>t</strong> moe.</td><td><strong>Word</strong> je moe?</td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-note">⚠️ <strong>Let op:</strong> Dit geldt <strong>ALLEEN</strong> voor de onbenadrukte vormen <strong>'je'</strong> en <strong>'jij'</strong>. Bij <strong>'u'</strong> blijft de -t <strong>altijd</strong> staan: <em>"Loopt u?"</em>, <em>"Werkt u?"</em>.</div>
      </div>

      <div class="gw-section">
        <h2>🔄 Deel 4: Werkwoorden op -EN met een 'D'- of 'T'-Stam</h2>
        <p>Sommige stammen eindigen op een <code class="gw-code">-d</code> of <code class="gw-code">-t</code>. In de hij/zij/het vorm (stam + t) moet je extra opletten op de uitspraak. Je schrijft precies wat je hoort.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Heel Werkwoord</th><th>Stam</th><th>Ik-vorm</th><th>Jij/Hij-vorm</th><th>Uitleg</th></tr></thead>
            <tbody>
              <tr><td><strong>worden</strong></td><td>word</td><td>ik word</td><td>hij <strong>wordt</strong></td><td><em>Je hoort de 't' aan het eind, dus je schrijft hem.</em></td></tr>
              <tr><td><strong>praten</strong></td><td>praat</td><td>ik praat</td><td>hij <strong>praat</strong></td><td><em>Stam eindigt al op -t. Je voegt geen extra -t toe. Je schrijft dus GEEN 'praatt'.</em></td></tr>
              <tr><td><strong>antwoorden</strong></td><td>antwoord</td><td>ik antwoord</td><td>hij <strong>antwoordt</strong></td><td><em>Je hoort duidelijk een 't' (antwoort).</em></td></tr>
              <tr><td><strong>eten</strong></td><td>eet</td><td>ik eet</td><td>hij <strong>eet</strong></td><td><em>Stam eindigt op -t, dus geen extra -t.</em></td></tr>
              <tr><td><strong>vinden</strong></td><td>vind</td><td>ik vind</td><td>hij <strong>vindt</strong></td><td><em>Je zegt 'vint'.</em></td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-card gw-card--tip" style="margin-top:16px;">
          <div class="gw-card-title">💡 Trucje voor 'Hij vindt' of 'Hij onthoudt':</div>
          <p style="margin:0; color:var(--gw-text)">Vervang het werkwoord door <strong>'lopen'</strong> (want 'loop' eindigt niet op d/t).<br>
          <em>Zin:</em> Hij vind<strong>t</strong> het leuk.<br>
          <em>Test:</em> Hij loop<strong>t</strong> het leuk. → Je hoort een 't'. Dus: vind<strong>t</strong>.</p>
        </div>
      </div>

      <div class="gw-section">
        <h2>🚫 Deel 5: Onregelmatige Werkwoorden</h2>
        <p>Gelukkig zijn er maar een paar écht onregelmatige werkwoorden in de tegenwoordige tijd. De belangrijkste zijn:</p>
        
        <h3>1. ZIJN (Het meest onregelmatig)</h3>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Persoon</th><th>Vervoeging</th></tr></thead>
            <tbody>
              <tr><td><strong>Ik</strong></td><td><strong>ben</strong></td></tr>
              <tr><td><strong>Jij/U</strong></td><td><strong>bent</strong></td></tr>
              <tr><td><strong>Hij/Zij/Het</strong></td><td><strong>is</strong></td></tr>
              <tr><td><strong>Wij/Jullie/Zij</strong></td><td><strong>zijn</strong></td></tr>
            </tbody>
          </table>
        </div>

        <h3>2. HEBBEN</h3>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Persoon</th><th>Vervoeging</th></tr></thead>
            <tbody>
              <tr><td><strong>Ik</strong></td><td><strong>heb</strong></td></tr>
              <tr><td><strong>Jij/U</strong></td><td><strong>hebt</strong> (of: <em>U hebt / U heeft</em>)</td></tr>
              <tr><td><strong>Hij/Zij</strong></td><td><strong>heeft</strong></td></tr>
              <tr><td><strong>Wij/Jullie/Zij</strong></td><td><strong>hebben</strong></td></tr>
            </tbody>
          </table>
        </div>

        <h3>3. KUNNEN (Geen -T in de derde persoon!)</h3>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Persoon</th><th>Vervoeging</th></tr></thead>
            <tbody>
              <tr><td><strong>Ik</strong></td><td><strong>kan</strong></td></tr>
              <tr><td><strong>Jij/U</strong></td><td><strong>kunt</strong> (of: <em>Jij kan</em> is informeel)</td></tr>
              <tr><td><strong>Hij/Zij</strong></td><td><strong>kan</strong> <em>(Let op: GEEN 'kant'!)</em></td></tr>
              <tr><td><strong>Wij</strong></td><td><strong>kunnen</strong></td></tr>
            </tbody>
          </table>
        </div>

        <h3>4. WILLEN (Geen -T in de derde persoon!)</h3>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Persoon</th><th>Vervoeging</th></tr></thead>
            <tbody>
              <tr><td><strong>Ik</strong></td><td><strong>wil</strong></td></tr>
              <tr><td><strong>Jij/U</strong></td><td><strong>wilt</strong> (of: <em>U wil</em>)</td></tr>
              <tr><td><strong>Hij/Zij</strong></td><td><strong>wil</strong> <em>(Let op: GEEN 'willt'!)</em></td></tr>
              <tr><td><strong>Wij</strong></td><td><strong>willen</strong></td></tr>
            </tbody>
          </table>
        </div>

        <h3>5. ZULLEN & 6. MOGEN</h3>
        <div class="gw-grid-2" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(250px,1fr)); gap:16px; margin:16px 0;">
          <div class="gw-card">
            <h4 style="margin-top:0;">ZULLEN</h4>
            <ul style="margin:0;"><li><strong>Ik</strong> → <strong>zal</strong></li><li><strong>Jij/U</strong> → <strong>zult</strong> (of: <em>Jij zal</em>)</li><li><strong>Hij/Zij</strong> → <strong>zal</strong></li><li><strong>Wij</strong> → <strong>zullen</strong></li></ul>
          </div>
          <div class="gw-card">
            <h4 style="margin-top:0;">MOGEN</h4>
            <ul style="margin:0;"><li><strong>Ik</strong> → <strong>mag</strong></li><li><strong>Jij/U</strong> → <strong>mag</strong> (informeel ook wel 'moogt')</li><li><strong>Hij/Zij</strong> → <strong>mag</strong></li><li><strong>Wij</strong> → <strong>mogen</strong></li></ul>
          </div>
        </div>
      </div>

      <div class="gw-section">
        <h2>🚀 Deel 6: Bijzondere Gebruikswijzen van de Tegenwoordige Tijd</h2>
        <p>De tegenwoordige tijd wordt niet alleen gebruikt voor dingen die <em>nu</em> gebeuren. Hier zijn drie belangrijke extra functies:</p>
        
        <h3>A. De Toekomst (Futurum)</h3>
        <p>Als er een tijdsbepaling in de zin staat, kun je de tegenwoordige tijd gebruiken om over de toekomst te praten.</p>
        <div class="gw-example">
          <span class="orig">📌 Ik <strong>ga</strong> <strong>morgen</strong> naar de film. <em>(Niet: Ik zal morgen gaan)</em></span>
          <span class="orig" style="margin-top:4px;">📌 <strong>Volgende week</strong> <strong>vertrekken</strong> wij naar Spanje.</span>
          <span class="orig" style="margin-top:4px;">📌 <strong>Over een uur</strong> <strong>begint</strong> de les.</span>
        </div>

        <h3>B. Historisch Presens (Levendig Verleden)</h3>
        <p>Om een verhaal uit het verleden spannender of levendiger te maken, kun je overschakelen op de tegenwoordige tijd.</p>
        <div class="gw-example">
          <span class="orig">📌 <em>Gisteren liep ik op straat. <strong>Komt</strong> er ineens een hond op me af <strong>rennen</strong>! Ik <strong>schrik</strong> me rot!</em></span>
          <span class="trans" style="margin-top:6px;">Hoewel het gisteren was, voelt het alsof het nu gebeurt.</span>
        </div>

        <h3>C. Imperatief (Gebiedende Wijs)</h3>
        <p>De beleefde vorm van de gebiedende wijs gebruikt de tegenwoordige tijd van 'u'.</p>
        <div class="gw-example">
          <span class="orig">📌 <strong>Loopt u</strong> maar even door.</span>
          <span class="orig" style="margin-top:4px;">📌 <strong>Pakt u</strong> uw spullen maar.</span>
        </div>
      </div>

      <div class="gw-section">
        <h2>📋 Deel 7: Schema voor Scheidbare Werkwoorden</h2>
        <p>Nederlands zit vol werkwoorden zoals <em>opstaan, aankomen, meenemen</em>. In de tegenwoordige tijd <strong>splijt</strong> het werkwoord.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Heel Werkwoord</th><th>Ik-vorm</th><th>Vraagzin (Inversie)</th></tr></thead>
            <tbody>
              <tr><td><strong>opbellen</strong></td><td>Ik <strong>bel</strong> jou morgen <strong>op</strong>.</td><td><strong>Bel</strong> jij mij morgen <strong>op</strong>?</td></tr>
              <tr><td><strong>aankomen</strong></td><td>De trein <strong>komt</strong> om 3 uur <strong>aan</strong>.</td><td><strong>Komt</strong> de trein al <strong>aan</strong>?</td></tr>
              <tr><td><strong>terugkomen</strong></td><td>Hij <strong>komt</strong> volgende week <strong>terug</strong>.</td><td><strong>Kom</strong> je snel <strong>terug</strong>?</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="gw-section">
        <h2>✍️ Deel 8: Spellingstips & Veelgemaakte Fouten</h2>
        
        <div class="gw-card gw-card--warn">
          <div class="gw-card-title">🚫 Fout 1: Ik wordt</div>
          <p style="margin:0; color:var(--gw-text)"><strong>Juist:</strong> <strong>Ik word</strong> ✅ <em>(Stam, geen t).</em></p>
        </div>

        <div class="gw-card gw-card--warn" style="margin-top:12px;">
          <div class="gw-card-title">🚫 Fout 2: Wordt je broer ook lid?</div>
          <p style="margin:0; color:var(--gw-text)"><strong>Juist:</strong> <strong>Word</strong> je broer ook lid? ✅ <em>(Inversie met 'je').</em></p>
        </div>

        <div class="gw-card gw-card--warn" style="margin-top:12px;">
          <div class="gw-card-title">🚫 Fout 3: Hij verhuist (als in: veranderen van huis)</div>
          <p style="margin:0; color:var(--gw-text)"><strong>Juist:</strong> Hij <strong>verhuist</strong> ✅ <em>(van verhuizen: stam verhuis + t).</em><br><em>Let op: Dit is anders dan "De file verhuist niet" (van verhuizen, dat is een ander woord).</em></p>
        </div>

        <div class="gw-card gw-card--check" style="margin-top:12px;">
          <div class="gw-card-title">🔍 Twijfelgeval: Gebeurt / Gebeurd</div>
          <ul style="margin-top:10px;">
            <li><strong>Gebeurt</strong> (tegenwoordige tijd): <em>"Wat <strong>gebeurt</strong> er?"</em> (Stam: gebeuren).</li>
            <li><strong>Gebeurd</strong> (voltooid deelwoord): <em>"Het is <strong>gebeurd</strong>."</em></li>
          </ul>
        </div>
      </div>

      <div class="gw-section">
        <h2>💡 Pro-tip: De 'Smurfen'-Regel</h2>
        <div class="gw-card gw-card--rule">
          <div class="gw-card-title">✨ De Smurfen-Truc:</div>
          <p style="margin:0; color:var(--gw-text)">Als je bij een moeilijk werkwoord niet weet of er een T achter moet, vervang het dan in je hoofd door het werkwoord <strong>'smurfen'</strong> (of lopen/werken).</p>

    <div class="gw-wrap">
      <div class="gw-hero">
        <h1>🗓️ Toekomende Tijd</h1>
        <p>Zullen, gaan en alle vormen van toekomst — Flexibel Nederlands</p>
      </div>

      <div class="gw-section">
        <p>Na de tegenwoordige, verleden en voltooide tijden is het tijd voor de <strong>toekomende tijd</strong> (o.t.t.t. - onvoltooid tegenwoordig toekomende tijd). Het Nederlands is hierin flexibeler dan veel andere talen: we hebben niet één strakke toekomende tijd, maar een heel arsenaal aan manieren om over de toekomst te praten.</p>
        <p>Deze gids behandelt alle vormen: van <strong>zullen</strong> tot <strong>gaan</strong>, van de simpele <strong>tegenwoordige tijd</strong> tot de complexe <strong>voltooid toekomende tijd</strong>, inclusief de bijzondere rol van <strong>zouden</strong> en de valkuilen bij scheidbare werkwoorden.</p>
      </div>

      <div class="gw-section">
        <h2>🗺️ Deel 1: Het Overzicht – Vijf Manieren om Over de Toekomst te Praten</h2>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Manier</th><th>Voorbeeld</th><th>Gebruik / Nuance</th></tr></thead>
            <tbody>
              <tr><td><strong>1. Tegenwoordige tijd + Tijdsbepaling</strong></td><td><em>Morgen <strong>ga</strong> ik naar de film.</em></td><td><strong>Meest gebruikelijk</strong> in spreektaal. Simpel en zeker.</td></tr>
              <tr><td><strong>2. Gaan + Infinitief</strong></td><td><em>Het <strong>gaat regenen</strong>.</em></td><td><strong>Nabije toekomst</strong> of <strong>intentie/plan</strong>.</td></tr>
              <tr><td><strong>3. Zullen + Infinitief</strong></td><td><em>Ik <strong>zal</strong> je morgen <strong>bellen</strong>.</em></td><td><strong>Beloftes</strong>, voorstellen, plechtige taal, of pure toekomst in formele teksten.</td></tr>
              <tr><td><strong>4. Zullen + Voltooid Deelwoord</strong></td><td><em>Morgen <strong>zal</strong> hij <strong>zijn aangekomen</strong>.</em></td><td><strong>Voltooid Toekomende Tijd</strong>: Een actie is in de toekomst afgerond.</td></tr>
              <tr><td><strong>5. Zouden + Infinitief</strong></td><td><em>Ik <strong>zou</strong> het niet <strong>doen</strong>.</em></td><td><strong>Beleefd advies</strong>, <strong>voorwaardelijke toekomst</strong> ("als...dan").</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="gw-section">
        <h2>📖 Deel 2: De Simpele Toekomst – Tegenwoordige Tijd als Futurum</h2>
        <p>Dit is de meest natuurlijke manier voor Nederlanders om over de toekomst te praten. Als er een <strong>tijdsbepaling</strong> in de zin staat die duidelijk naar de toekomst verwijst, is de tegenwoordige tijd vaak genoeg.</p>
        
        <div class="gw-example">
          <span class="orig">📌 Ik <strong>ga</strong> <strong>morgen</strong> naar de tandarts. <em>(Niet: Ik zal morgen gaan naar de tandarts)</em></span>
          <span class="orig" style="margin-top:4px;">📌 <strong>Volgende week</strong> <strong>vertrekken</strong> wij naar Spanje.</span>
          <span class="orig" style="margin-top:4px;">📌 <strong>Over een uur</strong> <strong>begint</strong> de les.</span>
          <span class="orig" style="margin-top:4px;">📌 <strong>Vanavond</strong> <strong>eten</strong> we pizza.</span>
          <span class="orig" style="margin-top:4px;">📌 <strong>Ooit</strong> <strong>word</strong> ik rijk.</span>
        </div>

        <div class="gw-note">⚠️ <strong>Let op:</strong> Zonder tijdsbepaling is dit gewoon de tegenwoordige tijd.<br><em>"Ik <strong>ga</strong> naar de tandarts."</em> (Betekent: Ik ben nu onderweg.)</div>
      </div>

      <div class="gw-section">
        <h2>🚶 Deel 3: "Gaan" + Infinitief – Intentie en Nabije Toekomst</h2>
        <p>Het hulpwerkwoord <strong>gaan</strong> geeft aan dat iets <strong>staat te gebeuren</strong> of dat je een <strong>concreet plan</strong> hebt. Het is informeler en directer dan "zullen".</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Persoon</th><th>Vervoeging "Gaan"</th><th>Infinitief</th><th>Voorbeeldzin</th></tr></thead>
            <tbody>
              <tr><td><strong>Ik</strong></td><td><strong>ga</strong></td><td>werken</td><td><em>"Ik <strong>ga</strong> nu <strong>werken</strong>."</em></td></tr>
              <tr><td><strong>Jij/U</strong></td><td><strong>gaat</strong></td><td>slapen</td><td><em>"<strong>Ga</strong> jij <strong>slapen</strong>?" <small>(Inversie, dus geen 't')</small></em></td></tr>
              <tr><td><strong>Hij/Zij/Het</strong></td><td><strong>gaat</strong></td><td>regenen</td><td><em>"Het <strong>gaat</strong> <strong>regenen</strong>."</em></td></tr>
              <tr><td><strong>Wij</strong></td><td><strong>gaan</strong></td><td>winnen</td><td><em>"Wij <strong>gaan</strong> <strong>winnen</strong>!"</em></td></tr>
            </tbody>
          </table>
        </div>

        <h3 style="margin-top:20px;">✅ Wanneer gebruik je "Gaan"?</h3>
        <ol>
          <li><strong>Intentie / Besluit:</strong> <em>"Ik <strong>ga</strong> stoppen met roken."</em></li>
          <li><strong>Directe / Nabije Toekomst:</strong> <em>"Pas op! Je <strong>gaat</strong> vallen!"</em></li>
          <li><strong>Voorspelling op basis van bewijs:</strong> <em>"Kijk naar die wolken. Het <strong>gaat</strong> zo <strong>stormen</strong>."</em></li>
        </ol>

        <div class="gw-card gw-card--warn" style="margin-top:16px;">
          <div class="gw-card-title">⚠️ Gevorderde Regel: "Gaan" bij Scheidbare Werkwoorden</div>
          <p style="margin:0; color:var(--gw-text)">Als je "gaan" combineert met een scheidbaar werkwoord (zoals <em>opbellen, meenemen</em>), schuift het hele scheidbare werkwoord naar het einde <strong>als één ongesplitst geheel</strong>.</p>
        </div>
        <div class="gw-example" style="margin-top:12px;">
          <span class="orig">📌 Ik <strong>ga</strong> je morgen <strong>opbellen</strong>. <em>(Niet: Ik ga je morgen op bellen)</em></span>
          <span class="orig" style="margin-top:4px;">📌 Wij <strong>gaan</strong> de hond <strong>uitlaten</strong>.</span>
          <span class="orig" style="margin-top:4px;">📌 Hij <strong>gaat</strong> de vaatwasser <strong>inruimen</strong>.</span>
        </div>
      </div>

      <div class="gw-section">
        <h2>👑 Deel 4: "Zullen" + Infinitief – De Officiële Toekomende Tijd</h2>
        <p><strong>Zullen</strong> is het klassieke hulpwerkwoord van de toekomende tijd. Het klinkt iets formeler, plechtiger, of dwingender.</p>
        
        <h3>📋 Vervoeging van "Zullen":</h3>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Persoon</th><th>Vervoeging</th></tr></thead>
            <tbody>
              <tr><td><strong>Ik</strong></td><td><strong>zal</strong></td></tr>
              <tr><td><strong>Jij / U</strong></td><td><strong>zult</strong> (of informeler: <em>jij zal</em>) / <strong>zult u</strong></td></tr>
              <tr><td><strong>Hij / Zij / Het</strong></td><td><strong>zal</strong></td></tr>
              <tr><td><strong>Wij / Jullie / Zij</strong></td><td><strong>zullen</strong></td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">📌 Ik <strong>zal</strong> je morgen <strong>bellen</strong>. <em>(Belofte)</em></span>
          <span class="orig" style="margin-top:4px;">📌 <strong>Zullen</strong> we naar de film <strong>gaan</strong>? <em>(Voorstel)</em></span>
          <span class="orig" style="margin-top:4px;">📌 De koning <strong>zal</strong> de tentoonstelling <strong>openen</strong>. <em>(Formeel)</em></span>
          <span class="orig" style="margin-top:4px;">📌 Dat <strong>zal</strong> wel <strong>loslopen</strong>. <em>(Vaste uitdrukking)</em></span>
        </div>

        <div class="gw-card gw-card--tip" style="margin-top:16px;">
          <div class="gw-card-title">📍 Let op de Woordvolgorde met "Zullen":</div>
          <p style="margin:0; color:var(--gw-text)">Het hoofdwerkwoord (de infinitief) staat <strong>helemaal aan het einde</strong> van de zin. Dit kan in lange zinnen voor verwarring zorgen.</p>
        </div>
        <div class="gw-example" style="margin-top:12px;">
          <span class="orig">📌 <em>Ik <strong>zal</strong> je het boek dat ik gisteren gekocht heb morgen <strong>geven</strong>.</em></span>
        </div>

        <h4 style="margin-top:20px;">🔀 Scheidbare Werkwoorden met "Zullen":</h4>
        <p>Net als bij "gaan" blijft het scheidbare werkwoord aan het einde <strong>ongesplitst</strong>.</p>
        <div class="gw-example">
          <span class="orig">📌 Ik <strong>zal</strong> je straks <strong>opbellen</strong>.</span>
          <span class="orig" style="margin-top:4px;">📌 <strong>Zullen</strong> we de hond straks <strong>uitlaten</strong>?</span>
        </div>
      </div>

      <div class="gw-section">
        <h2>🎭 Deel 5: "Zouden" – De Voorwaardelijke en Beleefde Toekomst</h2>
        <p><strong>Zouden</strong> is de verleden tijd van <strong>zullen</strong>, maar het wordt gebruikt voor situaties die <strong>niet zeker</strong> zijn, <strong>beleefd</strong> zijn, of <strong>afhankelijk</strong> van een voorwaarde.</p>
        
        <h3>📋 Vervoeging van "Zouden":</h3>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Persoon</th><th>Vervoeging</th></tr></thead>
            <tbody>
              <tr><td><strong>Ik</strong></td><td><strong>zou</strong></td></tr>
              <tr><td><strong>Jij / U</strong></td><td><strong>zou</strong> / <strong>zou u</strong></td></tr>
              <tr><td><strong>Hij / Zij</strong></td><td><strong>zou</strong></td></tr>
              <tr><td><strong>Wij</strong></td><td><strong>zouden</strong></td></tr>
            </tbody>
          </table>
        </div>

        <h3 style="margin-top:20px;">✨ Drie Belangrijkste Gebruikswijzen:</h3>
        <ol>
          <li><strong>Beleefd Verzoek / Advies:</strong><br><em>"<strong>Zou</strong> u het raam dicht willen doen?"</em> (Beleefder dan "Wilt u...")<br><em>"Ik <strong>zou</strong> het niet doen als ik jou was."</em> (Advies)<br><em>"<strong>Zou</strong> je misschien wat stiller kunnen zijn?"</em></li>
          <li><strong>Irrealis / Voorwaardelijke Zinnen ("Als... dan..."):</strong><br><em>"Als ik veel geld <strong>had</strong>, <strong>zou</strong> ik een groot huis <strong>kopen</strong>."</em><br><em>"<strong>Zou</strong> je het leuk <strong>vinden</strong> als ik meeging?"</em><br><em>"Dat <strong>zou</strong> ik niet <strong>zeggen</strong>."</em></li>
          <li><strong>Twijfel of Onzekerheid over de Toekomst:</strong><br><em>"Het <strong>zou</strong> morgen wel eens kunnen gaan regenen."</em><br><em>"Hij <strong>zou</strong> vandaag komen, maar ik heb hem nog niet gezien."</em></li>
        </ol>
      </div>

      <div class="gw-section">
        <h2>⏳ Deel 6: De Voltooid Toekomende Tijd (Futurum Exactum)</h2>
        <p>Deze tijd gebruik je om te zeggen dat een actie in de toekomst <strong>voltooid</strong> zal zijn vóór een ander toekomstig moment.</p>
        
        <div class="gw-card gw-card--rule">
          <div class="gw-card-title">✨ Formule:</div>
          <p style="margin:0; color:var(--gw-text)"><strong>Zullen</strong> + <strong>(hebben/zijn)</strong> + <strong>Voltooid Deelwoord</strong></p>
        </div>

        <p style="margin-top:16px;">Dit is de moeilijkste constructie qua woordvolgorde. Het schema:</p>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Persoon</th><th>Hulpwerkwoord</th><th>Infinitief vh Hulpww</th><th>Rest vd Zin</th><th>Voltooid Deelwoord</th></tr></thead>
            <tbody>
              <tr><td><strong>Ik</strong></td><td><strong>zal</strong></td><td><strong>hebben</strong></td><td>mijn huiswerk om 8 uur</td><td><strong>gemaakt</strong>.</td></tr>
              <tr><td><strong>Wij</strong></td><td><strong>zullen</strong></td><td><strong>zijn</strong></td><td>morgen om deze tijd</td><td><strong>aangekomen</strong>.</td></tr>
              <tr><td><strong>Jij</strong></td><td><strong>zult</strong></td><td><strong>hebben</strong></td><td>het geld dan al</td><td><strong>ontvangen</strong>.</td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">📌 <strong>Bel</strong> me niet om 6 uur, want dan <strong>zal</strong> ik nog niet thuis <strong>zijn gekomen</strong>.</span>
          <span class="orig" style="margin-top:4px;">📌 <strong>Volgend jaar</strong> om deze tijd <strong>zullen</strong> wij het huis <strong>hebben verkocht</strong>.</span>
          <span class="orig" style="margin-top:4px;">📌 <strong>Over een maand</strong> <strong>zal</strong> hij <strong>zijn afgestudeerd</strong>.</span>
        </div>

        <div class="gw-card gw-card--warn" style="margin-top:16px;">
          <div class="gw-card-title">⚠️ Valkuil: Scheidbare Werkwoorden in de V.Tk.T.</div>
          <p style="margin:0; color:var(--gw-text)">Het voltooid deelwoord van een scheidbaar werkwoord staat nog steeds aan het einde, maar het is gesplitst van het hulpwerkwoord.</p>
        </div>
        <div class="gw-example" style="margin-top:12px;">
          <span class="orig">📌 Ik <strong>zal</strong> het geld morgen <strong>hebben</strong> <strong>terugbetaald</strong>.</span>
          <span class="orig" style="margin-top:4px;">📌 De trein <strong>zal</strong> om 3 uur <strong>zijn</strong> <strong>aangekomen</strong>.</span>
        </div>
      </div>

      <div class="gw-section">
        <h2>🧩 Deel 7: De Voltooid Verleden Toekomende Tijd (Conditionalis Perfectum)</h2>
        <p>Dit is de tijd van de <strong>gemiste kans</strong> of de <strong>voorwaarde in het verleden</strong>. Je gebruikt <strong>zouden</strong> in plaats van <strong>zullen</strong>.</p>
        
        <div class="gw-card gw-card--rule">
          <div class="gw-card-title">✨ Formule:</div>
          <p style="margin:0; color:var(--gw-text)"><strong>Zouden</strong> + <strong>(hebben/zijn)</strong> + <strong>Voltooid Deelwoord</strong></p>
        </div>

        <div class="gw-table-wrap" style="margin-top:16px;">
          <table class="gw-table">
            <thead><tr><th>Persoon</th><th>Hulpwerkwoord</th><th>Infinitief vh Hulpww</th><th>Voltooid Deelwoord</th><th>Rest</th></tr></thead>
            <tbody>
              <tr><td><strong>Ik</strong></td><td><strong>zou</strong></td><td><strong>hebben</strong></td><td><strong>geholpen</strong></td><td>als ik tijd had gehad.</td></tr>
              <tr><td><strong>Wij</strong></td><td><strong>zouden</strong></td><td><strong>zijn</strong></td><td><strong>gegaan</strong></td><td>als het niet regende.</td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">📌 <em>Als ik de loterij <strong>had</strong> gewonnen, <strong>zou</strong> ik een eiland <strong>hebben gekocht</strong>.</em> <small>(Maar dat is niet gebeurd.)</small></span>
          <span class="orig" style="margin-top:4px;">📌 <strong>Zou</strong> jij dat ook <strong>hebben gedaan</strong>?</span>
          <span class="orig" style="margin-top:4px;">📌 Hij <strong>zou</strong> gisteren <strong>zijn gekomen</strong>, maar hij werd ziek. <small>(Plan in het verleden ging niet door.)</small></span>
        </div>
      </div>

      <div class="gw-section">
        <h2>📊 Deel 8: Vergelijkingstabel Toekomende Tijden</h2>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Tijd</th><th>Constructie</th><th>Gebruik</th><th>Voorbeeldzin</th></tr></thead>
            <tbody>
              <tr><td><strong>Onvoltooid Teg. Toekomst (OTTkT)</strong></td><td>Zullen + Infinitief</td><td>Belofte, formeel</td><td><em>Ik <strong>zal</strong> komen.</em></td></tr>
              <tr><td><strong>Onvoltooid Teg. Toekomst (Spreektaal)</strong></td><td>Gaan + Infinitief</td><td>Intentie, nabij</td><td><em>Ik <strong>ga</strong> even boodschappen <strong>doen</strong>.</em></td></tr>
              <tr><td><strong>Onvoltooid Teg. Toekomst (Simpel)</strong></td><td>Tegenwoordige Tijd + Tijdsbepaling</td><td>Neutraal, zeker</td><td><em>Ik <strong>kom</strong> <strong>morgen</strong>.</em></td></tr>
              <tr><td><strong>Voltooid Teg. Toekomst (VTTkT)</strong></td><td>Zullen + Hebben/Zijn + VD</td><td>Toekomstige actie is afgerond</td><td><em>Volgende week <strong>zal</strong> ik alles <strong>hebben ingeleverd</strong>.</em></td></tr>
              <tr><td><strong>Onvoltooid Verl. Toekomst (OVTkT)</strong></td><td>Zouden + Infinitief</td><td>Beleefd, voorwaardelijk</td><td><em>Ik <strong>zou</strong> het niet <strong>weten</strong>.</em></td></tr>
              <tr><td><strong>Voltooid Verl. Toekomst (VVTkT)</strong></td><td>Zouden + Hebben/Zijn + VD</td><td>Gemiste kans, verleden voorwaarde</td><td><em>Ik <strong>zou</strong> het <strong>hebben gedaan</strong>.</em></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="gw-section">
        <h2>⚠️ Deel 9: Veelgemaakte Fouten & Specifieke Gevallen</h2>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Fout ❌</th><th>Correctie ✅</th><th>Uitleg</th></tr></thead>
            <tbody>
              <tr><td>*Ik ga morgen opbellen hem.*</td><td>Ik <strong>ga</strong> hem morgen <strong>opbellen</strong>.</td><td>Infinitief aan het eind!</td></tr>
              <tr><td>*Zult u het raam dicht doen?*</td><td><strong>Zou</strong> u het raam dicht willen doen? / <strong>Wilt</strong> u het raam dicht doen?</td><td>In vraagvorm met 'u' is "zult u" ouderwets.</td></tr>
              <tr><td>*Als ik jou was, zal ik het doen.*</td><td>Als ik jou was, <strong>zou</strong> ik het <strong>doen</strong>.</td><td>Irrealis vraagt om 'zouden'.</td></tr>
              <tr><td>*Morgen zal ik hebben aangekomen.*</td><td>Morgen <strong>zal</strong> ik <strong>zijn aangekomen</strong>.</td><td>"Aankomen" is een ZIJN-werkwoord.</td></tr>
            </tbody>
          </table>
        </div>

        <h3 style="margin-top:20px;">🤔 Twijfel: Gaan of Zullen bij het Weer?</h3>
        <ul>
          <li><em>"Het <strong>gaat</strong> regenen."</em> (Je ziet de wolken al. Nabije toekomst.)</li>
          <li><em>"Het <strong>zal</strong> morgen regenen."</em> (Weersverwachting op het journaal. Formele voorspelling.)</li>
          <li><em>"Het <strong>zou</strong> morgen kunnen gaan regenen."</em> (Onzekere voorspelling.)</li>
        </ul>
      </div>

      <div class="gw-section">
        <h2>💡 Deel 10: Pro-tips & Ezelsbruggetjes</h2>
        <ol>
          <li><strong>De 80%-Regel:</strong> In 80% van de dagelijkse gesprekken kun je volstaan met <strong>"Gaan"</strong> of <strong>Tegenwoordige Tijd + Tijdsbepaling</strong>. Bewaar <strong>"Zullen"</strong> voor plechtige beloftes of formele mails.</li>
          <li><strong>De Plaats van de Infinitief:</strong> Denk aan de Nederlandse zin als een soort hond die aan het eind van de zin pas blaft. Alle werkwoorden (behalve de persoonsvorm) staan <strong>achteraan</strong>.<br><em>"Ik <strong>zal</strong> [ ... heel veel andere woorden ... ] <strong>geven</strong>."</em></li>

    <div class="gw-wrap">
      <div class="gw-hero">
        <h1>🪞 Wederkerende Werkwoorden</h1>
        <p>Zich wassen, zich vergissen, zich haasten — De actie kaatst terug op jezelf</p>
      </div>

      <div class="gw-section">
        <p>Heel graag! Na de scheidbare werkwoorden is dit het perfecte moment om de <strong>wederkerende werkwoorden</strong> tot in de finesses te doorgronden. Deze werkwoorden hebben een speciaal spiegeltje nodig: het <strong>wederkerend voornaamwoord</strong> (<em>me, je, zich, ons</em>).</p>
        <p>Ze vertellen je dat de actie <strong>terugkaatst op de spreker zelf</strong>. Deze gids is een volledig, foutloos en rijk geïllustreerd overzicht, boordevol prachtige voorbeelden.</p>
      </div>

      <div class="gw-section">
        <h2>🪞 Deel 1: Wat is een Wederkerend Werkwoord?</h2>
        <p>Een wederkerend werkwoord heeft altijd een <strong>wederkerend voornaamwoord</strong> bij zich. Dit voornaamwoord verwijst naar hetzelfde als het onderwerp.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Normaal Werkwoord</th><th>Wederkerend Werkwoord</th><th>Het Verschil</th></tr></thead>
            <tbody>
              <tr><td>Ik <strong>was</strong> de auto. <em>(Object = auto)</em></td><td>Ik <strong>was me</strong>. <em>(Object = mezelf)</em></td><td>Actie op ander vs. actie op jezelf</td></tr>
              <tr><td>Hij <strong>scheert</strong> zijn vader.</td><td>Hij <strong>scheert zich</strong>.</td><td>—</td></tr>
              <tr><td>Wij <strong>vergissen</strong> nooit iemand.</td><td>Wij <strong>vergissen ons</strong>.</td><td>—</td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-note">💡 <strong>Herkenning:</strong> Je herkent ze in het woordenboek aan het woordje <strong>'zich'</strong> ervoor: <em>zich wassen, zich vergissen, zich haasten</em>.</div>
      </div>

      <div class="gw-section">
        <h2>👥 Deel 2: De Wederkerende Voornaamwoorden (Het Spiegeltje)</h2>
        <p>Deze kleine woordjes moet je kennen. Ze veranderen per persoon.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Persoon</th><th>Onderwerp</th><th>Wederkerend Vnw.</th><th>Voorbeeld</th></tr></thead>
            <tbody>
              <tr><td><strong>1e enk.</strong></td><td><strong>Ik</strong></td><td><strong>me</strong></td><td>Ik vergis <strong>me</strong>.</td></tr>
              <tr><td><strong>2e enk. (informeel)</strong></td><td><strong>Jij / Je</strong></td><td><strong>je</strong></td><td>Jij vergist <strong>je</strong>.</td></tr>
              <tr><td><strong>2e enk. (formeel)</strong></td><td><strong>U</strong></td><td><strong>zich</strong></td><td>U vergist <strong>zich</strong>.</td></tr>
              <tr><td><strong>3e enk.</strong></td><td><strong>Hij / Zij / Het</strong></td><td><strong>zich</strong></td><td>Hij vergist <strong>zich</strong>.</td></tr>
              <tr><td><strong>1e mv.</strong></td><td><strong>Wij / We</strong></td><td><strong>ons</strong></td><td>Wij vergissen <strong>ons</strong>.</td></tr>
              <tr><td><strong>2e mv.</strong></td><td><strong>Jullie</strong></td><td><strong>je</strong></td><td>Jullie vergissen <strong>je</strong>.</td></tr>
              <tr><td><strong>3e mv.</strong></td><td><strong>Zij / Ze</strong></td><td><strong>zich</strong></td><td>Zij vergissen <strong>zich</strong>.</td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-card gw-card--tip" style="margin-top:16px;">
          <div class="gw-card-title">✨ Let op:</div>
          <p style="margin:0; color:var(--gw-text)"><strong>'Zich'</strong> is de ster van de show. Het wordt gebruikt voor <strong>hij, zij, het, u</strong> en <strong>zij (meervoud)</strong>.</p>
        </div>
      </div>

      <div class="gw-section">
        <h2>🎭 Deel 3: De Twee Smaakmakers: Verplicht vs. Optioneel</h2>
        <p>Niet alle wederkerende werkwoorden zijn gelijk. Er zijn twee belangrijke categorieën.</p>
        
        <h3>1️⃣ Verplicht Wederkerend (Het voornaamwoord MOET erbij)</h3>
        <p>Zonder het voornaamwoord bestaat het werkwoord niet, of het betekent iets heel anders. Je kunt deze niet "uitkleden".</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Werkwoord</th><th>Goed ✅</th><th>Fout ❌ (of andere betekenis)</th></tr></thead>
            <tbody>
              <tr><td><strong>zich vergissen</strong></td><td>Ik <strong>vergis me</strong>.</td><td><em>Ik vergis.</em> (Bestaat niet)</td></tr>
              <tr><td><strong>zich schamen</strong></td><td>Zij <strong>schaamt zich</strong>.</td><td><em>Zij schaamt.</em> (Onvolledig)</td></tr>
              <tr><td><strong>zich gedragen</strong></td><td><strong>Gedraag je!</strong></td><td><em>Gedraag!</em> (Kan niet)</td></tr>
              <tr><td><strong>zich haasten</strong></td><td>Wij <strong>haasten ons</strong>.</td><td><em>Wij haasten.</em> (Je haast altijd iemand/iets anders)</td></tr>
              <tr><td><strong>zich bevinden</strong></td><td>Het huis <strong>bevindt zich</strong> in het bos.</td><td><em>Het huis bevindt.</em></td></tr>
            </tbody>
          </table>
        </div>

        <h3 style="margin-top:24px;">2️⃣ Optioneel / Toevallig Wederkerend</h3>
        <p>Dit zijn gewone werkwoorden die je wederkerend kunt <strong>maken</strong> door het voornaamwoord toe te voegen. De actie verandert van een <em>ander</em> naar <em>jezelf</em>.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Werkwoord</th><th>Niet-Wederkerend (Actie op ANDER)</th><th>Wederkerend (Actie op JEZELF)</th></tr></thead>
            <tbody>
              <tr><td><strong>wassen</strong></td><td><em>Ik <strong>was</strong> de auto.</em></td><td><em>Ik <strong>was me</strong>.</em></td></tr>
              <tr><td><strong>scheren</strong></td><td><em>De kapper <strong>scheert</strong> de klant.</em></td><td><em>De klant <strong>scheert zich</strong>.</em></td></tr>
              <tr><td><strong>aankleden</strong></td><td><em>De moeder <strong>kleedt</strong> het kind <strong>aan</strong>.</em></td><td><em>Het kind <strong>kleedt zich aan</strong>.</em></td></tr>
              <tr><td><strong>bewegen</strong></td><td><em>De wind <strong>beweegt</strong> de bladeren.</em></td><td><em>De danser <strong>beweegt zich</strong> gracieus.</em></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="gw-section">
        <h2>📖 Deel 4: De Plaats in de Zin</h2>
        <p>Dit is een belangrijke kwestie van woordvolgorde. In de hoofdzin staat het wederkerend voornaamwoord <strong>direct na de persoonsvorm</strong> (het eerste werkwoord).</p>
        
        <div class="gw-example">
          <span class="orig">📌 Ik <strong>vergis me</strong> nooit.</span>
          <span class="orig" style="margin-top:4px;">📌 Hij <strong>schaamt zich</strong> diep.</span>
          <span class="orig" style="margin-top:4px;">📌 Jullie <strong>haasten je</strong> naar de trein.</span>
        </div>

        <h4 style="margin-top:20px;">🔄 Wat gebeurt er bij een Hulpwerkwoord (Modaal werkwoord)?</h4>
        <p>Dan staat het hulpwerkwoord op de tweede plek, het wederkerend voornaamwoord <strong>direct daarna</strong>, en het hele werkwoord aan het einde.</p>
        <div class="gw-example">
          <span class="orig">📌 Ik <strong>wil me</strong> even <strong>wassen</strong>.</span>
          <span class="orig" style="margin-top:4px;">📌 Zij <strong>moet zich</strong> niet zo <strong>schamen</strong>.</span>
          <span class="orig" style="margin-top:4px;">📌 <strong>Kun</strong> jij <strong>je</strong> een beetje <strong>haasten</strong>?</span>
        </div>

        <h4 style="margin-top:20px;">❓ Inversie (Vraagzin):</h4>
        <div class="gw-example">
          <span class="orig">📌 <strong>Vergis</strong> jij <strong>je</strong> nooit?</span>
          <span class="orig" style="margin-top:4px;">📌 <strong>Schaamt</strong> hij <strong>zich</strong>?</span>
          <span class="orig" style="margin-top:4px;">📌 <strong>Haasten</strong> jullie <strong>je</strong>?</span>
        </div>
      </div>

      <div class="gw-section">
        <h2>🔄 Deel 5: Wederkerende Werkwoorden in de Voltooide Tijd</h2>
        <p>In de voltooide tijd (met <em>hebben</em> of <em>zijn</em>) blijft het wederkerend voornaamwoord vóór het voltooid deelwoord staan. <strong>Alle wederkerende werkwoorden gebruiken het hulpwerkwoord 'HEBBEN'</strong> (zelfs <em>zich wassen</em>).</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Tegenwoordige Tijd</th><th>Voltooide Tijd</th></tr></thead>
            <tbody>
              <tr><td>Ik <strong>was me</strong>.</td><td>Ik <strong>heb me gewassen</strong>.</td></tr>
              <tr><td>Jij <strong>vergist je</strong>.</td><td>Jij <strong>hebt je vergist</strong>.</td></tr>
              <tr><td>Hij <strong>schaamt zich</strong>.</td><td>Hij <strong>heeft zich geschaamd</strong>.</td></tr>
              <tr><td>Wij <strong>haasten ons</strong>.</td><td>Wij <strong>hebben ons gehaast</strong>.</td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-note" style="margin-top:16px;">📍 <strong>Let op de Woordvolgorde in de Bijzin:</strong><br><em>"Ik voel me schoon, omdat <strong>ik me gewassen heb</strong>."</em><br><em>"Het is fijn dat <strong>jij je niet geschaamd hebt</strong>."</em></div>
      </div>

      <div class="gw-section">
        <h2>⏳ Deel 6: Wederkerend + Zitten/Liggen/Lopen/Staan</h2>
        <p>Je kunt wederkerende werkwoorden combineren met de duratieve constructies (<em>zitten te, liggen te, lopen te, staan te</em>). Het wederkerend voornaamwoord staat dan tussen het hulpwerkwoord en <em>'te'</em>.</p>
        
        <div class="gw-example">
          <span class="orig">📌 Ik <strong>zit me</strong> te <strong>vervelen</strong>.</span>
          <span class="orig" style="margin-top:4px;">📌 Hij <strong>ligt zich</strong> te <strong>scheren</strong> in bad. <small>(Oké, dat is vreemd, maar grammaticaal correct)</small></span>
          <span class="orig" style="margin-top:4px;">📌 Zij <strong>staat zich</strong> voor de spiegel <strong>aan te kleden</strong>.</span>
          <span class="orig" style="margin-top:4px;">📌 Loop niet zo <strong>te haasten</strong>! <small>(Hier kan het wederkerend vnw. soms wegvallen bij irritatie).</small></span>
        </div>
      </div>

      <div class="gw-section">
        <h2>🌸 Deel 7: De Ultieme Voorbeelden-Galerij</h2>
        
        <h3>🔒 Verplicht Wederkerende Werkwoorden</h3>
        
        <div class="gw-verb-card">
          <div class="gw-verb-title">zich vergissen</div>

          <div class="gw-verb-ex"><div class="gw-ex-type orange">🟠</div><em>"Je <strong>moet je</strong> niet <strong>vergissen</strong> in zijn vriendelijkheid."</em></div>
          <div class="gw-verb-ex"><div class="gw-ex-type green">🟢</div><em>"Hij <strong>heeft zich</strong> lelijk <strong>vergist</strong> in de lengte van de reis."</em></div>

          <div class="gw-verb-ex"><div class="gw-ex-type orange">🟠</div><em>"Je <strong>hoeft je</strong> nergens voor <strong>te schamen</strong>!"</em></div>
          <div class="gw-verb-ex"><div class="gw-ex-type green">🟢</div><em>"Achteraf <strong>hebben</strong> we <strong>ons</strong> wel een beetje <strong>geschaamd</strong>."</em></div>
        </div>

        <div class="gw-verb-card">
          <div class="gw-verb-title">zich haasten</div>
          <div class="gw-verb-ex"><div class="gw-ex-type red">🔴</div><em>"<strong>Haast je</strong> niet, we hebben nog tijd zat."</em></div>
          <div class="gw-verb-ex"><div class="gw-ex-type orange">🟠</div><em>"Zij <strong>moest zich</strong> vreselijk <strong>haasten</strong> om de trein te halen."</em></div>
          <div class="gw-verb-ex"><div class="gw-ex-type green">🟢</div><em>"Hoewel hij <strong>zich gehaast had</strong>, kwam hij toch te laat."</em></div>

        <div class="gw-verb-card">

          <div class="gw-verb-ex"><div class="gw-ex-type green">🟢</div><em>"De kinderen <strong>hebben zich</strong> voorbeeldig <strong>gedragen</strong>."</em></div>

        <div class="gw-verb-card">

          <div class="gw-verb-ex"><div class="gw-ex-type green">🟢</div><em>"Het schilderij <strong>heeft zich</strong> altijd in de familie <strong>bevonden</strong>."</em></div>

      <div class="gw-section">
        <h2>🚀 Deel 8: Gevorderd – Wederkerend of Passief?</h2>
        <p>Sommige zinnen met <em>zich</em> lijken op een passieve constructie, maar zijn dat niet. Dit heet de <strong>passieve wederkerende constructie</strong> of 'middelconstructie'. Het wordt gebruikt voor algemene waarheden of eigenschappen.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Constructie</th><th>Voorbeeldzin</th><th>Betekenis</th></tr></thead>

              <tr><td><strong>Zich + Werkwoord</strong></td><td><em>"Dit boek <strong>leest zich</strong> als een trein."</em></td><td>Het is makkelijk om dit boek te lezen.</td></tr>
              <tr><td><strong>Zich + Werkwoord</strong></td><td><em>"Deze stof <strong>wast zich</strong> gemakkelijk."</em></td><td>Het is makkelijk om deze stof te wassen.</td></tr>

        <div class="gw-note">✨ Dit is een prachtig staaltje Nederlands waarmee je als een echte kenner overkomt.</div>

      <div class="gw-section">
        <h2>⚠️ Deel 9: Veelgemaakte Fouten en de Correcties</h2>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Fout ❌</th><th>Correctie ✅</th><th>Waarom?</th></tr></thead>
            <tbody>
