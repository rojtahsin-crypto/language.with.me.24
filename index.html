<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lingua — Grammar Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#faf8f3; --bg2:#f2ede0; --bg3:#ebe4d1;
  --text:#1c1a16; --text2:#5a5040; --text3:#9a8e78;
  --border:#dfd7c2; --shadow:rgba(28,26,22,.07); --shadow-lg:rgba(28,26,22,.14);
  --r:16px; --rs:10px; --t:.28s cubic-bezier(.4,0,.2,1);
  --accent:#059669; --acbg:#ecfdf5; --acbo:#a7f3d0;
  --nl:#e8590c; --nlbg:#fff3ed; --nlbo:#fcd0b5;
  --fr:#4f46e5; --frbg:#eef2ff; --frbo:#c7d2fe;
  --en:#059669; --enbg:#ecfdf5; --enbo:#a7f3d0;
}
[data-theme=dark]{
  --bg:#131109; --bg2:#1c1912; --bg3:#24201a;
  --text:#f0ead8; --text2:#b8a88a; --text3:#6a5f45;
  --border:#2e2820; --shadow:rgba(0,0,0,.35); --shadow-lg:rgba(0,0,0,.55);
}

body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;transition:background var(--t),color var(--t);min-height:100vh}

/* === LANGUAGE SELECT === */
#langSelect{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;position:relative;overflow:hidden}
#langSelect::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 25% 30%,rgba(232,89,12,.07) 0%,transparent 50%),radial-gradient(ellipse at 75% 70%,rgba(79,70,229,.07) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(5,150,105,.05) 0%,transparent 55%);pointer-events:none}
.ls-hero{text-align:center;margin-bottom:3rem;animation:fadeUp .6s ease both}
.ls-hero h1{font-family:'Libre Baskerville',serif;font-size:clamp(2.2rem,5vw,3.8rem);font-weight:700;letter-spacing:-.025em;line-height:1.1}
.ls-hero h1 em{font-style:normal;color:var(--accent)}
.ls-hero p{color:var(--text2);font-size:1.05rem;margin-top:.5rem;font-weight:500}
.ls-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1.25rem;max-width:860px;width:100%}
.lc{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:2.5rem 2rem;text-align:center;cursor:pointer;transition:all var(--t);position:relative;overflow:hidden;animation:fadeUp .6s ease both}
.lc:nth-child(1){animation-delay:.12s}.lc:nth-child(2){animation-delay:.22s}.lc:nth-child(3){animation-delay:.32s}
.lc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;transform:scaleX(0);transition:transform var(--t);transform-origin:left}
.lc.nl::after{background:var(--nl)}.lc.fr::after{background:var(--fr)}.lc.en::after{background:var(--en)}
.lc:hover{transform:translateY(-7px);box-shadow:0 20px 44px var(--shadow-lg)}
.lc:hover::after{transform:scaleX(1)}
.lc.nl:hover{border-color:var(--nl)}.lc.fr:hover{border-color:var(--fr)}.lc.en:hover{border-color:var(--en)}
.lc-flag{font-size:3.8rem;display:block;margin-bottom:1rem;animation:float 4s ease-in-out infinite}
.lc:nth-child(2) .lc-flag{animation-delay:1.4s}.lc:nth-child(3) .lc-flag{animation-delay:2.8s}
.lc-name{font-family:'Libre Baskerville',serif;font-size:1.9rem;font-weight:700;margin-bottom:.25rem}
.lc-sub{color:var(--text3);font-size:.9rem;font-weight:500;letter-spacing:.02em}

/* === APP SHELL === */
#app{display:none}
.app-header{background:var(--bg);border-bottom:1.5px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.hdr{max-width:1320px;margin:0 auto;padding:.85rem 1.75rem;display:flex;align-items:center;gap:1rem}
.logo{font-family:'Libre Baskerville',serif;font-size:1.45rem;font-weight:700;flex:1;cursor:pointer;display:flex;align-items:center;gap:.35rem;color:var(--text);text-decoration:none}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0}
.hdr-acts{display:flex;gap:.45rem}
.btico{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--rs);padding:.5rem .85rem;cursor:pointer;transition:all var(--t);font-size:.88rem;font-family:'Nunito',sans-serif;font-weight:700;color:var(--text);display:flex;align-items:center;gap:.3rem}
.btico:hover{background:var(--bg3);border-color:var(--text3)}
.nav-bar{background:var(--bg);border-bottom:1.5px solid var(--border)}
.nav-inner{max-width:1320px;margin:0 auto;padding:0 1.75rem;display:flex}
.ntab{padding:.8rem 1.4rem;background:none;border:none;border-bottom:2.5px solid transparent;color:var(--text3);font-size:.93rem;font-weight:700;cursor:pointer;transition:all var(--t);font-family:'Nunito',sans-serif;letter-spacing:.01em;white-space:nowrap}
.ntab:hover{color:var(--text)}
.ntab.active{color:var(--text);border-bottom-color:var(--accent)}

/* === MAIN CONTENT === */
.cwrap{max-width:1320px;margin:0 auto;padding:1.75rem}
.sh{margin-bottom:1.25rem;position:relative}
.si{width:100%;padding:.85rem 2.8rem .85rem 1.1rem;font-size:.97rem;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--bg2);color:var(--text);font-family:'Nunito',sans-serif;transition:all var(--t)}
.si::placeholder{color:var(--text3)}
.si:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--acbg);background:var(--bg)}
.si-ico{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}

/* === TOPIC GRID === */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:.9rem}
.tc{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:1.4rem;cursor:pointer;transition:all var(--t);position:relative;animation:fadeIn .4s ease both}
.tc:hover{transform:translateY(-3px);box-shadow:0 8px 22px var(--shadow);border-color:var(--acbo);background:var(--acbg)}
.tc-num{display:inline-flex;align-items:center;justify-content:center;width:1.9rem;height:1.9rem;background:var(--acbg);color:var(--accent);border-radius:7px;font-size:.72rem;font-weight:900;margin-bottom:.7rem;border:1px solid var(--acbo)}
.tc-title{font-family:'Libre Baskerville',serif;font-size:1rem;font-weight:700;margin-bottom:.3rem;line-height:1.3}
.tc-desc{color:var(--text2);font-size:.82rem;line-height:1.5}

/* === TOPIC DETAIL === */
.back-btn{display:inline-flex;align-items:center;gap:.4rem;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--rs);padding:.5rem .95rem;cursor:pointer;transition:all var(--t);font-weight:700;color:var(--text);font-family:'Nunito',sans-serif;font-size:.88rem;margin-bottom:1.25rem}
.back-btn:hover{transform:translateX(-3px);border-color:var(--text3)}
.det-hdr{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:1.8rem 2.2rem;margin-bottom:1.25rem}
.det-hdr h1{font-family:'Libre Baskerville',serif;font-size:clamp(1.4rem,3vw,2rem);font-weight:700;margin-bottom:.4rem}
.det-hdr p{color:var(--text2);margin-bottom:1.25rem;font-size:.95rem}
.tact{display:flex;gap:.6rem;flex-wrap:wrap}
.btn{padding:.65rem 1.35rem;border-radius:var(--rs);font-family:'Nunito',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;transition:all var(--t);border:1.5px solid transparent;letter-spacing:.01em}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-p:hover{opacity:.88;transform:translateY(-1px)}
.btn-s{background:var(--bg);color:var(--text);border-color:var(--border)}.btn-s:hover{background:var(--bg3);border-color:var(--text3)}
.btn-o{background:var(--bg2);color:var(--text);border-color:var(--border)}.btn-o:hover{background:var(--bg3)}

/* === CONTENT BOX === */
.cbox{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:2rem 2.4rem;line-height:1.85;animation:fadeIn .4s ease both}
.cbox h2{font-family:'Libre Baskerville',serif;font-size:1.3rem;margin-bottom:.9rem;color:var(--text)}
.cbox p{margin-bottom:.9rem;color:var(--text)}
.cbox ul,.cbox ol{margin:.4rem 0 1rem 1.1rem}
.cbox li{margin-bottom:.35rem;color:var(--text)}
.cbox strong{font-weight:800}
.cbox em{color:var(--accent);font-style:italic}
.example-box{background:var(--bg3);border-left:3px solid var(--accent);padding:.9rem 1.1rem;border-radius:0 var(--rs) var(--rs) 0;margin:.9rem 0}
.example-box .original{display:block;font-family:'Libre Baskerville',serif;font-style:italic;color:var(--text);margin-bottom:.18rem;font-size:1rem}
.example-box .translation{display:block;color:var(--text3);font-size:.86rem}

/* === LOADING === */
.ldwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;gap:.9rem;color:var(--text3);font-weight:600;font-size:.92rem}
.spin{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}

/* === QUIZ === */
.qhdr{margin-bottom:1.2rem}
.pbar-wrap{background:var(--bg3);border-radius:100px;height:5px;margin-bottom:.45rem;overflow:hidden}
.pbar-fill{height:100%;background:var(--accent);border-radius:100px;transition:width .5s ease}
.qmeta{display:flex;justify-content:space-between;color:var(--text3);font-size:.82rem;font-weight:700}
.qcard{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:1.8rem 2.2rem;margin-bottom:1rem;animation:fadeIn .3s ease both}
.qtext{font-size:1.08rem;font-weight:700;margin-bottom:1.4rem;line-height:1.5;color:var(--text)}
.opts{display:flex;flex-direction:column;gap:.6rem}
.obtn{padding:.9rem 1.1rem;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--bg);color:var(--text);text-align:left;cursor:pointer;transition:all var(--t);font-size:.93rem;font-family:'Nunito',sans-serif;font-weight:600;display:flex;align-items:center;gap:.7rem;line-height:1.4}
.obtn:hover:not(:disabled){border-color:var(--accent);background:var(--acbg);transform:translateX(4px)}
.obtn:disabled{cursor:default}
.oltr{width:1.5rem;height:1.5rem;border-radius:6px;background:var(--bg2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:900;flex-shrink:0;transition:all var(--t)}
.obtn.correct{background:#ecfdf5;border-color:#059669;color:#065f46}
.obtn.correct .oltr{background:#059669;border-color:#059669;color:#fff}
.obtn.incorrect{background:#fef2f2;border-color:#ef4444;color:#991b1b}
.obtn.incorrect .oltr{background:#ef4444;border-color:#ef4444;color:#fff}
.obtn.sel-test{background:var(--acbg);border-color:var(--accent)}
.obtn.sel-test .oltr{background:var(--accent);border-color:var(--accent);color:#fff}
.expbox{background:var(--acbg);border:1.5px solid var(--acbo);border-radius:var(--rs);padding:.85rem 1.1rem;margin-top:.9rem;font-size:.88rem;color:var(--text);animation:fadeIn .3s ease both;font-weight:600;line-height:1.55}
.qnav{display:flex;justify-content:space-between;align-items:center;margin-top:1rem;gap:.6rem}

/* === RESULTS === */
.res-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);padding:2.5rem;text-align:center;animation:fadeIn .5s ease both}
.res-score{font-family:'Libre Baskerville',serif;font-size:clamp(3rem,8vw,5.5rem);font-weight:700;color:var(--accent);line-height:1;margin:.75rem 0}
.res-lbl{color:var(--text3);font-size:.9rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.res-msg{font-size:1.15rem;font-weight:800;margin-bottom:1.5rem;color:var(--text)}
.res-acts{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.75rem}
.rev-item{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--rs);padding:.85rem 1.1rem;margin-bottom:.6rem;border-left-width:3px;font-size:.88rem}
.rev-q{font-weight:700;margin-bottom:.35rem}
.rev-a{font-weight:800;margin-bottom:.25rem}
.rev-e{color:var(--text3);font-size:.82rem}

/* === ANIMATIONS === */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* === RESPONSIVE === */
@media(max-width:768px){
  .cwrap{padding:1rem}
  .hdr{padding:.7rem 1rem}
  .nav-inner{padding:0 1rem;overflow-x:auto;scrollbar-width:none}
  .nav-inner::-webkit-scrollbar{display:none}
  .ntab{padding:.7rem 1rem;font-size:.85rem}
  .det-hdr{padding:1.4rem 1.5rem}
  .cbox,.qcard{padding:1.4rem 1.5rem}
  .tgrid{grid-template-columns:1fr}
  .ls-grid{max-width:320px}
  .res-card{padding:1.75rem 1.5rem}
}
</style>
</head>
<body>

<!-- LANGUAGE SELECTION -->
<div id="langSelect">
  <div class="ls-hero">
    <h1>Lingua<em>AI</em></h1>
    <p>Grammar Mastery — AI-Powered Learning</p>
  </div>
  <div class="ls-grid">
    <div class="lc nl" onclick="selectLang('nl')">
      <span class="lc-flag">🇳🇱</span>
      <div class="lc-name">Nederlands</div>
      <div class="lc-sub">Dutch Language</div>
    </div>
    <div class="lc fr" onclick="selectLang('fr')">
      <span class="lc-flag">🇫🇷</span>
      <div class="lc-name">Français</div>
      <div class="lc-sub">French Language</div>
    </div>
    <div class="lc en" onclick="selectLang('en')">
      <span class="lc-flag">🇬🇧</span>
      <div class="lc-name">English</div>
      <div class="lc-sub">British English</div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header class="app-header">
    <div class="hdr">
      <div class="logo" onclick="showLangSelect()">
        LinguaAI<span class="logo-dot"></span>
      </div>
      <div class="hdr-acts">
        <button class="btico" id="langBtn" onclick="showLangSelect()">
          <span id="langFlag">🇬🇧</span>
        </button>
        <button class="btico" onclick="toggleTheme()">
          <span id="themeIco">🌙</span>
        </button>
      </div>
    </div>
  </header>
  <nav class="nav-bar">
    <div class="nav-inner">
      <button class="ntab active" id="tab-grammar" onclick="switchTab('grammar')">
        <span id="lbl-grammar">Grammar</span>
      </button>
      <button class="ntab" id="tab-practice" onclick="switchTab('practice')">
        <span id="lbl-practice">Practice</span>
      </button>
      <button class="ntab" id="tab-test" onclick="switchTab('test')">
        <span id="lbl-test">Test</span>
      </button>
    </div>
  </nav>
  <div class="cwrap">
    <!-- Grammar section -->
    <div id="sec-grammar">
      <div class="sh">
        <input type="text" class="si" id="searchInp" placeholder="Search grammar topics..." oninput="filterTopics()"/>
        <span class="si-ico">🔍</span>
      </div>
      <div class="tgrid" id="grammarGrid"></div>
    </div>

    <!-- Practice section -->
    <div id="sec-practice" style="display:none">
      <div class="tgrid" id="practiceGrid"></div>
    </div>

    <!-- Test section -->
    <div id="sec-test" style="display:none">
      <div class="tgrid" id="testGrid"></div>
    </div>

    <!-- Detail/quiz section (shared) -->
    <div id="sec-detail" style="display:none">
      <button class="back-btn" onclick="backFromDetail()">
        ← <span id="backLbl">Back</span>
      </button>
      <div id="detailContent"></div>
    </div>
  </div>
</div>

<script>
// =============================================
// CONFIGURATION & STATE
// =============================================
let lang = 'en';
let tab = 'grammar';
let dark = false;
let topicId = null;
let mode = 'grammar'; // grammar | practice | test
const cache = {};
let Qs = [], qi = 0, ans = [];
const LTRS = ['A','B','C','D'];

// =============================================
// TOPICS DATA
// =============================================
const TOPICS = {
  nl:[
{
  id: 1,
  t: "De lidwoorden (de/het/een)",
  d: "Leer wanneer je 'de' of 'het' moet gebruiken",
  content: `
    <style>
      .gw-wrap {
        --gw-bg: var(--bg); --gw-bg2: var(--bg2); --gw-bg3: var(--bg3);
        --gw-text: var(--text); --gw-text2: var(--text2); --gw-text3: var(--text3);
        --gw-border: var(--border); --gw-accent: var(--accent); --gw-accent-bg: var(--acbg);
        --gw-nl: var(--nl); --gw-nl-bg: var(--nlbg); --gw-nl-bo: var(--nlbo);
        --gw-fr: var(--fr); --gw-fr-bg: var(--frbg); --gw-fr-bo: var(--frbo);
        --gw-warn: #d97706; --gw-warn-bg: #fffbeb; --gw-warn-text: #92400e;
        --gw-shadow: var(--shadow);
        font-family: 'Nunito', sans-serif; color: var(--gw-text);
        line-height: 1.65; max-width: 920px; margin: 0 auto; padding: 6px;
      }
      /* === DARK MODE FIXES (Explicit Contrast) === */
      [data-theme="dark"] .gw-wrap {
        --gw-warn-bg: #2c1e0a; --gw-warn-text: #fbbf24; --gw-warn: #b45309;
        --gw-nl-bg: rgba(232, 89, 12, 0.15); --gw-nl-bo: rgba(232, 89, 12, 0.4); --gw-nl: #fb923c;
        --gw-fr-bg: rgba(79, 70, 229, 0.15); --gw-fr-bo: rgba(79, 70, 229, 0.4); --gw-fr: #a5b4fc;
        --gw-accent-bg: rgba(5, 150, 105, 0.15); --gw-accent-bo: rgba(5, 150, 105, 0.4); --gw-accent: #6ee7b7;
        --gw-card-hover: rgba(255,255,255,0.04);
        --gw-table-hover: rgba(255,255,255,0.06);
      }
      .gw-wrap * { box-sizing: border-box; }

      /* === HERO === */
      .gw-hero {
        background: linear-gradient(135deg, var(--gw-accent-bg) 0%, var(--gw-bg2) 100%);
        border: 1.5px solid var(--gw-border); border-radius: 22px;
        padding: 28px 24px; margin-bottom: 24px; text-align: center;
        position: relative; overflow: hidden;
      }
      .gw-hero::before {
        content: ''; position: absolute; top: -40%; right: -40%; width: 220px; height: 220px;
        background: radial-gradient(circle, var(--gw-accent) 0%, transparent 70%);
        opacity: 0.1; border-radius: 50%; pointer-events: none;
      }
      .gw-hero h1 {
        font-family: 'Libre Baskerville', serif; font-size: 2.1rem; margin: 0 0 10px;
        color: var(--gw-text); font-weight: 800; letter-spacing: -0.02em; position: relative;
      }
      .gw-hero p { color: var(--gw-text2); margin: 0; font-weight: 500; font-size: 1.08rem; position: relative; }

      /* === SECTIONS === */
      .gw-section {
        background: var(--gw-bg2); border: 1.5px solid var(--gw-border);
        border-radius: 20px; padding: 26px 28px; margin-bottom: 20px;
        transition: transform 0.25s ease, box-shadow 0.25s ease;
      }
      .gw-section:hover { box-shadow: 0 8px 30px var(--gw-shadow); transform: translateY(-3px); }
      .gw-section h2 {
        font-family: 'Libre Baskerville', serif; font-size: 1.55rem; margin: 0 0 22px;
        padding-bottom: 14px; border-bottom: 2px solid var(--gw-border); color: var(--gw-text);
      }
      .gw-section h3 { color: var(--gw-accent); font-size: 1.3rem; margin: 28px 0 14px; font-weight: 700; }
      .gw-section h4 { margin: 20px 0 10px; font-weight: 700; color: var(--gw-text); font-size: 1.05rem; }
      .gw-section p { margin: 0 0 14px; color: var(--gw-text); }
      .gw-section ul, .gw-section ol { margin: 10px 0 18px 28px; padding: 0; }
      .gw-section li { margin-bottom: 8px; color: var(--gw-text); line-height: 1.6; }
      .gw-section em { color: var(--gw-accent); font-style: italic; }
      .gw-section strong { font-weight: 800; color: var(--gw-text); }

      /* === SPECIAL CARDS === */
      .gw-card {
        background: var(--gw-bg); border: 1.5px solid var(--gw-border);
        border-radius: 16px; padding: 22px; margin: 20px 0; color: var(--gw-text);
      }
      .gw-card--rule { border-left: 5px solid var(--gw-accent); background: var(--gw-accent-bg); }
      .gw-card--tip { border-left: 5px solid var(--gw-fr); background: var(--gw-fr-bg); }
      .gw-card--warn { background: var(--gw-warn-bg); border: 1.5px solid var(--gw-warn); }
      .gw-card--check { background: linear-gradient(145deg, var(--gw-bg), var(--gw-bg2)); }

    <div class="gw-wrap">
      <div class="gw-hero">
        <h1>📘 Tegenwoordige Tijd (Presens)</h1>
        <p>De motor van de taal — Alles wat nu, altijd of straks gebeurt</p>
      </div>

      <div class="gw-section">
        <p>Goed, diep ademhalen, want we storten ons in de <strong>TEGENWOORDIGE TIJD</strong>. Dit is de motor van de taal. Alles wat nu gebeurt, wat altijd gebeurt, of wat straks gebeurt (als in een rooster) staat in deze tijd.</p>
        <p>Ik ga je inderdaad <strong>ALLES</strong> geven. Met regels, pro-regels, anti-regels, valkuilen, en een lawine aan voorbeelden.</p>
        <p>We behandelen:</p>
        <ol>
          <li>De Basisvervoeging (De Stam + T)</li>
          <li>De Grote Uitzonderingen (Onregelmatige Werkwoorden)</li>
          <li>De Spellingpolitie (Dt-fouten & 't Kofschip)</li>
          <li>De Zinsbouw (Inversie en de Plaats van het Werkwoord)</li>
          <li>Specifieke Werkwoordsoorten (Scheidbaar, Wederkerend, Modaal)</li>
        </ol>
      </div>

      <div class="gw-section">
        <h2>🔹 DEEL 1: DE STAM + T (DE HEILIGE REGEL)</h2>
        <p>Nederlands is een kwaadaardige taal geweest bij de lidwoorden (<em>de/het</em>), maar bij de werkwoorden is het <strong>rechtvaardig</strong>. Er zijn maar drie vormen in het enkelvoud en één voor het meervoud.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Persoon</th><th>Regel</th><th>Voorbeeld: WERKEN</th><th>Voorbeeld: FIETSEN</th></tr></thead>
            <tbody>
              <tr><td><strong>Ik</strong></td><td><strong>STAM</strong> (Heel werkwoord -EN)</td><td>Ik werk</td><td>Ik fiets</td></tr>
              <tr><td><strong>Jij / U</strong></td><td><strong>STAM + T</strong></td><td>Jij werk<strong>t</strong></td><td>U fiets<strong>t</strong></td></tr>
              <tr><td><strong>Hij / Zij / Het</strong></td><td><strong>STAM + T</strong></td><td>Hij werk<strong>t</strong></td><td>Het regen<strong>t</strong> (stam: regen)</td></tr>
              <tr><td><strong>Wij / Jullie / Zij (mv)</strong></td><td><strong>HELE WERKWOORD</strong></td><td>Wij werk<strong>en</strong></td><td>Jullie fiets<strong>en</strong></td></tr>
            </tbody>
          </table>
        </div>
        <div class="gw-note">⚠️ <strong>Let op:</strong> De stam is niet hetzelfde als de <em>ik-vorm</em>! Hele werkwoord: <strong>Reizen</strong> → Stam: <strong>Reiz</strong> (Min -en) → Ik-vorm: <strong>Reis</strong> (Z wordt S vanwege uitspraakregel, eindklank is stemloos)</div>

        <h3>🔀 1.2 De PRO-REGEL: Wanneer Géén T bij Jij?</h3>
        <p>Er is één glitch in de Matrix. Dit is de regel die iedereen vergeet en die zo mooi logisch is als je hem eenmaal ziet.</p>
        <div class="gw-card gw-card--rule">
          <div class="gw-card-title">✅ De Vraag:</div>
          <p style="margin:0; color: var(--gw-text);">Staat 'Je' of 'Jij' <strong>ACHTER</strong> het werkwoord?<br>• <strong>Ja?</strong> → <span class="gw-badge het">GEEN T!</span><br>• <strong>Nee?</strong> → <span class="gw-badge de">WEL T!</span></p>
        </div>

        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Situatie</th><th>Juiste vorm</th><th>Waarom?</th></tr></thead>
            <tbody>
              <tr><td><strong>Jij loopt</strong> op straat.</td><td>Loop<strong>t</strong></td><td>Jij staat ervóór.</td></tr>
              <tr><td><strong>Loop jij</strong> op straat?</td><td>Loop<strong>_</strong></td><td>Jij staat erachter (vraag).</td></tr>
              <tr><td>Morgen <strong>kom je</strong> toch?</td><td>Kom<strong>_</strong></td><td>Je staat erachter (en het is een vraag/zinsconstructie).</td></tr>
              <tr><td><strong>Wordt je broer</strong> boos?</td><td>Word<strong>t</strong></td><td>Je staat erachter, maar <em>je</em> is hier <strong>bezittelijk</strong> (jouw broer). De 'je' slaat op <em>broer</em> (hij). Dus: Wordt hij boos?</td></tr>
            </tbody>
          </table>
        </div>
        <p><strong>Nog meer van deze prachtige val:</strong></p>
        <ul>
          <li><strong>Vind jij</strong> dat ook? (Jij staat erachter = geen T)</li>
          <li><strong>Vindt jouw moeder</strong> dat ook? (Onderwerp is <em>moeder</em> = hij/zij = wel T)</li>
          <li><strong>Houd je</strong> van mij? (Geen T)</li>
          <li><strong>Houdt je vader</strong> van mij? (Wel T)</li>
        </ul>
      </div>

      <div class="gw-section">
        <h2>⚡ DEEL 2: DE GROTE UITZONDERINGEN (DE ZES APOSTELEN)</h2>
        <p>Deze werkwoorden zijn <strong>onregelmatig</strong>. Je moet ze kunnen dromen. Je moet ze kunnen spellen terwijl je ondersteboven aan een achtbaan hangt.</p>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Heel Werkwoord</th><th>Ik</th><th>Jij / U / Hij</th><th>Wij</th></tr></thead>
            <tbody>
              <tr><td><strong>Zijn</strong></td><td>Ik <strong>ben</strong></td><td>Jij <strong>bent</strong> (U <strong>bent/is</strong>)</td><td>Wij <strong>zijn</strong></td></tr>
              <tr><td><strong>Hebben</strong></td><td>Ik <strong>heb</strong></td><td>Jij <strong>hebt</strong> (U <strong>hebt/heeft</strong>)</td><td>Wij <strong>hebben</strong></td></tr>
              <tr><td><strong>Kunnen</strong></td><td>Ik <strong>kan</strong></td><td>Jij <strong>kunt</strong> (of <em>kan</em>)</td><td>Wij <strong>kunnen</strong></td></tr>
              <tr><td><strong>Mogen</strong></td><td>Ik <strong>mag</strong></td><td>Jij <strong>mag</strong> (Geen T!)</td><td>Wij <strong>mogen</strong></td></tr>
              <tr><td><strong>Willen</strong></td><td>Ik <strong>wil</strong></td><td>Jij <strong>wilt</strong> (of <em>wil</em>)</td><td>Wij <strong>willen</strong></td></tr>
              <tr><td><strong>Zullen</strong></td><td>Ik <strong>zal</strong></td><td>Jij <strong>zult</strong> (of <em>zal</em>)</td><td>Wij <strong>zullen</strong></td></tr>
            </tbody>
          </table>
        </div>
        <div class="gw-card gw-card--tip">
          <div class="gw-card-title">📝 Belangrijke opmerking bij U:</div>
          <p style="margin:0; color: var(--gw-text);">• <strong>U heeft</strong> (meest gebruikelijk) / <strong>U hebt</strong> (iets informeler)<br>• <strong>U bent</strong> (altijd) / U is (ouderwets, behalve in "U is aangeraden...")</p>
        </div>
      </div>

      <div class="gw-section">
        <h2>👮‍♂️ DEEL 3: DE SPELLINGPOLITIE</h2>
        <p>Dit is het onderdeel waar Nederlanders elkaar de tent uit vechten op Facebook.</p>
        
        <h3>📏 3.1 Waarom schrijf je "Hij <em>wordt</em>" met DT?</h3>
        <p>Omdat de stam <strong>WORD</strong> is. Regel: Stam + T = <strong>Wordt</strong>. De <strong>D</strong> zit al in de stam. Je hoort geen verschil tussen <em>Word</em> en <em>Wordt</em>, maar je moet hem wel schrijven.</p>

        <h3>🐑 3.2 'T KOFSCHIP (of 'T FOKSCHAAP)</h3>
        <p>Deze regel heb je nodig om de <strong>stam</strong> correct te spellen. Als het hele werkwoord eindigt op een medeklinker uit <span class="gw-code">'T KOFSCHIP</span> (of de uitgebreide versie <span class="gw-code">'T EX-FOKSCHAAP</span>), dan eindigt de stam op een <strong>T</strong> of <strong>F/S/CH</strong>.</p>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Heel Ww.</th><th>Stam</th><th>K in 't kofschip?</th><th>Ik-vorm</th></tr></thead>
            <tbody>
              <tr><td>Werke<strong>n</strong></td><td><strong>Werk</strong></td><td><strong>Ja</strong></td><td>Ik wer<strong>k</strong></td></tr>
              <tr><td>Leve<strong>n</strong></td><td><strong>Leev</strong></td><td><strong>Ja</strong> (V→F)</td><td>Ik lee<strong>f</strong></td></tr>
              <tr><td>Reize<strong>n</strong></td><td><strong>Reiz</strong></td><td><strong>Ja</strong> (Z→S)</td><td>Ik rei<strong>s</strong></td></tr>
              <tr><td>Brande<strong>n</strong></td><td><strong>Brand</strong></td><td><strong>NEE</strong></td><td>Ik bran<strong>d</strong>. Jij brand<strong>t</strong>.</td></tr>
            </tbody>
          </table>
        </div>

        <h3>🔤 3.3 De Dubbele Medeklinker & Klinker</h3>
        <div class="gw-card gw-card--rule">
          <div class="gw-card-title">✨ De Pro-Regel:</div>
          <p style="margin:0; color: var(--gw-text);">• <strong>Lange klank?</strong> → <strong>Verdubbel de klinker</strong> in open lettergreep (<em>Ik maak, ik breek</em>).<br>• <strong>Korte klank?</strong> → <strong>Verdubbel de medeklinker</strong> in gesloten lettergreep (<em>Ik val, ik zit, hij valt, hij zit</em>).</p>
        </div>
      </div>

      <div class="gw-section">
        <h2>🏗️ DEEL 4: DE ZINSBOUW</h2>
        <p>Hier verandert de volgorde.</p>
        <ul>
          <li><strong>Hoofdzin (Normaal):</strong> Onderwerp - Persoonsvorm - Rest - Overige Werkwoorden.<br><em>Ik <strong>wil</strong> vandaag patat <strong>eten</strong>.</em></li>
          <li><strong>Vraagzin (Inversie):</strong> Persoonsvorm - Onderwerp - Rest.<br><em><strong>Wil</strong> jij vandaag patat eten?</em></li>
          <li><strong>Bijzin (Het Werkwoord naar Achteren!):</strong> Dit is de <strong>valkuil voor gevorderden</strong>. Als je een woordje zoals <em>omdat, dat, die, hoewel, als</em> gebruikt, <strong>vlucht het werkwoord naar het einde van de zin</strong>.</li>
        </ul>
        <div class="gw-example">
          <span class="orig">📌 <em>Hoofdzin:</em> Ik <strong>ben</strong> moe.</span>
          <span class="orig" style="margin-top:8px;">📌 <em>Bijzin:</em> ...omdat ik moe <strong>ben</strong>.</span>
        </div>
        <div class="gw-note">💡 <strong>Lang voorbeeld:</strong> <em>Ik <strong>denk</strong> dat hij morgen naar de bioscoop <strong>gaat</strong> omdat hij een film <strong>wil</strong> <strong>zien</strong> die hij nog niet <strong>heeft</strong> <strong>gekeken</strong>.</em><br>Zie je? <strong>Denk</strong> (plek 2), <strong>gaat</strong> (einde), <strong>wil</strong> (einde), <strong>zien</strong> (einde), <strong>heeft</strong> (einde), <strong>gekeken</strong> (einde). Alles klontert samen aan het eind!</div>
      </div>

      <div class="gw-section">
        <h2>🎭 DEEL 5: SPECIALE WERKWOORDEN</h2>
        
        <h3>🔀 5.1 Scheidbare Werkwoorden</h3>
        <p>Deze werkwoorden scheuren uit elkaar in de tegenwoordige tijd.</p>
        <ul>
          <li><strong>Aankomen:</strong> Ik <strong>kom</strong> morgen <strong>aan</strong>.</li>
          <li><strong>Meenemen:</strong> <strong>Neem</strong> je die tas <strong>mee</strong>?</li>
          <li><strong>Opbellen:</strong> Hij <strong>belt</strong> zijn moeder <strong>op</strong>.</li>
        </ul>

        <h3>🔄 5.2 Wederkerende Werkwoorden</h3>
        <p>Je moet het woordje <strong>ME, JE, ZICH, ONS</strong> gebruiken.</p>
        <ul>
          <li>Ik <strong>vergis me</strong> vaak. (Stam: vergis)</li>
          <li>Jij <strong>vergist je</strong> vaak. (Stam + T: vergist)</li>
          <li>Hij <strong>vergist zich</strong> vaak.</li>
          <li>Wij <strong>vergissen ons</strong> vaak.</li>
        </ul>

        <h3>💪 5.3 Modale Werkwoorden</h3>
        <p>Deze geven een gevoel of noodzaak aan. In zinnen met twee werkwoorden, blijft het modale werkwoord op plek 2 en gaat het <strong>hele werkwoord</strong> naar het einde.</p>
        <div class="gw-example">
          <span class="orig">📌 Ik <strong>wil</strong> naar huis <strong>gaan</strong>.</span>
          <span class="orig" style="margin-top:4px;">📌 <strong>Mag</strong> ik hier <strong>zitten</strong>?</span>
        </div>
        <div class="gw-card gw-card--warn">
          <div class="gw-card-title">🚫 De Harde Noodzaak: MOETEN</div>
          <ul style="margin-top:0;"><li>Ik <strong>moet</strong>. Jij <strong>moet</strong>. Hij <strong>moet</strong>. Wij <strong>moeten</strong>.</li>
          <li><em>Let op:</em> Er is <strong>geen T</strong> in de hij-vorm bij <em>moeten</em>. (Hij moet<strong>_</strong>).</li></ul>
        </div>
      </div>

      <div class="gw-section">
        <h2>🕰️ DEEL 6: GEBRUIK (WANNEER GEBRUIK JE HET?)</h2>
        <p>De tegenwoordige tijd wordt voor <strong>4</strong> dingen gebruikt:</p>
        <ol>
          <li><strong>NU / FEIT:</strong> <em>Ik <strong>zit</strong> op een stoel. Water <strong>kookt</strong> bij 100 graden.</em></li>
          <li><strong>GEWOONTE:</strong> <em>Ik <strong>sta</strong> elke dag om 7 uur <strong>op</strong>. Hij <strong>fietst</strong> naar zijn werk.</em></li>
          <li><strong>TOEKOMST (Met Tijdsbepaling):</strong> <em>Morgen <strong>vertrek</strong> ik naar Spanje. Volgende week <strong>hebben</strong> we vakantie.</em> <span class="gw-note">Dit is de meest voorkomende fout van anderstaligen die meteen 'zullen' willen gebruiken. Je mag gewoon de T.T. gebruiken!</span></li>
          <li><strong>INSTRUCTIES (Imperatief):</strong> <em>Je <strong>neemt</strong> de eerste straat links.</em> Of: <em>U <strong>gaat</strong> hier rechtdoor.</em></li>
        </ol>
      </div>

      <div class="gw-section">
        <h2>📚 DEEL 7: DE MOEDER ALLER VOORBEELDLIJSTEN</h2>
        
        <h3>🥊 7.1 De D/T-Duels (Stam op -D)</h3>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Heel Werkwoord</th><th>Ik-vorm</th><th>Jij-vorm</th><th>Hij-vorm</th><th>Wij-vorm</th></tr></thead>
            <tbody>
              <tr><td><strong>Worden</strong></td><td>Ik <strong>word</strong></td><td>Jij <strong>wordt</strong></td><td>Hij <strong>wordt</strong></td><td>Wij <strong>worden</strong></td></tr>
              <tr><td><strong>Vinden</strong></td><td>Ik <strong>vind</strong></td><td>Jij <strong>vindt</strong></td><td>Het <strong>vindt</strong> plaats</td><td>Wij <strong>vinden</strong></td></tr>
              <tr><td><strong>Houden</strong></td><td>Ik <strong>houd</strong></td><td><strong>Houd</strong> jij van mij?</td><td>Hij <strong>houdt</strong> van haar</td><td>Wij <strong>houden</strong></td></tr>
              <tr><td><strong>Rijden</strong></td><td>Ik <strong>rijd</strong></td><td>Jij <strong>rijdt</strong></td><td>Zij <strong>rijdt</strong></td><td>Jullie <strong>rijden</strong></td></tr>
              <tr><td><strong>Bieden</strong></td><td>Ik <strong>bied</strong></td><td><strong>Bied</strong> je hulp?</td><td>Hij <strong>biedt</strong> hulp</td><td>Wij <strong>bieden</strong></td></tr>
            </tbody>
          </table>
        </div>

        <h3>🔊 7.2 De Klankverandering (V → F, Z → S)</h3>
        <div class="gw-table-wrap">
          <table class="gw-table">

    <div class="gw-wrap">
      <div class="gw-hero">
        <h1>✅ Voltooide Tijden (Perfectum)</h1>
        <p>Het domein van *hebben* en *zijn* — Alles is klaar, afgerond, gebeurd</p>
      </div>

      <div class="gw-section">
        <p>We gaan het laatste bastion van de Nederlandse werkwoordstijden bestormen: <strong>DE VOLTOOIDE TIJDEN</strong>. Dit is het domein van <em>hebben</em> en <em>zijn</em>. Het is de tijd die je gebruikt als iets <strong>klaar</strong> is, <strong>afgerond</strong>, <strong>gebeurd</strong>.</p>
        <p>Je hebt de Tegenwoordige Tijd (<em>ik werk</em>) en de Verleden Tijd (<em>ik werkte</em>) overleefd. Nu komt het <em>voltooide</em> aspect. <em>"Ik <strong>heb</strong> gewerkt." "Ik <strong>ben</strong> gevallen."</em></p>
        <p>Dit wordt weer <strong>ALLES</strong>. De regels, de pro-regels, de valkuilen, het <em>Kofschip</em> dat weer terugkomt, de keuzestress tussen <em>hebben</em> en <em>zijn</em>, en de zinsbouw die alles op zijn kop zet.</p>
        <p>We behandelen:</p>
        <ol>
          <li>De Basisformules (VTT, VVT, VTTk)</li>
          <li>De Vorming van het Voltooid Deelwoord (De <em>Ge-</em>-Machine)</li>
          <li>De Keuze: <strong>HEBBEN</strong> of <strong>ZIJN</strong>? (De grootste nachtmerrie)</li>
          <li>De Plek in de Zin (Het werkwoord vlucht naar het einde)</li>
          <li>Scheidbare Werkwoorden & Wederkerende Werkwoorden in de Voltooide Tijd</li>
          <li>De Dubbele Voltooide Tijd (Voor de echte pro's)</li>
        </ol>
      </div>

      <div class="gw-section">
        <h2>📐 DEEL 1: DE BASISFORMULES (DE DRIE VOLTOOIDE TIJDEN)</h2>
        <p>Er zijn er drie, maar in de praktijk gebruik je er vooral twee. De derde is een zeldzame, deftige vogel.</p>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Tijd</th><th>Formule</th><th>Gebruik</th><th>Voorbeeld</th></tr></thead>
            <tbody>
              <tr><td><strong>1. VTT</strong></td><td><strong>HEBBEN/ZIJN (T.T.) + VOLTOOID DEELWOORD</strong></td><td>Iets is nu klaar, of heeft effect op nu.</td><td>Ik <strong>heb</strong> gegeten. Hij <strong>is</strong> gevallen.</td></tr>
              <tr><td><strong>2. VVT</strong></td><td><strong>HADDEN/WAREN (V.T.) + VOLTOOID DEELWOORD</strong></td><td>Iets was klaar vóór een ander moment in het verleden.</td><td>Ik <strong>had</strong> gegeten voordat hij kwam. Hij <strong>was</strong> al gevallen.</td></tr>
              <tr><td><strong>3. VTTk</strong></td><td><strong>ZULLEN (T.T.) + HEBBEN/ZIJN + DEELWOORD</strong></td><td>Iets zal klaar zijn in de toekomst.</td><td>Ik <strong>zal hebben</strong> gegeten voor jouw komst.</td></tr>
            </tbody>
          </table>
        </div>
        <div class="gw-card gw-card--rule">
          <div class="gw-card-title">✨ Belangrijkste Vuistregel voor Nu:</div>
          <ul style="margin-top:10px;">
            <li><strong>VTT (Heb gedaan):</strong> Gebruik je 80% van de tijd als je over het verleden praat in gesprekken. <em>"Wat <strong>heb</strong> jij gisteren <strong>gedaan</strong>?"</em></li>
            <li><strong>OVT (Deed):</strong> Gebruik je voor beschrijvingen en gewoontes. <em>"Het <strong>regende</strong> en ik <strong>had</strong> geen paraplu."</em></li>
          </ul>
        </div>
      </div>

      <div class="gw-section">
        <h2>⚙️ DEEL 2: DE VORMING VAN HET VOLTOOID DEELWOORD</h2>
        <p>Het voltooid deelwoord is het tweede stukje van de puzzel. Hoe maak je dat ding?</p>
        
        <h3>2.1 De Zwakke Werkwoorden (Regelmatig)</h3>
        <p>Hier komt <span class="gw-code">'T KOFSCHIP</span> weer om de hoek kijken! Dezelfde regel als de Verleden Tijd, maar nu met <strong>GE-</strong> ervoor en <strong>-D</strong> of <strong>-T</strong> erachter.</p>
        <div class="gw-card gw-card--check">
          <div class="gw-card-title">📋 Stappenplan:</div>
          <ol style="margin:10px 0 0 22px;">
            <li><strong>GE-</strong> ervoor plakken.</li>
            <li><strong>STAM</strong> bepalen (hele werkwoord min -EN).</li>
            <li>Laatste letter van de stam in <strong>'T EX-FOKSCHAAP</strong>? → <strong>-T</strong>. Anders <strong>-D</strong>.</li>
          </ol>
        </div>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Heel Werkwoord</th><th>Stam</th><th>In 't Kofschip?</th><th>Voltooid Deelwoord</th></tr></thead>
            <tbody>
              <tr><td><strong>Werken</strong></td><td>Werk</td><td>Ja (K)</td><td>Ge<strong>werk</strong> + <strong>t</strong> = <strong>Gewerkt</strong></td></tr>
              <tr><td><strong>Spelen</strong></td><td>Speel</td><td>Nee (L)</td><td>Ge<strong>speel</strong> + <strong>d</strong> = <strong>Gespeeld</strong></td></tr>
              <tr><td><strong>Leven</strong></td><td>Leef</td><td>Ja (F)</td><td>Ge<strong>leef</strong> + <strong>t</strong> = <strong>Geleefd</strong></td></tr>
              <tr><td><strong>Praten</strong></td><td>Praat</td><td>Ja (T)</td><td>Ge<strong>praat</strong> + <strong>t</strong> = <strong>Gepraat</strong></td></tr>
            </tbody>
          </table>
        </div>

        <h3>2.2 De Sterke Werkwoorden (Onregelmatig)</h3>
        <p>Deze jongens veranderen van klinker en eindigen meestal op <strong>-EN</strong>. Je moet ze <strong>uit je hoofd leren</strong>.</p>
        <div class="gw-grid-2" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(250px,1fr)); gap:16px; margin:16px 0;">
          <div class="gw-card">
            <ul style="margin:0;"><li><strong>Lopen</strong> → Ge<strong>lopen</strong></li><li><strong>Zingen</strong> → Ge<strong>zongen</strong></li><li><strong>Eten</strong> → Ge<strong>geten</strong></li><li><strong>Doen</strong> → Ge<strong>daan</strong></li><li><strong>Hebben</strong> → Ge<strong>had</strong></li></ul>
          </div>
          <div class="gw-card">
            <ul style="margin:0;"><li><strong>Blijven</strong> → Ge<strong>bleven</strong></li><li><strong>Kijken</strong> → Ge<strong>keken</strong></li><li><strong>Drinken</strong> → Ge<strong>dronken</strong></li><li><strong>Zijn</strong> → Ge<strong>weest</strong></li><li><strong>Worden</strong> → Ge<strong>worden</strong> / <strong>Geworden</strong></li></ul>
          </div>
        </div>

        <h3>2.3 Wanneer Krijg je GEEN GE- ? (De Prefix-Regel)</h3>
        <div class="gw-card gw-card--warn">
          <div class="gw-card-title">🚫 PRO-REGEL:</div>
          <p style="margin:0; color:var(--gw-text)">Als het werkwoord begint met een van deze <strong>onbeklemtoonde voorvoegsels</strong>, <strong>VERVALT DE GE-</strong>:<br><strong>BE-, GE-, HER-, ER-, ONT-, VER-</strong></p>
        </div>
        <ul>
          <li><em>betalen</em> → <strong>betaald</strong></li>
          <li><em>gebeuren</em> → <strong>gebeurd</strong></li>
          <li><em>herkennen</em> → <strong>herkend</strong></li>
          <li><em>ontdekken</em> → <strong>ontdekt</strong></li>
          <li><em>vertellen</em> → <strong>verteld</strong></li>
        </ul>
        <div class="gw-note">⚠️ <strong>Uitzondering:</strong> Als de klemtoon <strong>WEL</strong> op het voorvoegsel ligt, komt er <strong>WEL GE-</strong> bij. <em>Voorkómen</em> → <strong>voorkómen</strong>. <em>Vóórkomen</em> → <strong>vóórgekomen</strong>.</div>

        <h3>2.4 De Spelling (D, T, of DT?)</h3>
        <div class="gw-card gw-card--rule">
          <div class="gw-card-title">✅ Gouden Regel:</div>
          <p style="margin:0; color:var(--gw-text)">Het voltooid deelwoord van zwakke werkwoorden eindigt <strong>NOOIT op -DT</strong>.<br>❌ Fout: <em>gebeurd<strong>t</strong>, verhuisd<strong>t</strong></em><br>✅ Goed: <strong>gebeurd, verhuisd</strong></p>
        </div>
        <p><em>Check? Maak het langer (verlengproef). <strong>Gebeure</strong> → hoor je een D? Ja, dus <strong>gebeurd</strong>.</em></p>
      </div>

      <div class="gw-section">
        <h2>⚖️ DEEL 3: DE KEUZE TUSSEN HEBBEN EN ZIJN</h2>
        <p>Dit is het onderdeel waar anderstaligen (en sommige Nederlanders) spontaan grijze haren van krijgen.</p>
        
        <h3>3.1 ZIJN gebruik je bij:</h3>
        <ol>
          <li><strong>Een duidelijke verandering van TOESTAND of LOCATIE.</strong> (Van A naar B)<br><em>Ik <strong>ben</strong> naar Amsterdam <strong>gefietst</strong>. De melk <strong>is</strong> zuur <strong>geworden</strong>.</em></li>
          <li><strong>Vaste werkwoorden (ALTID ZIJN):</strong> <em>zijn, worden, gebeuren, komen, blijven, beginnen, stoppen (ophouden), slagen, vergeten.</em></li>
          <li><strong>Koppelwerkwoorden:</strong> <em>zijn, worden, blijven, lijken, schijnen, heten, dunken, voorkomen.</em></li>
        </ol>

        <h3>3.2 HEBBEN gebruik je bij:</h3>
        <ol>
          <li><strong>De meeste andere werkwoorden.</strong> <em>Ik <strong>heb</strong> een boek <strong>gelezen</strong>.</em></li>
          <li><strong>Wederkerende werkwoorden.</strong> <em>Ik <strong>heb</strong> me <strong>vergist</strong>.</em></li>
          <li><strong>Modale werkwoorden.</strong> <em>Ik <strong>heb</strong> het <strong>gekund</strong>.</em></li>
        </ol>

        <h3>3.3 De Gemene Tussenweg: Werkwoorden die BEIDE kunnen</h3>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Situatie</th><th>Hulpwerkwoord</th><th>Voorbeeld</th><th>Uitleg</th></tr></thead>
            <tbody>
              <tr><td><strong>Nadruk op BESTEMMING / RICHTING</strong> (Waarheen?)</td><td><span class="gw-badge het">ZIJN</span></td><td>Ik <strong>ben</strong> naar de supermarkt <strong>gefietst</strong>.</td><td>Je eindigt op een andere plek.</td></tr>
              <tr><td><strong>Nadruk op de ACTIE / ACTIVITEIT</strong> (Wat deed je?)</td><td><span class="gw-badge de">HEBBEN</span></td><td>Ik <strong>heb</strong> de hele middag <strong>gefietst</strong>.</td><td>Het gaat om het bewegen zelf, niet de aankomst.</td></tr>
            </tbody>
          </table>
        </div>
        <div class="gw-note">🔹 <em>Wandelen:</em> Ik <strong>ben</strong> naar huis <strong>gewandeld</strong>. (Bestemming) vs. Ik <strong>heb</strong> in het bos <strong>gewandeld</strong>. (Activiteit)</div>
      </div>

      <div class="gw-section">
        <h2>📍 DEEL 4: DE PLEK IN DE ZIN</h2>
        <p>In de <strong>hoofdzin</strong> staat het <strong>hulpwerkwoord</strong> (hebben/zijn) op <strong>PLEK 2</strong>, maar het <strong>voltooid deelwoord</strong> sprint naar <strong>HET EINDE</strong>.</p>
        <div class="gw-example">
          <span class="orig">📌 Ik <strong>heb</strong> gisteren een hele leuke film over pinguïns <strong>gekeken</strong>.</span>
        </div>
        <p><strong>Let op bij Bijzinnen:</strong> In een bijzin (met <em>omdat, dat, die</em>) vluchten <strong>BEIDE</strong> werkwoorden naar het einde. Het hulpwerkwoord staat meestal <strong>vóór</strong> het voltooid deelwoord.</p>
        <div class="gw-example">
          <span class="orig">📌 ...omdat ik gisteren een leuke film <strong>heb gekeken</strong>.</span>
        </div>
      </div>

      <div class="gw-section">
        <h2>🧩 DEEL 5: SCHEIDBARE & WEDERKERENDE WERKWOORDEN</h2>
        <h3>5.1 Scheidbare Werkwoorden</h3>
        <p>Hier komt de <strong>-GE-</strong> <strong>TUSSEN</strong> het voorvoegsel en de stam!</p>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Heel Werkwoord</th><th>Voltooid Deelwoord</th><th>Voorbeeldzin</th></tr></thead>
            <tbody>
              <tr><td><strong>Aankomen</strong></td><td>Aan<strong>ge</strong>komen</td><td>De trein is eindelijk <strong>aangekomen</strong>.</td></tr>
              <tr><td><strong>Opbellen</strong></td><td>Op<strong>ge</strong>beld</td><td>Ik heb mijn moeder <strong>opgebeld</strong>.</td></tr>
              <tr><td><strong>Uitstappen</strong></td><td>Uit<strong>ge</strong>stapt</td><td>Wij zijn bij het station <strong>uitgestapt</strong>.</td></tr>
              <tr><td><strong>Meenemen</strong></td><td>Mee<strong>ge</strong>nomen</td><td>Heb jij de paraplu <strong>meegenomen</strong>?</td></tr>
              <tr><td><strong>Schoonmaken</strong></td><td>Schoon<strong>ge</strong>maakt</td><td>Ik heb de keuken <strong>schoongemaakt</strong>.</td></tr>
            </tbody>
          </table>
        </div>

        <h3>5.2 Wederkerende Werkwoorden</h3>
        <p>Deze hebben <strong>HEBBEN</strong>. Het wederkerend voornaamwoord (<em>me, je, zich</em>) plaatst zich <strong>direct na het hulpwerkwoord</strong>.</p>
        <div class="gw-example">
          <span class="orig">📌 Ik <strong>heb me</strong> lelijk <strong>vergist</strong>.</span>
          <span class="orig" style="margin-top:4px;">📌 <strong>Heb</strong> jij <strong>je</strong> wel eens <strong>verslapen</strong>?</span>
        </div>
      </div>

      <div class="gw-section">
        <h2>🚀 DEEL 6: DE DUBBELE VOLTOOIDE TIJD (VOOR PRO'S)</h2>
        <p>Soms hoor je zinnen als: <em>"Ik <strong>had</strong> dat eigenlijk anders <strong>willen doen</strong>."</em></p>
        <p>Hier staat een <strong>MODAAL WERKWOORD</strong> in de voltooide tijd. In plaats van het voltooid deelwoord (<em>gewild, gemoeten, gekund</em>) gebruik je het <strong>HELE WERKWOORD</strong> als er nog een ander werkwoord in de zin staat.</p>
        <div class="gw-card gw-card--rule">
          <div class="gw-card-title">✨ De Regel:</div>
          <p style="margin:0; color:var(--gw-text);"><strong>HEBBEN/ZIJN + HELE WERKWOORD (Modaal) + HELE WERKWOORD (Actie)</strong></p>
        </div>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Wat je zou denken (Fout)</th><th>Wat je moet zeggen (Goed)</th><th>Waarom?</th></tr></thead>

    score:"Your score", expl:"Explanation:"
  }
};

// =============================================
// LANGUAGE & THEME SETUP
// =============================================
function selectLang(l) {
  lang = l;
  const flags={nl:'🇳🇱',fr:'🇫🇷',en:'🇬🇧'};
  const cols={
    nl:{a:'--nl',ab:'--nlbg',abo:'--nlbo'},
    fr:{a:'--fr',ab:'--frbg',abo:'--frbo'},
    en:{a:'--en',ab:'--enbg',abo:'--enbo'}
  };
  const r = document.documentElement;
  const s = getComputedStyle(r);
  r.style.setProperty('--accent', s.getPropertyValue(cols[l].a).trim());
  r.style.setProperty('--acbg',   s.getPropertyValue(cols[l].ab).trim());
  r.style.setProperty('--acbo',   s.getPropertyValue(cols[l].abo).trim());
  document.getElementById('langFlag').textContent = flags[l];
  const lb = LABELS[l];
  document.getElementById('lbl-grammar').textContent = lb.grammar;
  document.getElementById('lbl-practice').textContent = lb.practice;
  document.getElementById('lbl-test').textContent = lb.test;
  document.getElementById('searchInp').placeholder = lb.ph;
  document.getElementById('langSelect').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  tab = 'grammar'; showTab('grammar');
}

function showLangSelect() {
  document.getElementById('langSelect').style.display = '';
  document.getElementById('app').style.display = 'none';
}

function toggleTheme() {
  dark = !dark;
  document.body.setAttribute('data-theme', dark ? 'dark' : '');
  document.getElementById('themeIco').textContent = dark ? '☀️' : '🌙';
  localStorage.setItem('ltheme', dark ? 'dark' : '');
}

// =============================================
// TAB NAVIGATION
// =============================================
function switchTab(t) { tab = t; showTab(t); }

function showTab(t) {
  ['grammar','practice','test'].forEach(x => {
    const s = document.getElementById('sec-'+x);
    if(s) s.style.display = x===t ? '' : 'none';
    const b = document.getElementById('tab-'+x);
    if(b) b.classList.toggle('active', x===t);
  });
  document.getElementById('sec-detail').style.display = 'none';
  if(t==='grammar')  renderGrid('grammarGrid',  topicClickGrammar);
  if(t==='practice') renderGrid('practiceGrid', topicClickPractice);
  if(t==='test')     renderGrid('testGrid',      topicClickTest);
}

// =============================================
// RENDER GRIDS
// =============================================
function renderGrid(gid, fn) {
  const el = document.getElementById(gid);
  if(!el) return;
  const fnName = fn.name;
  el.innerHTML = TOPICS[lang].map((tp,i) => `
    <div class="tc" onclick="${fnName}(${tp.id})" style="animation-delay:${i*0.025}s">
      <div class="tc-num">${tp.id}</div>
      <div class="tc-title">${tp.t}</div>
      <div class="tc-desc">${tp.d}</div>
    </div>
  `).join('');
}

function filterTopics() {
  const q = document.getElementById('searchInp').value.toLowerCase();
  document.querySelectorAll('#grammarGrid .tc').forEach(c => {
    c.style.display = c.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

// =============================================
// SHOW DETAIL SECTION
// =============================================
function showDetail() {
  document.getElementById('sec-grammar').style.display = 'none';
  document.getElementById('sec-practice').style.display = 'none';
  document.getElementById('sec-test').style.display = 'none';
  document.getElementById('sec-detail').style.display = '';
  document.getElementById('backLbl').textContent = LABELS[lang].back;
}

function backFromDetail() {
  document.getElementById('sec-detail').style.display = 'none';
  document.getElementById('sec-'+mode).style.display = '';
  document.getElementById('tab-'+mode).classList.add('active');
}

// =============================================
// TOPIC CLICK HANDLERS (global, used in innerHTML)
// =============================================
function topicClickGrammar(id) { mode='grammar'; openGrammar(id); }
function topicClickPractice(id){ mode='practice'; openPractice(id); }
function topicClickTest(id)    { mode='test';     openTest(id); }

// Also expose for buttons inside detail view
window.topicClickGrammar = topicClickGrammar;
window.topicClickPractice = topicClickPractice;
window.topicClickTest = topicClickTest;

// =============================================
// GRAMMAR EXPLANATION
// =============================================
async function openGrammar(id) {
  topicId = id;
  const tp = TOPICS[lang].find(t=>t.id===id);
  const lb = LABELS[lang];
  showDetail();
  document.getElementById('detailContent').innerHTML = `
    <div class="det-hdr">
      <h1>${tp.t}</h1>
      <p>${tp.d}</p>
      <div class="tact">
        <button class="btn btn-s" onclick="topicClickPractice(${id})">${lb.startP}</button>
        <button class="btn btn-s" onclick="topicClickTest(${id})">${lb.startT}</button>
      </div>
    </div>
    <div class="cbox" id="gramBox">
      <div class="ldwrap"><div class="spin"></div><span>${lb.loading}</span></div>
    </div>
  `;
  try {
    const html = await fetchGrammar(lang, id, tp.t);
    document.getElementById('gramBox').innerHTML = html;
  } catch(e) {
    document.getElementById('gramBox').innerHTML = `<p style="color:var(--text2)">⚠️ Could not load content. Check your connection and try again.</p>`;
  }
}

async function fetchGrammar(l, id, title) {
  // ١. هەوڵ بدە ناوەڕۆکەکە لە TOPICSـەوە بھێنیت
  const topicList = TOPICS[l];
  const topic = topicList?.find(t => t.id === id);
  
  // ئەگەر content هەبوو، ڕاستەوخۆ بیگەڕێنەوە
  if (topic?.content) {
    return topic.content;
  }
  
  // ٢. ئەگەر content نەبوو، پەیامێکی ئامادەکاری نیشان بدە
  return `
    <div class="modern-grammar">
      <h2>⚠️ شرحی ئەم بابەتە هێشتا ئامادە نەبووە</h2>
      <p><strong>بابەت:</strong> ${title}</p>
      <p>تکایە دواتر سەردان بکە یان پەیوەندی بە مامۆستاوە بکە.</p>
    </div>
  `;
}// =============================================
// PRACTICE MODE (5 questions, immediate feedback)
// =============================================
async function openPractice(id) {
  topicId = id;
  const tp = TOPICS[lang].find(t=>t.id===id);
  const lb = LABELS[lang];
  showDetail();
  document.getElementById('detailContent').innerHTML = `
    <div class="det-hdr">
      <h1>${tp.t}</h1>
      <p>${lb.practice} — 5 ${lb.q}s</p>
    </div>
    <div id="pquiz">
      <div class="ldwrap"><div class="spin"></div><span>${lb.loading}</span></div>
    </div>
  `;
  try {
    Qs = await fetchQuestions(lang, id, tp.t, 5, 'practice');
    qi = 0; ans = [];
    renderPracticeQ();
  } catch(e) {
    document.getElementById('pquiz').innerHTML = `<p style="color:var(--text2)">⚠️ Could not load questions. Please try again.</p>`;
  }
}

function renderPracticeQ() {
  const lb = LABELS[lang];
  const q = Qs[qi];
  const pct = Math.round(qi / Qs.length * 100);
  document.getElementById('pquiz').innerHTML = `
    <div class="qhdr">
      <div class="pbar-wrap"><div class="pbar-fill" style="width:${pct}%"></div></div>
      <div class="qmeta"><span>${lb.q} ${qi+1} ${lb.of} ${Qs.length}</span><span>${pct}%</span></div>
    </div>
    <div class="qcard">
      <div class="qtext">${q.question}</div>
      <div class="opts" id="opts">
        ${q.options.map((o,i)=>`
          <button class="obtn" id="ob${i}" onclick="pickPractice(${i})">
            <span class="oltr">${LTRS[i]}</span>${o}
          </button>
        `).join('')}
      </div>
      <div id="expbl"></div>
    </div>
    <div class="qnav">
      <div></div>
      <button class="btn btn-p" id="nxtbtn" style="display:none" onclick="nextPractice()">
        ${qi < Qs.length-1 ? lb.next : '✓ '+lb.backTop}
      </button>
    </div>
  `;
}

function pickPractice(sel) {
  const lb = LABELS[lang];
  const q = Qs[qi];
  document.querySelectorAll('.obtn').forEach((b,i) => {
    b.disabled = true;
    if(i === q.correct) b.classList.add('correct');
    else if(i === sel && sel !== q.correct) b.classList.add('incorrect');
  });
  document.getElementById('expbl').innerHTML = `<div class="expbox"><strong>${lb.expl}</strong> ${q.explanation}</div>`;
  document.getElementById('nxtbtn').style.display = 'inline-flex';
  ans[qi] = sel;
}

function nextPractice() {
  if(qi < Qs.length-1){ qi++; renderPracticeQ(); }
  else { backFromDetail(); }
}

// =============================================
// TEST MODE (10 questions, submit at end)
// =============================================
async function openTest(id) {
  topicId = id;
  const tp = TOPICS[lang].find(t=>t.id===id);
  const lb = LABELS[lang];
  showDetail();
  document.getElementById('detailContent').innerHTML = `
    <div class="det-hdr">
      <h1>${tp.t}</h1>
      <p>${lb.test} — 10 ${lb.q}s</p>
    </div>
    <div id="tquiz">
      <div class="ldwrap"><div class="spin"></div><span>${lb.loading}</span></div>
    </div>
  `;
  try {
    Qs = await fetchQuestions(lang, id, tp.t, 10, 'test');
    qi = 0; ans = new Array(10).fill(null);
    renderTestQ(0);
  } catch(e) {
    document.getElementById('tquiz').innerHTML = `<p style="color:var(--text2)">⚠️ Could not load questions. Please try again.</p>`;
  }
}

function renderTestQ(idx) {
  const lb = LABELS[lang];
  const q = Qs[idx];
  const pct = Math.round(idx / Qs.length * 100);
  const isLast = idx === Qs.length - 1;
  const selAns = ans[idx];
  document.getElementById('tquiz').innerHTML = `
    <div class="qhdr">
      <div class="pbar-wrap"><div class="pbar-fill" style="width:${pct}%"></div></div>
      <div class="qmeta"><span>${lb.q} ${idx+1} ${lb.of} ${Qs.length}</span><span>${pct}%</span></div>
    </div>
    <div class="qcard">
      <div class="qtext">${q.question}</div>
      <div class="opts">
        ${q.options.map((o,i)=>`
          <button class="obtn ${selAns===i?'sel-test':''}" onclick="pickTest(${idx},${i})">
            <span class="oltr">${LTRS[i]}</span>${o}
          </button>
        `).join('')}
      </div>
    </div>
    <div class="qnav">
      ${idx>0 ? `<button class="btn btn-o" onclick="renderTestQ(${idx-1})">← </button>` : '<div></div>'}
      ${!isLast
        ? `<button class="btn btn-p" onclick="renderTestQ(${idx+1})">${lb.next}</button>`
        : `<button class="btn btn-p" onclick="submitTest()">${lb.submit}</button>`
      }
    </div>
  `;
}

function pickTest(qi_, opt) {
  ans[qi_] = opt;
  renderTestQ(qi_);
}

function submitTest() {
  const lb = LABELS[lang];
  let correct = 0;
  Qs.forEach((q,i) => { if(ans[i]===q.correct) correct++; });
  const total = Qs.length;
  const pct = Math.round(correct/total*100);
  const msg = pct===100?lb.perfect:pct>=70?lb.great:pct>=40?lb.ok:lb.keep;
  const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  document.getElementById('tquiz').innerHTML = `
    <div class="res-card">
      <div class="res-lbl">${lb.results}</div>
      <div class="res-score">${correct}/${total}</div>
      <div class="res-msg">${msg}</div>
      <div style="margin-bottom:1.5rem">
        <div class="pbar-wrap" style="height:9px">
          <div class="pbar-fill" id="resPbar" style="width:0%"></div>
        </div>
        <div style="text-align:center;margin-top:.4rem;color:var(--text3);font-weight:700;font-size:.9rem">${pct}%</div>
      </div>
      <div class="res-acts">
        <button class="btn btn-p" onclick="openTest(${topicId})">${lb.tryAgain}</button>
        <button class="btn btn-s" onclick="backFromDetail()">${lb.backTop}</button>
      </div>
    </div>
    <div style="margin-top:1.5rem">
      <h3 style="font-family:'Libre Baskerville',serif;margin-bottom:1rem;font-size:1.05rem;color:var(--text2)">${lb.score} — ${lb.q}s</h3>
      ${Qs.map((q,i)=>{
        const ok = ans[i]===q.correct;
        return `<div class="rev-item" style="border-left-color:${ok?'var(--en)':'#ef4444'}">
          <div class="rev-q">${i+1}. ${q.question}</div>
          <div class="rev-a" style="color:${ok?'var(--en)':'#ef4444'}">${ok?'✓':'✗'} ${LTRS[q.correct]}. ${q.options[q.correct]}</div>
          <div class="rev-e">${q.explanation}</div>
        </div>`;
      }).join('')}
    </div>
  `;
  // Animate progress bar
  setTimeout(() => {
    const pb = document.getElementById('resPbar');
    if(pb) pb.style.width = pct+'%';
  }, 100);
}

// =============================================
// API CALLS
// =============================================
async function callAPI(prompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      messages:[{role:"user",content:prompt}]
    })
  });
  const data = await res.json();
  if(!data.content?.[0]?.text) throw new Error("No response");
  return data.content[0].text;
}

async function fetchQuestions(l, id, title, count, qtype) {
  const k = `q_${qtype}_${l}_${id}`;
  if(cache[k]) return cache[k];
  const langFull = {nl:'Dutch',fr:'French',en:'British English'}[l];
  const instr = {
    nl:`Schrijf alle vragen en antwoorden in het Nederlands.`,
    fr:`Écris toutes les questions et réponses en français.`,
    en:`Write all questions and answers in English.`
  }[l];
  const prompt = `You are an expert ${langFull} grammar teacher. ${instr}
Generate exactly ${count} multiple choice questions testing the grammar topic: "${title}"
Each question must have exactly 4 options. Only one is correct. Include a brief 1-sentence explanation.
Return ONLY valid JSON, no markdown, no backticks, no preamble:
{"questions":[{"question":"...","options":["A text","B text","C text","D text"],"correct":0,"explanation":"..."}]}
The "correct" value is the 0-based index of the correct option.`;
  const raw = await callAPI(prompt);
  let clean = raw.trim().replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'');
  const start = clean.indexOf('{');
  if(start > 0) clean = clean.slice(start);
  const data = JSON.parse(clean);
  cache[k] = data.questions;
  return data.questions;
}
