    <div class="gw-wrap">
      <div class="gw-hero">
        <h1>✨ Verkleinwoorden</h1>
        <p>-je, -tje, -pje, -etje, -kje — De magie van het kleine</p>
      </div>

      <div class="gw-section">
        <p>Met groot plezier duiken we in de wondere wereld van de <strong>verkleinwoorden</strong> (diminutieven). Dit is een van de meest charmante en typisch Nederlandse taalelementen. Waar andere talen een bijvoeglijk naamwoord gebruiken (<em>"een <strong>kleine</strong> hond"</em>), plakt het Nederlands er een magisch staartje aan (<em>"een hond<strong>je</strong>"</em>).</p>
        <p>Deze gids is een volledige, foutloze en prachtig geïllustreerde reis door alle vormen, regels en gevoelsnuances van het verkleinwoord, met een overvloed aan schitterende voorbeelden.</p>
      </div>

      <div class="gw-section">
        <h2>✨ Deel 1: De Magie van het Verkleinwoord</h2>
        <p>Een verkleinwoord maak je door een <strong>achtervoegsel</strong> aan het zelfstandig naamwoord te plakken. Dit verandert niet alleen de grootte, maar vaak ook de <strong>emotionele lading</strong>.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Zonder Verkleinwoord</th><th>Met Verkleinwoord</th><th>Gevoel / Nuance</th></tr></thead>
            <tbody>
              <tr><td>de <strong>hond</strong></td><td>het <strong>hondje</strong></td><td>Klein formaat, of schattig.</td></tr>
              <tr><td>de <strong>fiets</strong></td><td>het <strong>fietsje</strong></td><td>Kleine fiets (kinderfiets).</td></tr>
              <tr><td>het <strong>bier</strong></td><td>het <strong>biertje</strong></td><td>Gezellig drankje.</td></tr>
              <tr><td>de <strong>vrouw</strong></td><td>het <strong>vrouwtje</strong></td><td>Liefkozend (mijn vrouwtje), of kleinerend (dat oude vrouwtje).</td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-card gw-card--rule" style="margin-top:16px;">
          <div class="gw-card-title">🔑 De Belangrijkste Regel (100% Waterdicht):</div>
          <p style="margin:0; color:var(--gw-text)"><strong>Elk verkleinwoord is een HET-woord.</strong><br>
          • <em>de hond</em> (de-woord) → <strong>het hond<strong>je</strong></strong> (het-woord)<br>
          • <em>de tafel</em> (de-woord) → <strong>het tafel<strong>tje</strong></strong> (het-woord)<br>
          • <em>het boek</em> (het-woord) → <strong>het boek<strong>je</strong></strong> (het-woord)</p>
        </div>
      </div>

      <div class="gw-section">
        <h2>📚 Deel 2: De Vijf Gouden Achtervoegsels</h2>
        <p>De keuze voor het juiste achtervoegsel hangt af van de <strong>eindklank</strong> van het grondwoord. Dit is puur fonetisch (hoe klinkt het?).</p>
        
        <h3>1️⃣ -je (De Standaard)</h3>
        <p>Gebruik <strong>-je</strong> na de meeste medeklinkers die "makkelijk" vloeien: <strong>l, n, r, m, p, f, g, k, ch</strong>.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Eindklank</th><th>Grondwoord</th><th>Verkleinwoord</th><th>Voorbeeldzin</th></tr></thead>
            <tbody>
              <tr><td><strong>-l</strong></td><td>de <em>stoel</em></td><td>het <em>stoel<strong>je</strong></em></td><td><em>"Mag ik op dat kleine <strong>stoeltje</strong> zitten?"</em></td></tr>
              <tr><td><strong>-n</strong></td><td>de <em>tuin</em></td><td>het <em>tuin<strong>je</strong></em></td><td><em>"Wij hebben een gezellig <strong>tuintje</strong> achter het huis."</em></td></tr>
              <tr><td><strong>-r</strong></td><td>de <em>deur</em></td><td>het <em>deur<strong>je</strong></em></td><td><em>"Het <strong>deurtje</strong> van de kast piept."</em></td></tr>
              <tr><td><strong>-m</strong></td><td>de <em>bloem</em></td><td>het <em>bloem<strong>je</strong></em></td><td><em>"Een madeliefje is een prachtig klein <strong>bloempje</strong>."</em></td></tr>
              <tr><td><strong>-p</strong></td><td>de <em>kast</em></td><td>het <em>kast<strong>je</strong></em></td><td><em>"Het sleuteltje ligt in het bovenste <strong>kastje</strong>."</em></td></tr>
              <tr><td><strong>-f</strong></td><td>de <em>brief</em></td><td>het <em>brief<strong>je</strong></em></td><td><em>"Ik schrijf je een lief <strong>briefje</strong>."</em></td></tr>
              <tr><td><strong>-g</strong></td><td>de <em>dag</em></td><td>het <em>dag<strong>je</strong></em></td><td><em>"We gaan een <strong>dagje</strong> naar het strand."</em></td></tr>
              <tr><td><strong>-k</strong></td><td>het <em>boek</em></td><td>het <em>boek<strong>je</strong></em></td><td><em>"Zij leest een dun <strong>boekje</strong>."</em></td></tr>
              <tr><td><strong>-ch</strong></td><td>de <em>lach</em></td><td>het <em>lach<strong>je</strong></em></td><td><em>"Er verscheen een zuinig <strong>lachje</strong> op zijn gezicht."</em></td></tr>
            </tbody>
          </table>
        </div>

        <h3 style="margin-top:24px;">2️⃣ -tje (De Redder van de Klinker)</h3>
        <p>Gebruik <strong>-tje</strong> na een <strong>open klinker</strong> (a, e, i, o, u, y) of een <strong>lange klinker gevolgd door l, n, r</strong>.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Situatie</th><th>Grondwoord</th><th>Verkleinwoord</th><th>Voorbeeldzin</th></tr></thead>
            <tbody>
              <tr><td><strong>Klinker</strong></td><td>de <em>oma</em></td><td>het <em>oma'<strong>tje</strong></em></td><td><em>"Haar <strong>omaatje</strong> woont in een verzorgingshuis."</em></td></tr>
              <tr><td></td><td>de <em>auto</em></td><td>het <em>auto'<strong>tje</strong></em></td><td><em>"Hij speelt met zijn rode <strong>autootje</strong>."</em></td></tr>
              <tr><td></td><td>de <em>baby</em></td><td>het <em>baby'<strong>tje</strong></em></td><td><em>"Wat een schattig <strong>baby'tje</strong>!"</em></td></tr>
              <tr><td></td><td>het <em>café</em></td><td>het <em>café<strong>tje</strong></em></td><td><em>"We dronken een koffie in een bruin <strong>cafeetje</strong>."</em></td></tr>
              <tr><td><strong>Lange klank + l/n/r</strong></td><td>de <em>paal</em></td><td>het <em>paal<strong>tje</strong></em></td><td><em>"Zet die stok maar tegen dat <strong>paaltje</strong>."</em></td></tr>
              <tr><td></td><td>de <em>boon</em></td><td>het <em>boon<strong>tje</strong></em></td><td><em>"Een <strong>boontje</strong> voor je loontje."</em></td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-card gw-card--warn" style="margin-top:16px;">
          <div class="gw-card-title">⚠️ Let op de Apostrof bij Klinkers!</div>
          <p style="margin:0; color:var(--gw-text)">Bij woorden op een losse klinker komt een apostrof vóór de <strong>-tje</strong> om de uitspraak te redden. Zonder apostrof zou het er raar uitzien of anders klinken.</p>
        </div>

        <div class="gw-table-wrap" style="margin-top:12px;">
          <table class="gw-table">
            <thead><tr><th>Grondwoord</th><th>Fout</th><th>Goed ✅</th></tr></thead>
            <tbody>
              <tr><td><em>oma</em></td><td>~~omatje~~</td><td><strong>oma'tje</strong></td></tr>
              <tr><td><em>auto</em></td><td>~~autotje~~</td><td><strong>auto'tje</strong></td></tr>
              <tr><td><em>taxi</em></td><td>~~taxitje~~</td><td><strong>taxi'tje</strong></td></tr>
              <tr><td><em>menu</em></td><td>~~menutje~~</td><td><strong>menu'tje</strong></td></tr>
            </tbody>
          </table>
        </div>

        <h3 style="margin-top:24px;">3️⃣ -pje (Na de 'M')</h3>
        <p>Gebruik <strong>-pje</strong> na woorden die eindigen op een <strong>-m</strong> die volgt op een <strong>lange klinker</strong> of een <strong>tweeklank</strong>. (Dit is een "plof"-klank die je vanzelf hoort).</p>
        
        <div class="gw-dim-card">
          <div class="gw-dim-ex"><span class="gw-dim-sg">de boom</span><span class="gw-dim-pl">→ het boompje</span><span class="gw-dim-expl">"Hij plantte een jong <strong>boompje</strong>."</span></div>
          <div class="gw-dim-ex"><span class="gw-dim-sg">de bloem</span><span class="gw-dim-pl">→ het bloempje</span><span class="gw-dim-expl">"Geef mij maar een klein <strong>bloempje</strong>."</span></div>
          <div class="gw-dim-ex"><span class="gw-dim-sg">de duim</span><span class="gw-dim-pl">→ het duimpje</span><span class="gw-dim-expl">"Het kind zoog op zijn <strong>duimpje</strong>."</span></div>
          <div class="gw-dim-ex"><span class="gw-dim-sg">de raam</span><span class="gw-dim-pl">→ het raampje</span><span class="gw-dim-expl">"Het <strong>raampje</strong> van de zolder staat open."</span></div>
          <div class="gw-dim-ex"><span class="gw-dim-sg">de kroon</span><span class="gw-dim-pl">→ het kroontje</span><span class="gw-dim-expl">"De prinses droeg een klein <strong>kroontje</strong>."</span></div>
        </div>

        <div class="gw-note" style="margin-top:12px;">💡 <strong>Uitzondering:</strong> Korte klinker + m → <strong>-metje</strong> (zie hieronder).</div>

        <h3 style="margin-top:24px;">4️⃣ -etje (De Redder van de Korte Klank)</h3>
        <p>Gebruik <strong>-etje</strong> na woorden met een <strong>korte beklemtoonde klinker</strong> die eindigen op <strong>l, n, r, m, ng, b, g</strong>.</p>
        
        <div class="gw-dim-card">
          <div class="gw-dim-ex"><span class="gw-dim-sg">de bal</span><span class="gw-dim-pl">→ het balletje</span><span class="gw-dim-expl">"Gooi jij dat <strong>balletje</strong> even terug?"</span></div>
          <div class="gw-dim-ex"><span class="gw-dim-sg">de man</span><span class="gw-dim-pl">→ het mannetje</span><span class="gw-dim-expl">"Daar staat een vreemd <strong>mannetje</strong>."</span></div>
          <div class="gw-dim-ex"><span class="gw-dim-sg">de kar</span><span class="gw-dim-pl">→ het karretje</span><span class="gw-dim-expl">"We gingen met het <strong>karretje</strong> de berg af."</span></div>
          <div class="gw-dim-ex"><span class="gw-dim-sg">de kam</span><span class="gw-dim-pl">→ het kammetje</span><span class="gw-dim-expl">"Haar <strong>kammetje</strong> lag nog op de wastafel."</span></div>
          <div class="gw-dim-ex"><span class="gw-dim-sg">de kring</span><span class="gw-dim-pl">→ het kringetje</span><span class="gw-dim-expl">"Zij dansten in een klein <strong>kringetje</strong>."</span></div>
          <div class="gw-dim-ex"><span class="gw-dim-sg">de brug</span><span class="gw-dim-pl">→ het bruggetje</span><span class="gw-dim-expl">"Over dat kleine <strong>bruggetje</strong> kun je lopen."</span></div>
          <div class="gw-dim-ex"><span class="gw-dim-sg">de bel</span><span class="gw-dim-pl">→ het belletje</span><span class="gw-dim-expl">"Er hing een zilveren <strong>belletje</strong> aan de kat."</span></div>
        </div>

        <h3 style="margin-top:24px;">5️⃣ -kje (Na de -ING)</h3>
        <p>Gebruik <strong>-kje</strong> na woorden die eindigen op <strong>-ing</strong>. De 'g' valt weg in de uitspraak, maar de 'k' schrijft men wel.</p>
        
        <div class="gw-dim-card">
          <div class="gw-dim-ex"><span class="gw-dim-sg">de woning</span><span class="gw-dim-pl">→ het woninkje</span><span class="gw-dim-expl">"Het is een schattig klein <strong>woninkje</strong>."</span></div>
          <div class="gw-dim-ex"><span class="gw-dim-sg">de koning</span><span class="gw-dim-pl">→ het koninkje</span><span class="gw-dim-expl">"Hij werd het <strong>koninkje</strong> van het schoolplein genoemd."</span></div>
          <div class="gw-dim-ex"><span class="gw-dim-sg">de paling</span><span class="gw-dim-pl">→ het palinkje</span><span class="gw-dim-expl">"Een klein <strong>palinkje</strong> glipte door zijn vingers."</span></div>
          <div class="gw-dim-ex"><span class="gw-dim-sg">de helling</span><span class="gw-dim-pl">→ het hellinkje</span><span class="gw-dim-expl">"De weg ging over een steil <strong>hellinkje</strong>."</span></div>
        </div>
      </div>

      <div class="gw-section">
        <h2>🎭 Deel 3: De Betekenis is Méér dan Alleen "Klein"</h2>
        <p>Het verkleinwoord is een emotioneel Zwitsers zakmes. Je gebruikt het voor:</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Gebruik</th><th>Nuance</th><th>Voorbeeldzin</th></tr></thead>
            <tbody>
              <tr><td><strong>Klein Formaat</strong></td><td>Objectief kleiner.</td><td><em>"Ik heb een <strong>appeltje</strong> voor onderweg."</em></td></tr>
              <tr><td><strong>Affectie / Tederheid</strong></td><td>Liefkozend.</td><td><em>"Kom eens bij mama, <strong>kindje</strong>."</em></td></tr>
              <tr><td><strong>Gezelligheid</strong></td><td>Knus, informeel.</td><td><em>"Zullen we een <strong>biertje</strong> drinken?"</em></td></tr>
              <tr><td><strong>Bescheidenheid</strong></td><td>Iets afzwakken.</td><td><em>"Ik heb een klein <strong>vraagje</strong>."</em></td></tr>
              <tr><td><strong>Minachting / Ironie</strong></td><td>Kleinerend.</td><td><em>"Wat een raar <strong>ventje</strong> is dat."</em></td></tr>
              <tr><td><strong>Gemak / Routine</strong></td><td>Tijdsduiding.</td><td><em>"Ik ben zo terug, ik doe even een <strong>boodschapje</strong>."</em></td></tr>
              <tr><td><strong>Vaste Uitdrukkingen</strong></td><td>Betekenis verandert.</td><td><em>"Dat is een <strong>eitje</strong>."</em> (Makkelijk).</td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"Mijn <strong>oma</strong> is 90 jaar."</em> (Neutraal feit)</span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Mijn <strong>omaatje</strong> is 90 jaar."</em> (Vol warmte en affectie)</span>

          <span class="orig">✨ <em>"Hij dronk een <strong>glas</strong> melk."</em> (Gewoon dorst)</span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Hij dronk een <strong>glaasje</strong> melk."</em> (Klein beetje, of nostalgisch)</span>
        </div>
      </div>

      <div class="gw-section">
        <h2>🏛️ Deel 4: Verkleinwoorden van Leenwoorden en Afkortingen</h2>
        <p>Ook moderne woorden en acroniemen krijgen een verkleinvorm.</p>
        
        <div class="gw-dim-card">

          <p style="margin:0; color:var(--gw-text)">Dit staat bekend als de <strong>buigings-e</strong>.</p>
        </div>

        <div class="gw-table-wrap" style="margin-top:16px;">
          <table class="gw-table">
            <thead><tr><th>Situatie</th><th>Regel</th><th>Voorbeeld</th></tr></thead>
            <tbody>
              <tr><td><strong>1. Voor een DE-woord</strong></td><td><strong>Altijd +E</strong></td><td>de grot<strong>e</strong> hond, een grot<strong>e</strong> hond</td></tr>
              <tr><td><strong>2. Voor een HET-woord met 'HET' of bezittelijk vnw.</strong></td><td><strong>Altijd +E</strong></td><td>het grot<strong>e</strong> paard, mijn grot<strong>e</strong> paard</td></tr>
              <tr><td><strong>3. Voor een HET-woord met 'EEN' of géén lidwoord</strong></td><td><strong>Geen +E</strong> (basisvorm)</td><td>een groot paard, ∅ koud water</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="gw-section">
        <h2>📖 Deel 2: Uitgebreide Uitleg per Situatie</h2>
        
        <h3>✅ Situatie 1: Voor een DE-woord (Altijd met -E)</h3>
        <p>Of er nu <em>de</em>, <em>een</em>, <em>deze</em>, <em>die</em>, <em>mijn</em>, <em>jouw</em> voor staat: het bijvoeglijk naamwoord krijgt <strong>altijd</strong> een <strong>-e</strong>.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Combinatie</th><th>Voorbeeldzin</th><th>Uitleg</th></tr></thead>
            <tbody>
              <tr><td><strong>De + BN + de-woord</strong></td><td><em>"De <strong>oude</strong> man leest de krant."</em></td><td>Bepaald lidwoord <em>de</em> → +e</td></tr>
              <tr><td><strong>Een + BN + de-woord</strong></td><td><em>"Er loopt een <strong>zwarte</strong> kat in de tuin."</em></td><td>Onbepaald lidwoord <em>een</em> maar wél de-woord → +e</td></tr>
              <tr><td><strong>Deze/Die + BN + de-woord</strong></td><td><em>"Deze <strong>mooie</strong> bloemen zijn voor jou."</em></td><td>Aanwijzend voornaamwoord → +e</td></tr>
              <tr><td><strong>Mijn/Jouw/Zijn + BN + de-woord</strong></td><td><em>"Mijn <strong>nieuwe</strong> auto rijdt heerlijk."</em></td><td>Bezittelijk voornaamwoord → +e</td></tr>
              <tr><td><strong>Geen lidwoord + BN (meervoud)</strong></td><td><em>"<strong>Grote</strong> mensen kunnen ook huilen."</em></td><td>Meervoud (altijd <em>de</em>) → +e</td></tr>
            </tbody>
          </table>
        </div>

        <h3 style="margin-top:24px;">✅ Situatie 2: Voor een HET-woord met 'HET' of bezittelijk vnw. (Altijd met -E)</h3>
        <p>Zodra het bepaalde lidwoord <strong>'het'</strong> of een bezittelijk voornaamwoord (<em>mijn, jouw, zijn, haar, ons, jullie, hun</em>) voor het zelfstandig naamwoord staat, is de uitgang <strong>-e</strong> verplicht.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Combinatie</th><th>Voorbeeldzin</th><th>Uitleg</th></tr></thead>
            <tbody>
              <tr><td><strong>Het + BN + het-woord</strong></td><td><em>"Het <strong>kleine</strong> meisje lacht."</em></td><td>Bepaald lidwoord <em>het</em> → +e</td></tr>
              <tr><td><strong>Dit/Dat + BN + het-woord</strong></td><td><em>"Dat <strong>mooie</strong> schilderij hangt scheef."</em></td><td>Aanwijzend voornaamwoord → +e</td></tr>
              <tr><td><strong>Mijn/Jouw/Zijn + BN + het-woord</strong></td><td><em>"Jouw <strong>oude</strong> huis heeft charme."</em></td><td>Bezittelijk voornaamwoord → +e</td></tr>
              <tr><td><strong>Welk + BN + het-woord</strong></td><td><em>"Welk <strong>Franse</strong> woord zoek je?"</em></td><td>Vragend voornaamwoord → +e</td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"Het <strong>hoge</strong> gebouw staat in de stad."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Dit <strong>zachte</strong> kussen slaapt heerlijk."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Haar <strong>blonde</strong> haar glansde in de zon."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Ons <strong>tweede</strong> kind is een meisje."</em></span>
        </div>

        <h3 style="margin-top:24px;">✅ Situatie 3: Voor een HET-woord met 'EEN' of géén lidwoord (Geen -E)</h3>
        <p>Dit is de <strong>enige</strong> situatie waarin het bijvoeglijk naamwoord <strong>kaal</strong> blijft (de basisvorm zonder -e). Het gaat om onzijdige woorden in het enkelvoud die <strong>onbepaald</strong> zijn.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Combinatie</th><th>Voorbeeldzin</th><th>Uitleg</th></tr></thead>
            <tbody>
              <tr><td><strong>Een + BN + het-woord</strong></td><td><em>"Ik heb een <strong>groot</strong> probleem."</em></td><td><em>Een</em> + onzijdig enkelvoud → geen -e</td></tr>
              <tr><td><strong>Geen + BN + het-woord</strong></td><td><em>"Dat is geen <strong>slecht</strong> idee."</em></td><td><em>Geen</em> werkt als <em>een</em> → geen -e</td></tr>
              <tr><td><strong>∅ (Geen lidwoord) + BN + het-woord</strong></td><td><em>"Drink je <strong>koud</strong> bier of <strong>warm</strong> bier?"</em></td><td>Geen lidwoord voor onzijdig stofnaam → geen -e</td></tr>
              <tr><td></td><td><em>"Met <strong>groot</strong> gemak fietste hij weg."</em></td><td>Vaste uitdrukking → geen -e</td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-card gw-card--warn" style="margin-top:16px;">
          <div class="gw-card-title">🔍 De Cruciale Vergelijking (DE vs. HET):</div>
          <div class="gw-table-wrap" style="margin-top:12px;">
            <table class="gw-table">
              <thead><tr><th>Met 'Een' (Onbepaald)</th><th>Met 'Het' (Bepaald)</th></tr></thead>
              <tbody>
                <tr><td><em>een <strong>groot</strong> paard</em> (het-woord)</td><td><em>het <strong>grote</strong> paard</em></td></tr>
                <tr><td><em>een <strong>klein</strong> kind</em> (het-woord)</td><td><em>het <strong>kleine</strong> kind</em></td></tr>
                <tr><td><em>een <strong>mooi</strong> boek</em> (het-woord)</td><td><em>het <strong>mooie</strong> boek</em></td></tr>
              </tbody>
            </table>
          </div>
          <p style="margin-top:12px; margin-bottom:0; color:var(--gw-text)">⚠️ <strong>Let op:</strong> Dit geldt <strong>alleen</strong> voor het-woorden!<br><em>• een <strong>grote</strong> hond</em> (de-woord, dus <strong>altijd</strong> +e)<br><em>• een <strong>mooie</strong> bloem</em> (de-woord, dus <strong>altijd</strong> +e)</p>
        </div>
      </div>

      <div class="gw-section">
        <h2>🧩 Deel 3: De Spelling van de Verbogen Vorm</h2>
        <p>Wanneer je de <strong>-e</strong> toevoegt, moet je de spelling soms aanpassen om de klank te behouden. De regels zijn identiek aan die van het meervoud van zelfstandige naamwoorden.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Regel</th><th>Basisvorm</th><th>Verbogen Vorm (+E)</th><th>Uitleg</th></tr></thead>
            <tbody>
              <tr><td><strong>Standaard</strong></td><td><em>mooi</em></td><td><em>mooi<strong>e</strong></em></td><td>Gewoon toevoegen.</td></tr>
              <tr><td><strong>Lange klinker redden</strong></td><td><em>groot</em></td><td><em>grot<strong>e</strong></em></td><td>Lange 'oo' aan het eind van de lettergreep, dus één 'o' weghalen.</td></tr>
              <tr><td></td><td><em>laat</em></td><td><em>lat<strong>e</strong></em></td><td>Lange 'aa' wordt 'a'.</td></tr>
              <tr><td></td><td><em>geel</em></td><td><em>gel<strong>e</strong></em></td><td>Lange 'ee' wordt 'e'.</td></tr>
              <tr><td><strong>Korte klinker redden</strong></td><td><em>dik</em></td><td><em>dik<strong>ke</strong></em></td><td>Korte 'i' wordt gevolgd door dubbele 'k'.</td></tr>
              <tr><td></td><td><em>wit</em></td><td><em>wit<strong>te</strong></em></td><td>Korte 'i' wordt gevolgd door dubbele 't'.</td></tr>
              <tr><td></td><td><em>fris</em></td><td><em>fris<strong>se</strong></em></td><td>Korte 'i' wordt gevolgd door dubbele 's'.</td></tr>
              <tr><td><strong>'F' wordt 'V'</strong></td><td><em>lief</em></td><td><em>lie<strong>ve</strong></em></td><td>De zachte 'v' komt terug.</td></tr>
              <tr><td></td><td><em>doof</em></td><td><em>do<strong>ve</strong></em></td><td>—</td></tr>
              <tr><td><strong>'S' wordt 'Z'</strong></td><td><em>wijs</em></td><td><em>wij<strong>ze</strong></em></td><td>De zachte 'z' komt terug.</td></tr>
              <tr><td></td><td><em>vies</em></td><td><em>vie<strong>ze</strong></em></td><td>—</td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"Een <strong>groot</strong> huis"</em> → <em>"Het <strong>grote</strong> huis"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Een <strong>dik</strong> boek"</em> → <em>"Het <strong>dikke</strong> boek"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Een <strong>lief</strong> meisje"</em> → <em>"Het <strong>lieve</strong> meisje"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Een <strong>vies</strong> glas"</em> → <em>"Het <strong>vieze</strong> glas"</em></span>
        </div>
      </div>

      <div class="gw-section">
        <h2>🚫 Deel 4: Wanneer Géén -E? (De Uitzonderingen)</h2>
        <p>Er zijn een paar specifieke gevallen waarin je <strong>nooit</strong> een -e schrijft, ongeacht het lidwoord of geslacht.</p>
        
        <h3>1️⃣ Stoffelijke Bijvoeglijke Naamwoorden (Materiaal)</h3>
        <p>Woorden die het materiaal aanduiden eindigen <strong>altijd</strong> op <strong>-en</strong>. Ze krijgen <strong>nooit</strong> een extra -e.</p>
        
        <div class="gw-adj-card">
          <div class="gw-adj-ex"><span class="gw-adj-base">hout</span><span class="gw-adj-inflected">→ houten</span><span class="gw-adj-expl">"De <strong>houten</strong> tafel is antiek."</span></div>
          <div class="gw-adj-ex"><span class="gw-adj-base">goud</span><span class="gw-adj-inflected">→ gouden</span><span class="gw-adj-expl">"Zij droeg een <strong>gouden</strong> ring."</span></div>
          <div class="gw-adj-ex"><span class="gw-adj-base">zilver</span><span class="gw-adj-inflected">→ zilveren</span><span class="gw-adj-expl">"Het <strong>zilveren</strong> bestek glom."</span></div>
          <div class="gw-adj-ex"><span class="gw-adj-base">glas</span><span class="gw-adj-inflected">→ glazen</span><span class="gw-adj-expl">"Pas op voor de <strong>glazen</strong> deur."</span></div>
          <div class="gw-adj-ex"><span class="gw-adj-base">wol</span><span class="gw-adj-inflected">→ wollen</span><span class="gw-adj-expl">"Ik draag graag een <strong>wollen</strong> trui."</span></div>
          <div class="gw-adj-ex"><span class="gw-adj-base">steen</span><span class="gw-adj-inflected">→ stenen</span><span class="gw-adj-expl">"Het <strong>stenen</strong> beeld was zwaar."</span></div>
          <div class="gw-adj-ex"><span class="gw-adj-base">papier</span><span class="gw-adj-inflected">→ papieren</span><span class="gw-adj-expl">"Een <strong>papieren</strong> zakdoekje."</span></div>
        </div>

        <div class="gw-note" style="margin-top:12px;">💡 <strong>Let op:</strong> Moderne materialen of leenwoorden doen hier niet aan mee. Die krijgen wél een -e.<br><em>• "Een <strong>plastic</strong> tas" → "De <strong>plastic</strong> tas"</em> (Niet: plasticen)<br><em>• "Een <strong>nylon</strong> kous" → "De <strong>nylon</strong> kous"</em><br><em>• "Een <strong>aluminium</strong> frame" → "Het <strong>aluminium</strong> frame"</em></div>

        <h3 style="margin-top:24px;">2️⃣ Linkerdeel van een Samenstelling</h3>
        <p>Als een bijvoeglijk naamwoord onderdeel wordt van een samengesteld zelfstandig naamwoord, verliest het de -e.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Met -E (Losse Woorden)</th><th>Zonder -E (Samenstelling)</th></tr></thead>
            <tbody>
              <tr><td><em>de <strong>grote</strong> stad</em></td><td><em>de <strong>groot</strong>stad</em></td></tr>
              <tr><td><em>de <strong>kleine</strong> zoon</em></td><td><em>de <strong>klein</strong>zoon</em></td></tr>
              <tr><td><em>het <strong>hoge</strong> punt</em></td><td><em>het <strong>hoog</strong>punt</em></td></tr>
              <tr><td><em>een <strong>rood</strong> borstje</em></td><td><em>het <strong>rood</strong>borstje</em></td></tr>
            </tbody>
          </table>
        </div>

        <h3 style="margin-top:24px;">3️⃣ Vaste Combinaties met 'Iets', 'Niets', 'Veel', 'Wat', 'Genoeg'</h3>
        <p>Na deze onbepaalde voornaamwoorden krijgt het bijvoeglijk naamwoord <strong>-s</strong> (een oude genitiefvorm). Je schrijft de basisvorm + <strong>s</strong>.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Combinatie</th><th>Voorbeeldzin</th></tr></thead>
            <tbody>
              <tr><td><strong>iets</strong> + BN + <strong>s</strong></td><td><em>"Ik zoek <strong>iets leuks</strong> voor mijn verjaardag."</em></td></tr>
              <tr><td><strong>niets</strong> + BN + <strong>s</strong></td><td><em>"Er is <strong>niets bijzonders</strong> te zien."</em></td></tr>
              <tr><td><strong>veel</strong> + BN + <strong>s</strong></td><td><em>"Daar is <strong>veel moois</strong> te koop."</em></td></tr>
              <tr><td><strong>wat</strong> + BN + <strong>s</strong></td><td><em>"Zij vertelde <strong>wat grappigs</strong>."</em></td></tr>
              <tr><td><strong>genoeg</strong> + BN + <strong>s</strong></td><td><em>"We hebben <strong>genoeg lekkers</strong> in huis."</em></td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"Heb je nog <strong>iets interessants</strong> gehoord?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Er is <strong>niets zoets</strong> meer in de kast."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Dat is <strong>niets nieuws</strong> onder de zon."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Ik wens je <strong>veel goeds</strong>."</em></span>
        </div>

        <h3 style="margin-top:24px;">4️⃣ Enkele Vaste Uitdrukkingen</h3>
        <p>Soms blijft de oude naamvalsvorm bewaard in staande uitdrukkingen.</p>
        <div class="gw-adj-card">
          <div class="gw-adj-ex"><span class="gw-adj-base">Te goeder trouw.</span><span class="gw-adj-inflected">Met goede bedoelingen.</span></div>
          <div class="gw-adj-ex"><span class="gw-adj-base">In koelen bloede.</span><span class="gw-adj-inflected">Zonder emotie.</span></div>
          <div class="gw-adj-ex"><span class="gw-adj-base">Van ganser harte.</span><span class="gw-adj-inflected">Heel graag.</span></div>
          <div class="gw-adj-ex"><span class="gw-adj-base">Met voorbedachten rade.</span><span class="gw-adj-inflected">Met opzet.</span></div>
        </div>
      </div>

      <div class="gw-section">
        <h2>🎭 Deel 5: Bijvoeglijke Naamwoorden die op een Medeklinker eindigen</h2>
        <p>Sommige bijvoeglijke naamwoorden uit andere talen eindigen op een medeklinker of een aparte klinker. De regels zijn hier iets soepeler, maar vaak volgen ze de Nederlandse logica.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Basisvorm</th><th>Regel</th><th>Voorbeeld</th></tr></thead>
            <tbody>
              <tr><td><strong>-en</strong> (bv. <em>open</em>)</td><td>Geen extra -e</td><td><em>"De <strong>open</strong> deur."</em></td></tr>
              <tr><td><strong>-e</strong> (bv. <em>prima</em>)</td><td>Geen extra -e</td><td><em>"Een <strong>prima</strong> idee." / "Het <strong>prima</strong> plan."</em></td></tr>
              <tr><td><strong>-é</strong> (bv. <em>café</em>)</td><td>+e of niks</td><td><em>"Een <strong>café</strong> tafeltje"</em> (of <em>café-achtig</em>)</td></tr>
              <tr><td><strong>-s</strong> (bv. <em>fris</em>)</td><td>+e (frisse)</td><td><em>"Een <strong>frisse</strong> duik."</em></td></tr>
              <tr><td><strong>-x</strong> (bv. <em>fix</em>)</td><td>+e (fixe)</td><td><em>"Een <strong>fixe</strong> prijs."</em></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="gw-section">
        <h2>🧩 Deel 6: Het Voltooid Deelwoord als Bijvoeglijk Naamwoord</h2>
        <p>Een voltooid deelwoord kan ook vóór een zelfstandig naamwoord staan. Het volgt dezelfde regels als normale bijvoeglijke naamwoorden, maar let op de spelling van de stam.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Voltooid Deelwoord</th><th>Voor een Zelfstandig Naamwoord</th><th>Regel</th></tr></thead>
            <tbody>
              <tr><td><em>gewerkt</em></td><td><em>De <strong>gewerkte</strong> uren.</em></td><td>+e</td></tr>
              <tr><td><em>gereisd</em></td><td><em>De <strong>gereisde</strong> route.</em></td><td>+e (stam reis + d + e)</td></tr>
              <tr><td><em>verhuisd</em></td><td><em>De <strong>verhuisde</strong> spullen.</em></td><td>+e (stam verhuis + d + e)</td></tr>
              <tr><td><em>verbreed</em></td><td><em>De <strong>verbrede</strong> weg.</em></td><td>+e (niet 'verbreedde')</td></tr>
              <tr><td><em>verkocht</em></td><td><em>Het <strong>verkochte</strong> huis.</em></td><td>+e</td></tr>
              <tr><td><em>aangekomen</em></td><td><em>De <strong>aangekomen</strong> trein.</em></td><td>Sterk werkwoord: geen extra -d.</td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-card gw-card--tip" style="margin-top:16px;">
          <div class="gw-card-title">🔍 Vergelijk:</div>
          <p style="margin:0; color:var(--gw-text)">• <em>"Het huis is <strong>verkocht</strong>."</em> (Werkwoordelijk deel van het gezegde)<br>• <em>"Het <strong>verkochte</strong> huis was een opknapper."</em> (Bijvoeglijk gebruikt, dus +e)</p>
        </div>
      </div>

      <div class="gw-section">
        <h2>📊 Deel 7: Overzichtsschema (Spiekbriefje)</h2>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Type Zelfstandig Naamwoord</th><th>Lidwoord</th><th>Uitgang BN</th><th>Voorbeeld</th></tr></thead>
            <tbody>
              <tr><td><strong>De-woord</strong></td><td>de / een</td><td><strong>-e</strong></td><td>de <strong>grote</strong> man, een <strong>grote</strong> man</td></tr>
              <tr><td><strong>Het-woord</strong></td><td>het</td><td><strong>-e</strong></td><td>het <strong>grote</strong> paard</td></tr>
              <tr><td><strong>Het-woord</strong></td><td>een</td><td><strong>geen -e</strong></td><td>een <strong>groot</strong> paard</td></tr>
              <tr><td><strong>Het-woord</strong></td><td>∅ (geen lidwoord)</td><td><strong>geen -e</strong></td><td><strong>koud</strong> water</td></tr>
              <tr><td><strong>Meervoud (altijd de)</strong></td><td>de / ∅</td><td><strong>-e</strong></td><td>de <strong>grote</strong> paarden, <strong>grote</strong> paarden</td></tr>
              <tr><td><strong>Stoffelijk BN</strong></td><td>alle</td><td><strong>-en</strong></td><td>de <strong>houten</strong> tafel, een <strong>gouden</strong> ring</td></tr>
              <tr><td><strong>Na 'iets/niets/veel'</strong></td><td>-</td><td><strong>-s</strong></td><td>iets <strong>moois</strong>, niets <strong>bijzonders</strong></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="gw-section">
        <h2>⚠️ Deel 8: Veelgemaakte Fouten en Hun Correcties</h2>

      <div class="gw-hero">
        <h1>🧭 Voorzetsels</h1>
        <p>Op, in, aan, met, naar — ruimtelijk, temporeel, vast bij werkwoorden</p>
      </div>

      <div class="gw-section">
        <p>De <strong>voorzetsels</strong> zijn de kleine regisseurs van de Nederlandse taal. Ze lijken onschuldig (<em>op, in, aan, met, naar</em>), maar ze bepalen de relatie tussen woorden, de richting van je beweging en zelfs de betekenis van complete werkwoorden. Een verkeerd voorzetsel kan een zin volledig laten ontsporen (letterlijk: <em>op</em> het spoor of <em>naast</em> het spoor?).</p>
        <p>Deze gids is jouw complete, foutloze en prachtig geïllustreerde naslagwerk. We behandelen de ruimtelijke basis, de vaste combinaties met werkwoorden, de tijdsbepalingen en de grootste valkuilen. Uiteraard met een <strong>overvloed aan schitterende voorbeelden</strong>.</p>
      </div>

      <div class="gw-section">
        <h2>🧭 Deel 1: De Ruimtelijke Basis – Waar is het? Waar gaat het heen?</h2>
        <p>Het Nederlands maakt een scherp onderscheid tussen <strong>positie</strong> (waar ben je?) en <strong>richting</strong> (waar ga je heen?). Dit onderscheid is cruciaal en verklaart veel fouten.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Voorzetsel</th><th>Positie (Waar?)</th><th>Richting (Waarheen?)</th><th>Prachtige Voorbeelden</th></tr></thead>
            <tbody>
              <tr><td><strong>in</strong></td><td><em>in de kast</em></td><td><em>in de kast (leggen)</em></td><td><em>"Het boek ligt <strong>in</strong> de kast." / "Ik leg het boek <strong>in</strong> de kast."</em></td></tr>
              <tr><td><strong>op</strong></td><td><em>op de tafel</em></td><td><em>op de tafel</em></td><td><em>"De vaas staat <strong>op</strong> de tafel." / "Zet de vaas <strong>op</strong> de tafel."</em></td></tr>
              <tr><td><strong>aan</strong></td><td><em>aan de muur</em></td><td><em>aan de muur</em></td><td><em>"Het schilderij hangt <strong>aan</strong> de muur." / "Hang het schilderij <strong>aan</strong> de muur."</em></td></tr>
              <tr><td><strong>bij</strong></td><td><em>bij de deur</em></td><td><em>naar de deur (toe)</em></td><td><em>"Ik sta <strong>bij</strong> de deur." / "Ik loop <strong>naar</strong> de deur."</em></td></tr>
              <tr><td><strong>onder</strong></td><td><em>onder het bed</em></td><td><em>onder het bed</em></td><td><em>"De kat zit <strong>onder</strong> het bed." / "De kat kruipt <strong>onder</strong> het bed."</em></td></tr>
              <tr><td><strong>tussen</strong></td><td><em>tussen de boeken</em></td><td><em>tussen de boeken</em></td><td><em>"De foto zit <strong>tussen</strong> de boeken." / "Ik stop de foto <strong>tussen</strong> de boeken."</em></td></tr>
            </tbody>
          </table>
        </div>

        <h3 style="margin-top:24px;">🏙️ De Beruchte Tweeling: 'Naar' en 'In' bij Steden en Landen</h3>
        <p>Dit is een klassieke struikelblok. De regel is simpel maar moet je onthouden:</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Situatie</th><th>Voorzetsel</th><th>Voorbeeld</th></tr></thead>
            <tbody>
              <tr><td><strong>Beweging naar een stad/land</strong></td><td><strong>naar</strong></td><td><em>"Ik ga <strong>naar</strong> Amsterdam." / "Zij vliegt <strong>naar</strong> Frankrijk."</em></td></tr>
              <tr><td><strong>Je bent er al (Positie)</strong></td><td><strong>in</strong></td><td><em>"Ik ben <strong>in</strong> Amsterdam." / "Zij woont <strong>in</strong> Frankrijk."</em></td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"De auto staat <strong>voor</strong> de deur." (Positie)</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Parkeer de auto maar <strong>voor</strong> de deur." (Richting)</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Het vliegtuig vliegt <strong>over</strong> de wolken." (Richting/Beweging)</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Er hangt een lamp <strong>boven</strong> de eettafel." (Positie)</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Zij liep rustig <strong>langs</strong> het water." (Richting)</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"De brief is <strong>per</strong> post verstuurd." (Middel/Wijze)</em></span>
        </div>
      </div>

      <div class="gw-section">
        <h2>🕰️ Deel 2: Voorzetsels van Tijd – Wanneer?</h2>
        <p>Hier zit een strakke logica in, maar je moet de categorieën kennen.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Voorzetsel</th><th>Gebruik voor...</th><th>Prachtige Voorbeelden</th></tr></thead>
            <tbody>
              <tr><td><strong>om</strong></td><td>Exacte tijdstippen</td><td><em>"De trein vertrekt <strong>om</strong> 14:15 uur."<br>"We eten <strong>om</strong> zes uur."</em></td></tr>
              <tr><td><strong>op</strong></td><td>Dagen en data</td><td><em>"<strong>Op</strong> maandag ga ik sporten."<br>"Zij is jarig <strong>op</strong> 3 mei."<br>"<strong>Op</strong> mijn verjaardag trakteer ik."</em></td></tr>
              <tr><td><strong>in</strong></td><td>Maanden, jaren, seizoenen, dagdelen</td><td><em>"<strong>In</strong> december vieren we kerst."<br>"Hij is geboren <strong>in</strong> 1990."<br>"<strong>In</strong> de zomer gaan we kamperen."<br>"<strong>In</strong> de ochtend drink ik koffie."</em></td></tr>
              <tr><td><strong>over</strong></td><td>Toekomstige tijdsduur (na verloop van)</td><td><em>"<strong>Over</strong> tien minuten begint de film."<br>"<strong>Over</strong> een jaar zijn we klaar met de studie."</em></td></tr>
              <tr><td><strong>sinds</strong></td><td>Beginpunt in het verleden dat nog voortduurt</td><td><em>"Ik woon hier <strong>sinds</strong> 2015."<br>"<strong>Sinds</strong> vorige week is het koud."</em></td></tr>
              <tr><td><strong>vanaf</strong></td><td>Beginpunt in de toekomst</td><td><em>"<strong>Vanaf</strong> morgen ga ik op dieet."<br>"De winkel is open <strong>vanaf</strong> 9 uur."</em></td></tr>
              <tr><td><strong>tot</strong></td><td>Eindpunt</td><td><em>"Ik werk <strong>tot</strong> vijf uur."<br>"<strong>Tot</strong> morgen!"</em></td></tr>
              <tr><td><strong>gedurende</strong></td><td>Tijdens (formeel)</td><td><em>"<strong>Gedurende</strong> de vergadering is bellen verboden."</em></td></tr>

        <p>Hier is een lijst met de meest voorkomende <strong>werkwoord + vast voorzetsel</strong> combinaties, met héél véél voorbeelden.</p>

              <tr><td><strong>wachten</strong></td><td><strong>op</strong></td><td><em>"Ik <strong>wacht op</strong> de bus."<br>"Zij <strong>wachtte op</strong> een antwoord."</em></td></tr>
              <tr><td><strong>luisteren</strong></td><td><strong>naar</strong></td><td><em>"<strong>Luister</strong> je wel <strong>naar</strong> mij?"<br>"Wij <strong>luisteren naar</strong> het journaal."</em></td></tr>
              <tr><td><strong>kijken</strong></td><td><strong>naar</strong></td><td><em>"Zij <strong>kijkt naar</strong> de zonsondergang."<br>"<strong>Kijk</strong> eens <strong>naar</strong> die mooie auto!"</em></td></tr>

              <tr><td><strong>vragen</strong></td><td><strong>om</strong></td><td><em>"Zij <strong>vroeg om</strong> een glas water."<br>"Ik <strong>vraag om</strong> begrip."</em></td></tr>
              <tr><td><strong>solliciteren</strong></td><td><strong>naar</strong></td><td><em>"Hij <strong>solliciteert naar</strong> die baan."<br>"Ik heb <strong>naar</strong> die functie <strong>gesolliciteerd</strong>."</em></td></tr>

          <p style="margin:0; color:var(--gw-text)">Veel van deze combinaties werken met scheidbare werkwoorden. Het voorzetsel is dan <strong>onderdeel van het werkwoord</strong> en splitst af.<br><em>"Ik <strong>reken op</strong> je."</em> → <em>"Ik <strong>reken</strong> morgen <strong>op</strong> je."</em><br><em>"Hij <strong>luistert naar</strong> muziek."</em> → <em>"Hij <strong>luistert</strong> graag <strong>naar</strong> muziek."</em></p>

        <div class="gw-table-wrap">

              <tr><td><strong>Wiens / Wier</strong></td><td>Bezittelijk</td><td>Bezit (van wie?)</td></tr>
              <tr><td><strong>Waar + voorzetsel</strong></td><td>Bijwoordelijk</td><td>Plaats, reden, middel, etc.</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="gw-section">
        <h2>👤 Deel 2: 'Wie' – Vragen naar Personen</h2>
        <p><strong>Wie</strong> gebruik je uitsluitend voor <strong>personen</strong> (of gepersonifieerde wezens, zoals huisdieren met een naam). Het staat <strong>zelfstandig</strong>—er volgt geen zelfstandig naamwoord direct achter.</p>
        
        <h3>📋 Basisvoorbeelden:</h3>
        <div class="gw-example">
          <span class="orig">📌 <strong>Wie</strong> heeft de koekjes opgegeten? <em>(Onderwerp)</em></span>
          <span class="orig" style="margin-top:4px;">📌 <strong>Wie</strong> zoek je? <em>(Lijdend voorwerp)</em></span>
          <span class="orig" style="margin-top:4px;">📌 Aan <strong>wie</strong> denk je? <em>(Na een voorzetsel)</em></span>
          <span class="orig" style="margin-top:4px;">📌 Met <strong>wie</strong> ga je naar het feest?</span>
          <span class="orig" style="margin-top:4px;">📌 <strong>Wie</strong> van jullie wil er een ijsje?</span>
        </div>

        <div class="gw-card gw-card--tip" style="margin-top:16px;">
          <div class="gw-card-title">📍 Let op de Woordvolgorde:</div>
          <p style="margin:0; color:var(--gw-text)">Net als bij andere vraagzinnen komt het onderwerp <strong>na</strong> de persoonsvorm, tenzij <em>wie</em> zelf het onderwerp is.<br><em>"<strong>Wie</strong> komt er vanavond?"</em> (<em>Wie</em> = onderwerp, dus inversie is niet van toepassing)<br><em>"<strong>Wie</strong> heb jij uitgenodigd?"</em> (<em>Jij</em> = onderwerp, dus inversie: heb jij)</p>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"<strong>Wie</strong> heeft er zin in een kop koffie?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Weet jij <strong>wie</strong> dat prachtige schilderij gemaakt heeft?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Aan <strong>wie</strong> moet ik het pakketje afgeven?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Wie</strong> van de twee kandidaten krijgt jouw stem?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Wie</strong> niet weg is, is gezien." <small>(Spreekwoordelijk)</small></em></span>
        </div>
      </div>

      <div class="gw-section">
        <h2>📦 Deel 3: 'Wat' – Vragen naar Zaken, Dieren en Abstracties</h2>
        <p><strong>Wat</strong> gebruik je <strong>zelfstandig</strong> voor alles wat géén persoon is: dingen, dieren, concepten, situaties, stoffen.</p>
        
        <h3>📋 Basisvoorbeelden:</h3>
        <div class="gw-example">
          <span class="orig">📌 <strong>Wat</strong> ligt daar op de grond?</span>
          <span class="orig" style="margin-top:4px;">📌 <strong>Wat</strong> heb je gisteren gedaan?</span>
          <span class="orig" style="margin-top:4px;">📌 Met <strong>wat</strong> kan ik je helpen?</span>
          <span class="orig" style="margin-top:4px;">📌 <strong>Wat</strong> is de hoofdstad van België?</span>
          <span class="orig" style="margin-top:4px;">📌 <strong>Wat</strong> voor geluid is dat? <em>(Hier begint de combinatie <em>wat voor</em>)</em></span>
        </div>

        <div class="gw-card gw-card--warn" style="margin-top:16px;">
          <div class="gw-card-title">🔍 Let op het Verschil met 'Welke':</div>
          <p style="margin:0; color:var(--gw-text)"><strong>Wat</strong> is <strong>algemeen</strong>, <strong>welke</strong> is <strong>specifiek</strong>.<br><em>"<strong>Wat</strong> wil je drinken?"</em> (Alles is mogelijk: koffie, thee, water, limonade)<br><em>"<strong>Welke</strong> wijn wil je drinken?"</em> (Je kiest uit de rode of de witte wijn op tafel)</p>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"<strong>Wat</strong> is er aan de hand?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Wat</strong> eten we vanavond?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Wat</strong> is jouw favoriete boek?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Wat</strong> een prachtig uitzicht!" <small>(Uitroepend gebruik)</small></em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Ik weet niet <strong>wat</strong> ik moet zeggen."</em></span>
        </div>
      </div>

      <div class="gw-section">
        <h2>🎯 Deel 4: 'Welke' – Keuze uit een Beperkte Verzameling</h2>
        <p><strong>Welke</strong> is het enige vragend voornaamwoord dat <strong>verbuigt</strong> naar geslacht en getal. Het staat <strong>bijvoeglijk</strong> (vóór een zelfstandig naamwoord). Je gebruikt het wanneer er een <strong>beperkte, bekende groep</strong> is waaruit gekozen wordt.</p>
        
        <h3>📋 Vervoegingstabel:</h3>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Geslacht / Getal</th><th>Vorm</th><th>Voorbeeld</th></tr></thead>
            <tbody>
              <tr><td><strong>De-woorden</strong> (mannelijk/vrouwelijk enkelvoud)</td><td><strong>welke</strong></td><td><em>"<strong>Welke</strong> film zullen we kijken?"</em></td></tr>
              <tr><td><strong>Het-woorden</strong> (onzijdig enkelvoud)</td><td><strong>welk</strong></td><td><em>"<strong>Welk</strong> boek raad je me aan?"</em></td></tr>
              <tr><td><strong>Meervoud</strong> (alle geslachten)</td><td><strong>welke</strong></td><td><em>"<strong>Welke</strong> schoenen trek je aan?"</em></td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-card gw-card--rule" style="margin-top:16px;">
          <div class="gw-card-title">⚠️ Cruciaal:</div>
          <p style="margin:0; color:var(--gw-text)">Voor <strong>het-woorden</strong> in het enkelvoud vervalt de <strong>-e</strong>. Je schrijft dus <strong>welk</strong>.<br><em>"<strong>Welk</strong> glas is van mij?"</em> (Het glas)<br><em>"<strong>Welk</strong> probleem bedoel je?"</em> (Het probleem)<br><em>"<strong>Welk</strong> jurkje zal ik aandoen?"</em> (Het jurkje = verkleinwoord, dus het-woord)</p>
        </div>

        <h3 style="margin-top:24px;">🔄 Zelfstandig Gebruik van 'Welke':</h3>
        <p>Als het zelfstandig naamwoord al eerder genoemd is, kun je het weglaten en alleen <em>welke</em> gebruiken. Het verwijst dan terug.</p>
        <div class="gw-example">
          <span class="orig">📌 <em>"Hier zijn drie boeken. <strong>Welke</strong> wil je lezen?"</em> (In plaats van: <em>Welk boek</em>)</span>
          <span class="orig" style="margin-top:4px;">📌 <em>"Ik heb twee pennen. <strong>Welke</strong> wil je lenen?"</em></span>
          <span class="orig" style="margin-top:4px;">📌 <em>"Er liggen veel schoenen. <strong>Welke</strong> zijn van jou?"</em></span>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"<strong>Welke</strong> dag van de week is het vandaag?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Welk</strong> nummer zal ik voor je draaien?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Welke</strong> kleur vind je het mooist?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Welke</strong> van deze twee opties kies je?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Welk</strong> station moet ik uitstappen?"</em></span>
        </div>
      </div>

      <div class="gw-section">
        <h2>🎨 Deel 5: 'Wat voor (een)' – Vragen naar Soort of Eigenschap</h2>
        <p>Deze constructie gebruik je wanneer je vraagt naar de <strong>aard</strong>, de <strong>categorie</strong> of de <strong>eigenschap</strong> van iets. Het antwoord is meestal een bijvoeglijk naamwoord of een categorieaanduiding.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Constructie</th><th>Gebruik voor...</th><th>Voorbeeld</th></tr></thead>
            <tbody>
              <tr><td><strong>Wat voor + ZN</strong> (zonder lidwoord)</td><td>Meervoud of ontelbare stoffen</td><td><em>"<strong>Wat voor</strong> muziek luister je?"</em></td></tr>
              <tr><td><strong>Wat voor een + ZN</strong> (met 'een')</td><td>Enkelvoud telbaar</td><td><em>"<strong>Wat voor een</strong> auto heb je?"</em></td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">📌 <em>"<strong>Wat voor</strong> werk doe je?"</em> (Antwoord: <em>Interessant werk / Kantoorwerk</em>)</span>
          <span class="orig" style="margin-top:4px;">📌 <em>"<strong>Wat voor een</strong> dag is het?"</em> (Antwoord: <em>Een mooie dag / Een drukke dag</em>)</span>
          <span class="orig" style="margin-top:4px;">📌 <em>"<strong>Wat voor</strong> kleur ogen heeft hij?"</em> (Antwoord: <em>Blauwe ogen</em>)</span>
          <span class="orig" style="margin-top:4px;">📌 <em>"<strong>Wat voor</strong> weer wordt het?"</em> (Antwoord: <em>Zonnig weer</em>)</span>
        </div>

        <h3 style="margin-top:24px;">🔍 Vergelijk 'Welke' en 'Wat voor (een)'</h3>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Vraag</th><th>Antwoordtype</th><th>Nuance</th></tr></thead>
            <tbody>
              <tr><td><em>"<strong>Welke</strong> auto is van jou?"</em></td><td><em>"Die rode."</em></td><td>Keuze uit een zichtbare groep.</td></tr>
              <tr><td><em>"<strong>Wat voor</strong> auto heb je?"</em></td><td><em>"Een elektrische."</em></td><td>Vraag naar type/merk/eigenschap.</td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"<strong>Wat voor een</strong> verrassing had je in gedachten?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Wat voor</strong> eten zullen we bestellen?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Wat voor</strong> plant is dit eigenlijk?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Wat voor</strong> iemand is hij?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Wat voor</strong> geluid maakt een vos?"</em></span>
        </div>
      </div>

      <div class="gw-section">
        <h2>🧬 Deel 6: 'Wiens' en 'Wier' – Vragen naar Bezit (Formeel)</h2>
        <p>Dit zijn de bezittelijke vragende voornaamwoorden. In de <strong>informele spreektaal</strong> gebruiken we ze bijna niet; we zeggen dan <em>"Van wie is...?"</em>. In de <strong>formele schrijftaal</strong> komen ze nog volop voor en het is goed om ze te herkennen.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Vorm</th><th>Gebruik</th><th>Voorbeeld</th></tr></thead>
            <tbody>
              <tr><td><strong>Wiens</strong></td><td>Mannelijk en onzijdig enkelvoud (van hem/het)</td><td><em>"<strong>Wiens</strong> boek is dit?"</em> (Van wie is dit boek?)</td></tr>
              <tr><td><strong>Wier</strong></td><td>Vrouwelijk enkelvoud en meervoud (van haar/hun)</td><td><em>"De vrouw <strong>wier</strong> portemonnee gestolen was."</em></td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-card gw-card--tip" style="margin-top:16px;">
          <div class="gw-card-title">🔄 Modern Alternatief:</div>
          <p style="margin:0; color:var(--gw-text)">• Informeel: <em>"<strong>Van wie</strong> is deze jas?"</em><br>• Formeel: <em>"<strong>Wiens</strong> jas is dit?"</em></p>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"De auteur <strong>wiens</strong> boeken wereldwijd gelezen worden."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"De weduwe <strong>wier</strong> man onlangs overleden is."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Wiens</strong> idee was het om dit te doen?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"De kinderen <strong>wier</strong> ouders niet kwamen opdagen."</em></span>
        </div>
      </div>

      <div class="gw-section">
        <h2>🌍 Deel 7: Vragende Bijwoorden – De 'Waar-' Familie</h2>
        <p>Dit is een extreem belangrijk onderdeel van het Nederlands. Waar het Engels <em>"What ... for?"</em> of <em>"With what?"</em> zegt, plakt het Nederlands het voorzetsel vast aan <strong>waar</strong>.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Vraagwoord</th><th>Betekenis</th><th>Voorbeeldzin</th></tr></thead>
            <tbody>
              <tr><td><strong>Waar</strong></td><td>Locatie</td><td><em>"<strong>Waar</strong> woon je?"</em></td></tr>
              <tr><td><strong>Waarheen</strong> / <strong>Waar ... naartoe</strong></td><td>Richting</td><td><em>"<strong>Waar</strong> ga je <strong>naartoe</strong>?"</em></td></tr>
              <tr><td><strong>Waarvandaan</strong></td><td>Herkomst</td><td><em>"<strong>Waar</strong> kom je <strong>vandaan</strong>?"</em></td></tr>
              <tr><td><strong>Wanneer</strong></td><td>Tijd</td><td><em>"<strong>Wanneer</strong> begint de film?"</em></td></tr>
              <tr><td><strong>Waarom</strong></td><td>Reden</td><td><em>"<strong>Waarom</strong> huil je?"</em></td></tr>
              <tr><td><strong>Waardoor</strong></td><td>Oorzaak</td><td><em>"<strong>Waardoor</strong> werd het ongeluk veroorzaakt?"</em></td></tr>
              <tr><td><strong>Waarmee</strong></td><td>Middel / Instrument</td><td><em>"<strong>Waarmee</strong> kan ik betalen?"</em></td></tr>
              <tr><td><strong>Waarover</strong></td><td>Onderwerp</td><td><em>"<strong>Waarover</strong> gaat het boek?"</em></td></tr>
              <tr><td><strong>Waarvoor</strong></td><td>Doel</td><td><em>"<strong>Waarvoor</strong> gebruik je dit gereedschap?"</em></td></tr>
              <tr><td><strong>Waarop</strong></td><td>Oppervlak / Moment</td><td><em>"<strong>Waarop</strong> wacht je?"</em></td></tr>
              <tr><td><strong>Waaraan</strong></td><td>Bevestiging / Oorzaak</td><td><em>"<strong>Waaraan</strong> denk je?"</em></td></tr>
              <tr><td><strong>Waarvan</strong></td><td>Materiaal / Bezit</td><td><em>"<strong>Waarvan</strong> is dit gemaakt?"</em></td></tr>
              <tr><td><strong>Waartegen</strong></td><td>Verzet</td><td><em>"<strong>Waartegen</strong> protesteer je?"</em></td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-card gw-card--warn" style="margin-top:16px;">
          <div class="gw-card-title">🔀 Let op de Splitsing:</div>
          <p style="margin:0; color:var(--gw-text)">Als het voorzetsel <strong>achteraan</strong> in de zin staat, wordt de <em>waar-</em> combinatie gesplitst in <strong>waar ... voorzetsel</strong>.<br><em>"<strong>Waar</strong> wacht je <strong>op</strong>?"</em> (i.p.v. <em>Waarop wacht je?</em>)<br><em>"<strong>Waar</strong> denk je <strong>aan</strong>?"</em> (i.p.v. <em>Waaraan denk je?</em>)<br><em>"<strong>Waar</strong> kijk je <strong>naar</strong>?"</em> (i.p.v. <em>Waarnaar kijk je?</em>)<br><br><strong>De Gesplitste Vorm is in de spreektaal véél gebruikelijker!</strong></p>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"<strong>Waar</strong> heb je het <strong>over</strong>?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Waar</strong> droom je <strong>van</strong>?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Waar</strong> is dat <strong>van</strong> gemaakt?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Waar</strong> ben je <strong>mee</strong> bezig?"</em> <small>(Let op: <em>mee</em> in plaats van <em>met</em>)</small></span>
        </div>
      </div>

      <div class="gw-section">
        <h2>🧩 Deel 8: Combinatie met Voorzetsels (Vaste Verbindingen)</h2>
        <p>Sommige werkwoorden hebben een <strong>vast voorzetsel</strong>. In vraagzinnen moet dat voorzetsel mee, en vaak splitst het zich af naar het einde van de zin.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Werkwoord + Vast Voorzetsel</th><th>Vraagzin (Gesplitst)</th><th>Vraagzin (Ongesplitst / Formeel)</th></tr></thead>
            <tbody>
              <tr><td><em>houden van</em></td><td><em>"<strong>Waar</strong> hou jij <strong>van</strong>?"</em></td><td><em>"<strong>Waarvan</strong> hou jij?"</em></td></tr>
              <tr><td><em>denken aan</em></td><td><em>"<strong>Waar</strong> denk je <strong>aan</strong>?"</em></td><td><em>"<strong>Waaraan</strong> denk je?"</em></td></tr>
              <tr><td><em>wachten op</em></td><td><em>"<strong>Waar</strong> wacht je <strong>op</strong>?"</em></td><td><em>"<strong>Waarop</strong> wacht je?"</em></td></tr>
              <tr><td><em>luisteren naar</em></td><td><em>"<strong>Waar</strong> luister je <strong>naar</strong>?"</em></td><td><em>"<strong>Waarnaar</strong> luister je?"</em></td></tr>
              <tr><td><em>praten over</em></td><td><em>"<strong>Waar</strong> praten jullie <strong>over</strong>?"</em></td><td><em>"<strong>Waarover</strong> praten jullie?"</em></td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"<strong>Waar</strong> ben je bang <strong>voor</strong>?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Waar</strong> verlang je <strong>naar</strong>?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Waar</strong> erger jij je <strong>aan</strong>?"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Waar</strong> twijfel je <strong>aan</strong>?"</em></span>
        </div>
      </div>

      <div class="gw-section">
        <h2>⚠️ Deel 9: Veelgemaakte Fouten en Hun Correcties</h2>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Fout ❌</th><th>Correctie ✅</th><th>Waarom?</th></tr></thead>
            <tbody>
              <tr><td><em>Wie auto is dit?</em></td><td><strong>Wiens</strong> auto is dit? (of: Van wie is deze auto?)</td><td><em>Wie</em> kan niet bezittelijk zijn.</td></tr>
              <tr><td><em>Wat boek lees je?</em></td><td><strong>Welk</strong> boek lees je?</td><td><em>Wat</em> is zelfstandig; voor <em>boek</em> (het-woord) gebruik je <em>welk</em>.</td></tr>
              <tr><td><em>Welke glas is van mij?</em></td><td><strong>Welk</strong> glas is van mij?</td><td><em>Glas</em> is een het-woord, dus <em>welk</em> zonder -e.</td></tr>
              <tr><td><em>Wat voor kleur?</em> (in plaats van <em>Welke</em>)</td><td>Beide kunnen, maar nuance verschilt.</td><td><em>"Welke kleur?"</em> = keuze uit rood/blauw. <em>"Wat voor kleur?"</em> = vraag naar soort (warme kleur?).</td></tr>
              <tr><td><em>Waar ga je heen?</em></td><td>Waar ga je <strong>naartoe</strong>?</td><td><em>Heen</em> is formeel; <em>naartoe</em> is de gebruikelijke vorm.</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="gw-section">
        <h2>💡 Deel 10: Pro-Tips & Ezelsbruggetjes</h2>
        <ol>

    <div class="gw-wrap">
      <div class="gw-hero">
        <h1>🏛️ Zinsvolgorde in Hoofdzinnen</h1>
        <p>Inversie en de V2-regel — de dans van het onderwerp en de persoonsvorm</p>
      </div>

      <div class="gw-section">
        <p>Met groot genoegen duiken we in een van de meest fundamentele en tegelijkertijd meest elegante onderdelen van de Nederlandse grammatica: de <strong>zinsvolgorde in hoofdzinnen</strong>. Dit is het terrein van de beroemde <strong>V2-regel</strong> (werkwoord op de tweede plaats), de dans van het onderwerp en de persoonsvorm, en de kunst van het plaatsen van alle andere zinsdelen op de juiste plek.</p>
        <p>Deze gids is jouw complete, foutloze en prachtig geïllustreerde naslagwerk. We behandelen alles van de basisstructuur tot de fijnste nuances van inversie, de positie van <em>niet</em> en <em>er</em>, en de volgorde van werkwoordsclusters aan het einde. Uiteraard met een <strong>overvloed aan schitterende voorbeelden</strong>.</p>
      </div>

      <div class="gw-section">
        <h2>🏛️ Deel 1: De Gouden Regel van de Nederlandse Hoofdzin – V2</h2>
        <p>De absolute basisregel voor elke mededelende hoofdzin (en ja/nee-vraagzin) in het Nederlands is de <strong>V2-regel</strong>: het <strong>vervoegde werkwoord</strong> (de persoonsvorm) staat altijd op de <strong>tweede positie</strong> in de zin.</p>
        
        <div class="gw-card gw-card--rule">
          <div class="gw-card-title">📐 Wat is de "eerste positie"?</div>
          <p style="margin:0; color:var(--gw-text)">De eerste positie wordt ingenomen door <strong>één zinsdeel</strong>. Dat kan het onderwerp zijn, maar ook een tijd- of plaatsbepaling, een lijdend voorwerp, of zelfs een hele bijzin.</p>
        </div>

        <div class="gw-table-wrap" style="margin-top:16px;">
          <table class="gw-table">
            <thead><tr><th>Eerste Positie (1)</th><th>Tweede Positie = Persoonsvorm (2)</th><th>Rest van de Zin (3, 4, 5...)</th></tr></thead>
            <tbody>
              <tr><td><strong>Ik</strong></td><td><strong>ga</strong></td><td>morgen naar de bioscoop.</td></tr>
              <tr><td><strong>Morgen</strong></td><td><strong>ga</strong></td><td>ik naar de bioscoop.</td></tr>
              <tr><td><strong>Naar de bioscoop</strong></td><td><strong>ga</strong></td><td>ik morgen.</td></tr>
              <tr><td><strong>Omdat ik jarig ben,</strong></td><td><strong>trakteer</strong></td><td>ik vandaag op taart.</td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-card gw-card--warn" style="margin-top:16px;">
          <div class="gw-card-title">⚠️ Cruciaal:</div>
          <p style="margin:0; color:var(--gw-text)">Het onderwerp (<em>ik</em>) staat <strong>direct naast</strong> de persoonsvorm (<em>ga</em>). Als het onderwerp niet op de eerste plek staat, komt het direct op de derde plek. Dit heet <strong>inversie</strong> (omkering van onderwerp en persoonsvorm).</p>
        </div>
      </div>

      <div class="gw-section">
        <h2>🧱 Deel 2: De Basisstructuur – Onderwerp, Persoonsvorm, Rest</h2>
        <p>In de meest neutrale hoofdzin begint de zin met het <strong>onderwerp</strong>, gevolgd door de <strong>persoonsvorm</strong>. De rest van de informatie volgt daarna.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Structuur</th><th>Voorbeeldzin</th></tr></thead>
            <tbody>
              <tr><td><strong>Onderwerp – PV – (Rest)</strong></td><td><em>"<strong>De kat</strong> (O) <strong>zit</strong> (PV) op de mat."</em></td></tr>
              <tr><td></td><td><em>"<strong>Wij</strong> (O) <strong>hebben</strong> (PV) gisteren een nieuwe auto <strong>gekocht</strong>."</em></td></tr>
              <tr><td></td><td><em>"<strong>Het regent</strong> (O+PV) pijpenstelen."</em> <small>(Hier vallen O en PV samen in 'het regent')</small></td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"<strong>De zon schijnt</strong> fel aan de hemel."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Mijn zusje leest</strong> elke avond een verhaaltje voor het slapengaan."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>De leraar legde</strong> het moeilijke onderwerp geduldig uit."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Ik wil</strong> volgend jaar graag een wereldreis <strong>maken</strong>."</em></span>
        </div>
      </div>

      <div class="gw-section">
        <h2>🔄 Deel 3: Inversie – Wanneer het Onderwerp de Persoonsvorm Volgt</h2>
        <p>Zodra de eerste positie wordt ingenomen door een <strong>ander zinsdeel dan het onderwerp</strong>, vindt <strong>inversie</strong> plaats. Het onderwerp schuift dan een plekje op en komt <strong>direct na de persoonsvorm</strong>.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Eerste Positie (Niet-Onderwerp)</th><th>PV (2e plek)</th><th>Onderwerp (3e plek)</th><th>Rest</th></tr></thead>
            <tbody>
              <tr><td><strong>Morgen</strong></td><td><strong>ga</strong></td><td><strong>ik</strong></td><td>naar Amsterdam.</td></tr>
              <tr><td><strong>In de zomer</strong></td><td><strong>zwemmen</strong></td><td><strong>wij</strong></td><td>elke dag in het meer.</td></tr>
              <tr><td><strong>Die film</strong></td><td><strong>heb</strong></td><td><strong>ik</strong></td><td>nog nooit gezien.</td></tr>
              <tr><td><strong>Vanwege de storm</strong></td><td><strong>bleven</strong></td><td><strong>de scholen</strong></td><td>gesloten.</td></tr>
              <tr><td><strong>Gelukkig</strong></td><td><strong>was</strong></td><td><strong>het</strong></td><td>op tijd droog.</td></tr>
            </tbody>
          </table>
        </div>

        <h3 style="margin-top:24px;">🔍 Inversie in Vraagzinnen (Ja/Nee-vragen):</h3>
        <p>In een ja/nee-vraag is de eerste positie leeg. De persoonsvorm komt dan op de eerste plek, gevolgd door het onderwerp.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>(Leeg)</th><th>PV (1e plek)</th><th>Onderwerp (2e plek)</th><th>Rest</th></tr></thead>
            <tbody>
              <tr><td>-</td><td><strong>Ga</strong></td><td><strong>jij</strong></td><td>morgen mee?</td></tr>
              <tr><td>-</td><td><strong>Heeft</strong></td><td><strong>hij</strong></td><td>de trein gehaald?</td></tr>
              <tr><td>-</td><td><strong>Zal</strong></td><td><strong>het</strong></td><td>morgen regenen?</td></tr>
              <tr><td>-</td><td><strong>Werkt</strong></td><td><strong>deze printer</strong></td><td>nog?</td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"<strong>Vandaag begint</strong> de lente."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Op de hoek van de straat staat</strong> een prachtig oud huis."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Nooit heb</strong> ik zoiets vreemds meegemaakt!"</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Na het eten gaan</strong> we een stukje wandelen."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Kom jij</strong> ook naar het feest?"</em></span>
        </div>

        <div class="gw-note" style="margin-top:12px;">💡 <strong>Let op de eenheid van het eerste zinsdeel:</strong><br>Het eerste zinsdeel mag uit meerdere woorden bestaan, zolang het maar één grammaticale eenheid is.<br><em>"<strong>De oude man met de lange baard</strong> zat op het bankje."</em> (Alles vóór 'zat' is het onderwerp, één zinsdeel).</div>
      </div>

      <div class="gw-section">
        <h2>📦 Deel 4: De Volgorde van Andere Zinsdelen (De Rest)</h2>
        <p>Na de persoonsvorm (en eventueel het onderwerp bij inversie) komt de <strong>rest</strong> van de zin. Hier gelden geen absolute regels, maar wel sterke <strong>voorkeursvolgordes</strong> en logica.</p>
        
        <h3>✅ A. Algemene Voorkeursvolgorde voor Bepalingen</h3>
        <p>De meest neutrale volgorde voor bepalingen van tijd, manier en plaats is:</p>
        <div class="gw-card gw-card--rule">
          <div class="gw-card-title">📐 Tijd – Manier – Plaats</div>
          <p style="margin:0; color:var(--gw-text)"><em>"Ik ga <strong>morgen</strong> (Tijd) <strong>op de fiets</strong> (Manier) <strong>naar Amsterdam</strong> (Plaats)."</em><br>Deze volgorde is niet verplicht, maar klinkt het meest natuurlijk. Afwijkingen zijn mogelijk om <strong>nadruk</strong> te leggen.</p>
        </div>

        <h3 style="margin-top:24px;">✅ B. Lijdend Voorwerp (LV) en Meewerkend Voorwerp (MV)</h3>
        <p><strong>Met Zelfstandig Naamwoord:</strong> De neutrale volgorde is: <strong>MV vóór LV</strong> (zonder voorzetsel) of <strong>LV vóór MV</strong> (met <em>aan</em>).</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Structuur</th><th>Voorbeeldzin</th></tr></thead>
            <tbody>
              <tr><td><strong>MV (zonder 'aan') – LV</strong></td><td><em>"Ik <strong>geef</strong> <strong>mijn moeder</strong> (MV) <strong>een cadeau</strong> (LV)."</em></td></tr>
              <tr><td><strong>LV – MV (met 'aan')</strong></td><td><em>"Ik <strong>geef</strong> <strong>een cadeau</strong> (LV) <strong>aan mijn moeder</strong> (MV)."</em></td></tr>
            </tbody>
          </table>
        </div>

        <p style="margin-top:12px;"><strong>Met Persoonlijk Voornaamwoord:</strong> Als het MV een <strong>persoonlijk voornaamwoord</strong> is (<em>me, je, hem, haar, ons, jullie, ze</em>), staat het <strong>altijd vóór het LV</strong>.</p>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Structuur</th><th>Voorbeeldzin</th></tr></thead>
            <tbody>
              <tr><td><strong>MV (pronomen) – LV</strong></td><td><em>"Ik <strong>geef</strong> <strong>haar</strong> <strong>het boek</strong>."<br>"Hij <strong>heeft</strong> <strong>me</strong> <strong>een verhaal</strong> verteld."</em></td></tr>
              <tr><td><strong>LV (pronomen) – MV (pronomen)</strong></td><td><em>"Ik <strong>geef</strong> <strong>het</strong> (LV) <strong>haar</strong> (MV)." <small>(Let op: <em>het</em> vóór <em>haar</em> als beide voornaamwoorden zijn)</small></em></td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"<strong>De postbode bezorgde de buren het verkeerde pakketje</strong>."</em> <small>(MV 'de buren' vóór LV 'het verkeerde pakketje')</small></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Zij stuurde haar vriendin een lange brief</strong>."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Ik heb het hem gisteren nog gevraagd</strong>."</em> <small>(LV 'het' vóór MV 'hem')</small></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Kun je me de boter even aangeven?</strong>"</em> <small>(MV 'me' vóór LV 'de boter')</small></span>
        </div>

        <h3 style="margin-top:24px;">✅ C. Bijwoordelijke Bepalingen en 'Er'</h3>
        <p><strong>'Er'</strong> als onbepaald onderwerp of plaatsbepaling staat <strong>direct na de persoonsvorm</strong> (of na het onderwerp bij inversie).</p>
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Zin</th><th>Positie van 'Er'</th></tr></thead>
            <tbody>
              <tr><td><em>"<strong>Er</strong> staat iemand voor de deur."</em></td><td>Direct na PV (<em>staat</em>).</td></tr>
              <tr><td><em>"Vandaag <strong>staat er</strong> iemand voor de deur."</em></td><td>Na PV (<em>staat</em>) en vóór het onbepaald onderwerp (<em>iemand</em>).</td></tr>
              <tr><td><em>"Ik heb <strong>er</strong> geen zin in."</em></td><td>Na het onderwerp en PV, voor de rest.</td></tr>
            </tbody>
          </table>
        </div>

        <div class="gw-example" style="margin-top:16px;">
          <span class="orig">✨ <em>"<strong>Er</strong> wordt hier niet gerookt."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"<strong>Er</strong> is iets vreemds aan de hand."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Gisteren <strong>heeft er</strong> een ernstig ongeluk plaatsgevonden."</em></span>
          <span class="orig" style="margin-top:4px;">✨ <em>"Ik heb <strong>er</strong> lang over nagedacht."</em></span>
        </div>
      </div>

      <div class="gw-section">
        <h2>🎯 Deel 5: De Positie van 'Niet' in de Hoofdzin</h2>
        <p>De regel is simpel: <em>niet</em> wil zo ver mogelijk naar achteren, maar het moet <strong>vóór</strong> het element staan dat het ontkent als dat element specifiek is.</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Je ontkent...</th><th>Positie van 'Niet'</th><th>Voorbeeld</th></tr></thead>
            <tbody>
              <tr><td><strong>De hele actie</strong></td><td>Helemaal achteraan</td><td><em>"Ik kom <strong>niet</strong>."</em></td></tr>
              <tr><td><strong>Een specifiek ZN met 'de/het'</strong></td><td>Vóór het ZN</td><td><em>"Ik bedoel <strong>niet de</strong> directeur."</em></td></tr>
              <tr><td><strong>Een bijvoeglijk naamwoord</strong></td><td>Vóór het BN</td><td><em>"De soep is <strong>niet lekker</strong>."</em></td></tr>
              <tr><td><strong>Een voorzetselbepaling</strong></td><td>Vóór het voorzetsel</td><td><em>"Ik woon <strong>niet in</strong> Amsterdam."</em></td></tr>
              <tr><td><strong>Een werkwoordscluster</strong></td><td>Vóór de werkwoorden</td><td><em>"Ik <strong>heb</strong> hem <strong>niet</strong> kunnen <strong>zien</strong>."</em></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="gw-section">
        <h2>🔚 Deel 6: De Plaats van Werkwoorden aan het Einde (Het Rechterveld)</h2>
        <p>Een van de meest kenmerkende eigenschappen van het Nederlands is dat <strong>niet-vervoegde werkwoorden</strong> (infinitieven, voltooide deelwoorden, scheidbare voorvoegsels) naar het <strong>einde</strong> van de hoofdzin worden verbannen. Dit creëert de beroemde <strong>tangconstructie</strong> (Satzklammer).</p>
        
        <div class="gw-table-wrap">
          <table class="gw-table">
            <thead><tr><th>Vooraan</th><th>Middenstuk</th><th>Achteraan (Werkwoorden)</th></tr></thead>
            <tbody>
              <tr><td><em>Ik <strong>heb</strong> ...</em></td><td>... mijn zusje gisteren een boek ...</td><td>... <strong>gegeven</strong>.</td></tr>
              <tr><td><em>Hij <strong>wil</strong> ...</em></td><td>... volgend jaar een wereldreis ...</td><td>... <strong>maken</strong>.</td></tr>
              <tr><td><em>Zij <strong>belde</strong> ...</em></td><td>... haar moeder gisteren ...</td><td>... <strong>op</strong>. <small>(Scheidbaar voorvoegsel)</small></td></tr>
            </tbody>
          </table>
        </div>

        <h3 style="margin-top:24px;">🔍 Volgorde van Meerdere Werkwoorden aan het Einde:</h3>
        <p>Wanneer er twee of meer werkwoorden aan het einde staan, is de standaardvolgorde (de <strong>groene volgorde</strong>):</p>
        <div class="gw-card gw-card--rule">
          <div class="gw-card-title">📐 Hulpwerkwoord van tijd – Koppelwerkwoord / Modaal werkwoord – Hoofdwerkwoord</div>
          <p style="margin:0; color:var(--gw-text)"><em>"Ik <strong>heb</strong> hem <strong>zien</strong> <strong>lopen</strong>." | <em>"Hij <strong>had</strong> het <strong>willen</strong> <strong>doen</strong>." | <em>"Zij <strong>zou</strong> het <strong>hebben</strong> <strong>kunnen</strong> <strong>zien</strong>."</em></p>
